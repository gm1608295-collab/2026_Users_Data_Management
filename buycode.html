<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOLO M Game Shop - Buy Code</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        :root{--bg:#0a0a1a;--p:#1a1f4b;--a:#4a1c7a;--w:#f39c12;--g:#2ecc71;--t:#fff;--r:#e74c3c;--b:#3498db}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);min-height:100vh;padding:15px;overflow-y:auto}
        .container{max-width:500px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
        .header{display:flex;align-items:center;gap:10px;margin-bottom:15px}
        .header a{color:var(--w);font-size:20px;text-decoration:none}
        .header h1{font-size:18px;color:var(--w)}
        .balance-bar{background:rgba(0,0,0,0.4);padding:10px 15px;border-radius:8px;margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
        .balance-bar .bal{color:var(--w);font-weight:bold}
        .scroll-content{flex:1;overflow-y:auto;padding-bottom:10px}
        
        .game-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:15px}
        .game-card{background:rgba(26,31,75,0.6);border-radius:10px;padding:15px 10px;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.1);transition:all 0.3s}
        .game-card:hover{background:rgba(74,28,122,0.4);border-color:var(--w)}
        .game-card img{width:50px;height:50px;border-radius:10px;margin-bottom:8px;object-fit:cover}
        .game-card p{font-size:10px;color:var(--t);margin-top:5px}
        .game-card .price-tag{font-size:9px;color:var(--w);margin-top:3px}
        .game-card.owned{opacity:0.5;cursor:default;border-color:rgba(46,204,113,0.3)}
        .game-card.owned:after{content:'✓ Owned';display:block;font-size:8px;color:var(--g);margin-top:3px}
        
        .back-btn{display:block;padding:12px;background:rgba(255,255,255,0.1);color:var(--t);text-align:center;border-radius:6px;text-decoration:none;font-size:13px;margin-top:10px}
        .notif{position:fixed;top:20px;right:20px;padding:10px 15px;border-radius:6px;font-size:13px;z-index:9999;display:none;font-weight:bold}
        
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:5000;justify-content:center;align-items:center}
        .modal.active{display:flex}
        .modal-box{background:var(--p);padding:20px;border-radius:12px;width:90%;max-width:400px;border:2px solid var(--w);max-height:85vh;overflow-y:auto}
        .modal-box h3{color:var(--w);text-align:center;margin-bottom:5px;font-size:16px}
        .modal-box .modal-img{width:60px;height:60px;border-radius:12px;object-fit:cover;display:block;margin:0 auto 10px}
        .modal-box .warning-text{font-size:10px;color:rgba(255,255,255,0.6);text-align:center;margin-bottom:15px;line-height:1.5}
        .modal-box .code-item{background:rgba(0,0,0,0.4);padding:12px;border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
        .modal-box .code-item .code-val{font-family:'Courier New',monospace;font-size:12px;word-break:break-all;flex:1}
        .modal-box .code-item .code-val.locked{color:rgba(255,255,255,0.3);font-size:14px;letter-spacing:2px}
        .btn-sm{padding:5px 12px;font-size:10px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;white-space:nowrap}
        .btn-buy{background:var(--g);color:#000}.btn-close{background:var(--r);color:var(--t);padding:10px 25px;border:none;border-radius:6px;cursor:pointer;font-size:13px;display:block;margin:10px auto 0}
        
        .qr-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:6000;justify-content:center;align-items:center}
        .qr-modal.active{display:flex}
        .qr-box{background:#0c0e27;padding:25px;border-radius:12px;width:90%;max-width:380px;border:2px solid var(--w);text-align:center;max-height:90vh;overflow-y:auto}
        .qr-box h3{color:var(--w);margin-bottom:10px;font-size:15px}
        .qr-box .qr-container{background:#fff;padding:15px;border-radius:8px;display:inline-block;margin:10px 0}
        .qr-box .reveal-btn{background:var(--a);color:var(--t);border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:12px;margin:5px}
        .qr-box .code-area{display:none;margin-top:10px}
        .qr-box .code-area .the-code{font-size:16px;font-family:'Courier New',monospace;color:var(--g);background:rgba(0,0,0,0.5);padding:15px;border-radius:8px;word-break:break-all;letter-spacing:1px;user-select:all;margin:10px 0}
        .qr-box .code-area .timer{font-size:12px;color:var(--w);margin:5px 0}
        .qr-box .copy-btn{background:var(--g);color:#000;border:none;padding:8px 25px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:bold}
        .qr-box .close-qr{background:var(--r);color:var(--t);border:none;padding:8px 25px;border-radius:6px;cursor:pointer;font-size:12px;margin-top:10px}
    </style>
</head>
<body>
    <audio id="bgAudio" loop style="display:none"></audio>
    <div class="notif" id="notif"></div>
    
    <div class="container" id="mainContainer">
        <div class="header">
            <a href="/dashboard"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-shopping-cart"></i> Buy Code MLBB</h1>
        </div>
        
        <div class="balance-bar">
            <span><i class="fas fa-wallet"></i> MMK Balance</span>
            <span class="bal" id="myBalance">0 Ks</span>
        </div>
        
        <div class="scroll-content">
            <p style="font-size:11px;color:rgba(255,255,255,0.6);text-align:center;margin-bottom:15px">
                ⚠️ အကောင့်တစ်ကောင့်မှာ အမျိုးအစားတစ်ခုစီကို တစ်ကြိမ်စီသာ ဝယ်ယူလို့ရပါမည်။
            </p>
            <div class="game-grid" id="gameGrid"></div>
        </div>
        
        <a href="/dashboard" class="back-btn"><i class="fas fa-home"></i> Back to Dashboard</a>
    </div>
    
    <div class="modal" id="categoryModal">
        <div class="modal-box">
            <img class="modal-img" id="modalImg" src="" alt="">
            <h3 id="modalTitle"></h3>
            <p class="warning-text">⚠️ Code ကိုတစ်ကြိမ်ပဲကူးယူလို့ရပါမည်။ QR Code Scan ဖတ်ပြီးမှသာ Code အစစ်ရမည်။</p>
            <div id="codeList"></div>
            <button class="btn-close" onclick="closeCategoryModal()">Close</button>
        </div>
    </div>
    
    <div class="qr-modal" id="qrModal">
        <div class="qr-box" id="qrBoxContent"></div>
    </div>

<script>
    // ==================== PAGE ACCESS CHECK ====================
    (async function checkPageAccess(){
        try{
            const r=await fetch('/api/admin/page_status');
            const d=await r.json();
            if(d.pages){
                const bc=d.pages.find(p=>p.id==='buycode');
                if(bc&&bc.status==='off'){
                    document.getElementById('mainContainer').innerHTML=`<div style="text-align:center;padding:50px"><i class="fas fa-tools" style="font-size:60px;color:#f39c12;margin-bottom:20px"></i><h2 style="color:#f39c12">ယခုစာမျက်နှာကို ပြုပြင်နေပါသည်</h2><p>ခဏစောင့်ပါ</p><a href="/dashboard" style="color:#f39c12">Back to Dashboard</a></div>`;
                    return;
                }
            }
        }catch(e){}
    })();

    const CODES=[
        {category:"Shhh emote",icon:"https://i.ibb.co/KprVCy87/icon-reward2-Q0a-Xg-C62.png",price:5000,codes:["2359x2s4zqzq23fb8"]},
        {category:"Golden Month Border",icon:"https://i.ibb.co/LXVHQfk3/icon-reward1-D7w-Nl-OTn.png",price:8000,codes:["29jwchdgqyvj23f5e"]},
        {category:"Lucky Diamond Code",icon:"https://i.ibb.co/n8m2ZSgz/box4-7e338a9e.png",price:12000,codes:["2ja2rum6s6x923fnn"]},
        {category:"Magic Durt",icon:"https://i.ibb.co/NdpDZ0P7/8.png",price:3000,codes:["35smvu4a354423gzj"]},
        {category:"Emblem Box",icon:"https://i.ibb.co/Xr1LDXSG/mbx1-c5ec07ee.png",price:4000,codes:["28knzpt43hdc23gzc"]}
    ];

    let purchasedCodes=JSON.parse(localStorage.getItem('purchased_codes')||'{}');
    let currentBalance=0;
    let qrTimerInterval=null;
    let revealedCodeValue='';

    function n(m,t="success"){const e=document.getElementById("notif");e.textContent=m;e.style.background=t==="success"?"#2ecc71":"#e74c3c";e.style.display="block";setTimeout(()=>e.style.display="none",2000)}
    function formatNumber(num){return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',')}

    async function loadBalance(){
        try{const r=await fetch('/api/get_balance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:localStorage.getItem('auth_token')})});const d=await r.json();currentBalance=d.balance||0;document.getElementById('myBalance').textContent=formatNumber(currentBalance)+' Ks';renderGameCards()}catch(e){}
    }

    function isCategoryPurchased(i){return purchasedCodes[i]===true}

    function renderGameCards(){
        document.getElementById('gameGrid').innerHTML=CODES.map((cat,i)=>`<div class="game-card ${isCategoryPurchased(i)?'owned':''}" onclick="${isCategoryPurchased(i)?'':'openCategory('+i+')'}"><img src="${cat.icon}"><p>${cat.category}</p><div class="price-tag">💰 ${formatNumber(cat.price)} Ks</div></div>`).join('')
    }

    function openCategory(i){
        if(isCategoryPurchased(i))return;
        const cat=CODES[i];
        document.getElementById('modalImg').src=cat.icon;
        document.getElementById('modalTitle').textContent=cat.category;
        document.getElementById('codeList').innerHTML=cat.codes.map(c=>`<div class="code-item"><span class="code-val locked">••••••••••••••••••</span><button class="btn-sm btn-buy" onclick="buyCode(${i})">Buy (${formatNumber(cat.price)} Ks)</button></div>`).join('');
        document.getElementById('categoryModal').classList.add('active');
    }

    function closeCategoryModal(){document.getElementById('categoryModal').classList.remove('active')}

    function buyCode(i){
        const cat=CODES[i],price=cat.price,code=cat.codes[0];
        if(isCategoryPurchased(i))return n('ဒီအမျိုးအစားကိုဝယ်ပြီးပါပြီ','error');
        if(currentBalance<price)return n('ငွေမလုံလောက်ပါ','error');
        if(!confirm(`${cat.category}\n\nစျေးနှုန်း: ${formatNumber(price)} Ks\n\nဝယ်ယူမှာသေချာပါသလား?`))return;
        
        const uid=parseInt(localStorage.getItem('auth_token').replace('token_',''));
        fetch('/api/use_code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,userId:uid})})
        .then(r=>r.json()).then(d=>{
            if(d.already_used)return n('❌ ဤ Code ကို အသုံးပြုပြီးပါပြီ။','error');
            fetch('/api/admin/update_balance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:uid,amount:-price})})
            .then(r=>r.json()).then(d2=>{
                if(d2.success){
                    currentBalance-=price;
                    document.getElementById('myBalance').textContent=formatNumber(currentBalance)+' Ks';
                    purchasedCodes[i]=true;
                    localStorage.setItem('purchased_codes',JSON.stringify(purchasedCodes));
                    closeCategoryModal();
                    renderGameCards();
                    showQRModal(code);
                }
            });
        });
    }

    function showQRModal(code){
        revealedCodeValue=code;
        document.getElementById('qrBoxContent').innerHTML=`
            <h3><i class="fas fa-qrcode"></i> Scan QR Code</h3>
            <p style="font-size:11px;color:rgba(255,255,255,0.7)">Code ရယူရန် QR Code ကို Scan ဖတ်ပါ</p>
            <div class="qr-container" id="qrcodeContainer"></div>
            <p style="font-size:10px;color:rgba(255,255,255,0.5);margin:8px 0">သို့မဟုတ်</p>
            <button class="reveal-btn" onclick="revealCode()"><i class="fas fa-eye"></i> Code အစစ် ကြည့်မည်</button>
            <div class="code-area" id="qrCodeArea">
                <div class="the-code">${code}</div>
                <p class="timer" id="qrTimer">⏱️ 10 seconds remaining</p>
                <button class="copy-btn" id="qrCopyBtn" onclick="copyQRCode()"><i class="fas fa-copy"></i> Copy Code</button>
            </div>
            <button class="close-qr" onclick="closeQRModal()">Close</button>`;
        
        document.getElementById('qrModal').classList.add('active');
        
        setTimeout(()=>{
            const c=document.getElementById('qrcodeContainer');
            if(c){c.innerHTML='';new QRCode(c,{text:code,width:150,height:150,colorDark:'#000000',colorLight:'#ffffff'})}
        },100);
        
        let sec=10;
        if(qrTimerInterval)clearInterval(qrTimerInterval);
        qrTimerInterval=setInterval(()=>{
            sec--;
            const t=document.getElementById('qrTimer');
            if(t)t.textContent=`⏱️ ${sec} seconds remaining`;
            if(sec<=0){clearInterval(qrTimerInterval);closeQRModal();n('⏰ Code ကူးယူချိန်ကုန်သွားပါပြီ')}
        },1000);
    }

    function revealCode(){document.getElementById('qrCodeArea').style.display='block';document.querySelector('.reveal-btn').style.display='none'}
    function copyQRCode(){if(!revealedCodeValue)return;navigator.clipboard.writeText(revealedCodeValue).then(()=>{const b=document.getElementById('qrCopyBtn');if(b){b.innerHTML='<i class="fas fa-check"></i> Copied!';b.style.background='rgba(255,255,255,0.2)'}n('✅ Code Copied!')})}
    function closeQRModal(){document.getElementById('qrModal').classList.remove('active');if(qrTimerInterval){clearInterval(qrTimerInterval);qrTimerInterval=null}}
    
    loadBalance();

    // ==================== BG MUSIC PLAYLIST PLAYER ====================
    (function(){const a=document.getElementById('bgAudio');let playlist=[],currentIndex=parseInt(localStorage.getItem('bgMusicIndex')||'0');a.volume=0.6;
    async function check(){try{const r=await fetch('/api/bg_music?t='+Date.now());const d=await r.json();if(d.playlist&&d.playlist.length>0){const nl=JSON.stringify(d.playlist),ol=JSON.stringify(playlist);if(nl!==ol){playlist=d.playlist;currentIndex=0;play()}else if(a.paused&&a.src){const t=localStorage.getItem('bgMusicTime_'+currentIndex);if(t)a.currentTime=parseFloat(t);a.play().catch(()=>{})}}else{a.pause();a.src='';playlist=[]}}catch(e){}}
    function play(){if(!playlist.length)return;if(currentIndex>=playlist.length)currentIndex=0;const url=playlist[currentIndex];if(a.src!==url){a.src=url;a.addEventListener('canplay',function(){const t=localStorage.getItem('bgMusicTime_'+currentIndex);if(t)a.currentTime=parseFloat(t);a.play().catch(()=>{})},{once:true})}else{a.play().catch(()=>{})}}
    a.addEventListener('ended',function(){localStorage.setItem('bgMusicTime_'+currentIndex,a.currentTime);currentIndex=(currentIndex+1)%playlist.length;localStorage.setItem('bgMusicIndex',currentIndex);localStorage.setItem('bgMusicTime_'+currentIndex,'0');play()});
    setInterval(()=>{if(!a.paused&&playlist.length>0){localStorage.setItem('bgMusicIndex',currentIndex);localStorage.setItem('bgMusicTime_'+currentIndex,a.currentTime)}},500);
    check();setInterval(check,5000)})();
</script>
</body>
</html>
