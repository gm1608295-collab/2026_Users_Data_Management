<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Users</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0c0e27;--p:#1a1f4b;--a:#4a1c7a;--r:#e74c3c;--g:#2ecc71;--w:#f39c12;--b:#3498db;--t:#fff}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);min-height:100vh;padding:15px;overflow-y:auto}
        .section{background:rgba(26,31,75,0.6);border-radius:10px;padding:15px;margin-bottom:12px;border:1px solid rgba(74,28,122,0.5)}
        .section h3{color:var(--w);font-size:13px;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:6px;display:flex;align-items:center;gap:8px}
        .btn{padding:8px 14px;border:none;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer;margin:3px;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;justify-content:center}
        .btn-w{background:var(--w);color:#000}.btn-g{background:var(--g);color:#000}.btn-r{background:var(--r);color:#fff}.btn-b{background:var(--b);color:#fff}
        .user-row{display:flex;justify-content:space-between;align-items:center;padding:12px;background:rgba(0,0,0,0.35);border-radius:14px;margin-bottom:8px;border-left:4px solid var(--g);gap:15px;transition:all 0.2s}
        .user-row:hover{background:rgba(0,0,0,0.5)}
        .user-row.banned{border-left-color:var(--r);opacity:0.7;background:rgba(231,76,60,0.1)}
        .user-info{flex:1;min-width:0}
        .user-name{font-size:12px;font-weight:bold;color:var(--w);display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:5px}
        .user-details{font-size:9px;color:rgba(255,255,255,0.6);margin-bottom:4px;word-break:break-all}
        .device-info{font-size:8px;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
        .device-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
        .device-dot.online{background:#2ecc71;box-shadow:0 0 6px #2ecc71}
        .device-dot.offline{background:#e74c3c}
        .premium-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:8px;font-weight:bold}
        .premium-badge.spin{background:rgba(243,156,18,0.2);color:#f39c12}
        .premium-badge.chat{background:rgba(46,204,113,0.2);color:#2ecc71}
        .username{font-size:11px;color:#fff}
        .user-btns{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;flex-shrink:0;min-width:130px}
        .btn-micro{padding:6px 4px;font-size:9px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;white-space:nowrap;text-align:center}
        .btn-micro.edit{background:var(--w);color:#000}
        .btn-micro.pass{background:#9b59b6;color:#fff}
        .btn-micro.ban{background:var(--r);color:#fff}
        .btn-micro.unban{background:var(--g);color:#000}
        .btn-micro.del{background:#c0392b;color:#fff}
        .btn-micro.revoke{background:#e74c3c;color:#fff}
        .btn-micro.revoke-chat{background:#e74c3c;color:#fff}
        .status-badge{font-size:8px;padding:4px 8px;border-radius:12px;font-weight:bold;display:inline-block}
        .status-badge.on{background:rgba(46,204,113,0.2);color:var(--g)}
        .status-badge.off{background:rgba(231,76,60,0.2);color:var(--r)}
        .divider{margin:12px 0}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:2000;justify-content:center;align-items:center}
        .modal.active{display:flex}
        .modal-box{background:var(--p);border:2px solid var(--w);border-radius:12px;padding:22px;width:90%;max-width:420px;max-height:80vh;overflow-y:auto}
        .modal-close{float:right;color:var(--r);cursor:pointer;font-size:22px}
        .form-group{margin-bottom:8px}
        .form-group label{display:block;font-size:11px;margin-bottom:3px;color:#ccc;font-weight:600}
        .form-group input{width:100%;padding:8px 10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:var(--t);font-size:11px}
        .pass-display-box{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:12px;margin-bottom:10px}
        .pass-value{font-family:monospace;font-size:11px;color:var(--w);background:rgba(0,0,0,0.3);padding:6px 10px;border-radius:8px;margin-bottom:8px}
        .login-more-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:9px;font-weight:bold;cursor:pointer;white-space:nowrap;flex-shrink:0}
        .login-detail-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:5000;justify-content:center;align-items:center}
        .login-detail-overlay.active{display:flex}
        .login-detail-modal{background:linear-gradient(145deg,#0f1235,#1a1f4b);border:2px solid rgba(255,255,255,0.15);border-radius:16px;width:95%;max-width:800px;height:90vh;display:flex;flex-direction:column;overflow:hidden}
        .login-detail-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
        .login-detail-header h2{font-size:16px;color:var(--w);margin:0}
        .login-detail-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:18px;cursor:pointer}
        .login-detail-toolbar{display:flex;gap:8px;padding:10px 16px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;flex-shrink:0}
        .login-detail-toolbar input{flex:1;min-width:200px;padding:8px 12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font-size:11px}
        .login-detail-table-wrap{flex:1;overflow-y:auto;overflow-x:auto;padding:0}
        .login-detail-table{width:100%;border-collapse:collapse;font-size:10px;min-width:650px}
        .login-detail-table th{background:rgba(0,0,0,0.6);color:var(--w);padding:10px 8px;text-align:left;font-size:9px;font-weight:bold;position:sticky;top:0;z-index:10}
        .login-detail-table td{padding:8px;border-bottom:1px solid rgba(255,255,255,0.05);vertical-align:middle}
        .login-detail-footer{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.1);font-size:10px;flex-shrink:0}
        .user-type-badge{display:inline-block;padding:3px 8px;border-radius:10px;font-size:8px;font-weight:bold}
        .user-type-badge.local{background:rgba(52,152,219,0.2);color:#3498db}
        .user-type-badge.google{background:rgba(231,76,60,0.2);color:#e74c3c}
        .user-type-badge.tiktok{background:rgba(0,0,0,0.3);color:#fff;border:1px solid rgba(255,255,255,0.3)}
        .user-type-badge.telegram{background:rgba(0,136,204,0.2);color:#0088cc}
        .login-table-actions{display:flex;gap:3px;flex-wrap:wrap}
        .login-table-actions .btn{font-size:7px;padding:3px 6px}
    </style>
</head>
<body>
    <div class="section">
        <h3><i class="fas fa-search"></i> User Search & Balance</h3>
        <div style="display:flex;gap:6px;margin-bottom:8px"><input type="text" id="userSearch" placeholder="Enter ID or Email..." style="flex:1;padding:10px;font-size:11px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff" onkeyup="searchUser()"></div>
        <div id="userSearchResult" style="max-height:120px;overflow-y:auto;margin-bottom:8px;font-size:10px"></div>
    </div>

    <div class="section">
        <h3 style="display:flex;justify-content:space-between;align-items:center">
            <span>📧 Local Users</span>
            <button class="login-more-btn" onclick="openLoginDetailModal('local')"><i class="fas fa-table"></i> More</button>
        </h3>
        <div id="localList" style="max-height:150px;overflow-y:auto"></div>
    </div>

    <div class="section">
        <h3 style="display:flex;justify-content:space-between;align-items:center">
            <span>🔵 Google Users</span>
            <button class="login-more-btn" onclick="openLoginDetailModal('google')"><i class="fas fa-table"></i> More</button>
        </h3>
        <div id="googleList" style="max-height:150px;overflow-y:auto"></div>
    </div>

    <div class="section">
        <h3 style="display:flex;justify-content:space-between;align-items:center">
            <span>🎵 TikTok Users</span>
            <button class="login-more-btn" onclick="openLoginDetailModal('tiktok')"><i class="fas fa-table"></i> More</button>
        </h3>
        <div id="tiktokList" style="max-height:150px;overflow-y:auto"></div>
    </div>

    <div class="section">
        <h3 style="display:flex;justify-content:space-between;align-items:center">
            <span>🤖 Telegram Users</span>
            <button class="login-more-btn" onclick="openLoginDetailModal('telegram')"><i class="fas fa-table"></i> More</button>
        </h3>
        <div id="telegramList" style="max-height:150px;overflow-y:auto"></div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-box">
            <span class="modal-close" onclick="closeEditModal()">&times;</span>
            <h3><i class="fas fa-user-edit"></i> Edit User</h3>
            <input type="hidden" id="editUserId">
            <div class="form-group"><label>Username</label><input type="text" id="editName"></div>
            <div class="form-group"><label>Email</label><input type="email" id="editEmail"></div>
            <div class="form-group"><label>Phone</label><input type="text" id="editPhone"></div>
            <div class="form-group"><label>New Password (optional)</label><input type="password" id="editPass"></div>
            <button class="btn btn-g" onclick="saveEdit()" style="width:100%"><i class="fas fa-save"></i> Save Changes</button>
        </div>
    </div>

    <div class="modal" id="dataPassModal">
        <div class="modal-box">
            <span class="modal-close" onclick="closeDataPassModal()">&times;</span>
            <h3><i class="fas fa-database"></i> Data Password Manager</h3>
            <input type="hidden" id="dataPassUserId">
            <p style="font-size:11px;color:rgba(255,255,255,0.6);text-align:center;margin-bottom:15px">👤 User: <b style="color:var(--w)" id="dataPassUserDisplay"></b></p>
            <div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:12px;margin-bottom:12px">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span><i class="fas fa-envelope"></i> 📧 Gmail Password</span><span style="font-size:10px;color:rgba(255,255,255,0.4)">Current</span></div>
                <div class="pass-value" id="currentGmailPass">---</div>
                <input type="text" id="newGmailPass" placeholder="New Gmail password" style="width:100%;padding:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff">
            </div>
            <div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:12px;margin-bottom:12px">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span><i class="fas fa-gamepad"></i> 🎮 MLBB Password</span><span style="font-size:10px;color:rgba(255,255,255,0.4)">Current</span></div>
                <div class="pass-value" id="currentMlbbPass">---</div>
                <input type="text" id="newMlbbPass" placeholder="New MLBB password" style="width:100%;padding:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff">
            </div>
            <div style="background:rgba(0,0,0,0.3);border-radius:12px;padding:12px;margin-bottom:12px">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span><i class="fab fa-tiktok"></i> 🎵 TikTok Password</span><span style="font-size:10px;color:rgba(255,255,255,0.4)">Current</span></div>
                <div class="pass-value" id="currentTiktokPass">---</div>
                <input type="text" id="newTiktokPass" placeholder="New TikTok password" style="width:100%;padding:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff">
            </div>
            <button class="btn btn-g" onclick="saveDataPass()" style="width:100%"><i class="fas fa-save"></i> Save All Passwords</button>
        </div>
    </div>

    <!-- Login Detail Modal -->
    <div class="login-detail-overlay" id="loginDetailOverlay" onclick="closeLoginDetailModal(event)">
        <div class="login-detail-modal" onclick="event.stopPropagation()">
            <div class="login-detail-header">
                <h2 id="loginDetailTitle"><i class="fas fa-users"></i> User Details</h2>
                <button class="login-detail-close" onclick="closeLoginDetailModal()">&times;</button>
            </div>
            <div class="login-detail-toolbar">
                <input type="text" id="loginDetailSearch" placeholder="🔍 Search by ID, Name, or Email..." onkeyup="filterLoginDetailTable()">
                <button class="btn btn-r" onclick="banAllInLoginDetail()"><i class="fas fa-ban"></i> Ban All</button>
                <button class="btn btn-g" onclick="unbanAllInLoginDetail()"><i class="fas fa-check"></i> Unban All</button>
            </div>
            <div class="login-detail-table-wrap" id="loginDetailTableWrap">
                <div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4);"><i class="fas fa-spinner fa-spin" style="font-size:30px;"></i><p style="margin-top:12px;">Loading...</p></div>
            </div>
            <div class="login-detail-footer">
                <span>Total: <b id="loginDetailTotal">0</b> users</span>
                <span>Banned: <b id="loginDetailBanned">0</b></span>
                <span>Premium: <b id="loginDetailPremium">0</b></span>
            </div>
        </div>
    </div>

    <script>
        // ==================== UTILITIES ====================
        function escapeHtml(str){if(!str)return'';return str.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m}).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g,function(c){return c})}
        function getTimeAgo(date){const now=new Date();const diff=Math.floor((now-date)/1000);if(diff<60)return diff+'s ago';if(diff<3600)return Math.floor(diff/60)+'m ago';if(diff<86400)return Math.floor(diff/3600)+'h ago';if(diff<604800)return Math.floor(diff/86400)+'d ago';return date.toLocaleDateString()}
        function n(m,t){t=t||"success";const e=document.getElementById("notif");if(!e){alert(m);return} e.textContent=m;e.style.background=t==="success"?"#2ecc71":"#e74c3c";e.style.display="block";setTimeout(()=>e.style.display="none",3000)}
        let loginDetailBannedList=[];let allLoginDetailUsers=[];let loginDetailType='local';
        
        // ==================== LOAD USERS ====================
        async function loadAdminData(){
            try{
                const r=await fetch("/api/admin/users_with_logins");
                const d=await r.json();
                document.getElementById("totalUsers").textContent=d.users?d.users.length:0;
                let banned=[];
                try{
                    let bannedRes=await fetch('/api/admin/banned_list');
                    let bannedData=await bannedRes.json();
                    banned=bannedData.banned||[];
                }catch(e){banned=[];}
                document.getElementById("bannedUsers").textContent=banned.length;
                const renderList=(list,container,editable)=>{
                    if(!list||list.length===0){container.innerHTML='<p style="font-size:10px;color:rgba(255,255,255,0.4);padding:15px;text-align:center">No users</p>';return;}
                    container.innerHTML=list.map(u=>{
                        const isBanned=banned.includes(u.id.toString());
                        const isPremium=u.premium_expiry&&new Date(u.premium_expiry)>new Date();
                        const isChatPremium=u.chat_premium_expiry&&new Date(u.chat_premium_expiry)>new Date();
                        const lastLogin=u.last_login_time?new Date(u.last_login_time):null;
                        const timeAgo=lastLogin?getTimeAgo(lastLogin):'Never';
                        const activeDevices=parseInt(u.active_devices)||0;
                        const lastDevice=u.last_device||'Unknown';
                        let badges='';
                        if(isPremium)badges+='<span class="premium-badge spin">🎰 Spin</span>';
                        if(isChatPremium)badges+='<span class="premium-badge chat">💬 Chat</span>';
                        let editBtn=editable?`<button class="btn-micro edit" onclick="openEditModal('${u.id}','${escapeHtml(u.username||'')}','${escapeHtml(u.email||'')}','${escapeHtml(u.phone||'')}')">✏️Edit</button>`:'';
                        let passBtn=`<button class="btn-micro pass" onclick="openDataPassModal('${u.id}','${escapeHtml(u.username||'User')}')">🔑Pass</button>`;
                        let revokeSpinBtn=isPremium?`<button class="btn-micro revoke" onclick="revokePremium('${u.id}','${escapeHtml(u.username||'User')}')">🎰Revoke Spin</button>':'`;
                        let revokeChatBtn=isChatPremium?`<button class="btn-micro revoke-chat" onclick="revokeChatPremium('${u.id}','${escapeHtml(u.username||'User')}')">💬Revoke Chat</button>':'`;
                        let banBtn=`<button class="btn-micro ${isBanned?'unban':'ban'}" onclick="toggleBanUser('${u.id}', this)">${isBanned?'✅Unban':'🚫Ban'}</button>`;
                        let delBtn=`<button class="btn-micro del" onclick="delUserById('${u.id}')">🗑️Del</button>`;
                        return `<div class="user-row ${isBanned?'banned':''}"><div class="user-info"><div class="user-name">🆔 ${u.id.toString().padStart(6,'0')} <span class="username">${escapeHtml(u.username||'N/A')}</span>${badges}</div><div class="user-details">📧 ${escapeHtml(u.email||'N/A')} | 💰 ${(u.balance||0).toLocaleString()} Ks</div><div class="device-info"><span class="device-dot ${activeDevices>0?'online':'offline'}"></span> 📱 ${activeDevices} active | 🕐 ${timeAgo} | ${escapeHtml(lastDevice)}</div></div><div class="user-btns">${editBtn}${passBtn}${revokeSpinBtn}${revokeChatBtn}${banBtn}${delBtn}</div></div>`;
                    }).join('');
                };
                const locals=d.users.filter(u=>u.login_type==='local');
                const googles=d.users.filter(u=>u.login_type==='google');
                const tiktoks=d.users.filter(u=>u.login_type==='tiktok');
                const telegrams=d.users.filter(u=>u.login_type==='telegram');
                renderList(locals,document.getElementById("localList"),true);
                renderList(googles,document.getElementById("googleList"),false);
                renderList(tiktoks,document.getElementById("tiktokList"),false);
                renderList(telegrams,document.getElementById("telegramList"),false);
            }catch(e){console.error(e);}
        }

        // ==================== USER ACTIONS ====================
        async function toggleBanUser(id,btn){
            const isBanned=btn.textContent.trim()==='✅Unban';
            if(isBanned){
                if(!confirm("✅ Unban user #"+id+"?"))return;
                try{const r=await fetch("/api/admin/unban",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:String(id)})});const d=await r.json();if(d.success){alert("✅ Unbanned!");loadAdminData();}else{alert("❌ Error");}}catch(e){alert("❌ Error");}
            }else{
                if(!confirm("⚠️ Ban user #"+id+"?"))return;
                try{const r=await fetch("/api/admin/ban",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:String(id)})});const d=await r.json();if(d.success){alert("✅ Banned!");loadAdminData();}else{alert("❌ Error");}}catch(e){alert("❌ Error");}
            }
        }
        async function delUserById(id){if(!confirm("⚠️ Delete user #"+id+"?"))return;try{const r=await fetch("/api/admin/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:id})});const d=await r.json();if(d.success){alert("✅ Deleted!");loadAdminData();}else{alert("❌ Error");}}catch(e){alert("❌ Error");}}
        async function revokePremium(userId,username){if(!confirm('⚠️ Revoke premium access for "'+username+'"? This will immediately remove their premium status.'))return;try{const r=await fetch('/api/admin/revoke_premium',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:userId})});const d=await r.json();if(d.success){alert('✅ Premium revoked for '+username);loadAdminData();}else{alert('❌ Error');}}catch(e){alert('❌ Error');}}
        async function revokeChatPremium(userId,username){if(!confirm('⚠️ Revoke CHAT PREMIUM access for "'+username+'"? This will immediately remove their chat premium status.'))return;try{const r=await fetch('/api/admin/revoke_chat_premium',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:userId})});const d=await r.json();if(d.success){alert('✅ Chat premium revoked for '+username);loadAdminData();}else{alert('❌ Error');}}catch(e){alert('❌ Error');}}
        function openEditModal(uid,un,em,ph){document.getElementById("editUserId").value=uid;document.getElementById("editName").value=un||'';document.getElementById("editEmail").value=em||'';document.getElementById("editPhone").value=ph||'';document.getElementById("editPass").value='';document.getElementById("editModal").classList.add("active")}
        function closeEditModal(){document.getElementById("editModal").classList.remove("active")}
        async function saveEdit(){const id=document.getElementById("editUserId").value,un=document.getElementById("editName").value,em=document.getElementById("editEmail").value,ph=document.getElementById("editPhone").value,pw=document.getElementById("editPass").value;try{await fetch("/api/admin/edit_user",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:parseInt(id),username:un,email:em,phone:ph,password:pw||''})});alert("✅ Updated!");closeEditModal();loadAdminData()}catch(e){alert("Error");}}
        function openDataPassModal(uid,uname){document.getElementById('dataPassUserId').value=uid;document.getElementById('dataPassUserDisplay').textContent=uname+' (ID: '+uid.toString().padStart(6,'0')+')';document.getElementById('newGmailPass').value='';document.getElementById('newMlbbPass').value='';document.getElementById('newTiktokPass').value='';fetch('/api/admin/get_user_data_pass',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:uid})}).then(r=>r.json()).then(d=>{document.getElementById('currentGmailPass').textContent=d.gmail_pass||'Default: DoubleMK2008';document.getElementById('currentMlbbPass').textContent=d.mlbb_pass||'Default: GlobalMK2008';document.getElementById('currentTiktokPass').textContent=d.tiktok_pass||'Default: DoubleMK2008'}).catch(()=>{document.getElementById('currentGmailPass').textContent='Default: DoubleMK2008';document.getElementById('currentMlbbPass').textContent='Default: GlobalMK2008';document.getElementById('currentTiktokPass').textContent='Default: DoubleMK2008'});document.getElementById('dataPassModal').classList.add('active')}
        function closeDataPassModal(){document.getElementById('dataPassModal').classList.remove('active')}
        async function saveDataPass(){const uid=document.getElementById('dataPassUserId').value;const gpass=document.getElementById('newGmailPass').value.trim();const mpass=document.getElementById('newMlbbPass').value.trim();const tpass=document.getElementById('newTiktokPass').value.trim();if(!gpass&&!mpass&&!tpass)return alert('Enter at least one password');try{const r=await fetch('/api/admin/update_data_pass',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:uid,gmail_pass:gpass||null,mlbb_pass:mpass||null,tiktok_pass:tpass||null})});const d=await r.json();if(d.success){alert('✅ Updated!');closeDataPassModal()}else{alert(d.message||'Error')}}catch(e){alert('Error')}}
        async function searchUser(){const q=document.getElementById('userSearch').value;if(q.length<2){document.getElementById('userSearchResult').innerHTML='';return}try{const r=await fetch('/api/admin/search_user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});const d=await r.json();document.getElementById('userSearchResult').innerHTML=d.users.map(u=>`<div class="user-row"><div class="user-info"><b>ID:${u.id.toString().padStart(6,'0')}</b> ${u.username||''}<br><small>📧 ${u.email} | 💰 ${u.balance||0} Ks</small></div><div style="display:flex;gap:3px;align-items:center"><input type="number" id="bal${u.id}" placeholder="Amt" style="width:55px;padding:4px;font-size:9px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:4px"><button class="btn btn-g" style="font-size:9px;padding:5px 8px" onclick="addBalance(${u.id})">+</button><button class="btn btn-r" style="font-size:9px;padding:5px 8px" onclick="subBalance(${u.id})">-</button></div></div>`).join('')}catch(e){}}
        async function addBalance(uid){const a=document.getElementById('bal'+uid).value;if(!a)return;await fetch('/api/admin/update_balance',{method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:uid,amount:parseFloat(a)})});alert('Added!');searchUser();loadAdminData()}
        async function subBalance(uid){const a=document.getElementById('bal'+uid).value;if(!a)return;await fetch('/api/admin/update_balance',{method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:uid,amount:-parseFloat(a)})});alert('Deducted!');searchUser();loadAdminData()}

        // ==================== LOGIN DETAIL MODAL ====================
        function openLoginDetailModal(type){
            loginDetailType=type;
            document.getElementById('loginDetailOverlay').classList.add('active');
            const titles={'local':'📧 Local Users Detail','google':'🔵 Google Users Detail','tiktok':'🎵 TikTok Users Detail','telegram':'🤖 Telegram Users Detail'};
            document.getElementById('loginDetailTitle').innerHTML='<i class="fas fa-users"></i> '+(titles[type]||'User Details');
            document.getElementById('loginDetailSearch').value='';
            loadLoginDetailModal();
        }
        function closeLoginDetailModal(event){if(event&&event.target!==document.getElementById('loginDetailOverlay'))return;document.getElementById('loginDetailOverlay').classList.remove('active');loadAdminData();}
        async function loadLoginDetailModal(){
            const wrap=document.getElementById('loginDetailTableWrap');
            wrap.innerHTML='<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4);"><i class="fas fa-spinner fa-spin" style="font-size:30px;"></i><p style="margin-top:12px;">Loading...</p></div>';
            try{
                try{const bannedRes=await fetch('/api/admin/banned_list');const bannedData=await bannedRes.json();loginDetailBannedList=bannedData.banned||[];}catch(e){loginDetailBannedList=[];}
                const r=await fetch("/api/admin/users_with_logins");const d=await r.json();
                if(!d.users){wrap.innerHTML='<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4);">No users found</div>';return;}
                allLoginDetailUsers=d.users.filter(u=>u.login_type===loginDetailType);
                document.getElementById('loginDetailTotal').textContent=allLoginDetailUsers.length;
                document.getElementById('loginDetailBanned').textContent=allLoginDetailUsers.filter(u=>loginDetailBannedList.includes(u.id.toString())).length;
                document.getElementById('loginDetailPremium').textContent=allLoginDetailUsers.filter(u=>u.premium_expiry&&new Date(u.premium_expiry)>new Date()).length;
                renderLoginDetailTable(allLoginDetailUsers);
            }catch(e){wrap.innerHTML='<div style="text-align:center;padding:40px;color:var(--r);">Error loading users</div>';}
        }
        function renderLoginDetailTable(users){
            const wrap=document.getElementById('loginDetailTableWrap');
            if(!users.length){wrap.innerHTML='<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.4);"><i class="fas fa-user-slash" style="font-size:40px;"></i><p style="margin-top:12px;">No users found</p></div>';return;}
            let html=`<table class="login-detail-table"><thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Balance</th><th>Premium</th><th>Devices</th><th>Last Login</th><th>Status</th><th>Actions</th></tr></thead><tbody>`;
            users.forEach(u=>{
                const isBanned=loginDetailBannedList.includes(u.id.toString());
                const isPremium=u.premium_expiry&&new Date(u.premium_expiry)>new Date();
                const isChatPremium=u.chat_premium_expiry&&new Date(u.chat_premium_expiry)>new Date();
                const lastLogin=u.last_login_time?new Date(u.last_login_time):null;
                const timeAgo=lastLogin?getTimeAgo(lastLogin):'Never';
                const activeDevices=parseInt(u.active_devices)||0;
                let premiumBadge='';if(isPremium)premiumBadge+='🎰 Spin ';if(isChatPremium)premiumBadge+='💬 Chat';if(!premiumBadge)premiumBadge='—';
                html+=`<tr style="${isBanned?'opacity:0.6;background:rgba(231,76,60,0.1);':''}"><td><b>${u.id.toString().padStart(6,'0')}</b></td><td><span class="user-type-badge ${loginDetailType}">${loginDetailType.toUpperCase()}</span> <span style="color:#fff;margin-left:4px;">${escapeHtml(u.username||'N/A')}</span></td><td style="font-size:9px;">${escapeHtml(u.email||'N/A')}</td><td><b style="color:var(--w);">${(u.balance||0).toLocaleString()} Ks</b></td><td><span style="font-size:8px;">${premiumBadge}</span></td><td><span class="device-dot ${activeDevices>0?'online':'offline'}"></span> ${activeDevices}</td><td style="font-size:9px;">${timeAgo}</td><td><span class="status-badge ${isBanned?'off':'on'}">${isBanned?'🚫 Banned':'✅ Active'}</span></td><td><div class="login-table-actions"><button class="btn btn-w" onclick="loginDetailEdit('${u.id}','${escapeHtml(u.username||'')}','${escapeHtml(u.email||'')}','${escapeHtml(u.phone||'')}')">✏️</button><button class="btn ${isBanned?'btn-g':'btn-r'}" onclick="loginDetailToggleBan('${u.id}', this)">${isBanned?'✅':'🚫'}</button><button class="btn btn-r" onclick="loginDetailDelete('${u.id}')">🗑️</button></div></td></tr>`;
            });
            html+='</tbody></table>';
            wrap.innerHTML=html;
        }
        function filterLoginDetailTable(){const query=document.getElementById('loginDetailSearch').value.toLowerCase().trim();if(!query){renderLoginDetailTable(allLoginDetailUsers);return;}const filtered=allLoginDetailUsers.filter(u=>u.id.toString().includes(query)||(u.username&&u.username.toLowerCase().includes(query))||(u.email&&u.email.toLowerCase().includes(query))||(u.phone&&u.phone.includes(query)));renderLoginDetailTable(filtered);}
        async function loginDetailToggleBan(id,btn){const isBanned=loginDetailBannedList.includes(id.toString());if(isBanned){if(!confirm("✅ Unban user #"+id+"?"))return;try{const r=await fetch("/api/admin/unban",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:String(id)})});const d=await r.json();if(d.success){alert("✅ Unbanned!");loadLoginDetailModal();}else{alert("❌ Error");}}catch(e){alert("❌ Error");}}else{if(!confirm("⚠️ Ban user #"+id+"?"))return;try{const r=await fetch("/api/admin/ban",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:String(id)})});const d=await r.json();if(d.success){alert("✅ Banned!");loadLoginDetailModal();}else{alert("❌ Error");}}catch(e){alert("❌ Error");}}}
        async function loginDetailDelete(id){if(!confirm("⚠️ Delete user #"+id+"? This cannot be undone!"))return;try{const r=await fetch("/api/admin/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:id})});const d=await r.json();if(d.success){alert("✅ Deleted!");loadLoginDetailModal();}else{alert("❌ Error");}}catch(e){alert("❌ Error");}}
        function loginDetailEdit(uid,un,em,ph){closeLoginDetailModal();setTimeout(()=>{openEditModal(uid,un,em,ph)},300);}
        async function banAllInLoginDetail(){const activeUsers=allLoginDetailUsers.filter(u=>!loginDetailBannedList.includes(u.id.toString()));if(!activeUsers.length)return alert('No active users to ban');if(!confirm(`⚠️ Ban ALL ${activeUsers.length} ${loginDetailType} users?`))return;let count=0;for(const u of activeUsers){try{await fetch("/api/admin/ban",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:String(u.id)})});count++;}catch(e){}}alert(`✅ ${count} users banned!`);loadLoginDetailModal();}
        async function unbanAllInLoginDetail(){const bannedUsers=allLoginDetailUsers.filter(u=>loginDetailBannedList.includes(u.id.toString()));if(!bannedUsers.length)return alert('No banned users to unban');if(!confirm(`✅ Unban ALL ${bannedUsers.length} ${loginDetailType} users?`))return;let count=0;for(const u of bannedUsers){try{await fetch("/api/admin/unban",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:String(u.id)})});count++;}catch(e){}}alert(`✅ ${count} users unbanned!`);loadLoginDetailModal();}

        // ==================== INIT ====================
        loadAdminData();
    </script>
</body>
</html>
