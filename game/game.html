
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍄 SUPER SOLO RUN - SOLO M Game Shop</title>
    <style>
        :root{--w:#f39c12;--r:#e74c3c;--g:#2ecc71;--b:#3498db}
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:manipulation;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;font-family:'Segoe UI',system-ui,sans-serif;position:fixed;top:0;left:0}
        #gameWrapper{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;overflow:hidden}
        canvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%}
        #hud{position:absolute;top:6px;left:6px;right:6px;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:5px 10px;background:rgba(0,0,0,0.55);border-radius:6px;color:#fff;font-size:12px;font-weight:bold;pointer-events:none;flex-wrap:wrap;gap:3px}
        .hud-item{display:flex;align-items:center;gap:2px;white-space:nowrap}
        .screen{position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,0.88);color:#fff;text-align:center;padding:20px}
        .screen h1{font-size:clamp(20px,5vw,34px);color:var(--w);margin-bottom:6px;text-shadow:2px 2px 4px rgba(0,0,0,0.8)}
        .screen h2{font-size:clamp(18px,4vw,26px);margin-bottom:8px}
        .screen p{font-size:clamp(10px,2vw,13px);color:#ccc;margin:3px 0;line-height:1.5}
        .screen .btn{display:inline-block;padding:12px 28px;background:var(--w);color:#000;border:none;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:10px;transition:all 0.2s;box-shadow:0 4px 15px rgba(243,156,18,0.3)}
        .screen .btn:hover{transform:scale(1.05);box-shadow:0 6px 25px rgba(243,156,18,0.5)}
        .screen .btn:active{transform:scale(0.95)}
        .win-h2{color:var(--g)}.lose-h2{color:var(--r)}
        .game-menu-btn{position:absolute;top:8px;right:8px;z-index:15;background:rgba(0,0,0,0.5);border:2px solid var(--w);color:var(--w);padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-weight:bold}
        .game-menu-btn:hover{background:rgba(243,156,18,0.3)}
    </style>
</head>
<body>
    <div id="gameWrapper">
        <div id="hud">
            <div class="hud-item">🌍 <span id="hudLevel">1-1</span></div>
            <div class="hud-item">⏱️ <span id="hudTime">300</span></div>
            <div class="hud-item">🪙 <span id="hudCoins">0</span></div>
            <div class="hud-item">💎 <span id="hudDiamonds">0</span></div>
            <div class="hud-item">🏆 <span id="hudScore">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <!-- Mobile Controls -->
        <div id="mobileControls" style="display:none;position:absolute;bottom:8px;left:0;right:0;z-index:10;padding:0 8px;"></div>
        
        <!-- Start Screen -->
        <div class="screen" id="startScreen">
            <h1>🍄 SUPER SOLO RUN</h1>
            <p>⬅️➡️ Move &nbsp;|&nbsp; ⬆️ Jump &nbsp;|&nbsp; ⬆️⬆️ Double Jump</p>
            <p>Stomp enemies 🧟 &nbsp;|&nbsp; Coins 🪙 &nbsp;|&nbsp; Flag 🏁</p>
            <button class="btn" id="btnStart">▶️ START GAME</button>
        </div>
        
        <!-- Game Over Screen -->
        <div class="screen" id="gameOverScreen" style="display:none">
            <h2 class="lose-h2">💀 GAME OVER</h2>
            <p>Score: <b id="finalScore">0</b></p>
            <p>Level: <b id="finalLevel">1-1</b></p>
            <button class="btn" id="btnRetry">🔄 TRY AGAIN</button>
        </div>
        
        <!-- Win Screen -->
        <div class="screen" id="winScreen" style="display:none">
            <h2 class="win-h2">🎉 VICTORY!</h2>
            <p>All Levels Completed!</p>
            <p>Total Score: <b id="winScore">0</b></p>
            <p>Diamonds: <b id="winDiamonds">0</b></p>
            <button class="btn" id="btnPlayAgain">🔄 PLAY AGAIN</button>
        </div>
    </div>

    <!-- Game Scripts Load Order -->
    <script src="game/audio.js"></script>
    <script src="game/hero.js"></script>
    <script src="game/creep.js"></script>
    <script src="game/gold.js"></script>
    <script src="game/shop.js"></script>
    <script src="game/button.js"></script>
    <script src="game/play.js"></script>
</body>
</html>
