<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>စကားပြော - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        :root{--bg:#0a0a1a;--p:#1a1f4b;--a:#4a1c7a;--w:#f39c12;--g:#2ecc71;--t:#fff;--r:#e74c3c;--b:#3498db}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:#0c0e27;color:var(--t);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:all 0.5s ease}
        
        .chat-header{display:flex;align-items:center;gap:10px;padding:12px 15px;background:linear-gradient(to right,var(--a),var(--p));border-bottom:2px solid var(--w);flex-shrink:0;z-index:10}
        .chat-header a{color:var(--w);text-decoration:none;font-size:18px;pointer-events:auto;cursor:pointer}
        .chat-header h3{color:var(--w);font-size:14px;flex:1}
        .chat-header .online-count{font-size:10px;color:var(--g)}
        
        .chat-tabs{display:flex;gap:4px;padding:8px 10px;background:rgba(0,0,0,0.3);flex-shrink:0}
        .chat-tab{flex:1;padding:8px;text-align:center;font-size:11px;cursor:pointer;border-radius:6px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);transition:all 0.2s}
        .chat-tab.active{background:var(--a);color:var(--w)}
        
        .chat-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
        
        .room-list{display:none;flex:1;overflow-y:auto;padding:10px}
        .room-list.active{display:block}
        
        .room-item{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(0,0,0,0.2);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all 0.2s}
        .room-item:hover{background:rgba(74,28,122,0.3)}
        .room-item .room-icon{font-size:20px}
        .room-item .room-info{flex:1}
        .room-item .room-name{font-size:12px;font-weight:bold}
        .room-item .room-last{font-size:9px;color:rgba(255,255,255,0.4);margin-top:3px}
        .room-item .room-badge{background:var(--r);color:#fff;font-size:9px;padding:2px 8px;border-radius:10px;min-width:20px;text-align:center}
        
        .chat-area{display:none;flex:1;flex-direction:column;overflow:hidden}
        .chat-area.active{display:flex}
        
        .chat-area-header{display:flex;align-items:center;gap:10px;padding:10px 15px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
        .chat-area-header .back-btn{color:var(--w);cursor:pointer;font-size:16px;pointer-events:auto}
        .chat-area-header .room-title{font-size:13px;font-weight:bold;flex:1}
        .chat-area-header .typing-indicator{font-size:9px;color:var(--g)}
        
        .messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px}
        
        .msg-row{display:flex;gap:8px;max-width:85%}
        .msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
        .msg-row.other{align-self:flex-start}
        
        .msg-bubble{padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.5;word-break:break-word;position:relative}
        .msg-mine .msg-bubble{background:var(--a);border-bottom-right-radius:4px}
        .msg-other .msg-bubble{background:rgba(255,255,255,0.1);border-bottom-left-radius:4px}
        
        .msg-sender{font-size:9px;color:var(--w);margin-bottom:4px;font-weight:bold}
        .msg-time{font-size:8px;color:rgba(255,255,255,0.3);margin-top:4px;text-align:right}
        
        .msg-image{max-width:200px;max-height:200px;border-radius:10px;cursor:pointer;display:block}
        .msg-file{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,0,0,0.3);border-radius:8px;cursor:pointer}
        .msg-file i{font-size:20px;color:var(--b)}
        .msg-file .file-info{flex:1}
        .msg-file .file-name{font-size:11px;color:var(--t)}
        .msg-file .file-size{font-size:9px;color:rgba(255,255,255,0.4)}
        
        .upload-progress{display:none;padding:10px 15px;background:rgba(0,0,0,0.5);border-top:1px solid rgba(255,255,255,0.1);align-items:center;gap:10px;flex-shrink:0}
        .upload-progress.active{display:flex}
        .upload-progress .progress-bar{flex:1;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
        .upload-progress .progress-fill{height:100%;background:var(--g);border-radius:2px;transition:width 0.3s;width:0%}
        .upload-progress .progress-text{font-size:10px;color:rgba(255,255,255,0.6);white-space:nowrap}
        .upload-progress .cancel-upload{color:var(--r);cursor:pointer;font-size:14px}
        
        .msg-input-area{display:flex;gap:8px;padding:10px 15px;background:rgba(0,0,0,0.4);border-top:1px solid rgba(255,255,255,0.1);flex-shrink:0;align-items:center}
        .input-wrapper{position:relative;flex:1}
        .msg-input-area input{width:100%;padding:12px 40px 12px 15px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:20px;color:#fff;font-size:13px;outline:none}
        .emoji-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;color:rgba(255,255,255,0.5)}
        .msg-input-area button{width:40px;height:40px;border-radius:50%;border:none;background:var(--w);color:#000;font-size:16px;cursor:pointer;flex-shrink:0}
        
        .attach-btn{width:38px;height:38px;border-radius:50%;border:none;background:rgba(255,255,255,0.1);color:var(--t);font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
        .attach-btn:hover{background:rgba(255,255,255,0.2)}
        .attach-btn.locked{opacity:0.4;cursor:not-allowed;background:rgba(255,255,255,0.05)}
        
        .emoji-picker{display:none;position:absolute;bottom:60px;right:0;background:var(--p);border:2px solid var(--w);border-radius:10px;padding:10px;z-index:100;width:300px;max-height:250px;overflow-y:auto;flex-wrap:wrap;gap:6px;box-shadow:0 10px 30px rgba(0,0,0,0.5)}
        .emoji-picker.active{display:flex}
        .emoji-item{font-size:24px;cursor:pointer;padding:4px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all 0.2s}
        .emoji-item:hover{transform:scale(1.3);background:rgba(255,255,255,0.1)}
        
        .admin-btn{width:100%;padding:12px;background:var(--g);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;margin-top:10px}
        
        .search-bar{padding:8px 10px;background:rgba(0,0,0,0.2);flex-shrink:0}
        .search-bar input{width:100%;padding:10px 15px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:20px;color:#fff;font-size:12px;outline:none}
        
        .empty-state{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.3)}
        .empty-state i{font-size:50px;margin-bottom:15px;display:block}
        
        .load-more{text-align:center;padding:10px;color:var(--b);font-size:11px;cursor:pointer}
        
        .image-preview-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:99999;justify-content:center;align-items:center;cursor:pointer}
        .image-preview-modal.active{display:flex}
        .image-preview-modal img{max-width:95%;max-height:95%;border-radius:10px}
        
        .toast{position:fixed;top:15px;right:15px;padding:12px 18px;border-radius:25px;z-index:99999;font-size:12px;font-weight:bold;display:none;box-shadow:0 5px 20px rgba(0,0,0,0.4)}
        
        @media(max-width:380px){.msg-row{max-width:90%}.msg-image{max-width:150px;max-height:150px}}
    </style>
</head>
<body>
    <audio id="msgSound" preload="auto" style="display:none">
        <source src="https://www.soundjay.com/buttons/sounds/button-09.mp3" type="audio/mpeg">
    </audio>

    <div class="toast" id="toast"></div>
    
    <div class="image-preview-modal" id="imagePreviewModal" onclick="this.classList.remove('active')">
        <img id="previewImage" src="">
    </div>

    <div class="chat-header">
        <a href="/dashboard"><i class="fas fa-arrow-left"></i></a>
        <h3><i class="fas fa-comments"></i> စကားပြော</h3>
        <span class="online-count" id="onlineCount">0 ယောက်ရှိ</span>
    </div>
    
    <div class="chat-tabs">
        <div class="chat-tab active" onclick="switchTab('rooms')">💬 စကားပြောများ</div>
        <div class="chat-tab" onclick="switchTab('online')">🟢 အွန်လိုင်း</div>
        <div class="chat-tab" onclick="switchTab('search')">🔍 ရှာရန်</div>
    </div>
    
    <div class="chat-body">
        <div class="room-list active" id="roomList"></div>
        <div class="room-list" id="onlineList"><div class="empty-state"><i class="fas fa-users"></i>အွန်လိုင်းသုံးစွဲသူများ စောင့်ဆိုင်းနေသည်...</div></div>
        <div class="room-list" id="searchList">
            <div class="search-bar"><input type="text" id="searchInput" placeholder="သုံးစွဲသူအမည် ရှာရန်..." onkeyup="searchUsers()"></div>
            <div id="searchResults" style="padding:10px"><div class="empty-state"><i class="fas fa-search"></i>သုံးစွဲသူအမည် ရိုက်ထည့်ပါ</div></div>
        </div>
        
        <div class="chat-area" id="chatArea">
            <div class="chat-area-header">
                <span class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></span>
                <span class="room-title" id="chatRoomTitle">စကားပြော</span>
                <span class="typing-indicator" id="typingIndicator"></span>
            </div>
            <div class="messages" id="messages"></div>
            <div class="load-more" id="loadMore" style="display:none" onclick="loadMoreMessages()">⏳ နောက်ထပ်စာများ ကြည့်ရန်...</div>
            
            <div class="upload-progress" id="uploadProgress">
                <span>📤</span>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <span class="progress-text" id="progressText">0%</span>
                <span class="cancel-upload" onclick="cancelUpload()"><i class="fas fa-times"></i></span>
            </div>
            
            <div class="msg-input-area">
                <input type="file" id="imageInput" accept="image/*" onchange="handleFileSelect('image')" style="display:none">
                <input type="file" id="fileInput" accept="*/*" onchange="handleFileSelect('file')" style="display:none">
                <button class="attach-btn" id="imageBtn" onclick="document.getElementById('imageInput').click()" title="ပုံပို့ရန်"><i class="fas fa-image"></i></button>
                <button class="attach-btn" id="fileBtn" onclick="document.getElementById('fileInput').click()" title="ဖိုင်ပို့ရန်"><i class="fas fa-paperclip"></i></button>
                <div class="input-wrapper">
                    <input type="text" id="msgInput" placeholder="စာရိုက်ပါ..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <span class="emoji-btn" onclick="toggleEmoji()">😊</span>
                    <div class="emoji-picker" id="emojiPicker"></div>
                </div>
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

<script>
// Check login
if (!localStorage.getItem('auth_token') || localStorage.getItem('auth_token') === 'guest') {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;text-align:center"><div><i class="fas fa-lock" style="font-size:50px;color:#f39c12;margin-bottom:15px"></i><h3>စကားပြောရန် အကောင့်ဝင်ပါ</h3><a href="/" style="color:#f39c12;margin-top:15px;display:inline-block">Login Page သို့သွားရန်</a></div></div>';
}

if (localStorage.getItem('auth_token') && localStorage.getItem('auth_token') !== 'guest') {

const socket = io(window.location.origin, {transports:['websocket','polling'],reconnection:true,reconnectionAttempts:5});

let user=null,currentRoom=null,messageOffset=0,hasMoreMessages=false,chatPremiumActive=false;

try{user=JSON.parse(localStorage.getItem('user')||'{}')}catch(e){user={}}
if(!user.id)user={id:0,username:'ဧည့်သည်'};

socket.on('connect',()=>{socket.emit('join',{userId:user.id||0,username:user.username||'သုံးစွဲသူ'})});

// ==================== TOAST ====================
function showToast(msg,isError){const t=document.getElementById('toast');t.textContent=msg;t.style.background=isError?'#e74c3c':'#2ecc71';t.style.display='block';setTimeout(()=>t.style.display='none',3000)}

// ==================== EMOJI ====================
const EMOJIS=['😀','😃','😄','😁','😅','🤣','😂','🙂','😉','😊','😇','🥰','😍','🤩','😘','😋','😛','😜','🤪','😝','🤑','🤗','🤔','😐','😑','😶','😏','😒','🙄','😬','😌','😔','😴','😷','🤒','🤕','🤢','🤮','🥵','🥶','😵','🤯','🥳','😎','🤓','🧐','😕','😟','😮','😯','😲','😳','🥺','😢','😭','😱','😡','😠','🤬','💀','👻','👽','🤖','👍','👎','👌','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','👇','👋','🤝','🙌','👏','🙏','💪','❤️','🧡','💛','💚','💙','💜','🖤','💔','💕','💞','💓','💗','💖','💘','💝','💯','⭐','🌟','✨','⚡','🔥','💫','🎉','🎊','🎁','🎂','🏆','🥇','🥈','🥉','🎖️','🏅','👑','💎','💰','🎮','📱','💻','🍔','🍕','🍟','☕','🍺','⚽','🏀','🎵','🎶','🌈','☀️','🌙','🚗','✈️','🚀'];

function buildEmojiPicker(){document.getElementById('emojiPicker').innerHTML=EMOJIS.map(e=>`<span class="emoji-item" onclick="insertEmoji('${e}')">${e}</span>`).join('')}
buildEmojiPicker();
function toggleEmoji(){document.getElementById('emojiPicker').classList.toggle('active')}
function insertEmoji(e){const i=document.getElementById('msgInput');i.value+=e;document.getElementById('emojiPicker').classList.remove('active');i.focus()}

// ==================== PREMIUM CHECK ====================
async function checkChatPremium(){
    const token=localStorage.getItem('auth_token');if(!token||token==='guest')return;
    try{const r=await fetch('/api/chat/premium/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});const d=await r.json();
        chatPremiumActive=d.success&&d.premium_active;
        ['imageBtn','fileBtn'].forEach(id=>{const btn=document.getElementById(id);if(btn){if(chatPremiumActive){btn.classList.remove('locked');btn.title='ပုံ/ဖိုင်ပို့ရန်'}else{btn.classList.add('locked');btn.title='ပုံ/ဖိုင်ပို့ရန် Premium လိုပါသည်'}}})
    }catch(e){}
}

// ==================== FILE UPLOAD ====================
function showUploadProgress(s){document.getElementById('uploadProgress').classList.toggle('active',s)}
function updateUploadProgress(p){document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressText').textContent=p+'%'}
function cancelUpload(){showUploadProgress(false);updateUploadProgress(0)}

async function handleFileSelect(type){
    const input=document.getElementById(type==='image'?'imageInput':'fileInput');
    const file=input.files[0];if(!file)return;
    
    if(!chatPremiumActive){showToast('ပုံ/ဖိုင်ပို့ရန် Chat Premium လိုအပ်ပါသည်!',true);input.value='';return}
    if(file.size>10*1024*1024){showToast('ဖိုင်အရွယ်အစား 10MB အောက်သာခွင့်ပြုပါသည်',true);input.value='';return}
    
    const token=localStorage.getItem('auth_token');if(!token){showToast('အကောင့်ဝင်ပါ',true);return}
    
    showUploadProgress(true);updateUploadProgress(10);
    try{
        updateUploadProgress(30);
        const base64=await new Promise((resolve,reject)=>{const r=new FileReader();r.onload=e=>resolve(e.target.result);r.onerror=reject;r.readAsDataURL(file)});
        updateUploadProgress(60);
        const r=await fetch('/api/chat/upload_file',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,base64,fileName:file.name,fileType:file.type})});
        updateUploadProgress(90);
        const d=await r.json();
        if(d.success){updateUploadProgress(100);
            const prefix=file.type.startsWith('image/')?'[IMAGE]':'[FILE]';
            const display=file.type.startsWith('image/')?d.url:`${d.url}|${file.name}|${(file.size/1024).toFixed(1)} KB`;
            socket.emit('send_message',{roomId:currentRoom,message:prefix+display,userId:user.id||0,username:user.username||'သုံးစွဲသူ',messageType:file.type.startsWith('image/')?'image':'file'});
            showToast('ဖိုင်ပို့ပြီးပါပြီ ✅');
        }else{showToast(d.message||'ဖိုင်တင်မအောင်မြင်ပါ',true)}
    }catch(e){showToast('ချိတ်ဆက်မှုပြဿနာ',true)}
    setTimeout(()=>{showUploadProgress(false);updateUploadProgress(0)},1000);
    input.value='';
}

// ==================== TABS ====================
function switchTab(tab){
    document.querySelectorAll('.chat-tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('roomList').classList.remove('active');
    document.getElementById('onlineList').classList.remove('active');
    document.getElementById('searchList').classList.remove('active');
    if(tab==='rooms'){document.getElementById('roomList').classList.add('active');loadRooms()}
    if(tab==='online')document.getElementById('onlineList').classList.add('active');
    if(tab==='search')document.getElementById('searchList').classList.add('active');
}

// ==================== ROOMS ====================
async function loadRooms(){
    const token=localStorage.getItem('auth_token');
    if(!token||token==='guest'){document.getElementById('roomList').innerHTML='<div class="empty-state"><i class="fas fa-lock"></i>စကားပြောရန် အကောင့်ဝင်ပါ</div>';return}
    try{
        const r=await fetch('/api/chat/rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
        const d=await r.json();const c=document.getElementById('roomList');
        if(d.rooms&&d.rooms.length>0){c.innerHTML=d.rooms.map(room=>`<div class="room-item" onclick="openRoom(${room.id},'${room.room_name.replace(/'/g,"\\'")}')"><div class="room-icon">${room.room_type==='admin'?'👨‍💼':room.room_type==='group'?'👥':'💬'}</div><div class="room-info"><div class="room-name">${room.room_name}</div><div class="room-last">${room.room_type==='admin'?'Admin နှင့် စကားပြော':room.room_type==='group'?'အုပ်စုစကားပြော':'တစ်ဦးချင်းစကားပြော'}</div></div>${room.unread>0?`<div class="room-badge">${room.unread>99?'99+':room.unread}</div>`:''}</div>`).join('')}
        else{c.innerHTML='<div class="empty-state"><i class="fas fa-comments"></i>စကားပြောခန်းမရှိသေးပါ<button class="admin-btn" onclick="createAdminChat()"><i class="fas fa-headset"></i> Admin နှင့် စကားပြောမည်</button></div>'}
    }catch(e){}
}

// ==================== SEARCH ====================
async function searchUsers(){
    const q=document.getElementById('searchInput').value.trim();
    if(q.length<2){document.getElementById('searchResults').innerHTML='<div class="empty-state"><i class="fas fa-search"></i>သုံးစွဲသူအမည် ရိုက်ထည့်ပါ</div>';return}
    try{const r=await fetch('/api/admin/search_user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})});const d=await r.json();
        document.getElementById('searchResults').innerHTML=d.users&&d.users.length>0?d.users.map(u=>`<div class="room-item" onclick="startPrivateChat(${u.id},'${u.username}')"><div class="room-icon">💬</div><div class="room-info"><div class="room-name">${u.username}</div><div class="room-last">စကားပြော စတင်ရန် နှိပ်ပါ</div></div></div>`).join(''):'<div class="empty-state"><i class="fas fa-search"></i>ရှာမတွေ့ပါ</div>'
    }catch(e){}
}

async function startPrivateChat(otherUserId,otherUsername){
    const token=localStorage.getItem('auth_token');if(!token)return alert('အကောင့်ဝင်ပါ');
    try{const r=await fetch('/api/chat/create_private_room',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,otherUserId})});const d=await r.json();if(d.success)openRoom(d.room.id,otherUsername)}catch(e){}
}

// ==================== ADMIN CHAT ====================
async function createAdminChat(){
    const token=localStorage.getItem('auth_token');if(!token)return alert('အကောင့်ဝင်ပါ');
    try{const r=await fetch('/api/chat/create_admin_room',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});const d=await r.json();if(d.success)loadRooms()}catch(e){}
}

// ==================== OPEN ROOM ====================
async function openRoom(roomId,roomName){
    currentRoom=roomId;messageOffset=0;
    document.getElementById('roomList').classList.remove('active');document.getElementById('onlineList').classList.remove('active');document.getElementById('searchList').classList.remove('active');
    document.getElementById('chatArea').classList.add('active');document.getElementById('chatRoomTitle').textContent=roomName;
    document.getElementById('messages').innerHTML='';document.getElementById('loadMore').style.display='none';
    socket.emit('join_room',roomId);
    try{const r=await fetch('/api/chat/messages/'+roomId);const d=await r.json();if(d.messages){if(d.messages.length>=50){hasMoreMessages=true;document.getElementById('loadMore').style.display='block'}d.messages.forEach(msg=>addMessage(msg,false));setTimeout(()=>{document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight},100)}}
    catch(e){}
    const token=localStorage.getItem('auth_token');const uid=user.id||0;
    fetch('/api/chat/read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId,userId:uid})});
}

function closeChat(){currentRoom=null;document.getElementById('chatArea').classList.remove('active');document.getElementById('roomList').classList.add('active');loadRooms()}

async function loadMoreMessages(){
    if(!currentRoom)return;messageOffset+=50;
    try{const r=await fetch('/api/chat/messages/'+currentRoom+'?offset='+messageOffset);const d=await r.json();if(d.messages&&d.messages.length>0){const c=document.getElementById('messages');const oh=c.scrollHeight;d.messages.forEach(msg=>addMessage(msg,true));c.scrollTop=c.scrollHeight-oh}
        if(!d.messages||d.messages.length<50){document.getElementById('loadMore').style.display='none';hasMoreMessages=false}
    }catch(e){}
}

// ==================== MESSAGES ====================
function addMessage(msg,prepend=false){
    const isMine=(msg.sender_id===(user.id||0))||(msg.userId===(user.id||0));
    const container=document.getElementById('messages');const div=document.createElement('div');
    div.className='msg-row '+(isMine?'mine msg-mine':'other msg-other');
    let content=escapeHtml(msg.message||'');
    if(content.startsWith('[IMAGE]')){const url=content.replace('[IMAGE]','');content=`<img src="${url}" class="msg-image" onclick="previewImage('${url}')" loading="lazy">`}
    else if(content.startsWith('[FILE]')){const parts=content.replace('[FILE]','').split('|');content=`<div class="msg-file" onclick="window.open('${parts[0]}','_blank')"><i class="fas fa-file"></i><div class="file-info"><div class="file-name">📄 ${parts[1]||'file'}</div><div class="file-size">${parts[2]||''} - ဒေါင်းလုဒ်ရန် နှိပ်ပါ</div></div></div>`}
    div.innerHTML=`<div class="msg-bubble">${!isMine?`<div class="msg-sender">${msg.username||'သုံးစွဲသူ'}</div>`:''}${content}<div class="msg-time">${new Date(msg.created_at||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
    if(prepend)container.insertBefore(div,container.firstChild);else container.appendChild(div);
}

function escapeHtml(text){const d=document.createElement('div');d.textContent=text;return d.innerHTML}
function previewImage(url){document.getElementById('previewImage').src=url;document.getElementById('imagePreviewModal').classList.add('active')}

function sendMessage(){
    const input=document.getElementById('msgInput');const message=input.value.trim();
    if(!message||!currentRoom)return;
    socket.emit('send_message',{roomId:currentRoom,message,userId:user.id||0,username:user.username||'သုံးစွဲသူ',messageType:'text'});
    input.value='';document.getElementById('emojiPicker').classList.remove('active');
}

// ==================== SOCKET EVENTS ====================
socket.on('new_message',(msg)=>{if(currentRoom===msg.roomId){addMessage(msg,false);document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight}if(msg.userId!==(user.id||0)&&msg.sender_id!==(user.id||0)){try{document.getElementById('msgSound').play().catch(()=>{})}catch(e){}}loadRooms()});
socket.on('online_users',(users)=>{document.getElementById('onlineCount').textContent=users.length+' ယောက်ရှိ';document.getElementById('onlineList').innerHTML=users.length>0?users.map(u=>`<div class="room-item"><div class="room-icon">🟢</div><div class="room-info"><div class="room-name">${u.username}</div></div></div>`).join(''):'<div class="empty-state"><i class="fas fa-users"></i>အွန်လိုင်းသုံးစွဲသူမရှိပါ</div>'});

// ==================== INIT ====================
checkChatPremium();loadRooms();

}
</script>
