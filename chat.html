<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Chat - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a1a;
            --card: #151932;
            --card2: #1a1f4b;
            --text: #ffffff;
            --muted: rgba(255,255,255,0.65);
            --accent: #f39c12;
            --green: #2ecc71;
            --red: #e74c3c;
            --border: rgba(255,255,255,0.10);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0c0e27, #1a1f4b, #2c3e50);
            color: var(--text);
            min-height: 100vh;
            padding: 15px;
            overflow: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            height: calc(100vh - 30px);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 15px;
            border-radius: 16px;
            background: rgba(0,0,0,0.18);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .header a {
            color: var(--text);
            font-size: 18px;
            text-decoration: none;
            width: 28px;
            text-align: center;
        }

        .header h2 {
            font-size: 16px;
            font-weight: bold;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: linear-gradient(135deg, #f39c12, #ffd24d);
            color: #111;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0,0,0,0.18);
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            min-height: 0;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 85%;
            padding: 10px 12px;
            border-radius: 14px;
            line-height: 1.5;
            font-size: 14px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .msg.bot {
            align-self: flex-start;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #4a1c7a, #1a1f4b);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .msg .time {
            display: block;
            margin-top: 6px;
            font-size: 10px;
            opacity: 0.65;
        }

        .chat-input {
            padding: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.14);
        }

        .chat-input input {
            flex: 1;
            border: 1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            padding: 14px 14px;
            border-radius: 14px;
            outline: none;
            font-size: 14px;
        }

        .chat-input input::placeholder {
            color: rgba(255,255,255,0.45);
        }

        .chat-input button {
            border: none;
            background: linear-gradient(135deg, #f39c12, #ffd24d);
            color: #111;
            font-weight: bold;
            padding: 0 18px;
            border-radius: 14px;
            cursor: pointer;
            min-width: 64px;
        }

        .tools {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .tool-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .tool-btn i {
            margin-right: 6px;
        }

        .toast {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 12px 18px;
            border-radius: 30px;
            z-index: 9999;
            font-size: 12px;
            font-weight: bold;
            display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        @media (max-width: 380px) {
            body { padding: 10px; }
            .container { height: calc(100vh - 20px); }
            .msg { max-width: 92%; }
            .chat-input button { min-width: 56px; padding: 0 14px; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="container">
        <div class="header">
            <a href="/"><i class="fas fa-arrow-left"></i></a>
            <h2><span>💬</span> Chat</h2>
            <div class="badge">
                <i class="fas fa-message"></i> SOLO M
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-list" id="chatList">
                <div class="msg bot">
                    မင်္ဂလာပါ။ Chat page ကိုအသုံးပြုနိုင်ပါပြီ။
                    <span class="time" id="welcomeTime"></span>
                </div>
            </div>

            <div class="chat-input">
                <input id="messageInput" type="text" placeholder="စာရိုက်ပါ..." autocomplete="off" />
                <button id="sendBtn" type="button">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>

        <div class="tools">
            <button class="tool-btn" type="button" id="clearBtn">
                <i class="fas fa-trash"></i> Clear
            </button>
            <button class="tool-btn" type="button" id="copyBtn">
                <i class="fas fa-copy"></i> Copy Last
            </button>
        </div>
    </div>

    <script>
        const chatList = document.getElementById('chatList');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        let lastMessageText = '';

        function nowTime() {
            const d = new Date();
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.style.background = isError ? '#e74c3c' : '#2ecc71';
            toast.style.color = '#fff';
            toast.style.display = 'block';
            clearTimeout(window.__toastTimer);
            window.__toastTimer = setTimeout(() => {
                toast.style.display = 'none';
            }, 2500);
        }

        function addMessage(text, type = 'user') {
            const msg = document.createElement('div');
            msg.className = `msg ${type}`;

            const content = document.createElement('div');
            content.textContent = text;

            const time = document.createElement('span');
            time.className = 'time';
            time.textContent = nowTime();

            msg.appendChild(content);
            msg.appendChild(time);
            chatList.appendChild(msg);
            chatList.scrollTop = chatList.scrollHeight;

            if (type === 'user') lastMessageText = text;
        }

        async function copyText(text) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.position = 'fixed';
                    ta.style.left = '-9999px';
                    document.body.appendChild(ta);
                    ta.focus();
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                }
                showToast('Copied: ' + text);
            } catch (e) {
                showToast('Copy မရပါ', true);
            }
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            messageInput.value = '';

            // placeholder bot reply
            setTimeout(() => {
                addMessage('လက်ရှိ code က premium part မပါဘဲ clean version ဖြစ်ပါတယ်။', 'bot');
            }, 500);
        }

        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        clearBtn.addEventListener('click', () => {
            chatList.innerHTML = '';
            addMessage('Chat cleared.', 'bot');
            showToast('Chat cleared');
            lastMessageText = '';
        });

        copyBtn.addEventListener('click', () => {
            if (!lastMessageText) {
                showToast('Copy လုပ်မယ့် message မရှိသေးပါ', true);
                return;
            }
            copyText(lastMessageText);
        });

        // Init
        document.getElementById('welcomeTime').textContent = nowTime();
    </script>
</body>
</html>
