<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>စကားပြော - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:#0c0e27;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        
        .chat-header{display:flex;align-items:center;gap:10px;padding:12px 15px;background:linear-gradient(to right,#4a1c7a,#1a1f4b);border-bottom:2px solid #f39c12;flex-shrink:0}
        .chat-header a{color:#f39c12;text-decoration:none;font-size:18px}
        .chat-header h3{flex:1;font-size:14px;color:#f39c12}
        .chat-header .online-count{font-size:10px;color:#2ecc71}
        
        .chat-tabs{display:flex;gap:4px;padding:8px 10px;background:rgba(0,0,0,0.3);flex-shrink:0}
        .chat-tab{flex:1;padding:8px;text-align:center;font-size:11px;cursor:pointer;border-radius:6px;background:rgba(255,255,255,0.05)}
        .chat-tab.active{background:#4a1c7a;color:#f39c12}
        
        .chat-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .room-list{display:none;flex:1;overflow-y:auto;padding:10px}
        .room-list.active{display:block}
        
        .room-item{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(0,0,0,0.3);border-radius:12px;margin-bottom:8px;cursor:pointer}
        .room-item:hover{background:rgba(74,28,122,0.4)}
        .room-item .room-icon{font-size:22px}
        .room-item .room-info{flex:1}
        .room-item .room-name{font-size:13px;font-weight:bold}
        .room-item .room-last{font-size:9px;color:rgba(255,255,255,0.4);margin-top:3px}
        .room-item .room-badge{background:#e74c3c;color:#fff;font-size:9px;padding:2px 8px;border-radius:20px}
        
        .chat-area{display:none;flex:1;flex-direction:column;overflow:hidden}
        .chat-area.active{display:flex}
        
        .chat-area-header{display:flex;align-items:center;gap:10px;padding:10px 15px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
        .chat-area-header .back-btn{color:#f39c12;cursor:pointer;font-size:16px}
        .chat-area-header .room-title{font-size:14px;font-weight:bold;flex:1}
        
        .messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px}
        .msg-row{display:flex;gap:8px;max-width:85%}
        .msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
        .msg-bubble{padding:10px 14px;border-radius:16px;font-size:12px;word-break:break-word}
        .msg-mine .msg-bubble{background:#4a1c7a;border-bottom-right-radius:4px}
        .msg-other .msg-bubble{background:rgba(255,255,255,0.1);border-bottom-left-radius:4px}
        .msg-sender{font-size:9px;color:#f39c12;margin-bottom:4px}
        .msg-time{font-size:8px;color:rgba(255,255,255,0.4);margin-top:4px;text-align:right}
        
        .msg-input-area{display:flex;gap:8px;padding:10px 15px;background:rgba(0,0,0,0.4);border-top:1px solid rgba(255,255,255,0.1);flex-shrink:0}
        .msg-input-area input{flex:1;padding:12px 15px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:30px;color:#fff;font-size:13px;outline:none}
        .msg-input-area input:focus{border-color:#f39c12}
        .msg-input-area button{width:44px;height:44px;border-radius:50%;border:none;background:#f39c12;color:#000;font-size:18px;cursor:pointer}
        
        .empty-state{text-align:center;padding:40px;color:rgba(255,255,255,0.3)}
        .admin-btn{width:100%;padding:12px;background:#2ecc71;color:#000;border:none;border-radius:30px;font-size:13px;font-weight:bold;cursor:pointer;margin-top:10px}
        .user-item{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(0,0,0,0.3);border-radius:12px;margin-bottom:6px;cursor:pointer}
        .user-item:hover{background:rgba(74,28,122,0.4)}
        
        .toast{position:fixed;top:15px;right:15px;padding:12px 18px;border-radius:30px;background:#2ecc71;color:#000;display:none;z-index:2000;font-size:12px}
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="chat-header">
        <a href="/dashboard"><i class="fas fa-arrow-left"></i></a>
        <a href="/chatpremium.html" style="color:#FFD700;text-decoration:none;font-size:11px;font-weight:bold">👑 Premium</a>
        <h3><i class="fas fa-comments"></i> စကားပြော</h3>
        <span class="online-count" id="onlineCount">0 online</span>
    </div>
    
    <div class="chat-tabs">
        <div class="chat-tab active" onclick="switchTab('rooms')">💬 Rooms</div>
        <div class="chat-tab" onclick="switchTab('users')">👥 Users</div>
    </div>
    
    <div class="chat-body">
        <div class="room-list active" id="roomList">
            <div class="empty-state">Loading...</div>
        </div>
        <div class="room-list" id="usersList">
            <div class="empty-state">Loading users...</div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="chat-area-header">
                <span class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></span>
                <span class="room-title" id="chatRoomTitle">Chat</span>
            </div>
            <div class="messages" id="messages">
                <div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4)">Select a chat room to start</div>
            </div>
            <!-- 👇👇👇 ဒီအပိုင်း ပါမပါ စစ်ပါ 👇👇👇 -->
            <div class="msg-input-area">
                <input type="text" id="msgInput" placeholder="စာရိုက်ပါ..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

<script>
// ============================================
// CHAT SYSTEM - FIXED VERSION
// ============================================

let socket = null;
let currentUser = null;
let currentRoom = null;

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function scrollToBottom() {
    const msgs = document.getElementById('messages');
    if (msgs) {
        msgs.scrollTop = msgs.scrollHeight;
    }
}

// Get current user
async function getCurrentUser() {
    const token = localStorage.getItem('auth_token');
    if (!token || token === 'guest') {
        document.body.innerHTML = '<div style="text-align:center;padding:50px"><i class="fas fa-lock" style="font-size:50px"></i><h3>Please login to chat</h3><a href="/">Login</a></div>';
        return null;
    }
    
    try {
        const r = await fetch('/api/chat/current_user', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token })
        });
        const d = await r.json();
        if (d.success) {
            currentUser = d.user;
            return currentUser;
        }
        throw new Error('User not found');
    } catch(e) {
        document.body.innerHTML = '<div style="text-align:center;padding:50px"><i class="fas fa-exclamation-triangle" style="font-size:50px"></i><h3>Error loading user</h3><a href="/">Back</a></div>';
        return null;
    }
}
// Initialize Socket - FIXED for all browsers
function initSocket() {
    socket = io(window.location.origin, {
        transports: ['websocket', 'polling'],
        reconnection: true,
        reconnectionAttempts: 10,
        reconnectionDelay: 1000,
        timeout: 20000,
        forceNew: true
    });
    
    socket.on('connect', () => {
        console.log('✅ Socket connected:', socket.id);
        showToast('Connected to chat server');
        if (currentUser) {
            socket.emit('user_online', { 
                userId: currentUser.id, 
                username: currentUser.username 
            });
        }
    });
    
    socket.on('new_message', (msg) => {
        console.log('📨 New message received:', msg);
        if (currentRoom === msg.roomId) {
            addMessageToUI(msg, msg.sender_id === currentUser?.id);
            scrollToBottom();
        }
        loadRooms();
    });
    
    // initSocket() ထဲမှာ online_users event ကို ဒီလိုပြင်ပါ
socket.on('online_users', (users) => {
    const count = Array.isArray(users) ? users.length : 0;
    document.getElementById('onlineCount').innerHTML = count + ' online';
});
    
    socket.on('disconnect', () => {
        console.log('❌ Socket disconnected');
        showToast('Reconnecting...');
    });
    
    socket.on('connect_error', (err) => {
        console.log('Socket error:', err.message);
        showToast('Connection issue, retrying...');
    });
}

// Switch tabs
function switchTab(tab) {
    const btns = document.querySelectorAll('.chat-tab');
    btns.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    
    document.getElementById('roomList').classList.remove('active');
    document.getElementById('usersList').classList.remove('active');
    
    if (tab === 'rooms') {
        document.getElementById('roomList').classList.add('active');
        loadRooms();
    } else if (tab === 'users') {
        document.getElementById('usersList').classList.add('active');
        loadUsersList();
    }
}

// Load rooms
async function loadRooms() {
    if (!currentUser) return;
    try {
        const r = await fetch('/api/chat/rooms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUser.id })
        });
        const d = await r.json();
        const container = document.getElementById('roomList');
        
        if (d.rooms && d.rooms.length > 0) {
            container.innerHTML = d.rooms.map(room => `
                <div class="room-item" onclick="openRoom(${room.id}, '${escapeHtml(room.room_name)}')">
                    <div class="room-icon">${room.room_type === 'admin' ? '👑' : room.room_type === 'group' ? '👥' : '💬'}</div>
                    <div class="room-info">
                        <div class="room-name">${escapeHtml(room.room_name)}</div>
                        <div class="room-last">${escapeHtml(room.last_message || 'No messages')}</div>
                    </div>
                    ${room.unread > 0 ? `<div class="room-badge">${room.unread}</div>` : ''}
                </div>
            `).join('');
        } else {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <p>No chat rooms yet</p>
                    <button class="admin-btn" onclick="startAdminChat()">📞 Chat with Admin</button>
                </div>
            `;
        }
    } catch(e) { 
        console.error(e);
        document.getElementById('roomList').innerHTML = '<div class="empty-state">Error loading rooms</div>';
    }
}

// Load users list
async function loadUsersList() {
    if (!currentUser) return;
    try {
        const r = await fetch('/api/chat/all_users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUser.id })
        });
        const d = await r.json();
        const container = document.getElementById('usersList');
        
        if (d.users && d.users.length > 0) {
            container.innerHTML = d.users.map(user => `
                <div class="user-item" onclick="startPrivateChat(${user.id}, '${escapeHtml(user.username)}')">
                    <div class="room-icon">👤</div>
                    <div class="room-info">
                        <div class="room-name">${escapeHtml(user.username)}</div>
                        <div class="room-last">Click to start chat</div>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<div class="empty-state">No other users found</div>';
        }
    } catch(e) { 
        document.getElementById('usersList').innerHTML = '<div class="empty-state">Error loading users</div>';
    }
}

// Start admin chat
async function startAdminChat() {
    if (!currentUser) return;
    try {
        const r = await fetch('/api/chat/create_admin_room', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUser.id })
        });
        const d = await r.json();
        if (d.success) {
            openRoom(d.room.id, d.room.room_name);
            loadRooms();
        } else {
            showToast('Error creating admin chat');
        }
    } catch(e) { 
        showToast('Server error');
    }
}

// Start private chat
async function startPrivateChat(otherUserId, otherUsername) {
    if (!currentUser) return;
    try {
        const r = await fetch('/api/chat/create_private_room', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUser.id, otherUserId })
        });
        const d = await r.json();
        if (d.success) {
            openRoom(d.room.id, otherUsername);
            loadRooms();
        }
    } catch(e) { 
        showToast('Error');
    }
}

// Open room
async function openRoom(roomId, roomName) {
    currentRoom = roomId;
    
    document.getElementById('roomList').classList.remove('active');
    document.getElementById('usersList').classList.remove('active');
    document.getElementById('chatArea').classList.add('active');
    document.getElementById('chatRoomTitle').textContent = roomName;
    document.getElementById('messages').innerHTML = '<div style="text-align:center;padding:20px">Loading messages...</div>';
    
    socket.emit('join_room', roomId);
    
    try {
        const r = await fetch(`/api/chat/messages/${roomId}`);
        const d = await r.json();
        
        const container = document.getElementById('messages');
        if (d.messages && d.messages.length > 0) {
            container.innerHTML = '';
            d.messages.forEach(msg => {
                addMessageToUI(msg, msg.sender_id === currentUser?.id);
            });
            scrollToBottom();
        } else {
            container.innerHTML = '<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4)">No messages yet. Say hi!</div>';
        }
        
        // Mark as read
        await fetch('/api/chat/read', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomId, userId: currentUser.id })
        });
    } catch(e) { 
        console.error(e);
        document.getElementById('messages').innerHTML = '<div style="text-align:center;padding:20px">Error loading messages</div>';
    }
}

function addMessageToUI(msg, isMine) {
    const container = document.getElementById('messages');
    if (container.innerHTML.includes('No messages') || container.innerHTML.includes('Loading')) {
        container.innerHTML = '';
    }
    
    const div = document.createElement('div');
    div.className = `msg-row ${isMine ? 'mine msg-mine' : 'other msg-other'}`;
    div.innerHTML = `
        <div class="msg-bubble">
            ${!isMine ? `<div class="msg-sender">${escapeHtml(msg.username || 'User')}</div>` : ''}
            ${escapeHtml(msg.message)}
            <div class="msg-time">${new Date(msg.created_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
        </div>
    `;
    container.appendChild(div);
}

function sendMessage() {
    const input = document.getElementById('msgInput');
    const message = input.value.trim();
    
    console.log('📤 Send message clicked:', { message, currentRoom, currentUser });
    
    if (!message) {
        console.log('⚠️ Empty message');
        return;
    }
    if (!currentRoom) {
        console.log('⚠️ No current room');
        showToast('Please select a chat room first');
        return;
    }
    if (!currentUser) {
        console.log('⚠️ No user');
        showToast('Please login');
        return;
    }
    
    socket.emit('send_message', {
        roomId: currentRoom,
        message: message,
        userId: currentUser.id,
        username: currentUser.username
    });
    
    console.log('✅ Message emitted');
    input.value = '';
}

function closeChat() {
    currentRoom = null;
    document.getElementById('chatArea').classList.remove('active');
    document.getElementById('roomList').classList.add('active');
    loadRooms();
}

// Init
async function init() {
    const user = await getCurrentUser();
    if (!user) return;
    
    initSocket();
    loadRooms();
}

init();
</script>
</body>
</html>
