<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }
        body {
            background: radial-gradient(ellipse at 20% 30%, #0c0e27, #05050f);
            color: #fff;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top, 0px);
        }
        /* ========== THEMES (Premium) ========== */
        body.normal-theme { background: linear-gradient(135deg, #0c0e27, #1a1f4b); }
        body.normal-theme .chat-header { background: linear-gradient(135deg, #4a1c7a, #1a1f4b); border-bottom: 2px solid #f39c12; }
        body.normal-theme .chat-header h3, body.normal-theme .chat-header a { color: #fff; }
        body.normal-theme .chat-tab.active { background: #f39c12; color: #000; }
        body.normal-theme .premium-badge { display: none; }

        body.bronze-tier {
            background: linear-gradient(160deg, #3d1c00 0%, #2d1a0a 40%, #1a0f07 100%);
        }
        body.bronze-tier .chat-header {
            background: linear-gradient(135deg, #3d1c00, #6b3410);
            border-bottom: 3px solid #CD7F32;
            border-left: 3px solid #CD7F32;
            border-right: 3px solid #CD7F32;
        }
        body.bronze-tier .chat-header h3 { color: #E8A87C; }
        body.bronze-tier .chat-tab.active { background: #6b3410; color: #E8A87C; border-color: #CD7F32; }
        body.bronze-tier .room-item { background: rgba(107,52,16,0.2); border-left: 4px solid #CD7F32; }
        body.bronze-tier .msg-mine .msg-bubble { background: linear-gradient(150deg, #6b3410, #8B4513); border: 2px solid #CD7F32; }
        body.bronze-tier .msg-input-area { border-top: 2px solid #CD7F32; }
        body.bronze-tier .msg-input-area button { background: linear-gradient(135deg, #6b3410, #CD7F32); }
        body.bronze-tier .premium-badge { background: #6b3410; color: #E8A87C; border: 1px solid #CD7F32; display: inline-block; }

        body.silver-tier {
            background: linear-gradient(160deg, #2d2d2d 0%, #1a1a1a 40%, #0a0a0a 100%);
        }
        body.silver-tier .chat-header {
            background: linear-gradient(135deg, #2d2d2d, #707070);
            border-bottom: 3px solid #C0C0C0;
        }
        body.silver-tier .chat-header h3 { color: #E8E8E8; }
        body.silver-tier .chat-tab.active { background: #707070; color: #E8E8E8; border-color: #C0C0C0; }
        body.silver-tier .room-item { background: rgba(112,112,112,0.15); border-left: 4px solid #C0C0C0; }
        body.silver-tier .msg-mine .msg-bubble { background: linear-gradient(150deg, #707070, #5a5a5a); border: 2px solid #C0C0C0; }
        body.silver-tier .msg-input-area { border-top: 2px solid #C0C0C0; }
        body.silver-tier .msg-input-area button { background: linear-gradient(135deg, #707070, #C0C0C0); color: #000; }
        body.silver-tier .premium-badge { background: #707070; color: #E8E8E8; border: 1px solid #C0C0C0; display: inline-block; }

        body.gold-tier {
            background: linear-gradient(160deg, #6d4c00 0%, #3d2a00 40%, #1a0a00 100%);
        }
        body.gold-tier .chat-header {
            background: linear-gradient(135deg, #6d4c00, #B8860B);
            border-bottom: 3px solid #FFD700;
        }
        body.gold-tier .chat-header h3 { color: #FFF8DC; }
        body.gold-tier .chat-tab.active { background: #B8860B; color: #FFF8DC; border-color: #FFD700; }
        body.gold-tier .room-item { background: rgba(184,134,11,0.15); border-left: 4px solid #FFD700; }
        body.gold-tier .msg-mine .msg-bubble { background: linear-gradient(150deg, #B8860B, #8B6914); border: 2px solid #FFD700; }
        body.gold-tier .msg-input-area { border-top: 2px solid #FFD700; }
        body.gold-tier .msg-input-area button { background: linear-gradient(135deg, #B8860B, #FFD700); color: #1a0a00; }
        body.gold-tier .premium-badge { background: #B8860B; color: #FFF8DC; border: 1px solid #FFD700; display: inline-block; }

        /* ========== SHARED STYLES ========== */
        .chat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            padding-top: calc(10px + env(safe-area-inset-top, 0px));
            flex-shrink: 0;
            border-radius: 0 0 4px 4px;
        }
        .chat-header a {
            text-decoration: none;
            font-size: 16px;
            transition: 0.2s;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 30px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .chat-header a i { font-size: 12px; }
        .chat-header a:hover { background: rgba(0,0,0,0.5); transform: scale(1.02); }
        .chat-header h3 { flex: 1; font-size: 14px; font-weight: 600; }
        .chat-header .online-count { font-size: 9px; padding: 3px 10px; border-radius: 40px; background: rgba(0,0,0,0.3); }
        .premium-badge { display: none; padding: 3px 10px; border-radius: 40px; font-size: 8px; font-weight: 700; }

        .chat-tabs {
            display: flex;
            gap: 5px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.15);
            flex-shrink: 0;
        }
        .chat-tab {
            flex: 1;
            padding: 7px;
            text-align: center;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .chat-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .room-list { display: none; flex: 1; overflow-y: auto; padding: 10px; }
        .room-list.active { display: block; }
        .room-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .room-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .room-info { flex: 1; }
        .room-name { font-size: 13px; font-weight: 600; }
        .room-last { font-size: 9px; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .room-badge { background: #e74c3c; color: #fff; font-size: 8px; padding: 2px 7px; border-radius: 30px; }

        .chat-area { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .chat-area.active { display: flex; }
        .chat-area-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .back-btn { cursor: pointer; font-size: 14px; background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 30px; display: flex; align-items: center; gap: 5px; }
        .room-title { font-size: 14px; font-weight: 600; flex: 1; }
        .delete-room-btn { color: #e74c3c; cursor: pointer; opacity: 0.6; padding: 5px; }

        .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 5px; }
        .msg-row { display: flex; gap: 6px; max-width: 80%; margin-bottom: 3px; }
        .msg-row.mine { align-self: flex-end; flex-direction: row-reverse; }
        .msg-bubble {
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 12px;
            word-break: break-word;
            position: relative;
        }
        .msg-bubble.normal-tier { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
        .msg-mine .msg-bubble.normal-tier { background: rgba(46,204,113,0.2); border: 1px solid rgba(46,204,113,0.3); }
        .msg-sender { font-size: 9px; margin-bottom: 3px; font-weight: 600; opacity: 0.8; }
        .msg-time { font-size: 7px; color: rgba(255,255,255,0.35); margin-top: 3px; text-align: right; }
        .media-message { max-width: 200px; border-radius: 12px; cursor: pointer; position: relative; }
        .media-message img { max-width: 100%; border-radius: 12px; }
        .file-message { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(0,0,0,0.2); border-radius: 12px; cursor: pointer; }

        .msg-input-area {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            flex-shrink: 0;
            background: rgba(0,0,0,0.3);
        }
        .input-wrapper { flex: 1; }
        .msg-input-area input {
            width: 100%;
            height: 38px;
            padding: 0 14px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }
        .msg-input-area button {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
            cursor: pointer;
        }
        .media-buttons { display: flex; gap: 6px; }
        .media-btn {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
            position: relative;
        }
        .media-btn.locked { opacity: 0.5; cursor: not-allowed; }
        .lock-icon { position: absolute; bottom: -1px; right: -1px; background: #e74c3c; border-radius: 50%; width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; font-size: 6px; }

        .emoji-row {
            display: flex;
            overflow-x: auto;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.15);
            flex-shrink: 0;
        }
        .emoji-item { font-size: 20px; cursor: pointer; padding: 3px; border-radius: 6px; transition: 0.1s; }
        .emoji-item:hover { transform: scale(1.15); background: rgba(255,255,255,0.1); }
        .toggle-emoji-btn { background: rgba(255,255,255,0.06); border: none; border-radius: 6px; padding: 4px 10px; font-size: 10px; cursor: pointer; color: #f39c12; }

        .typing-indicator { padding: 4px 14px; font-size: 10px; color: #f39c12; }

        /* ========== MODALS ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: linear-gradient(145deg, #1a1f4b, #11112a);
            border: 2px solid #f39c12;
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-box h3 { color: #f39c12; margin-bottom: 12px; font-size: 16px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { font-size: 9px; color: rgba(255,255,255,0.5); display: block; margin-bottom: 3px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 11px;
        }
        .btn-row { display: flex; gap: 6px; margin-top: 12px; }
        .btn { padding: 8px; border: none; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; flex: 1; text-align: center; }
        .btn-g { background: #2ecc71; color: #000; }
        .btn-r { background: #e74c3c; color: #fff; }
        .btn-b { background: #3498db; color: #fff; }
        .btn-w { background: #f39c12; color: #000; }

        /* Profile Modal */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #f39c12;
            background: #2d2d2d;
        }
        .profile-username {
            font-size: 18px;
            font-weight: 700;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .copy-username-btn {
            background: none;
            border: none;
            color: #f39c12;
            cursor: pointer;
            font-size: 14px;
            padding: 2px;
        }
        .profile-groups { margin-top: 15px; }
        .profile-group-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        .upload-avatar-area { margin-top: 15px; display: flex; gap: 8px; flex-wrap: wrap; }

        /* Group Members List */
        .member-list {
            max-height: 300px;
            overflow-y: auto;
            margin: 10px 0;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 6px;
        }
        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .member-info { flex: 1; font-size: 11px; }
        .member-name { font-weight: 600; }
        .member-role { font-size: 9px; color: #f39c12; }
        .member-actions button {
            background: rgba(0,0,0,0.3);
            border: none;
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 9px;
            cursor: pointer;
            margin-left: 4px;
        }

        .toast {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 8px 16px;
            border-radius: 8px;
            background: #2ecc71;
            color: #000;
            display: none;
            z-index: 4000;
            font-size: 11px;
            font-weight: 600;
        }
        .empty-state { text-align: center; padding: 30px; color: rgba(255,255,255,0.3); font-size: 12px; }
        .admin-btn { width: 100%; padding: 10px; background: #2ecc71; color: #000; border: none; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body class="normal-theme">
    <div class="toast" id="toast"></div>

    <div class="chat-header">
        <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back</a>
        <a href="/chatpremium.html" id="premiumBtn" style="display:inline-flex; align-items:center; gap:4px; padding:6px 14px; background:linear-gradient(135deg, #f39c12, #e67e22); color:#000; text-decoration:none; font-size:10px; font-weight:700; border-radius:20px; border:2px solid #fff; letter-spacing:0.5px;">
            <span class="wave-text"><span class="wave-letter">P</span><span class="wave-letter">r</span><span class="wave-letter">e</span><span class="wave-letter">m</span><span class="wave-letter">i</span><span class="wave-letter">u</span><span class="wave-letter">m</span></span>
        </a>
        <h3><i class="fas fa-comments"></i> Chat</h3>
        <span class="online-count" id="onlineCount">0 online</span>
        <span class="premium-badge" id="premiumBadge"></span>
    </div>

    <div class="chat-tabs">
        <div class="chat-tab active" data-tab="rooms">💬 Rooms</div>
        <div class="chat-tab" data-tab="users">👥 Users</div>
        <div class="chat-tab" data-tab="groups">👥 Groups</div>
        <div class="chat-tab" data-tab="profile">👤 Profile</div>
    </div>

    <div class="chat-body">
        <div class="room-list active" id="roomList"><div class="empty-state">Loading...</div></div>
        <div class="room-list" id="usersList"><div class="empty-state">Loading users...</div></div>
        <div class="room-list" id="groupsList"><div class="empty-state">No groups yet. <button class="admin-btn" onclick="openCreateGroupModal()">+ Create New Group</button></div></div>
        <div class="room-list" id="profileTab">
            <div class="empty-state">Loading profile...</div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="chat-area-header">
                <span class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i> Back</span>
                <span class="room-title" id="chatRoomTitle">Chat</span>
                <span class="delete-room-btn" onclick="deleteCurrentRoom()"><i class="fas fa-trash"></i></span>
            </div>
            <div class="messages" id="messages">
                <div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4)">Select a chat room to start</div>
            </div>
            <div class="typing-indicator" id="typingIndicator" style="display:none"><i class="fas fa-ellipsis-h"></i> Someone is typing...</div>
            <div class="msg-input-area">
                <div class="media-buttons" id="mediaButtons">
                    <button class="media-btn" id="imageBtn" onclick="handleImageClick()"><i class="fas fa-image"></i><span class="lock-icon" id="imageLock" style="display:none">🔒</span></button>
                    <button class="media-btn" id="fileBtn" onclick="handleFileClick()"><i class="fas fa-paperclip"></i><span class="lock-icon" id="fileLock" style="display:none">🔒</span></button>
                </div>
                <div class="input-wrapper"><input type="text" id="msgInput" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMessage()" oninput="onTyping()"></div>
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="emoji-row">
                <button class="toggle-emoji-btn" onclick="toggleMoreEmojis()"><i class="fas fa-smile"></i> More</button>
                <span class="emoji-item" onclick="insertEmoji('😀')">😀</span><span class="emoji-item" onclick="insertEmoji('😂')">😂</span><span class="emoji-item" onclick="insertEmoji('😍')">😍</span><span class="emoji-item" onclick="insertEmoji('😎')">😎</span>
                <span class="emoji-item" onclick="insertEmoji('😢')">😢</span><span class="emoji-item" onclick="insertEmoji('😡')">😡</span><span class="emoji-item" onclick="insertEmoji('👍')">👍</span><span class="emoji-item" onclick="insertEmoji('❤️')">❤️</span>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="groupModal"><div class="modal-box"><h3><i class="fas fa-users"></i> Create New Group</h3><div class="form-group"><label>Group Name</label><input type="text" id="groupName" placeholder="Enter group name..."></div><div class="form-group"><label>Search Users to Add (optional)</label><input type="text" id="groupMemberSearch" placeholder="Type username..."><div id="searchResults" style="margin-top:5px; max-height:150px; overflow-y:auto;"></div></div><div class="btn-row"><button class="btn btn-g" onclick="createGroup()">Create</button><button class="btn btn-r" onclick="closeModal('groupModal')">Cancel</button></div></div></div>

    <div class="modal-overlay" id="profileModal"><div class="modal-box" id="profileModalContent"></div></div>
    <div class="modal-overlay" id="groupProfileModal"><div class="modal-box" id="groupProfileContent"></div></div>
    <div class="modal-overlay" id="memberActionsModal"><div class="modal-box" id="memberActionsContent"></div></div>
    <div class="modal-overlay" id="moreEmojisModal"><div class="modal-box"><h3><i class="fas fa-smile"></i> All Emojis</h3><div id="moreEmojisGrid" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-height:300px; overflow-y:auto;"></div><button class="btn" onclick="closeModal('moreEmojisModal')" style="width:100%; margin-top:10px">Close</button></div></div>

    <script>
    // ---------------------------- GLOBALS ----------------------------
    let socket = null, currentUser = null, currentRoom = null, typingTimeout = null;
    let isPremium = false, premiumTier = 0;
    let selectedFile = null, selectedFileType = null, selectedFileName = null, uploadCancelled = false;
    const IMGBB_API_KEY = '55854bc5e01a19fd4793d1df84326d00'; // from server

    function showToast(msg, isError=false) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.background = isError ? '#e74c3c' : '#2ecc71';
        toast.style.color = isError ? '#fff' : '#000';
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2500);
    }
    function escapeHtml(text) { if(!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function closeModal(modalId) { document.getElementById(modalId).classList.remove('active'); }

    // ---------------------------- PREMIUM CHECK ----------------------------
    async function checkPremiumStatus() {
        const token = localStorage.getItem('auth_token');
        if (!token || token === 'guest') return;
        try {
            const res = await fetch('/api/chat/premium/all_tiers', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const data = await res.json();
            if (data.success && data.tiers) {
                let highest = 0;
                for (let i=3; i>=1; i--) if(data.tiers[i]) { highest=i; break; }
                if(highest>0) { isPremium=true; premiumTier=highest; applyPremiumTheme(highest); updateMediaButtons(true); }
                else { isPremium=false; premiumTier=0; applyNormalTheme(); updateMediaButtons(false); }
            } else { isPremium=false; premiumTier=0; applyNormalTheme(); updateMediaButtons(false); }
        } catch(e) { console.error(e); }
    }
    function applyPremiumTheme(tier) {
        const body = document.body;
        body.classList.remove('normal-theme','bronze-tier','silver-tier','gold-tier');
        const badge = document.getElementById('premiumBadge');
        const premiumBtn = document.getElementById('premiumBtn');

    // ---------------------------- AVATAR UPLOAD & DISPLAY ----------------------------
    async function uploadAvatar(file) {
        if(!file) return null;
        const formData = new FormData();
        formData.append('key', IMGBB_API_KEY);
        const reader = new FileReader();
        const base64 = await new Promise(resolve => { reader.onload = e => resolve(e.target.result.split(',')[1]); reader.readAsDataURL(file); });
        formData.append('image', base64);
        const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if(data.success) return data.data.url;
        throw new Error('Upload failed');
    }
    async function updateMyAvatar() {
        const fileInput = document.getElementById('avatarUploadInput');
        if(!fileInput.files.length) { showToast('Select a file first', true); return; }
        const file = fileInput.files[0];
        try {
            showToast('Uploading...');
            const url = await uploadAvatar(file);
            const saveRes = await fetch('/api/chat/update_avatar', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUser.id, avatarUrl: url })
            });
            const saveData = await saveRes.json();
            if(saveData.success) { showToast('Avatar updated!'); loadMyProfile(); loadRooms(); }
            else showToast('Save failed', true);
        } catch(e) { showToast('Upload error', true); }
    }

            method: 'POST', headers: { 'Content-Type': 'application/json' },

    // ---------------------------- GROUP MANAGEMENT (with member search, roles) ----------------------------
    let currentGroupRoomId = null;
    async function openGroupProfile(roomId) {
        if(!currentUser) return;
        currentGroupRoomId = roomId;
        try {
            const [infoRes, membersRes] = await Promise.all([
                fetch('/api/chat/group_info', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, userId: currentUser.id }) }),
                fetch('/api/chat/group_members', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ roomId, userId: currentUser.id }) })
            ]);
            const info = await infoRes.json();
            const membersData = await membersRes.json();
            if(!info.success) { showToast('Group not found', true); return; }
            const isOwner = info.user_role === 'owner';
            const isAdmin = info.user_role === 'admin';
            const isMember = info.is_member;
            let avatarHtml = `<img src="${info.avatar_url || '/default-group.png'}" onerror="this.src='/default-group.png'" style="width:60px;height:60px;border-radius:50%;object-fit:cover;">`;

            }
            let memberListHtml = `<div class="member-list">${(membersData.members||[]).map(m => `
                <div class="member-item">
                    <img src="${m.avatar_url || '/default-avatar.png'}" onerror="this.src='/default-avatar.png'" class="member-avatar">
                    <div class="member-info"><div class="member-name">${escapeHtml(m.username)}</div><div class="member-role">${m.role || 'member'}</div></div>
                    ${(isOwner || (isAdmin && m.role !== 'owner')) ? `<div class="member-actions"><button onclick="showMemberActions(${roomId}, ${m.user_id}, '${escapeHtml(m.username)}', '${m.role}')">⚙️</button></div>` : ''}
                </div>
            `).join('')}</div>`;
            const searchHtml = (isOwner || isAdmin) ? `
                <div class="form-group"><label>Add Member by Username</label><input type="text" id="addMemberSearch" placeholder="Type username..."><div id="addMemberResults"></div></div>
                <script>
                    document.getElementById('addMemberSearch')?.addEventListener('input', async function(){
                        const q = this.value.trim();
                        if(q.length<2) { document.getElementById('addMemberResults').innerHTML=''; return; }
                        const res = await fetch('/api/chat/search_users', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ query:q, excludeIds:${JSON.stringify((membersData.members||[]).map(m=>m.user_id))} }) });
                        const data = await res.json();
                        if(data.users && data.users.length) {
                            document.getElementById('addMemberResults').innerHTML = data.users.map(u => '<div class="member-item" style="cursor:pointer" onclick="addMemberToGroup('+roomId+','+u.user_id+',`'+escapeHtml(u.username)+'`)"><img src="'+(u.avatar_url||'/default-avatar.png')+'" class="member-avatar"><div class="member-info">'+escapeHtml(u.username)+'</div><button class="btn btn-g" style="padding:4px 8px">Add</button></div>').join('');
                        } else document.getElementById('addMemberResults').innerHTML='<div class="empty-state">No users found</div>';
                    });
                <\/script>
            ` : '';
            const content = `
                <div style="text-align:center;">
                    ${avatarHtml}
                    <h3>${escapeHtml(info.room_name)}</h3>
                    <p>${info.member_count} members</p>

    async function showMemberActions(roomId, userId, username, role) {
        const isOwner = (await getMyRoleInGroup(roomId)) === 'owner';
        const actions = [];
        if(role !== 'owner') {
            if(isOwner) actions.push(`<button class="btn btn-b" onclick="performAdminAction('promote',${roomId},${userId},'${username}')">Make Admin</button>`);
            actions.push(`<button class="btn btn-r" onclick="performAdminAction('kick',${roomId},${userId},'${username}')">Kick</button>`);
            actions.push(`<button class="btn btn-r" onclick="performAdminAction('ban',${roomId},${userId},'${username}')">Ban</button>`);
        }
        if(isOwner && role === 'admin') actions.push(`<button class="btn btn-w" onclick="performAdminAction('demote',${roomId},${userId},'${username}')">Demote to Member</button>`);
        if(isOwner && role !== 'owner') actions.push(`<button class="btn btn-w" onclick="performAdminAction('transfer',${roomId},${userId},'${username}')">Transfer Ownership</button>`);
        if(actions.length===0) actions.push('<div>No actions available</div>');
        document.getElementById('memberActionsContent').innerHTML = `<div style="text-align:center"><h3>${escapeHtml(username)}</h3>${actions.join('<br>')}<br><button class="btn" onclick="closeModal('memberActionsModal')">Close</button></div>`;
        document.getElementById('memberActionsModal').classList.add('active');
    }
    async function getMyRoleInGroup(roomId) {
        const res = await fetch('/api/chat/group_info', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ roomId, userId: currentUser.id }) });
        const data = await res.json();
        return data.user_role || 'member';
    }
    async function performAdminAction(action, roomId, userId, username) {
        let endpoint = '';
        if(action==='promote') endpoint='/api/chat/promote_admin';
        else if(action==='demote') endpoint='/api/chat/demote_member';
        else if(action==='kick') endpoint='/api/chat/kick_member';
        else if(action==='ban') endpoint='/api/chat/ban_member';
        else if(action==='transfer') endpoint='/api/chat/transfer_owner';
        if(!endpoint) return;
        const res = await fetch(endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ roomId, userId, requesterId: currentUser.id }) });
        const data = await res.json();
        if(data.success) {
            showToast(`${action} successful`);
            closeModal('memberActionsModal');
            openGroupProfile(roomId);
            loadGroupsList();
            loadRooms();
        } else showToast(data.message || 'Error', true);
    }

    // ---------------------------- SOCKET & MAIN LOGIC ----------------------------
    async function getCurrentUser() {
        const token = localStorage.getItem('auth_token');
        if(!token || token==='guest') { window.location.href='/'; return null; }
        const res = await fetch('/api/chat/current_user', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ token }) });
        const data = await res.json();
        if(data.success) { currentUser = data.user; return currentUser; }
        window.location.href='/';
        return null;
    }
    function initSocket() {
        socket = io(window.location.origin, { transports: ['polling','websocket'], reconnection: true });
        socket.on('connect', () => { if(currentUser) socket.emit('user_online', { userId: currentUser.id, username: currentUser.username }); });
        socket.on('new_message', (msg) => { if(currentRoom === msg.roomId) { addMessageToUI(msg, msg.sender_id===currentUser?.id, msg.sender_premium_tier||0); scrollToBottom(); } loadRooms(); });
        socket.on('online_users', (users) => { document.getElementById('onlineCount').innerHTML = (users?.length||0)+' online'; loadUsersList(); });
        socket.on('user_typing', (data) => { if(currentRoom===data.roomId && data.userId!==currentUser?.id) { const ind=document.getElementById('typingIndicator'); ind.style.display='block'; ind.innerHTML=`<i class="fas fa-ellipsis-h"></i> ${escapeHtml(data.username)} is typing...`; clearTimeout(typingTimeout); typingTimeout=setTimeout(()=>ind.style.display='none',2000); } });
    }
    function sendMessage() {
        const input = document.getElementById('msgInput');
        const message = input.value.trim();
        if(!message) return;
        if(!currentRoom) { showToast('Select a chat first', true); return; }
        socket.emit('send_message', { roomId: currentRoom, message, userId: currentUser.id, username: currentUser.username, senderPremiumTier: premiumTier });
        input.value = '';
    }
    function onTyping() { if(currentRoom && currentUser) socket.emit('typing', { roomId: currentRoom, userId: currentUser.id, username: currentUser.username }); }
    function scrollToBottom() { const msgs=document.getElementById('messages'); if(msgs) msgs.scrollTop=msgs.scrollHeight; }
    function addMessageToUI(msg, isMine, senderPremiumTier) {
        const container=document.getElementById('messages');
        if(container.innerHTML.includes('No messages')||container.innerHTML.includes('Loading')) container.innerHTML='';
        let messageHtml='';
        const txt=msg.message||'';
        if(txt.startsWith('📷 IMAGE:')) { const url=txt.replace('📷 IMAGE:',''); messageHtml=`<div class="media-message" onclick="downloadMedia('${url}','image')"><img src="${url}" loading="lazy"><div class="download-icon" style="position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,0.5);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center"><i class="fas fa-download"></i></div></div>`; }
        else if(txt.startsWith('📎 FILE:')) { const parts=txt.replace('📎 FILE:','').split('|'); const url=parts[0], fname=parts[1]||'File'; messageHtml=`<div class="file-message" onclick="downloadMedia('${url}','file','${fname}')"><i class="fas fa-file"></i> ${escapeHtml(fname)}<i class="fas fa-download download-icon"></i></div>`; }
        else messageHtml=escapeHtml(txt);
        let tierClass='normal-tier';
        if(senderPremiumTier===1) tierClass='bronze-tier';
        else if(senderPremiumTier===2) tierClass='silver-tier';
        else if(senderPremiumTier===3) tierClass='gold-tier';
        const div=document.createElement('div');
        div.className=`msg-row ${isMine?'mine msg-mine':'other msg-other'}`;
        div.innerHTML=`<div class="msg-bubble ${tierClass}">${!isMine?`<div class="msg-sender">${escapeHtml(msg.username||'User')}</div>`:''}${messageHtml}<div class="msg-time">${new Date(msg.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
        container.appendChild(div);
    }
    function downloadMedia(url,type,filename='file'){ const a=document.createElement('a'); a.href=url; a.download=type==='image'?'image.jpg':filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); showToast('Download started'); }
    function closeChat(){ currentRoom=null; document.getElementById('chatArea').classList.remove('active'); document.getElementById('roomList').classList.add('active'); loadRooms(); }
    async function deleteCurrentRoom(){ if(!currentRoom||!confirm('Delete this chat room?')) return; await fetch('/api/chat/delete_room',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId:currentRoom,userId:currentUser.id})}); showToast('Room deleted'); closeChat(); }
    async function loadRooms(){

        const res=await fetch('/api/chat/rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id})});

        } else container.innerHTML=`<div class="empty-state"><i class="fas fa-comments"></i><p>No chat rooms</p><button class="admin-btn" onclick="startAdminChat()">📞 Chat with Admin</button></div>`;
    }
    async function loadUsersList(){
        if(!currentUser) return;
        const res=await fetch('/api/chat/online_users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id})});
        const data=await res.json();
        const onlineUsers=(data.users||[]).filter(u=>u.user_id!==currentUser.id);
        document.getElementById('usersList').innerHTML=onlineUsers.length?onlineUsers.map(user=>`<div class="user-item" onclick="viewUserProfile(${user.user_id})"><div class="online-indicator" style="width:8px;height:8px;background:#2ecc71;border-radius:50%;box-shadow:0 0 4px #2ecc71;"></div><div class="room-info"><div class="room-name">${escapeHtml(user.username)}</div><div class="room-last" style="color:#2ecc71;">🟢 Online</div></div></div>`).join(''):'<div class="empty-state">No online users</div>';
    }
    async function loadGroupsList(){
        if(!currentUser) return;
        const res=await fetch('/api/chat/groups',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id})});
        const data=await res.json();
        const container=document.getElementById('groupsList');
        if(data.groups?.length){
            container.innerHTML=data.groups.map(g=>`<div class="room-item" onclick="openRoom(${g.id},'${escapeHtml(g.room_name)}','group')"><div class="room-avatar"><img src="${g.avatar_url||'/default-group.png'}" onerror="this.src='/default-group.png'" style="width:40px;height:40px;border-radius:50%;object-fit:cover;"></div><div class="room-info"><div class="room-name">${escapeHtml(g.room_name)}</div><div class="room-last">${escapeHtml(g.last_message||'No messages')}</div></div><div class="room-badge">${g.member_count||0} members</div></div>`).join('');
        } else container.innerHTML=`<div class="empty-state"><i class="fas fa-users"></i><p>No groups yet</p><button class="admin-btn" onclick="openCreateGroupModal()">+ Create New Group</button></div>`;
    }
    async function openRoom(roomId, roomName, roomType){
        currentRoom=roomId;
        document.querySelectorAll('.room-list').forEach(l=>l.classList.remove('active'));
        document.getElementById('chatArea').classList.add('active');
        document.getElementById('chatRoomTitle').innerHTML=roomName;
        const msgContainer=document.getElementById('messages');
        msgContainer.innerHTML='<div style="text-align:center;padding:20px">Loading...</div>';
        if(socket && socket.connected) socket.emit('join_room', roomId);
        const res=await fetch(`/api/chat/messages/${roomId}`);
        const data=await res.json();
        if(data.messages?.length){
            msgContainer.innerHTML='';
            data.messages.forEach(msg=>addMessageToUI(msg, msg.sender_id===currentUser?.id, msg.sender_premium_tier||0));
            scrollToBottom();
        } else msgContainer.innerHTML='<div style="text-align:center;padding:20px;color:rgba(255,255,255,0.4)">No messages yet. Say hi!</div>';
        await fetch('/api/chat/read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId,userId:currentUser.id})});
    }
    async function startAdminChat(){
        const res=await fetch('/api/chat/create_admin_room',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id})});
        const data=await res.json();
        if(data.success) openRoom(data.room.id, data.room.room_name, 'admin');
        else showToast('Error',true);
    }
    function switchTab(tabName){
        document.querySelectorAll('.chat-tab').forEach(t=>t.classList.remove('active'));
        document.querySelector(`.chat-tab[data-tab="${tabName}"]`).classList.add('active');
        document.getElementById('roomList').classList.remove('active');
        document.getElementById('usersList').classList.remove('active');
        document.getElementById('groupsList').classList.remove('active');
        document.getElementById('profileTab').classList.remove('active');
        if(tabName==='rooms') document.getElementById('roomList').classList.add('active');
        else if(tabName==='users') document.getElementById('usersList').classList.add('active');
        else if(tabName==='groups') document.getElementById('groupsList').classList.add('active');
        else if(tabName==='profile') { document.getElementById('profileTab').classList.add('active'); loadMyProfile(); }
    }
    function insertEmoji(emoji){
        const input=document.getElementById('msgInput');
        const start=input.selectionStart;
        input.value=input.value.substring(0,start)+emoji+input.value.substring(start);
        input.focus();
        input.setSelectionRange(start+emoji.length, start+emoji.length);
    }
    function toggleMoreEmojis(){
        const allEmojis=['😀','😂','😍','😎','😢','😡','👍','👎','❤️','🔥','🎉','💯','🙏','😊','🤔','😴','🥰','😇','🤗','💪','👋','✌️','🤝','👑','💎','💰','🎮','⚽','🌟','🍕','🍺','☕','🏆','🎯','📱','💻','🎵','📷','🔒','✅','❌','⚠️','💡','🔑','🔔','📢','💬','💭','🕒','📍','🔗','🐱','🐶','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🇲🇲','🇹🇭','🇯🇵','🇰🇷','🇺🇸','🇬🇧','🇫🇷','🇩🇪','🇮🇳','🇨🇳','🏳️‍🌈','🏴‍☠️','⭐','🌙','☀️','🌈','⚡','❄️','💧','🔥','🌊','🌸','🌺','🌻','🌹','🍎','🍕','🍔','🥤','🎂','🎁','🎈','🎊'];
        const grid=document.getElementById('moreEmojisGrid');
        grid.innerHTML=allEmojis.map(e=>`<span class="emoji-item" style="font-size:28px; cursor:pointer; padding:5px" onclick="insertEmoji('${e}'); closeModal('moreEmojisModal');">${e}</span>`).join('');
        document.getElementById('moreEmojisModal').classList.add('active');
    }
    async function init(){
        document.querySelectorAll('.chat-tab').forEach(tab=>tab.addEventListener('click',()=>switchTab(tab.getAttribute('data-tab'))));
        const user=await getCurrentUser();
        if(!user) return;
        await checkPremiumStatus();
        initSocket();
        loadRooms();
        loadUsersList();
        loadGroupsList();
        loadMyProfile();
    }
    init();
    </script>
</body>
