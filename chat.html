<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        :root{--bg:#0a0a1a;--p:#1a1f4b;--a:#4a1c7a;--w:#f39c12;--g:#2ecc71;--t:#fff;--r:#e74c3c}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:#0c0e27;color:var(--t);height:100vh;display:flex;flex-direction:column;overflow:hidden}
        
        .chat-header{display:flex;align-items:center;gap:10px;padding:12px 15px;background:linear-gradient(to right,var(--a),var(--p));border-bottom:2px solid var(--w)}
        .chat-header a{color:var(--w);text-decoration:none;font-size:18px}
        .chat-header h3{color:var(--w);font-size:14px;flex:1}
        .chat-header .online-count{font-size:10px;color:var(--g)}
        
        .chat-tabs{display:flex;gap:4px;padding:8px 10px;background:rgba(0,0,0,0.3)}
        .chat-tab{flex:1;padding:8px;text-align:center;font-size:11px;cursor:pointer;border-radius:6px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);transition:all 0.2s}
        .chat-tab.active{background:var(--a);color:var(--w)}
        
        .chat-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
        
        .room-list{display:none;flex:1;overflow-y:auto;padding:10px}
        .room-list.active{display:block}
        
        .room-item{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(0,0,0,0.2);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all 0.2s}
        .room-item:hover{background:rgba(74,28,122,0.3)}
        .room-item .room-icon{font-size:20px}
        .room-item .room-info{flex:1}
        .room-item .room-name{font-size:12px;font-weight:bold}
        .room-item .room-last{font-size:9px;color:rgba(255,255,255,0.4);margin-top:3px}
        .room-item .room-badge{background:var(--r);color:#fff;font-size:9px;padding:2px 8px;border-radius:10px;min-width:20px;text-align:center}
        
        .chat-area{display:none;flex:1;flex-direction:column;overflow:hidden}
        .chat-area.active{display:flex}
        
        .chat-area-header{display:flex;align-items:center;gap:10px;padding:10px 15px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.1)}
        .chat-area-header .back-btn{color:var(--w);cursor:pointer;font-size:16px}
        .chat-area-header .room-title{font-size:13px;font-weight:bold}
        .chat-area-header .typing-indicator{font-size:9px;color:var(--g);margin-left:10px}
        
        .messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px}
        
        .msg-row{display:flex;gap:8px;max-width:85%}
        .msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
        .msg-row.other{align-self:flex-start}
        
        .msg-bubble{padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.5;word-break:break-word}
        .msg-mine .msg-bubble{background:var(--a);border-bottom-right-radius:4px}
        .msg-other .msg-bubble{background:rgba(255,255,255,0.1);border-bottom-left-radius:4px}
        
        .msg-sender{font-size:9px;color:var(--w);margin-bottom:4px;font-weight:bold}
        .msg-time{font-size:8px;color:rgba(255,255,255,0.3);margin-top:4px;text-align:right}
        
        .msg-input-area{display:flex;gap:8px;padding:10px 15px;background:rgba(0,0,0,0.4);border-top:1px solid rgba(255,255,255,0.1)}
        .msg-input-area input{flex:1;padding:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:20px;color:#fff;font-size:13px;outline:none}
        .msg-input-area button{width:44px;height:44px;border-radius:50%;border:none;background:var(--w);color:#000;font-size:18px;cursor:pointer;transition:all 0.2s}
        .msg-input-area button:hover{transform:scale(1.05)}
        
        .admin-btn{width:100%;padding:12px;background:var(--g);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;margin-top:10px}
        
        .empty-state{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.3)}
        .empty-state i{font-size:50px;margin-bottom:15px;display:block}
        
        @media (max-width:380px){
            .msg-row{max-width:90%}
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="/dashboard"><i class="fas fa-arrow-left"></i></a>
        <h3><i class="fas fa-comments"></i> Chat</h3>
        <span class="online-count" id="onlineCount">0 online</span>
    </div>
    
    <div class="chat-tabs">
        <div class="chat-tab active" onclick="switchTab('rooms')">💬 Chats</div>
        <div class="chat-tab" onclick="switchTab('online')">🟢 Online</div>
    </div>
    
    <div class="chat-body">
        <!-- Room List -->
        <div class="room-list active" id="roomList"></div>
        
        <!-- Online Users -->
        <div class="room-list" id="onlineList">
            <div class="empty-state"><i class="fas fa-users"></i>Loading online users...</div>
        </div>
        
        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="chat-area-header">
                <span class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></span>
                <span class="room-title" id="chatRoomTitle">Chat</span>
                <span class="typing-indicator" id="typingIndicator"></span>
            </div>
            <div class="messages" id="messages"></div>
            <div class="msg-input-area">
                <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

<script>
const socket = io();
let user = null;
let currentRoom = null;

// Get user from localStorage
try { user = JSON.parse(localStorage.getItem('user') || '{}'); } catch(e) { user = {}; }
if (!user.id && localStorage.getItem('auth_token') !== 'guest') {
    user = { id: 0, username: 'Guest' };
}

// Connect socket
socket.emit('join', { userId: user.id || 0, username: user.username || 'User' });

// ==================== TABS ====================
function switchTab(tab) {
    document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('roomList').classList.remove('active');
    document.getElementById('onlineList').classList.remove('active');
    
    if (tab === 'rooms') { document.getElementById('roomList').classList.add('active'); loadRooms(); }
    if (tab === 'online') { document.getElementById('onlineList').classList.add('active'); }
}

// ==================== ROOMS ====================
async function loadRooms() {
    const token = localStorage.getItem('auth_token');
    if (!token || token === 'guest') {
        document.getElementById('roomList').innerHTML = '<div class="empty-state"><i class="fas fa-lock"></i>Please login to chat</div>';
        return;
    }
    
    try {
        const r = await fetch('/api/chat/rooms', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token}) });
        const d = await r.json();
        const container = document.getElementById('roomList');
        
        if (d.rooms && d.rooms.length > 0) {
            container.innerHTML = d.rooms.map(room => `
                <div class="room-item" onclick="openRoom(${room.id}, '${room.room_name}')">
                    <div class="room-icon">${room.room_type === 'admin' ? '👨‍💼' : room.room_type === 'group' ? '👥' : '💬'}</div>
                    <div class="room-info">
                        <div class="room-name">${room.room_name}</div>
                        <div class="room-last">${room.room_type} chat</div>
                    </div>
                    ${room.unread > 0 ? `<div class="room-badge">${room.unread}</div>` : ''}
                </div>
            `).join('');
        } else {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-comments"></i>No conversations yet
                    <button class="admin-btn" onclick="createAdminChat()"><i class="fas fa-headset"></i> Chat with Admin</button>
                </div>`;
        }
    } catch(e) {}
}

// ==================== OPEN ROOM ====================
async function openRoom(roomId, roomName) {
    currentRoom = roomId;
    document.getElementById('roomList').classList.remove('active');
    document.getElementById('onlineList').classList.remove('active');
    document.getElementById('chatArea').classList.add('active');
    document.getElementById('chatRoomTitle').textContent = roomName;
    document.getElementById('messages').innerHTML = '';
    
    socket.emit('join_room', roomId);
    
    // Load messages
    try {
        const r = await fetch('/api/chat/messages/' + roomId);
        const d = await r.json();
        if (d.messages) {
            d.messages.forEach(msg => addMessage(msg));
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
    } catch(e) {}
    
    // Mark as read
    const token = localStorage.getItem('auth_token');
    const uid = user.id || 0;
    fetch('/api/chat/read', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({roomId, userId:uid}) });
}

function closeChat() {
    currentRoom = null;
    document.getElementById('chatArea').classList.remove('active');
    document.getElementById('roomList').classList.add('active');
    loadRooms();
}

// ==================== MESSAGES ====================
function addMessage(msg) {
    const isMine = (msg.sender_id === (user.id || 0)) || (msg.userId === (user.id || 0));
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg-row ' + (isMine ? 'mine msg-mine' : 'other msg-other');
    div.innerHTML = `
        <div class="msg-bubble">
            ${!isMine ? `<div class="msg-sender">${msg.username || 'User'}</div>` : ''}
            ${msg.message}
            <div class="msg-time">${new Date(msg.created_at || Date.now()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
        </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById('msgInput');
    const message = input.value.trim();
    if (!message || !currentRoom) return;
    
    socket.emit('send_message', {
        roomId: currentRoom,
        message,
        userId: user.id || 0,
        username: user.username || 'User'
    });
    
    input.value = '';
}

function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

// ==================== ADMIN CHAT ====================
async function createAdminChat() {
    const token = localStorage.getItem('auth_token');
    if (!token) return alert('Please login first');
    
    try {
        const r = await fetch('/api/chat/create_admin_room', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token}) });
        const d = await r.json();
        if (d.success) {
            loadRooms();
        }
    } catch(e) {}
}

// ==================== SOCKET EVENTS ====================
socket.on('new_message', (msg) => {
    if (currentRoom === msg.roomId) {
        addMessage(msg);
    }
    loadRooms();
});

socket.on('user_typing', (data) => {
    document.getElementById('typingIndicator').textContent = data.username + ' is typing...';
    setTimeout(() => { document.getElementById('typingIndicator').textContent = ''; }, 2000);
});

socket.on('online_users', (users) => {
    document.getElementById('onlineCount').textContent = users.length + ' online';
    document.getElementById('onlineList').innerHTML = users.length > 0 
        ? users.map(u => `<div class="room-item"><div class="room-icon">🟢</div><div class="room-info"><div class="room-name">${u.username}</div></div></div>`).join('')
        : '<div class="empty-state"><i class="fas fa-users"></i>No users online</div>';
});

// ==================== INIT ====================
loadRooms();
</script>
</body>
</html>
