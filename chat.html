<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>စကားပြော - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        :root{--bg:#0a0a1a;--p:#1a1f4b;--a:#4a1c7a;--w:#f39c12;--g:#2ecc71;--t:#fff;--r:#e74c3c;--b:#3498db}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:#0c0e27;color:var(--t);height:100vh;display:flex;flex-direction:column;overflow:hidden}
        
        .chat-header{display:flex;align-items:center;gap:10px;padding:12px 15px;background:linear-gradient(to right,var(--a),var(--p));border-bottom:2px solid var(--w);flex-shrink:0}
        .chat-header a{color:var(--w);text-decoration:none;font-size:18px}
        .chat-header h3{color:var(--w);font-size:14px;flex:1}
        .chat-header .online-count{font-size:10px;color:var(--g)}
        
        .chat-tabs{display:flex;gap:4px;padding:8px 10px;background:rgba(0,0,0,0.3);flex-shrink:0}
        .chat-tab{flex:1;padding:8px;text-align:center;font-size:11px;cursor:pointer;border-radius:6px;background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.5);transition:all 0.2s}
        .chat-tab.active{background:var(--a);color:var(--w)}
        
        .chat-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
        
        .room-list{display:none;flex:1;overflow-y:auto;padding:10px}
        .room-list.active{display:block}
        
        .room-item{display:flex;align-items:center;gap:10px;padding:12px;background:rgba(0,0,0,0.2);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all 0.2s}
        .room-item:hover{background:rgba(74,28,122,0.3)}
        .room-item .room-icon{font-size:20px}
        .room-item .room-info{flex:1}
        .room-item .room-name{font-size:12px;font-weight:bold}
        .room-item .room-last{font-size:9px;color:rgba(255,255,255,0.4);margin-top:3px}
        .room-item .room-badge{background:var(--r);color:#fff;font-size:9px;padding:2px 8px;border-radius:10px;min-width:20px;text-align:center}
        
        .chat-area{display:none;flex:1;flex-direction:column;overflow:hidden}
        .chat-area.active{display:flex}
        
        .chat-area-header{display:flex;align-items:center;gap:10px;padding:10px 15px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
        .chat-area-header .back-btn{color:var(--w);cursor:pointer;font-size:16px}
        .chat-area-header .room-title{font-size:13px;font-weight:bold;flex:1}
        .chat-area-header .typing-indicator{font-size:9px;color:var(--g)}
        .chat-area-header .delete-btn{color:var(--r);cursor:pointer;font-size:14px;padding:5px}
        
        .messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px}
        
        .msg-row{display:flex;gap:8px;max-width:85%}
        .msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
        .msg-row.other{align-self:flex-start}
        
        .msg-bubble{padding:10px 14px;border-radius:12px;font-size:12px;line-height:1.5;word-break:break-word;position:relative}
        .msg-mine .msg-bubble{background:var(--a);border-bottom-right-radius:4px}
        .msg-other .msg-bubble{background:rgba(255,255,255,0.1);border-bottom-left-radius:4px}
        
        .msg-sender{font-size:9px;color:var(--w);margin-bottom:4px;font-weight:bold}
        .msg-time{font-size:8px;color:rgba(255,255,255,0.3);margin-top:4px;text-align:right}
        .msg-delete{position:absolute;top:4px;right:8px;font-size:8px;color:rgba(255,255,255,0.3);cursor:pointer;display:none}
        .msg-mine .msg-bubble:hover .msg-delete{display:block}
        
        .read-receipt{font-size:8px;color:var(--b);text-align:right;margin-top:2px}
        
        .msg-input-area{display:flex;gap:8px;padding:10px 15px;background:rgba(0,0,0,0.4);border-top:1px solid rgba(255,255,255,0.1);flex-shrink:0}
        .msg-input-area input{flex:1;padding:12px 40px 12px 15px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:20px;color:#fff;font-size:13px;outline:none}
        .emoji-btn{position:absolute;right:55px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;color:rgba(255,255,255,0.5)}
        .msg-input-area button{width:44px;height:44px;border-radius:50%;border:none;background:var(--w);color:#000;font-size:18px;cursor:pointer;transition:all 0.2s;flex-shrink:0}
        .msg-input-area button:hover{transform:scale(1.05)}
        
        .input-wrapper{position:relative;flex:1}
        
        .emoji-picker{display:none;position:absolute;bottom:60px;right:0;background:var(--p);border:2px solid var(--w);border-radius:10px;padding:10px;z-index:100;max-width:280px;flex-wrap:wrap;gap:6px}
        .emoji-picker.active{display:flex}
        .emoji-item{font-size:22px;cursor:pointer;padding:4px;transition:all 0.2s}
        .emoji-item:hover{transform:scale(1.3)}
        
        .admin-btn{width:100%;padding:12px;background:var(--g);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:bold;cursor:pointer;margin-top:10px}
        
        .search-bar{padding:8px 10px;background:rgba(0,0,0,0.2);flex-shrink:0}
        .search-bar input{width:100%;padding:10px 15px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:20px;color:#fff;font-size:12px;outline:none}
        
        .empty-state{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.3)}
        .empty-state i{font-size:50px;margin-bottom:15px;display:block}
        
        .load-more{text-align:center;padding:10px;color:var(--b);font-size:11px;cursor:pointer}
        
        @media (max-width:380px){
            .msg-row{max-width:90%}
        }
    </style>
</head>
<body>
    <audio id="msgSound" preload="auto" style="display:none">
        <source src="https://www.soundjay.com/buttons/sounds/button-09.mp3" type="audio/mpeg">
    </audio>
    
    <div class="chat-header">
        <a href="/dashboard"><i class="fas fa-arrow-left"></i></a>
        <h3><i class="fas fa-comments"></i> စကားပြော</h3>
        <span class="online-count" id="onlineCount">0 ယောက်ရှိ</span>
    </div>
    
    <div class="chat-tabs">
        <div class="chat-tab active" onclick="switchTab('rooms')">💬 စကားပြောများ</div>
        <div class="chat-tab" onclick="switchTab('online')">🟢 အွန်လိုင်း</div>
        <div class="chat-tab" onclick="switchTab('search')">🔍 ရှာရန်</div>
    </div>
    
    <div class="chat-body">
        <!-- Room List -->
        <div class="room-list active" id="roomList"></div>
        
        <!-- Online Users -->
        <div class="room-list" id="onlineList">
            <div class="empty-state"><i class="fas fa-users"></i>အွန်လိုင်းသုံးစွဲသူများ စောင့်ဆိုင်းနေသည်...</div>
        </div>
        
        <!-- Search Users -->
        <div class="room-list" id="searchList">
            <div class="search-bar"><input type="text" id="searchInput" placeholder="သုံးစွဲသူအမည် ရှာရန်..." onkeyup="searchUsers()"></div>
            <div id="searchResults" style="padding:10px"><div class="empty-state"><i class="fas fa-search"></i>သုံးစွဲသူအမည် ရိုက်ထည့်ပါ</div></div>
        </div>
        
        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <div class="chat-area-header">
                <span class="back-btn" onclick="closeChat()"><i class="fas fa-arrow-left"></i></span>
                <span class="room-title" id="chatRoomTitle">စကားပြော</span>
                <span class="typing-indicator" id="typingIndicator"></span>
                <span class="delete-btn" onclick="deleteRoom()" title="စကားပြောခန်းဖျက်ရန်"><i class="fas fa-trash"></i></span>
            </div>
            <div class="messages" id="messages"></div>
            <div class="load-more" id="loadMore" style="display:none" onclick="loadMoreMessages()">⏳ နောက်ထပ်စာများ ကြည့်ရန်...</div>
            <div class="msg-input-area">
                <div class="input-wrapper">
                    <input type="text" id="msgInput" placeholder="စာရိုက်ပါ..." onkeypress="handleKeyPress(event)" oninput="handleTyping()">
                    <span class="emoji-btn" onclick="toggleEmoji()">😊</span>
                    <div class="emoji-picker" id="emojiPicker"></div>
                </div>
                <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

<script>
const socket = io();
let user = null;
let currentRoom = null;
let messageOffset = 0;
let hasMoreMessages = false;

// Get user
try { user = JSON.parse(localStorage.getItem('user') || '{}'); } catch(e) { user = {}; }
if (!user.id && localStorage.getItem('auth_token') !== 'guest') {
    user = { id: 0, username: 'ဧည့်သည်' };
}

// Connect socket
socket.emit('join', { userId: user.id || 0, username: user.username || 'သုံးစွဲသူ' });

// ==================== EMOJIS ====================
const EMOJIS = ['😀','😂','😍','😎','😢','😡','👍','👎','❤️','🔥','🎉','💯','🙏','😊','🤔','😴','🥰','😇','🤗','💪','👋','✌️','🤝','👑','💎','💰','🎮','⚽','🌟','🍕'];

function buildEmojiPicker() {
    document.getElementById('emojiPicker').innerHTML = EMOJIS.map(e => `<span class="emoji-item" onclick="insertEmoji('${e}')">${e}</span>`).join('');
}
buildEmojiPicker();

function toggleEmoji() { document.getElementById('emojiPicker').classList.toggle('active'); }
function insertEmoji(emoji) {
    const input = document.getElementById('msgInput');
    input.value += emoji;
    document.getElementById('emojiPicker').classList.remove('active');
    input.focus();
}

// ==================== SOUND ====================
function playMsgSound() {
    try { document.getElementById('msgSound').play().catch(()=>{}); } catch(e) {}
}

// ==================== TABS ====================
function switchTab(tab) {
    document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('roomList').classList.remove('active');
    document.getElementById('onlineList').classList.remove('active');
    document.getElementById('searchList').classList.remove('active');
    
    if (tab === 'rooms') { document.getElementById('roomList').classList.add('active'); loadRooms(); }
    if (tab === 'online') { document.getElementById('onlineList').classList.add('active'); }
    if (tab === 'search') { document.getElementById('searchList').classList.add('active'); }
}

// ==================== ROOMS ====================
async function loadRooms() {
    const token = localStorage.getItem('auth_token');
    if (!token || token === 'guest') {
        document.getElementById('roomList').innerHTML = '<div class="empty-state"><i class="fas fa-lock"></i>စကားပြောရန် အကောင့်ဝင်ပါ</div>';
        return;
    }
    
    try {
        const r = await fetch('/api/chat/rooms', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token}) });
        const d = await r.json();
        const container = document.getElementById('roomList');
        
        if (d.rooms && d.rooms.length > 0) {
            container.innerHTML = d.rooms.map(room => `
                <div class="room-item" onclick="openRoom(${room.id}, '${room.room_name.replace(/'/g, "\\'")}')">
                    <div class="room-icon">${room.room_type === 'admin' ? '👨‍💼' : room.room_type === 'group' ? '👥' : '💬'}</div>
                    <div class="room-info">
                        <div class="room-name">${room.room_name}</div>
                        <div class="room-last">${room.room_type === 'admin' ? 'Admin နှင့် စကားပြော' : room.room_type === 'group' ? 'အုပ်စုစကားပြော' : 'တစ်ဦးချင်းစကားပြော'}</div>
                    </div>
                    ${room.unread > 0 ? `<div class="room-badge">${room.unread > 99 ? '99+' : room.unread}</div>` : ''}
                </div>
            `).join('');
        } else {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-comments"></i>စကားပြောခန်းမရှိသေးပါ
                    <button class="admin-btn" onclick="createAdminChat()"><i class="fas fa-headset"></i> Admin နှင့် စကားပြောမည်</button>
                </div>`;
        }
    } catch(e) {}
}

// ==================== SEARCH ====================
async function searchUsers() {
    const query = document.getElementById('searchInput').value.trim();
    if (query.length < 2) {
        document.getElementById('searchResults').innerHTML = '<div class="empty-state"><i class="fas fa-search"></i>သုံးစွဲသူအမည် ရိုက်ထည့်ပါ</div>';
        return;
    }
    
    try {
        const r = await fetch('/api/admin/search_user', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query}) });
        const d = await r.json();
        const container = document.getElementById('searchResults');
        
        if (d.users && d.users.length > 0) {
            container.innerHTML = d.users.map(u => `
                <div class="room-item" onclick="startPrivateChat(${u.id}, '${u.username}')">
                    <div class="room-icon">💬</div>
                    <div class="room-info">
                        <div class="room-name">${u.username}</div>
                        <div class="room-last">စကားပြော စတင်ရန် နှိပ်ပါ</div>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i>ရှာမတွေ့ပါ</div>';
        }
    } catch(e) {}
}

// ==================== PRIVATE CHAT ====================
async function startPrivateChat(otherUserId, otherUsername) {
    const token = localStorage.getItem('auth_token');
    if (!token) return alert('အကောင့်ဝင်ပါ');
    
    try {
        const r = await fetch('/api/chat/create_private_room', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, otherUserId}) });
        const d = await r.json();
        if (d.success) {
            openRoom(d.room.id, otherUsername);
        }
    } catch(e) {}
}

// ==================== OPEN ROOM ====================
async function openRoom(roomId, roomName) {
    currentRoom = roomId;
    messageOffset = 0;
    document.getElementById('roomList').classList.remove('active');
    document.getElementById('onlineList').classList.remove('active');
    document.getElementById('searchList').classList.remove('active');
    document.getElementById('chatArea').classList.add('active');
    document.getElementById('chatRoomTitle').textContent = roomName;
    document.getElementById('messages').innerHTML = '';
    document.getElementById('loadMore').style.display = 'none';
    
    socket.emit('join_room', roomId);
    
    try {
        const r = await fetch('/api/chat/messages/' + roomId);
        const d = await r.json();
        if (d.messages) {
            if (d.messages.length >= 50) {
                hasMoreMessages = true;
                document.getElementById('loadMore').style.display = 'block';
            }
            d.messages.forEach(msg => addMessage(msg, false));
            setTimeout(() => {
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            }, 100);
        }
    } catch(e) {}
    
    const token = localStorage.getItem('auth_token');
    const uid = user.id || 0;
    fetch('/api/chat/read', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({roomId, userId:uid}) });
}

function closeChat() {
    currentRoom = null;
    document.getElementById('chatArea').classList.remove('active');
    document.getElementById('roomList').classList.add('active');
    loadRooms();
}

async function deleteRoom() {
    if (!confirm('စကားပြောခန်းကို ဖျက်မှာသေချာပါသလား?')) return;
    if (!currentRoom) return;
    try {
        await fetch('/api/chat/room/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({roomId: currentRoom}) });
        closeChat();
    } catch(e) {}
}

async function loadMoreMessages() {
    if (!currentRoom) return;
    messageOffset += 50;
    try {
        const r = await fetch('/api/chat/messages/' + currentRoom + '?offset=' + messageOffset);
        const d = await r.json();
        if (d.messages && d.messages.length > 0) {
            const container = document.getElementById('messages');
            const oldHeight = container.scrollHeight;
            d.messages.forEach(msg => addMessage(msg, true));
            container.scrollTop = container.scrollHeight - oldHeight;
        }
        if (!d.messages || d.messages.length < 50) {
            document.getElementById('loadMore').style.display = 'none';
            hasMoreMessages = false;
        }
    } catch(e) {}
}

// ==================== MESSAGES ====================
function addMessage(msg, prepend = false) {
    const isMine = (msg.sender_id === (user.id || 0)) || (msg.userId === (user.id || 0));
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg-row ' + (isMine ? 'mine msg-mine' : 'other msg-other');
    div.innerHTML = `
        <div class="msg-bubble">
            ${!isMine ? `<div class="msg-sender">${msg.username || 'သုံးစွဲသူ'}</div>` : ''}
            ${escapeHtml(msg.message)}
            <div class="msg-time">
                ${new Date(msg.created_at || Date.now()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
                ${isMine ? `<span class="msg-delete" onclick="deleteMessage(${msg.id})"><i class="fas fa-times"></i></span>` : ''}
            </div>
        </div>
        ${isMine && msg.is_read ? '<div class="read-receipt">✓✓ ဖတ်ပြီး</div>' : ''}
    `;
    
    if (prepend) {
        container.insertBefore(div, container.firstChild);
    } else {
        container.appendChild(div);
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function deleteMessage(msgId) {
    if (!confirm('စာကိုဖျက်မှာသေချာပါသလား?')) return;
    try {
        await fetch('/api/chat/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({messageId: msgId}) });
        document.querySelectorAll('.msg-row').forEach(row => {
            if (row.innerHTML.includes('deleteMessage(' + msgId + ')')) row.remove();
        });
    } catch(e) {}
}

function sendMessage() {
    const input = document.getElementById('msgInput');
    const message = input.value.trim();
    if (!message || !currentRoom) return;
    
    socket.emit('send_message', {
        roomId: currentRoom,
        message,
        userId: user.id || 0,
        username: user.username || 'သုံးစွဲသူ'
    });
    
    input.value = '';
    document.getElementById('emojiPicker').classList.remove('active');
}

function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

let typingTimeout;
function handleTyping() {
    if (!currentRoom) return;
    clearTimeout(typingTimeout);
    socket.emit('typing', { roomId: currentRoom, userId: user.id || 0, username: user.username || 'သုံးစွဲသူ' });
    typingTimeout = setTimeout(() => {}, 1000);
}

// ==================== ADMIN CHAT ====================
async function createAdminChat() {
    const token = localStorage.getItem('auth_token');
    if (!token) return alert('အကောင့်ဝင်ပါ');
    
    try {
        const r = await fetch('/api/chat/create_admin_room', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token}) });
        const d = await r.json();
        if (d.success) {
            loadRooms();
        }
    } catch(e) {}
}

// ==================== SOCKET EVENTS ====================
socket.on('new_message', (msg) => {
    if (currentRoom === msg.roomId) {
        addMessage(msg, false);
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
    if (msg.userId !== (user.id || 0) && msg.sender_id !== (user.id || 0)) {
        playMsgSound();
    }
    loadRooms();
});

socket.on('user_typing', (data) => {
    document.getElementById('typingIndicator').textContent = data.username + ' စာရိုက်နေသည်...';
    setTimeout(() => { document.getElementById('typingIndicator').textContent = ''; }, 2000);
});

socket.on('online_users', (users) => {
    document.getElementById('onlineCount').textContent = users.length + ' ယောက်ရှိ';
    document.getElementById('onlineList').innerHTML = users.length > 0 
        ? users.map(u => `<div class="room-item"><div class="room-icon">🟢</div><div class="room-info"><div class="room-name">${u.username}</div></div></div>`).join('')
        : '<div class="empty-state"><i class="fas fa-users"></i>အွန်လိုင်းသုံးစွဲသူမရှိပါ</div>';
});

// ==================== INIT ====================
loadRooms();
</script>
</body>
</html>
