    <style>
        :root{
            --bg:#0f1123;--surface:#1a1f4b;--gold:#f39c12;--green:#2ecc71;--red:#e74c3c;
            --b-solid:#6b3410;--b-light:#CD7F32;--b-bright:#E8A87C;
            --s-solid:#707070;--s-light:#C0C0C0;--s-bright:#E8E8E8;
            --g-solid:#B8860B;--g-light:#FFD700;--g-bright:#FFF8DC;
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
        body{background:var(--bg);color:#fff;height:100dvh;display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top,0px)}

        /* ========== PREMIUM TIER BACKGROUNDS ========== */
        body.bronze-tier{background:linear-gradient(160deg,#3d1c00 0%,#2d1a0a 40%,#1a0f07 100%)}
        body.silver-tier{background:linear-gradient(160deg,#2d2d2d 0%,#1a1a1a 40%,#0a0a0a 100%)}
        body.gold-tier{background:linear-gradient(160deg,#6d4c00 0%,#3d2a00 40%,#1a0a00 100%)}

        /* ========== HEADER ========== */
        .tg-header{display:flex;align-items:center;gap:8px;padding:8px 12px;padding-top:calc(8px + env(safe-area-inset-top,0px));flex-shrink:0;background:var(--surface);border-bottom:1px solid rgba(255,255,255,0.06)}

        .tg-header .back-btn:hover{background:rgba(255,255,255,0.08)}
        .tg-header .title{flex:1;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
        .tg-header .online-badge{font-size:9px;padding:3px 10px;border-radius:12px;background:rgba(46,204,113,0.1);color:#2ecc71;border:1px solid rgba(46,204,113,0.2);font-weight:600}
        .premium-badge{display:none;padding:3px 10px;border-radius:12px;font-size:8px;font-weight:700}

        body.bronze-tier .tg-header{background:linear-gradient(135deg,#3d1c00,#6b3410);border-bottom:2px solid var(--b-light)}
        body.bronze-tier .tg-header .title{color:var(--b-bright)}
        body.bronze-tier .premium-badge{background:var(--b-solid);color:var(--b-bright);border:1px solid var(--b-light);display:inline-block}
        body.silver-tier .tg-header{background:linear-gradient(135deg,#2d2d2d,#707070);border-bottom:2px solid var(--s-light)}
        body.silver-tier .tg-header .title{color:var(--s-bright)}
        body.silver-tier .premium-badge{background:var(--s-solid);color:var(--s-bright);border:1px solid var(--s-light);display:inline-block}
        body.gold-tier .tg-header{background:linear-gradient(135deg,#6d4c00,#B8860B);border-bottom:2px solid var(--g-light)}
        body.gold-tier .tg-header .title{color:var(--g-bright)}
        body.gold-tier .premium-badge{background:var(--g-solid);color:var(--g-bright);border:1px solid var(--g-light);display:inline-block}

        /* ========== TABS ========== */
        .tg-tabs{display:flex;gap:2px;padding:6px 10px;background:rgba(0,0,0,0.2);flex-shrink:0}
        .tg-tab{flex:1;padding:7px 0;text-align:center;font-size:10px;font-weight:500;cursor:pointer;border-radius:8px;transition:all 0.2s;color:rgba(255,255,255,0.5);background:transparent;border:none}
        .tg-tab.active{background:var(--gold);color:#000;font-weight:700}
        .tg-tab.nav-link{text-decoration:none;display:flex;align-items:center;justify-content:center}

        body.bronze-tier .tg-tab.active{background:var(--b-solid);color:var(--b-bright)}
        body.silver-tier .tg-tab.active{background:var(--s-solid);color:var(--s-bright)}
        body.gold-tier .tg-tab.active{background:var(--g-solid);color:var(--g-bright)}

        /* ========== CHAT BODY ========== */
        .chat-body{flex:1;display:flex;flex-direction:column;overflow:hidden}
        .room-list{display:none;flex:1;overflow-y:auto;padding:6px 10px}
        .room-list.active{display:block}

        /* ========== ROOM ITEM ========== */
        .tg-room{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:2px;cursor:pointer;transition:all 0.2s}
        .tg-room:hover{background:rgba(255,255,255,0.04)}
        .tg-room:active{transform:scale(0.98)}
        .tg-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid transparent}
        .tg-room-info{flex:1;min-width:0}
        .tg-room-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .tg-room-last{font-size:10px;color:rgba(255,255,255,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .tg-room-badge{background:#e74c3c;color:#fff;font-size:9px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}

        /* ========== USER ITEM ========== */
        .tg-user{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:2px;cursor:pointer;transition:all 0.2s}
        .tg-user:hover{background:rgba(255,255,255,0.04)}
        .tg-user:active{transform:scale(0.98)}
        .online-dot{width:10px;height:10px;border-radius:50%;background:#2ecc71;flex-shrink:0;box-shadow:0 0 6px rgba(46,204,113,0.4)}

        /* ========== CHAT AREA ========== */
        .chat-area{display:none;flex:1;flex-direction:column;overflow:hidden}
        .chat-area.active{display:flex}
        .chat-area-header{display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.05);flex-shrink:0}
        .chat-area-header .back-btn{cursor:pointer;font-size:16px;color:#fff;padding:4px 8px}
        .chat-area-header .room-avatar{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.15)}
        .chat-area-header .room-title{flex:1;font-size:13px;font-weight:600}
        .chat-area-header .delete-btn{color:rgba(255,255,255,0.3);cursor:pointer;padding:4px 8px;font-size:14px;transition:0.2s}
        .chat-area-header .delete-btn:hover{color:#e74c3c}

         /* ========== MESSAGE BUBBLE - RGB LED NEON BORDER (PREMIUM TIERS) ========== */
.msg-bubble {
    position: relative;
    padding: 7px 12px;
    border-radius: 14px;
    font-size: 12px;
    word-break: break-word;
    line-height: 1.4;
    background: #111827;
    color: #fff;
    z-index: 1;
}

/* Normal Tier - Simple (overflow hidden ထား) */
.msg-bubble.normal-tier {
    background: rgba(255, 255, 255, 0.06) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    overflow: hidden;
}

.msg-mine .msg-bubble.normal-tier {
    background: rgba(46, 204, 113, 0.12) !important;
    border: 1px solid rgba(46, 204, 113, 0.2) !important;
    overflow: hidden;
}

/* ===== RGB LED THIN BORDER (Premium Only) ===== */
.msg-bubble.bronze-tier,
.msg-bubble.silver-tier,
.msg-bubble.gold-tier {
    background: #111827 !important;
    color: #fff !important;
}

/* RGB LED Border Pseudo Element */
.msg-bubble.bronze-tier::before,
.msg-bubble.silver-tier::before,
.msg-bubble.gold-tier::before {
    content: "";
    position: absolute;
    inset: -1.5px;
    border-radius: 15px;
    z-index: -2;
    filter: blur(1px) drop-shadow(0 0 6px #00ffee) drop-shadow(0 0 12px #bb00ff) drop-shadow(0 0 18px #00ffea);
    animation: rgbRotate 1.6s linear infinite;
}

/* Inner box (makes border thin) */
.msg-bubble.bronze-tier::after,
.msg-bubble.silver-tier::after,
.msg-bubble.gold-tier::after {
    content: "";
    position: absolute;
    inset: 2px;
    background: #111827;
    border-radius: 12px;
    z-index: -1;
}

/* ===== BRONZE - Warm Fire RGB ===== */
.msg-bubble.bronze-tier::before {
    background: conic-gradient(
        from 0deg,
        #ff4500, #ff6a00, #ff8800, #ffaa00,
        #ff6600, #ff8c00, #cc3700, #ff4500
    );
}

/* ===== SILVER - Ice Blue RGB ===== */
.msg-bubble.silver-tier::before {
    background: conic-gradient(
        from 0deg,
        #4dc9f6, #00bfff, #1e90ff, #00d2ff,
        #00e5ff, #00f0ff, #00ccff, #4dc9f6
    );
    filter: blur(1px) drop-shadow(0 0 6px #00e5ff) drop-shadow(0 0 12px #1e90ff) drop-shadow(0 0 18px #00d2ff);
}

/* ===== GOLD - Rainbow RGB (Full Spectrum) ===== */
.msg-bubble.gold-tier::before {
    background: conic-gradient(
        from 0deg,
        #ff0000, #ff4400, #ff8800, #ffcc00,
        #ffee00, #ccff00, #88ff00, #44ff00,
        #00ff44, #00ff88, #00ffcc, #00ffee,
        #00ccff, #0088ff, #0044ff, #0000ff,
        #4400ff, #8800ff, #cc00ff, #ff00cc,
        #ff0088, #ff0044, #ff0000
    );
    filter: blur(1px) drop-shadow(0 0 6px #ff0000) drop-shadow(0 0 12px #00ffee) drop-shadow(0 0 18px #ff00d4);
    animation: rgbRotate 1.2s linear infinite;
}

/* ===== ROTATION ANIMATION ===== */
@keyframes rgbRotate {
    100% {
        transform: rotate(360deg);
    }
}

/* Mine bubble corners */
.msg-mine .msg-bubble { border-bottom-right-radius: 3px; }
.msg-other .msg-bubble { border-bottom-left-radius: 3px; }
        /* ========== INPUT AREA ========== */
        .msg-input-area{display:flex;gap:6px;padding:8px 10px;background:rgba(0,0,0,0.25);border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0}

        /* ========== MODALS ========== */
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:2000;justify-content:center;align-items:center}

        .premium-req-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:2500;justify-content:center;align-items:center}
        .premium-req-overlay.active{display:flex}

         /* ========== UPLOAD PREVIEW - TELEGRAM STYLE BOTTOM SHEET ========== */
.upload-preview-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 3000;
    display: flex;
    align-items: flex-end;
    animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.upload-preview-sheet {
    background: #1a1f4b;
    border-radius: 20px 20px 0 0;
    padding: 16px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border-top: 2px solid rgba(243, 156, 18, 0.3);
}
@keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
}

/* Drag handle */
.upload-drag-handle {
    width: 36px;
    height: 4px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 2px;
    margin: 0 auto 14px;
    cursor: grab;
}

/* Image preview */
.upload-preview-image-wrap {
    text-align: center;
    margin-bottom: 12px;
}

.upload-preview-image {
    max-width: 100%;
    max-height: 35vh;
    border-radius: 12px;
    object-fit: contain;
    border: 2px solid rgba(255, 255, 255, 0.1);
}

/* File preview */
.upload-preview-file-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    background: rgba(255, 255, 255, 0.04);
    border-radius: 12px;
    margin-bottom: 12px;
    border: 1px solid rgba(255, 255, 255, 0.06);
}

.upload-preview-file-icon {
    font-size: 40px;
    flex-shrink: 0;
}

.upload-preview-file-info {
    flex: 1;
    min-width: 0;
}

.upload-preview-file-name {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.upload-preview-file-size {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
}

/* Progress bar */
.upload-progress-wrap {
    margin-bottom: 12px;
    display: none;
}

.upload-progress-text {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 4px;
    text-align: center;
}

.upload-progress-bar {
    height: 4px;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 2px;
    overflow: hidden;
}

.upload-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #2ecc71, #f39c12);
    border-radius: 2px;
    width: 0%;
    transition: width 0.15s ease;
}

/* Buttons */
.upload-preview-buttons {
    display: flex;
    gap: 10px;
}

.upload-btn-cancel {
    flex: 1;
    padding: 14px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.04);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}

.upload-btn-cancel:hover {
    background: rgba(255, 255, 255, 0.08);
}

.upload-btn-send {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #2ecc71;
    color: #000;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
}

.upload-btn-send:hover {
    background: #27ae60;
    transform: translateY(-1px);
}

.upload-btn-send:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}
/* ========== PREMIUM LOCK MODAL - PREMIUM DESIGN ========== */
.premium-lock-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 2600;
    display: flex;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.premium-lock-card {
    background: linear-gradient(145deg, #1a1f4b 0%, #11112a 100%);
    border: 2px solid #f39c12;
    border-radius: 20px;
    padding: 30px 24px 24px;
    width: 90%;
    max-width: 350px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: cardPopIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(243, 156, 18, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
}

@keyframes cardPopIn {
    from {
        opacity: 0;
        transform: scale(0.8) translateY(30px);
    }
    to {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

/* Top shine bar */
.premium-lock-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, 
        transparent 0%, 
        #f39c12 20%, 
        #FFD700 50%, 
        #f39c12 80%, 
        transparent 100%
    );
    animation: topBarShine 2s ease-in-out infinite;
}

@keyframes topBarShine {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
}

/* Floating particles */
.premium-lock-card::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:

<script>
// Audio elements (created once)
let sendSound = null;
let receiveSound = null;

function initSounds() {
    try {
        sendSound = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
        sendSound.volume = 0.3;
        
        receiveSound = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
        receiveSound.volume = 0.2;
    } catch(e) {}
}
// ============================================
// TELEGRAM STYLE CHAT SYSTEM
// ============================================
let socket=null,currentUser=null,currentRoom=null,typingTimeout=null,isPremium=false,premiumTier=0;
let selectedFile=null,selectedFileType=null,selectedFileName=null,uploadCancelled=false;
const IMGBB_KEY='55854bc5e01a19fd4793d1df84326d00';

function showToast(m,e){e=e||false;const t=document.getElementById('toast');t.textContent=m;t.style.background=e?'#e74c3c':'#2ecc71';t.style.color=e?'#fff':'#000';t.style.display='block';setTimeout(()=>t.style.display='none',2500)}
function escapeHtml(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function scrollToBottom(){const m=document.getElementById('messages');if(m)m.scrollTop=m.scrollHeight}
function closeModal(id){document.getElementById(id).classList.remove('active')}
function handleImageClick() {
    if (!isPremium) {
        showPremiumLockModal('📷');
        return;
    }
    selectImage();
}

function handleFileClick() {
    if (!isPremium) {
        showPremiumLockModal('📎');
        return;
    }
    selectFile();
}

// ✅ Premium Lock Modal
function showPremiumLockModal(icon) {
    var overlay = document.createElement('div');
    overlay.className = 'premium-lock-overlay';
    overlay.onclick = function(e) {
        if (e.target === overlay) overlay.remove();
    };
    
    overlay.innerHTML = `
        <div class="premium-lock-card" onclick="event.stopPropagation()">
            <div class="premium-lock-icon">${icon}</div>
            <div class="premium-lock-title">Premium Feature</div>
            <div class="premium-lock-subtitle">
                ဓာတ်ပုံနှင့် ဖိုင်များ ပေးပို့ရန်<br>
                <b>Premium</b> ဝယ်ယူထားရပါမည်
            </div>
            <div class="premium-tier-icons">
                <span class="premium-tier-icon bronze">🥉 Bronze</span>
                <span class="premium-tier-icon silver">🥈 Silver</span>
                <span class="premium-tier-icon gold">🥇 Gold</span>
            </div>
            <div class="premium-lock-buttons">
                <button class="btn-go-premium" onclick="window.location.href='/chatpremium.html'">
                    👑 Go Premium
                </button>
                <button class="btn-cancel-premium" onclick="this.closest('.premium-lock-overlay').remove()">
                    Cancel
                </button>
            </div>
        </div>
    `;
    
    document.body.appendChild(overlay);
}
// ==================== PREMIUM ====================
async function checkPremiumStatus(){
    const t=localStorage.getItem('auth_token');if(!t||t==='guest')return;
    try{const r=await fetch('/api/chat/premium/all_tiers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})});const d=await r.json();
    if(d.success&&d.tiers){let h=0;for(let i=3;i>=1;i--){if(d.tiers[i]){h=i;break}}isPremium=h>0;premiumTier=h;isPremium?(applyPremiumTheme(premiumTier),updateMediaButtons(true)):(applyNormalTheme(),updateMediaButtons(false))}
    else{isPremium=false;premiumTier=0;applyNormalTheme();updateMediaButtons(false)}}catch(e){}
}
function applyNormalTheme(){document.body.classList.remove('bronze-tier','silver-tier','gold-tier');document.body.classList.add('normal-theme');document.getElementById('premiumBadge').style.display='none'}
function applyPremiumTheme(t){
    const b=document.body,ba=document.getElementById('premiumBadge'),pb=document.getElementById('premiumBtn');
    b.classList.remove('normal-theme','bronze-tier','silver-tier','gold-tier');
    function w(tx,ic){let h=ic+' <span class="wave-text">';for(let i=0;i<tx.length;i++)h+=`<span class="wave-letter">${tx[i]}</span>`;return h+='</span>'}
    if(t===1){b.classList.add('bronze-tier');ba.textContent='🥉 BRONZE';ba.style.display='inline-block';if(pb){pb.style.background='linear-gradient(135deg,#CD7F32,#8B4513)';pb.style.color='#fff';pb.style.border='2px solid #E8A87C';pb.innerHTML=w('Bronze','🥉')}}
    else if(t===2){b.classList.add('silver-tier');ba.textContent='🥈 SILVER';ba.style.display='inline-block';if(pb){pb.style.background='linear-gradient(135deg,#C0C0C0,#808080)';pb.style.color='#0a0a0a';pb.style.border='2px solid #E8E8E8';pb.innerHTML=w('Silver','🥈')}}
    else if(t===3){b.classList.add('gold-tier');ba.textContent='🥇 GOLD';ba.style.display='inline-block';if(pb){pb.style.background='linear-gradient(135deg,#FFD700,#B8860B)';pb.style.color='#1a0a00';pb.style.border='2px solid #FFF8DC';pb.innerHTML=w('Gold','🥇')}}
    else{applyNormalTheme()}
}
function updateMediaButtons(h){const i=document.getElementById('imageBtn'),f=document.getElementById('fileBtn');if(h){i.disabled=false;f.disabled=false;i.classList.remove('locked');f.classList.remove('locked')}else{i.disabled=true;f.disabled=true;i.classList.add('locked');f.classList.add('locked')}}

// ==================== FILE UPLOAD ====================
function selectImage(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=e=>{if(e.target.files[0]){selectedFile=e.target.files[0];selectedFileType='image';selectedFileName=selectedFile.name;showUploadPreview(selectedFile,'image')}};i.click()}
function selectFile(){const i=document.createElement('input');i.type='file';i.onchange=e=>{if(e.target.files[0]){selectedFile=e.target.files[0];selectedFileType='file';selectedFileName=selectedFile.name;showUploadPreview(selectedFile,'file')}};i.click()}
function showUploadPreview(f, t) {
    const modal = document.getElementById('uploadPreviewModal');
    const imageWrap = document.getElementById('uploadImagePreview');
    const fileWrap = document.getElementById('uploadFilePreview');
    
    modal.style.display = 'flex';
    document.getElementById('uploadProgress').style.display = 'none';
    document.getElementById('sendUploadBtn').disabled = false;
    uploadCancelled = false;
    
    if (t === 'image') {
        imageWrap.style.display = 'block';
        fileWrap.innerHTML = '';
        const reader = new FileReader();
        reader.onload = e => {
            imageWrap.innerHTML = `<img src="${e.target.result}" class="upload-preview-image">`;
        };
        reader.readAsDataURL(f);
    } else {
        imageWrap.style.display = 'none';
        imageWrap.innerHTML = '';
        fileWrap.innerHTML = `
            <div class="upload-preview-file-card">
                <div class="upload-preview-file-icon"><i class="fas fa-file"></i></div>
                <div class="upload-preview-file-info">
                    <div class="upload-preview-file-name">${escapeHtml(f.name)}</div>
                    <div class="upload-preview-file-size">${(f.size / 1024).toFixed(1)} KB</div>
                </div>
            </div>
        `;
    }
}

function cancelUpload() {
    uploadCancelled = true;
    selectedFile = null;
    document.getElementById('uploadPreviewModal').style.display = 'none';
    document.getElementById('uploadImagePreview').innerHTML = '';
    document.getElementById('uploadFilePreview').innerHTML = '';
}
async function confirmUpload(){
    if(!selectedFile||uploadCancelled||!currentRoom){
        if(!currentRoom) showToast('Select a chat room first',true);
        cancelUpload();
        return;
    }
    
    const progressDiv = document.getElementById('uploadProgress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const sendBtn = document.getElementById('sendUploadBtn');
    
    progressDiv.style.display = 'block';
    progressFill.style.width = '0%';
    progressText.textContent = '0%';
    sendBtn.disabled = true;
    
    let p = 0;
    const pi = setInterval(() => {
        if(uploadCancelled) return;
        p = Math.min(p + 8, 90);
        progressFill.style.width = p + '%';
        progressText.textContent = p + '%';
    }, 150);
    
    try{
        const r = new FileReader();
        const b64 = await new Promise(res => {
            r.onload = e => res(e.target.result);
            r.readAsDataURL(selectedFile);
        });
        
        if(uploadCancelled){ clearInterval(pi); cancelUpload(); return; }
        
        progressFill.style.width = '95%';
        progressText.textContent = '95%';
        
        const res = await fetch('/api/chat/upload_file', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                token: localStorage.getItem('auth_token'),
                base64: b64,
                fileName: selectedFileName,
                fileType: selectedFile.type
            })
        });
        
        const d = await res.json();
        clearInterval(pi);
        
        if(uploadCancelled){ cancelUpload(); return; }
        
        if(d.success){
            progressFill.style.width = '100%';
            progressText.textContent = 'Sent!';
            
            await new Promise(r => setTimeout(r, 200));
            
            socket.emit('send_message', {
                roomId: currentRoom,
                message: selectedFileType === 'image' ? `📷 IMAGE:${d.url}` : `📎 FILE:${d.url}|${d.fileName||selectedFileName}`,
                userId: currentUser.id,
                username: currentUser.username,
                senderPremiumTier: premiumTier
            });
            
            showToast('Sent!');
            cancelUpload();
        } else {
            showToast(d.message || 'Upload failed', true);
            cancelUpload();
        }
    } catch(e) {
        clearInterval(pi);
        showToast('Upload error', true);
        cancelUpload();
    }
}

// ==================== USER & SOCKET ====================
async function getCurrentUser(){const t=localStorage.getItem('auth_token');if(!t||t==='guest'){document.body.innerHTML='<div style="text-align:center;padding:50px"><h3>Please login</h3><a href="/">Login</a></div>';return null}try{const r=await fetch('/api/chat/current_user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})});const d=await r.json();if(d.success){currentUser=d.user;return currentUser}}catch(e){}return null}
function initSocket(){
    socket=io(window.location.origin,{transports:['polling','websocket'],reconnection:true});
    socket.on('connect',()=>{if(currentUser)socket.emit('user_online',{userId:currentUser.id,username:currentUser.username})});
    socket.on('new_message', msg => {
    if (currentRoom === msg.roomId) {
        addMessageToUI(msg, msg.sender_id === currentUser?.id, msg.sender_premium_tier || 0);
        scrollToBottom();
        
        // ✅ Receive sound (other people's messages)
        if (msg.sender_id !== currentUser?.id) {
            playReceiveSound();
        }
    }
    loadRooms();
});
    socket.on('online_users',u=>{document.getElementById('onlineCount').innerHTML=(u?.length||0)+' online';loadUsersList()});
    socket.on('user_typing',d=>{if(currentRoom===d.roomId&&d.userId!==currentUser?.id){const ind=document.getElementById('typingIndicator');ind.style.display='block';ind.innerHTML=`<i class="fas fa-ellipsis-h"></i> ${escapeHtml(d.username)} typing...`;clearTimeout(typingTimeout);typingTimeout=setTimeout(()=>ind.style.display='none',2000)}});
}
function onTyping(){if(!currentRoom||!currentUser)return;socket.emit('typing',{roomId:currentRoom,userId:currentUser.id,username:currentUser.username})}

// ==================== TABS ====================
function switchTab(t){
    document.querySelectorAll('.tg-tab:not(.nav-link)').forEach(x=>x.classList.remove('active'));
    document.querySelector(`.tg-tab[data-tab="${t}"]`).classList.add('active');
    document.getElementById('roomList').classList.remove('active');document.getElementById('usersList').classList.remove('active');document.getElementById('chatArea').classList.remove('active');
    if(t==='rooms'){document.getElementById('roomList').classList.add('active');loadRooms()}else if(t==='users'){document.getElementById('usersList').classList.add('active');loadUsersList()}
}

// ==================== ROOMS ====================
async function loadRooms(){
    if(!currentUser)return;
    try{const r=await fetch('/api/chat/rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id})});const d=await r.json();const c=document.getElementById('roomList');
    if(d.rooms?.length){c.innerHTML=d.rooms.map(room=>{
        let av=room.avatar_url?`<img src="${room.avatar_url}" class="tg-avatar" onerror="this.style.display='none'">`:`<div class="tg-avatar">${room.room_type==='admin'?'👑':room.room_type==='group'?'👥':'💬'}</div>`;
        return`<div class="tg-room" onclick="openRoom(${room.id},'${escapeHtml(room.room_name)}','${room.room_type}')">${av}<div class="tg-room-info"><div class="tg-room-name">${escapeHtml(room.room_name)}</div><div class="tg-room-last">${escapeHtml(room.last_message||'No messages')}</div></div>${room.unread>0?`<div class="tg-room-badge">${room.unread}</div>`:''}</div>`;
    }).join('')}else{c.innerHTML='<div class="empty-state"><p>No chats yet</p><button class="admin-btn" onclick="startAdminChat()">📞 Chat with Admin</button></div>'}}catch(e){}
}
async function loadUsersList(){
    if(!currentUser)return;
    try{const r=await fetch('/api/chat/online_users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id})});const d=await r.json();const ou=(d.users||[]).filter(u=>u.user_id!==currentUser.id);
    document.getElementById('usersList').innerHTML=ou.length?ou.map(u=>`<div class="tg-user" onclick="startPrivateChat(${u.user_id},'${escapeHtml(u.username)}')"><div class="online-dot"></div><div class="tg-room-info"><div class="tg-room-name">${escapeHtml(u.username)}</div><div class="tg-room-last" style="color:#2ecc71">Online</div></div></div>`).join(''):'<div class="empty-state"><p>No online users</p></div>';}catch(e){}
}

async function startAdminChat(){if(!currentUser)return;try{const r=await fetch('/api/chat/create_admin_room',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id})});const d=await r.json();if(d.success){openRoom(d.room.id,d.room.room_name,'admin');loadRooms()}else showToast('Error',true)}catch(e){}}
async function startPrivateChat(oid,oun){if(!currentUser)return;try{const r=await fetch('/api/chat/create_private_room',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id,otherUserId:oid})});const d=await r.json();if(d.success)openRoom(d.room.id,oun,'private')}catch(e){}}

async function openRoom(rid,rn,rt){
    currentRoom=rid;document.getElementById('roomList').classList.remove('active');document.getElementById('usersList').classList.remove('active');
    document.getElementById('chatArea').classList.add('active');document.getElementById('chatRoomTitle').textContent=rn;
    if(rt==='group'){try{const r=await fetch('/api/chat/group_info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId:rid,userId:currentUser.id})});const d=await r.json();if(d.success&&d.avatar_url){document.getElementById('chatRoomAvatar').src=d.avatar_url;document.getElementById('chatRoomAvatar').style.display='inline-block'}else{document.getElementById('chatRoomAvatar').style.display='none'}}catch(e){}}
    else{document.getElementById('chatRoomAvatar').style.display='none'}
    const mc=document.getElementById('messages');mc.innerHTML='<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.2)">Loading...</div>';
    if(socket&&socket.connected)socket.emit('join_room',rid);
    try{const r=await fetch(`/api/chat/messages/${rid}`);const d=await r.json();if(d.messages?.length){mc.innerHTML='';d.messages.forEach(msg=>addMessageToUI(msg,msg.sender_id===currentUser?.id,msg.sender_premium_tier||0));scrollToBottom()}else mc.innerHTML='<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.2)">No messages yet</div>';
    await fetch('/api/chat/read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId:rid,userId:currentUser.id})})}catch(e){}
}

function addMessageToUI(msg, isMine, spt) {
    spt = spt || 0;
    const c = document.getElementById('messages');
    if (c.innerHTML.includes('No messages') || c.innerHTML.includes('Loading')) c.innerHTML = '';
    
    let mh = '';
    const mt = msg.message || '';
    if (mt.startsWith('📷 IMAGE:')) {
        mh = `<div class="media-message" onclick="downloadMedia('${mt.replace('📷 IMAGE:', '')}', 'image')"><img src="${mt.replace('📷 IMAGE:', '')}" loading="lazy"></div>`;
    } else if (mt.startsWith('📎 FILE:')) {
        const p = mt.replace('📎 FILE:', '').split('|');
        mh = `<div class="file-message" onclick="downloadMedia('${p[0]}', 'file', '${p[1] || 'File'}')"><i class="fas fa-file"></i> ${escapeHtml(p[1] || 'File')}</div>`;
    } else {
        mh = escapeHtml(mt);
    }
    
    const d = document.createElement('div');
    d.className = `msg-row ${isMine ? 'mine msg-mine' : 'other msg-other'}`;
    
    let bc = 'normal-tier';
    if (spt === 1) bc = 'bronze-tier';
    else if (spt === 2) bc = 'silver-tier';
    else if (spt === 3) bc = 'gold-tier';
    
    let av = '';
    if (!isMine) {
        av = msg.avatar_url ? 
            `<img src="${msg.avatar_url}" class="msg-avatar-xs" onerror="this.style.display='none'">` : 
            `<div class="msg-avatar-xs" style="background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:10px">👤</div>`;
    }
    
    // ✅ Seen Status (Telegram Style)
    let seenHtml = '';
    if (isMine) {
        if (msg.read_count >= 2) {
            // Seen by 2+ people
            seenHtml = '<span style="color:#2ecc71;font-size:9px;margin-left:3px">✓✓</span>';
        } else if (msg.read_count >= 1) {
            // Seen by 1 person
            seenHtml = '<span style="color:#2ecc71;font-size:9px;margin-left:3px">✓✓</span>';
        } else if (msg.is_read) {
            // Delivered but not seen
            seenHtml = '<span style="color:rgba(255,255,255,0.4);font-size:9px;margin-left:3px">✓✓</span>';
        } else {
            // Sent only
            seenHtml = '<span style="color:rgba(255,255,255,0.25);font-size:9px;margin-left:3px">✓</span>';
        }
    }
    
    d.innerHTML = `${av}<div class="msg-bubble ${bc}">${!isMine ? `<div class="msg-sender">${escapeHtml(msg.username || 'User')}</div>` : ''}${mh}<div class="msg-time">${new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}${seenHtml}</div></div>`;
    c.appendChild(d);
}
function downloadMedia(u,t,fn='file'){const a=document.createElement('a');a.href=u;a.download=t==='image'?'image.jpg':fn;document.body.appendChild(a);a.click();document.body.removeChild(a)}

function sendMessage() {
    const i = document.getElementById('msgInput');
    const m = i.value.trim();
    if (!m) return;
    if (!currentRoom) return;
    
    socket.emit('send_message', {
        roomId: currentRoom,
        message: m,
        userId: currentUser.id,
        username: currentUser.username,
        senderPremiumTier: premiumTier
    });
    
    // ✅ Send sound
    playSendSound();
    
    i.value = '';
    i.focus();
    setTimeout(() => i.focus(), 50);
}
function playSendSound() {
    if (sendSound) {
        sendSound.currentTime = 0;
        sendSound.play().catch(() => {});
    }
}

function playReceiveSound() {
    if (receiveSound) {
        receiveSound.currentTime = 0;
        receiveSound.play().catch(() => {});
    }
}
function closeChat(){currentRoom=null;document.getElementById('chatArea').classList.remove('active');document.getElementById('roomList').classList.add('active');loadRooms()}
function deleteCurrentRoom(){if(!currentRoom||!confirm('Delete?'))return;fetch('/api/chat/delete_room',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({roomId:currentRoom,userId:currentUser.id})}).then(()=>{showToast('Deleted');closeChat()}).catch(()=>showToast('Error',true))}

// ==================== PAGE TIMER ====================
function setCookie(n,v,d){let e='';if(d){const dt=new Date();dt.setTime(dt.getTime()+(d*24*60*60*1000));e='; expires='+dt.toUTCString()}document.cookie=n+'='+encodeURIComponent(v||'')+e+'; path=/'}
function getCookie(n){const ne=n+'=';const ca=document.cookie.split(';');for(let i=0;i<ca.length;i++){let c=ca[i];while(c.charAt(0)===' ')c=c.substring(1);if(c.indexOf(ne)===0)return c.substring(ne.length)}return null}
async function checkPageTimer(){const pid='chat';let t=null;try{const s=localStorage.getItem('pageTimers');if(s){const tm=JSON.parse(s);t=tm[pid]}if(!t){const ck=getCookie('pageTimers');if(ck){const tm=JSON.parse(decodeURIComponent(ck));t=tm[pid]}}if(!t){const ss=sessionStorage.getItem('pageTimers');if(ss){const tm=JSON.parse(ss);t=tm[pid]}}}catch(e){}if(t&&t>Date.now()){showMaintenanceMode(t);return false}return true}
function showMaintenanceMode(te){
    document.querySelector('.tg-header').style.display='none';document.querySelector('.tg-tabs').style.display='none';document.querySelector('.chat-body').style.display='none';
    document.body.insertAdjacentHTML('beforeend',`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px"><div style="font-size:60px;color:var(--gold);margin-bottom:15px"><i class="fas fa-tools"></i></div><div style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:8px">ပြုပြင်နေပါသည်</div><div id="maintCountdown" style="font-size:26px;font-weight:700;color:var(--gold);font-family:monospace;margin:12px 0">--:--:--</div><a href="/dashboard" style="padding:10px 25px;background:var(--gold);color:#000;text-decoration:none;border-radius:10px;font-weight:700;font-size:13px;margin-top:8px"><i class="fas fa-arrow-left"></i> Dashboard</a></div>`);
    const ce=document.getElementById('maintCountdown');function up(){const r=te-Date.now();if(r<=0){try{const s=localStorage.getItem('pageTimers');if(s){const tm=JSON.parse(s);delete tm['chat'];localStorage.setItem('pageTimers',JSON.stringify(tm))}setCookie('pageTimers','',-1);sessionStorage.removeItem('pageTimers')}catch(e){}location.reload();return}const ss=Math.floor(r/1000),h=Math.floor(ss/3600),m=Math.floor((ss%3600)/60),s=ss%60;ce.textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}up();setInterval(up,1000)}
async function checkPageAccess(){
    try{const r=await fetch('/api/admin/page_status');const d=await r.json();if(d.pages){const cp=d.pages.find(p=>p.id==='chat');if(cp&&cp.status==='off'){const ht=await checkPageTimer();if(ht===false)return false;
    document.querySelector('.tg-header').style.display='none';document.querySelector('.tg-tabs').style.display='none';document.querySelector('.chat-body').style.display='none';
    document.body.insertAdjacentHTML('beforeend','<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px"><div style="font-size:60px;color:var(--gold)"><i class="fas fa-tools"></i></div><div style="font-size:18px;font-weight:700;color:var(--gold);margin:10px 0">ပြုပြင်နေပါသည်</div><a href="/dashboard" style="padding:10px 25px;background:var(--gold);color:#000;text-decoration:none;border-radius:10px;font-weight:700;font-size:13px"><i class="fas fa-arrow-left"></i> Dashboard</a></div>');return false}}return true}catch(e){return true}
}

async function init(){
    const po = await checkPageAccess();
    if (!po) return;
    
    // ✅ Initialize sounds
    initSounds();
    
    // Tab listeners
    document.querySelectorAll('.tg-tab:not(.nav-link)').forEach(t => 
        t.addEventListener('click', () => switchTab(t.getAttribute('data-tab')))
    );
    
    // Load user & start
    const u = await getCurrentUser();
    if (!u) return;
    await checkPremiumStatus();
    initSocket();
    loadRooms();
}
