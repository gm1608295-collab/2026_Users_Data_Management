<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>စကားပြော - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
    :root {
        --bg: #0f1123;
        --surface: #1a1f4b;
        --gold: #f39c12;
        --green: #2ecc71;
        --red: #e74c3c;
        --bronze-solid: #5a2d0c;
        --bronze: #CD7F32;
        --bronze-light: #E8A87C;
        --bronze-dark: #3d1c00;
        --silver-solid: #5a5a5a;
        --silver: #C0C0C0;
        --silver-light: #E8E8E8;
        --silver-dark: #2d2d2d;
        --gold-solid: #8B6914;
        --gold-p: #FFD700;
        --gold-light: #FFF8DC;
        --gold-dark: #3d2a00;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    body {
        background: var(--bg);
        color: #fff;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding-top: env(safe-area-inset-top, 0px);
    }

    /* ========== PREMIUM TIER BACKGROUNDS ========== */
    body.bronze-tier { background: linear-gradient(160deg, var(--bronze-dark) 0%, #2d1a0a 40%, #1a0f07 100%); }
    body.silver-tier { background: linear-gradient(160deg, var(--silver-dark) 0%, #1a1a1a 40%, #0a0a0a 100%); }
    body.gold-tier { background: linear-gradient(160deg, #6d4c00 0%, var(--gold-dark) 40%, #1a0a00 100%); }

    /* ========== HEADER ========== */
.tg-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    padding-top: calc(8px + env(safe-area-inset-top, 0px));
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}
.tg-header .back-btn {
    color: #fff;
    font-size: 16px;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 8px;
    transition: 0.2s;
}
.tg-header .back-btn:hover { background: rgba(255, 255, 255, 0.08); }
.tg-header .title {
    flex: 1;
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
}
.tg-header .online-badge {
    font-size: 9px;
    padding: 3px 10px;
    border-radius: 12px;
    background: rgba(46, 204, 113, 0.1);
    color: #2ecc71;
    border: 1px solid rgba(46, 204, 113, 0.2);
    font-weight: 600;
}
.premium-badge {
    display: none;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 8px;
    font-weight: 700;
}
    body.bronze-tier .tg-header {
        background: linear-gradient(135deg, var(--bronze-dark), var(--bronze-solid));
        border-bottom: 2px solid var(--bronze);
    }
    body.bronze-tier .tg-header .title { color: var(--bronze-light); }
    body.bronze-tier .premium-badge {
        background: var(--bronze-solid);
        color: var(--bronze-light);
        border: 1px solid var(--bronze);
        display: inline-block;
    }
    body.silver-tier .tg-header {
        background: linear-gradient(135deg, var(--silver-dark), var(--silver-solid));
        border-bottom: 2px solid var(--silver);
    }
    body.silver-tier .tg-header .title { color: var(--silver-light); }
    body.silver-tier .premium-badge {
        background: var(--silver-solid);
        color: var(--silver-light);
        border: 1px solid var(--silver);
        display: inline-block;
    }
    body.gold-tier .tg-header {
        background: linear-gradient(135deg, #6d4c00, var(--gold-solid));
        border-bottom: 2px solid var(--gold-p);
    }
    body.gold-tier .tg-header .title { color: var(--gold-light); }
    body.gold-tier .premium-badge {
        background: var(--gold-solid);
        color: var(--gold-light);
        border: 1px solid var(--gold-p);
        display: inline-block;
    }

    /* ========== TABS ========== */
    .tg-tabs {
        display: flex;
        gap: 2px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.2);
        flex-shrink: 0;
    }
    .tg-tab {
        flex: 1;
        padding: 7px 0;
        text-align: center;
        font-size: 10px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s;
        color: rgba(255, 255, 255, 0.5);
        background: transparent;
        border: none;
    }
    .tg-tab.active {
        background: var(--gold);
        color: #000;
        font-weight: 700;
    }
    .tg-tab.nav-link {
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    body.bronze-tier .tg-tab.active { background: var(--bronze-solid); color: var(--bronze-light); }
    body.silver-tier .tg-tab.active { background: var(--silver-solid); color: var(--silver-light); }
    body.gold-tier .tg-tab.active { background: var(--gold-solid); color: var(--gold-light); }

    /* ========== CHAT BODY ========== */
    .chat-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .room-list {
        display: none;
        flex: 1;
        overflow-y: auto;
        padding: 6px 10px;
    }
    .room-list.active { display: block; }

    /* ========== ROOM ITEM ========== */
    .tg-room {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        margin-bottom: 2px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .tg-room:hover { background: rgba(255, 255, 255, 0.04); }
    .tg-room:active { transform: scale(0.98); }
    .tg-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        border: 2px solid transparent;
    }
    .tg-room-info {
        flex: 1;
        min-width: 0;
    }
    .tg-room-name {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .tg-room-last {
        font-size: 10px;
        color: rgba(255, 255, 255, 0.35);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .tg-room-badge {
        background: #e74c3c;
        color: #fff;
        font-size: 9px;
        min-width: 18px;
        height: 18px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        flex-shrink: 0;
    }

    /* ========== USER ITEM ========== */
    .tg-user {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        margin-bottom: 2px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .tg-user:hover { background: rgba(255, 255, 255, 0.04); }
    .tg-user:active { transform: scale(0.98); }
    .online-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #2ecc71;
        flex-shrink: 0;
        box-shadow: 0 0 6px rgba(46, 204, 113, 0.4);
    }

    /* ========== CHAT AREA ========== */
    .chat-area {
        display: none;
        flex: 1;
        flex-direction: column;
        overflow: hidden;
    }
    .chat-area.active { display: flex; }
    .chat-area-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.2);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        flex-shrink: 0;
    }
    .chat-area-header .back-btn {
        cursor: pointer;
        font-size: 16px;
        color: #fff;
        padding: 4px 8px;
    }
    .chat-area-header .room-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(255, 255, 255, 0.15);
    }
    .chat-area-header .room-title {
        flex: 1;
        font-size: 13px;
        font-weight: 600;
    }
    .chat-area-header .delete-btn {
        color: rgba(255, 255, 255, 0.3);
        cursor: pointer;
        padding: 4px 8px;
        font-size: 14px;
        transition: 0.2s;
    }
    .chat-area-header .delete-btn:hover { color: #e74c3c; }

    /* ========== MESSAGES ========== */
    .messages {
        flex: 1;
        overflow-y: auto;
        padding: 8px 12px;
        display: flex;
        flex-direction: column;
        gap: 3px;
    }
    .msg-row {
        display: flex;
        gap: 6px;
        max-width: 85%;
        margin-bottom: 2px;
        align-items: flex-end;
    }
    .msg-row.mine {
        align-self: flex-end;
        flex-direction: row-reverse;
    }
    .msg-avatar-xs {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
    }

    /* ========== MESSAGE BUBBLE BASE (Slim Height) ========== */
    .msg-bubble {
    padding: 5px 10px !important;
    border-radius: 14px;
    font-size: 12px;
    word-break: break-word;
    line-height: 1.35;
    position: relative;
    max-width: 100%;
    overflow: hidden; /* ✅ ဒါထည့် */
}

/* ✅ ဒီအောက်က အကုန်ထည့် */
.msg-bubble::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,0.03) 50%, transparent 60%);
    animation: bubbleShine 4s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
}

@keyframes bubbleShine {
    0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
    50% { transform: translateX(100%) translateY(100%) rotate(45deg); }
    100% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
}

/* BRONZE Shine */
.msg-bubble.bronze-tier::after {
    background: linear-gradient(45deg, transparent 40%, rgba(232,168,124,0.08) 50%, transparent 60%);
    animation: bubbleShine 3s ease-in-out infinite;
}

/* SILVER Shine */
.msg-bubble.silver-tier::after {
    background: linear-gradient(45deg, transparent 40%, rgba(232,232,232,0.08) 50%, transparent 60%);
    animation: bubbleShine 2.5s ease-in-out infinite;
}

/* GOLD Shine */
.msg-bubble.gold-tier::after {
    background: linear-gradient(45deg, transparent 40%, rgba(255,248,220,0.1) 50%, transparent 60%);
    animation: bubbleShine 2s ease-in-out infinite;
}

.msg-bubble > * {
    position: relative;
    z-index: 2;
}
    .msg-mine .msg-bubble { border-bottom-right-radius: 3px; }
    .msg-other .msg-bubble { border-bottom-left-radius: 3px; }
    .msg-sender {
        font-size: 9px;
        margin-bottom: 2px;
        font-weight: 600;
        opacity: 0.7;
        cursor: pointer;
        color: var(--gold);
    }
    .msg-time {
        font-size: 8px;
        color: rgba(255, 255, 255, 0.25);
        margin-top: 2px;
        text-align: right;
    }
    .media-message {
        max-width: 200px;
        border-radius: 10px;
        cursor: pointer;
        overflow: hidden;
    }
    .media-message img {
        max-width: 100%;
        border-radius: 10px;
        display: block;
    }
    .file-message {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 10px;
        cursor: pointer;
        font-size: 10px;
    }
    .typing-indicator {
        padding: 2px 12px;
        font-size: 9px;
        color: #2ecc71;
        font-style: italic;
    }

    /* ========== NORMAL BUBBLE (Clean) ========== */
    .msg-bubble.normal-tier {
        background: rgba(255, 255, 255, 0.06) !important;
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        color: #fff !important;
        box-shadow: none !important;
    }
    .msg-mine .msg-bubble.normal-tier {
        background: rgba(46, 204, 113, 0.12) !important;
        border: 1px solid rgba(46, 204, 113, 0.2) !important;
    }

    /* ========== PREMIUM LED BORDER - CLEAN + MOVING ========== */
    /* BRONZE */
    .msg-bubble.bronze-tier {
        background: #3d1c00 !important;
        color: #E8A87C !important;
        border: 2px solid #CD7F32 !important;
        border-radius: 14px !important;
        position: relative;
        overflow: hidden;
        box-shadow: none !important;
        animation: bronzeBorderMove 3s linear infinite;
    }
    .msg-bubble.bronze-tier > * { position: relative; z-index: 2; }
    @keyframes bronzeBorderMove {
        0%   { border-top-color: #CD7F32; border-right-color: #8B4513; border-bottom-color: #6b3410; border-left-color: #8B4513; }
        25%  { border-top-color: #6b3410; border-right-color: #CD7F32; border-bottom-color: #8B4513; border-left-color: #8B4513; }
        50%  { border-top-color: #8B4513; border-right-color: #6b3410; border-bottom-color: #CD7F32; border-left-color: #8B4513; }
        75%  { border-top-color: #8B4513; border-right-color: #8B4513; border-bottom-color: #6b3410; border-left-color: #CD7F32; }
        100% { border-top-color: #CD7F32; border-right-color: #8B4513; border-bottom-color: #6b3410; border-left-color: #8B4513; }
    }

    /* SILVER */
    .msg-bubble.silver-tier {
        background: #2d2d2d !important;
        color: #E8E8E8 !important;
        border: 2px solid #C0C0C0 !important;
        border-radius: 14px !important;
        position: relative;
        overflow: hidden;
        box-shadow: none !important;
        animation: silverBorderMove 2.5s linear infinite;
    }
    .msg-bubble.silver-tier > * { position: relative; z-index: 2; }
    @keyframes silverBorderMove {
        0%   { border-top-color: #C0C0C0; border-right-color: #808080; border-bottom-color: #5a5a5a; border-left-color: #808080; }
        25%  { border-top-color: #5a5a5a; border-right-color: #C0C0C0; border-bottom-color: #808080; border-left-color: #808080; }
        50%  { border-top-color: #808080; border-right-color: #5a5a5a; border-bottom-color: #C0C0C0; border-left-color: #808080; }
        75%  { border-top-color: #808080; border-right-color: #808080; border-bottom-color: #5a5a5a; border-left-color: #C0C0C0; }
        100% { border-top-color: #C0C0C0; border-right-color: #808080; border-bottom-color: #5a5a5a; border-left-color: #808080; }
    }

    /* GOLD */
    .msg-bubble.gold-tier {
        background: #3d2a00 !important;
        color: #FFF8DC !important;
        border: 2px solid #FFD700 !important;
        border-radius: 14px !important;
        position: relative;
        overflow: hidden;
        box-shadow: none !important;
        animation: goldBorderMove 2s linear infinite;
    }
    .msg-bubble.gold-tier > * { position: relative; z-index: 2; }
    @keyframes goldBorderMove {
        0%   { border-top-color: #FFD700; border-right-color: #B8860B; border-bottom-color: #8B6914; border-left-color: #B8860B; }
        25%  { border-top-color: #8B6914; border-right-color: #FFD700; border-bottom-color: #B8860B; border-left-color: #B8860B; }
        50%  { border-top-color: #B8860B; border-right-color: #8B6914; border-bottom-color: #FFD700; border-left-color: #B8860B; }
        75%  { border-top-color: #B8860B; border-right-color: #B8860B; border-bottom-color: #8B6914; border-left-color: #FFD700; }
        100% { border-top-color: #FFD700; border-right-color: #B8860B; border-bottom-color: #8B6914; border-left-color: #B8860B; }
    }

    /* ========== INPUT AREA ========== */
    .msg-input-area {
        display: flex;
        gap: 6px;
        padding: 8px 10px;
        background: rgba(0, 0, 0, 0.25);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
    }
    .media-buttons { display: flex; gap: 4px; }
    .media-btn {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
    }
    .media-btn:hover { background: rgba(255, 255, 255, 0.1); }
    .media-btn.locked {
        background: rgba(231, 76, 60, 0.1);
        opacity: 0.5;
    }
    .input-wrapper { flex: 1; }
    .msg-input-area input {
        width: 100%;
        height: 34px;
        padding: 0 14px;
        border-radius: 17px;
        font-size: 12px;
        outline: none;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #fff;
        transition: 0.2s;
    }
    .msg-input-area input:focus { border-color: var(--gold); }
    .msg-input-area input::placeholder {
        color: rgba(255, 255, 255, 0.2);
        font-size: 11px;
    }
    .send-btn {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: none;
        font-size: 14px;
        cursor: pointer;
        background: var(--gold);
        color: #000;
        flex-shrink: 0;
        transition: 0.2s;
    }
    .send-btn:hover { transform: scale(1.05); }

    /* ========== EMOJI ROW ========== */
    .emoji-row {
        display: flex;
        overflow-x: auto;
        gap: 6px;
        padding: 4px 10px;
        background: rgba(0, 0, 0, 0.15);
        border-top: 1px solid rgba(255, 255, 255, 0.04);
        flex-shrink: 0;
        scrollbar-width: none;
    }
    .emoji-row::-webkit-scrollbar { display: none; }
    .emoji-item {
        font-size: 20px;
        cursor: pointer;
        flex-shrink: 0;
        padding: 3px;
        border-radius: 6px;
        transition: 0.15s;
    }
    .emoji-item:hover {
        transform: scale(1.2);
        background: rgba(255, 255, 255, 0.06);
    }
    .more-emoji-btn {
        font-size: 9px;
        padding: 4px 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--gold);
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
    }

    /* ========== MODALS ========== */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 2000;
        justify-content: center;
        align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
        background: var(--surface);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 18px;
        width: 90%;
        max-width: 380px;
        max-height: 80vh;
        overflow-y: auto;
    }
    .modal-box h3 {
        color: var(--gold);
        margin-bottom: 12px;
        text-align: center;
        font-size: 15px;
    }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    .btn {
        padding: 10px;
        border: none;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        flex: 1;
        text-align: center;
    }
    .btn-g { background: var(--green); color: #000; }
    .btn-r { background: var(--red); color: #fff; }
    .btn-b { background: #3498db; color: #fff; }
    .btn-w { background: var(--gold); color: #000; }
    .toast {
        position: fixed;
        top: 15px;
        right: 15px;
        padding: 10px 16px;
        border-radius: 10px;
        background: var(--green);
        color: #000;
        display: none;
        z-index: 4000;
        font-size: 11px;
        font-weight: 700;
    }
    .empty-state {
        text-align: center;
        padding: 30px;
        color: rgba(255, 255, 255, 0.2);
        font-size: 12px;
    }
    .admin-btn {
        width: 100%;
        padding: 10px;
        background: var(--green);
        color: #000;
        border: none;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 8px;
    }

    /* ========== PREMIUM LOCK MODAL ========== */
    .premium-lock-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 2600;
        display: flex;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    .premium-lock-card {
        background: linear-gradient(145deg, #1a1f4b 0%, #11112a 100%);
        border: 2px solid var(--gold);
        border-radius: 20px;
        padding: 30px 24px 24px;
        width: 90%;
        max-width: 350px;
        text-align: center;
        position: relative;
        overflow: hidden;

        });
        const d = await r.json();
        if (d.success && d.tiers) {
            let h = 0;
            for (let i = 3; i >= 1; i--) {
                if (d.tiers[i]) { h = i; break; }
            }
            isPremium = h > 0;
            premiumTier = h;
            isPremium ? (applyPremiumTheme(premiumTier), updateMediaButtons(true)) : (applyNormalTheme(), updateMediaButtons(false));
        } else {
            isPremium = false;
            premiumTier = 0;
            applyNormalTheme();
            updateMediaButtons(false);
        }
    } catch(e) {}
}

function applyNormalTheme() {
    document.body.classList.remove('bronze-tier', 'silver-tier', 'gold-tier');
    document.body.classList.add('normal-theme');
    document.getElementById('premiumBadge').style.display = 'none';
}

function applyPremiumTheme(t) {
    const b = document.body, ba = document.getElementById('premiumBadge'), pb = document.getElementById('premiumBtn');
    b.classList.remove('normal-theme', 'bronze-tier', 'silver-tier', 'gold-tier');
    function w(tx, ic) {
        let h = ic + ' <span class="wave-text">';
        for (let i = 0; i < tx.length; i++) h += `<span class="wave-letter">${tx[i]}</span>`;
        return h += '</span>';
    }
    if (t === 1) {
        b.classList.add('bronze-tier');
        ba.textContent = '🥉 BRONZE';
        ba.style.display = 'inline-block';
        if (pb) {
            pb.style.background = 'linear-gradient(135deg,#CD7F32,#8B4513)';
            pb.style.color = '#fff';
            pb.style.border = '2px solid #E8A87C';
            pb.innerHTML = w('Bronze', '🥉');
        }
    } else if (t === 2) {
        b.classList.add('silver-tier');
        ba.textContent = '🥈 SILVER';
        ba.style.display = 'inline-block';
        if (pb) {
            pb.style.background = 'linear-gradient(135deg,#C0C0C0,#808080)';
            pb.style.color = '#0a0a0a';
            pb.style.border = '2px solid #E8E8E8';
            pb.innerHTML = w('Silver', '🥈');
        }
    } else if (t === 3) {
        b.classList.add('gold-tier');
        ba.textContent = '🥇 GOLD';
        ba.style.display = 'inline-block';
        if (pb) {
            pb.style.background = 'linear-gradient(135deg,#FFD700,#B8860B)';
            pb.style.color = '#1a0a00';
            pb.style.border = '2px solid #FFF8DC';
            pb.innerHTML = w('Gold', '🥇');
        }
    } else {
        applyNormalTheme();
    }
}

function updateMediaButtons(hasPremium) {
    const i = document.getElementById('imageBtn'), f = document.getElementById('fileBtn');
    if (hasPremium) {
        i.disabled = false;
        f.disabled = false;
        i.classList.remove('locked');
        f.classList.remove('locked');
    } else {
        i.disabled = true;
        f.disabled = true;
        i.classList.add('locked');
        f.classList.add('locked');
    }
}

// ==================== FILE UPLOAD HANDLERS ====================
function handleImageClick() {
    if (!isPremium) { showPremiumLockModal('📷'); return; }
    selectImage();
}
function handleFileClick() {
    if (!isPremium) { showPremiumLockModal('📎'); return; }
    selectFile();
}
function selectImage() {
    const i = document.createElement('input');
    i.type = 'file';
    i.accept = 'image/*';
    i.onchange = e => {
        if (e.target.files[0]) {
            selectedFile = e.target.files[0];
            selectedFileType = 'image';
            selectedFileName = selectedFile.name;
            showUploadPreview(selectedFile, 'image');
        }
    };
    i.click();
}
function selectFile() {
    const i = document.createElement('input');
    i.type = 'file';
    i.onchange = e => {
        if (e.target.files[0]) {
            selectedFile = e.target.files[0];
            selectedFileType = 'file';
            selectedFileName = selectedFile.name;
            showUploadPreview(selectedFile, 'file');
        }
    };
    i.click();
}
function showUploadPreview(f, t) {
    const modal = document.getElementById('uploadPreviewModal');
    const imageWrap = document.getElementById('uploadImagePreview');
    const fileWrap = document.getElementById('uploadFilePreview');
    modal.style.display = 'flex';
    document.getElementById('uploadProgress').style.display = 'none';
    document.getElementById('sendUploadBtn').disabled = false;
    uploadCancelled = false;
    if (t === 'image') {
        imageWrap.style.display = 'block';
        fileWrap.innerHTML = '';
        const reader = new FileReader();
        reader.onload = e => {
            imageWrap.innerHTML = `<img src="${e.target.result}" class="upload-preview-image">`;
        };
        reader.readAsDataURL(f);
    } else {
        imageWrap.style.display = 'none';
        imageWrap.innerHTML = '';
        fileWrap.innerHTML = `
            <div class="upload-preview-file-card">
                <div class="upload-preview-file-icon"><i class="fas fa-file"></i></div>
                <div class="upload-preview-file-info">
                    <div class="upload-preview-file-name">${escapeHtml(f.name)}</div>
                    <div class="upload-preview-file-size">${(f.size / 1024).toFixed(1)} KB</div>
                </div>
            </div>
        `;
    }
}
function cancelUpload() {
    uploadCancelled = true;
    selectedFile = null;
    document.getElementById('uploadPreviewModal').style.display = 'none';
    document.getElementById('uploadImagePreview').innerHTML = '';
    document.getElementById('uploadFilePreview').innerHTML = '';
}
async function confirmUpload() {
    if (!selectedFile || uploadCancelled || !currentRoom) {
        if (!currentRoom) showToast('Select a chat room first', true);
        cancelUpload();
        return;
    }
    const progressDiv = document.getElementById('uploadProgress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const sendBtn = document.getElementById('sendUploadBtn');
    progressDiv.style.display = 'block';
    progressFill.style.width = '0%';
    progressText.textContent = '0%';
    sendBtn.disabled = true;
    let p = 0;
    const pi = setInterval(() => {
        if (uploadCancelled) return;
        p = Math.min(p + 8, 90);
        progressFill.style.width = p + '%';
        progressText.textContent = p + '%';
    }, 150);
    try {
        const r = new FileReader();
        const b64 = await new Promise(res => {
            r.onload = e => res(e.target.result);
            r.readAsDataURL(selectedFile);
        });
        if (uploadCancelled) { clearInterval(pi); cancelUpload(); return; }
        progressFill.style.width = '95%';
        progressText.textContent = '95%';
        const res = await fetch('/api/chat/upload_file', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                token: localStorage.getItem('auth_token'),
                base64: b64,
                fileName: selectedFileName,
                fileType: selectedFile.type
            })
        });
        const d = await res.json();
        clearInterval(pi);
        if (uploadCancelled) { cancelUpload(); return; }
        if (d.success) {
            progressFill.style.width = '100%';
            progressText.textContent = 'Sent!';
            await new Promise(r => setTimeout(r, 200));
            socket.emit('send_message', {
                roomId: currentRoom,
                message: selectedFileType === 'image' ? `📷 IMAGE:${d.url}` : `📎 FILE:${d.url}|${d.fileName||selectedFileName}`,
                userId: currentUser.id,
                username: currentUser.username,
                senderPremiumTier: premiumTier
            });
            showToast('Sent!');
            cancelUpload();
        } else {
            showToast(d.message || 'Upload failed', true);
            cancelUpload();
        }
    } catch(e) {
        clearInterval(pi);
        showToast('Upload error', true);
        cancelUpload();
    }
}

// ==================== USER & SOCKET ====================
async function getCurrentUser() {
    // ✅ 1. Token ကို localStorage, Cookie, နဲ့ Meta Tag ကနေ ရှာပါ (App Support)
    let t = localStorage.getItem('auth_token');
    
    // Cookie မှာ token ရှိမရှိစစ် (App တွေအတွက်)
    if (!t || t === 'guest') {
        const cookieToken = getCookie('auth_token');
        if (cookieToken && cookieToken !== 'guest') {
            t = cookieToken;
        }
    }

    // Meta tag မှာပါရင် (Telegram Web App / Android WebView တွေအတွက်)
    if (!t || t === 'guest') {
        const metaToken = document.querySelector('meta[name="auth_token"]');
        if (metaToken) {
            t = metaToken.content;
        }
    }

    console.log('[DEBUG] Token found (App/Bot Check):', t ? t.substring(0, 15) + '...' : 'None');
    
    if (!t || t === 'guest') {
        document.body.innerHTML = '<div style="text-align:center;padding:50px"><h3>Please login</h3><a href="/">Login</a></div>';
        return null;
    }
    
    try {
        const r = await fetch('/api/chat/current_user', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + t // ✅ App တွေအတွက် Header မှာပါထည့်ပေးမယ်
            },
            body: JSON.stringify({ token: t })
        });
        if (!r.ok) {
            console.error('[ERROR] Server returned:', r.status);
            return null;
        }
        const d = await r.json();
        console.log('[DEBUG] Current User API Response:', d);
        if (d.success && d.user) {
            currentUser = d.user;
            console.log('[DEBUG] Current User Set:', currentUser);
            return currentUser;
        } else {
            console.error('[ERROR] API returned no user');
            document.getElementById('roomList').innerHTML = '<div class="empty-state" style="color:#e74c3c;">User not found. Please login again.</div>';
        }
    } catch(e) {
        console.error('[GET USER ERROR]', e);
        document.getElementById('roomList').innerHTML = '<div class="empty-state" style="color:#e74c3c;">Error: ' + e.message + '</div>';
    }
    return null;
    }

function initSocket() {
    // ✅ Socket URL ကို သေချာစေပါ
    const socketUrl = window.location.protocol + '//' + window.location.host;
    
    socket = io(socketUrl, {
        transports: ['polling', 'websocket'],
        reconnection: true,
        reconnectionAttempts: 10,
        reconnectionDelay: 1000,
        reconnectionDelayMax: 5000,
        timeout: 20000,
        upgrade: true,
        forceNew: true
    });
    
    socket.on('connect', function() {
        console.log('[SOCKET] Connected!');
        
        // ✅ User Online Event ကို သေချာပို့ပါ
        if (currentUser) {
            socket.emit('user_online', {
                userId: currentUser.id,
                username: currentUser.username
            });
            loadRooms();
            loadUsersList();
        }
    });
    
    socket.on('disconnect', function(reason) {
        console.log('[SOCKET] Disconnected:', reason);
    });
    
    socket.on('new_message', function(msg) {
        if (currentRoom === msg.roomId) {
            addMessageToUI(msg, msg.sender_id === currentUser?.id, msg.sender_premium_tier || 0);
            scrollToBottom();
        }
        loadRooms(); // အခန်းစာရင်း Update လုပ်ရန်
    });
    
    socket.on('online_users', function(u) {
        document.getElementById('onlineCount').innerHTML = (u?.length || 0) + ' online';
        loadUsersList();
    });
    
    socket.on('user_typing', function(d) {
        if (currentRoom === d.roomId && d.userId !== currentUser?.id) {
            var ind = document.getElementById('typingIndicator');
            ind.style.display = 'block';
            ind.innerHTML = '<i class="fas fa-ellipsis-h"></i> ' + escapeHtml(d.username) + ' typing...';
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(function() {
                ind.style.display = 'none';
            }, 2000);
        }
    });
    
    socket.on('messages_read', function(data) {
        if (currentRoom === data.roomId) {
            var bubbles = document.querySelectorAll('.msg-row.mine .msg-time');
            bubbles.forEach(function(timeEl) {
                if (!timeEl.innerHTML.includes('✓✓')) {
                    timeEl.innerHTML = timeEl.innerHTML.replace('✓', '✓✓');
                    timeEl.style.color = '#2ecc71';
                }
            });
        }
    });
    
    // ✅ ဒီ Event သုံးခုကို function ထဲမှာ ပြန်ထည့်ထားပါတယ်။
    socket.on('message_edited', function(msg) {
        if (currentRoom === msg.room_id) {
            var row = document.querySelector('.msg-row[data-msg-id="' + msg.id + '"]');
            if (row) {
                var bubble = row.querySelector('.msg-bubble');
                if (bubble) {
                    var timeEl = bubble.querySelector('.msg-time');
                    var timeHtml = timeEl ? timeEl.outerHTML : '';
                    var senderEl = bubble.querySelector('.msg-sender');
                    var senderHtml = senderEl ? senderEl.outerHTML : '';
                    bubble.innerHTML = senderHtml + escapeHtml(msg.message) + ' <small style="font-size:7px;color:rgba(255,255,255,0.3)">(edited)</small>' + timeHtml;
                }
            }
        }
    });
    
    socket.on('message_deleted', function(data) {
        if (currentRoom === data.roomId) {
            var row = document.querySelector('.msg-row[data-msg-id="' + data.messageId + '"]');
            if (row) row.remove();
        }
    });
    
    socket.on('group_updated', function() {
        loadRooms();
    });
    
    console.log('[SOCKET] ✅ Listener registered');
}

function switchTab(t) {
    document.querySelectorAll('.tg-tab:not(.nav-link)').forEach(x => x.classList.remove('active'));
    document.querySelector(`.tg-tab[data-tab="${t}"]`).classList.add('active');
    document.getElementById('roomList').classList.remove('active');
    document.getElementById('usersList').classList.remove('active');
    document.getElementById('chatArea').classList.remove('active');

        document.getElementById('roomList').classList.add('active');
        loadRooms();
    } else if (t === 'users') {
        document.getElementById('usersList').classList.add('active');
        loadUsersList();
    }
}

// ==================== ROOMS & USERS ====================
async function loadRooms() {
    if (!currentUser) return;
    try {
        const r = await fetch('/api/chat/rooms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUser.id })
        });
        const d = await r.json();
        const c = document.getElementById('roomList');
        if (d.rooms && d.rooms.length > 0) {
            c.innerHTML = d.rooms.map(room => {
                let av = `<div class="tg-avatar" style="background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; font-size:18px; color:rgba(255,255,255,0.3);">
                    ${room.room_type === 'admin' ? '👑' : room.room_type === 'group' ? '👥' : '💬'}
                </div>`;
                if (room.avatar_url) {
                    av = `<img src="${room.avatar_url}" class="tg-avatar" onerror="this.style.display='none'; this.parentElement.innerHTML='${av}'">`;
                }
                return `<div class="tg-room" onclick="openRoom(${room.id},'${escapeHtml(room.room_name)}','${room.room_type}')">
                    ${av}
                    <div class="tg-room-info">
                        <div class="tg-room-name">${escapeHtml(room.room_name)}</div>
                        <div class="tg-room-last">${escapeHtml(room.last_message || 'No messages')}</div>
                    </div>
                    ${room.unread > 0 ? `<div class="tg-room-badge">${room.unread}</div>` : ''}
                </div>`;
            }).join('');
        } else {
            c.innerHTML = '<div class="empty-state"><p>No chats yet</p><button class="admin-btn" onclick="startAdminChat()">📞 Chat with Admin</button></div>';
        }
    } catch(e) {
        console.error('[LOAD ROOMS ERROR]', e);
        document.getElementById('roomList').innerHTML = '<div class="empty-state">Error loading rooms</div>';
    }
}

async function loadUsersList() {
    if (!currentUser) return;
    try {
        const r = await fetch('/api/chat/online_users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUser.id })
        });
        const d = await r.json();
        const ou = (d.users || []).filter(u => u.user_id !== currentUser.id);
        document.getElementById('usersList').innerHTML = ou.length ? ou.map(u => `
            <div class="tg-user" onclick="startPrivateChat(${u.user_id},'${escapeHtml(u.username)}')">
                <div class="online-dot"></div>
                <div class="tg-room-info">
                    <div class="tg-room-name">${escapeHtml(u.username)}</div>
                    <div class="tg-room-last" style="color:#2ecc71">Online</div>
                </div>
            </div>
        `).join('') : '<div class="empty-state"><p>No online users</p></div>';
    } catch(e) {
        console.error('[LOAD USERS ERROR]', e);
    }
}

// ==================== START CHAT FUNCTIONS ====================
async function startAdminChat() {
    if (!currentUser) return;
    try {
        const r = await fetch('/api/chat/create_admin_room', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUser.id })
        });
        const d = await r.json();
        if (d.success) {
            openRoom(d.room.id, d.room.room_name, 'admin');
            loadRooms();
        } else {

        }

}

async function startPrivateChat(oid, oun) {
    if (!currentUser) return;
    try {
        const r = await fetch('/api/chat/create_private_room', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUser.id, otherUserId: oid })
        });
        const d = await r.json();

async function openRoom(rid, rn, rt) {
    currentRoom = rid;
    document.getElementById('roomList').classList.remove('active');
    document.getElementById('usersList').classList.remove('active');
    document.getElementById('chatArea').classList.add('active');
    document.getElementById('chatRoomTitle').textContent = rn;
    
    if (rt === 'group') {
        try {
            const r = await fetch('/api/chat/group_info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomId: rid, userId: currentUser.id })
            });
            const d = await r.json();
            if (d.success && d.avatar_url) {
                document.getElementById('chatRoomAvatar').src = d.avatar_url;
                document.getElementById('chatRoomAvatar').style.display = 'inline-block';
            } else {
                document.getElementById('chatRoomAvatar').style.display = 'none';
            }
        } catch(e) {}
    } else {
        document.getElementById('chatRoomAvatar').style.display = 'none';
    }
    
    const mc = document.getElementById('messages');
    mc.innerHTML = '<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.2)">Loading...</div>';
    
    // ✅ ဒီမှာ parseInt(rid) ကို သေချာထည့်ပေးလိုက်ပါတယ်။
    if (socket && socket.connected) socket.emit('join_room', parseInt(rid));
    
    try {
        const r = await fetch(`/api/chat/messages/${rid}`);
        const d = await r.json();
        if (d.messages && d.messages.length) {
            mc.innerHTML = '';
            d.messages.forEach(msg => addMessageToUI(msg, msg.sender_id === currentUser?.id, msg.sender_premium_tier || 0));
            scrollToBottom();
        } else {
            mc.innerHTML = '<div style="text-align:center;padding:30px;color:rgba(255,255,255,0.2)">No messages yet</div>';
        }
        // Mark messages as read
        await fetch('/api/chat/read', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomId: rid, userId: currentUser.id })
        });
    } catch(e) {
        console.error('[OPEN ROOM ERROR]', e);
        mc.innerHTML = '<div style="text-align:center;padding:30px;color:#e74c3c;">Failed to load messages</div>';
    }
    }
    
function addMessageToUI(msg, isMine, spt) {
    spt = spt || 0;
    const c = document.getElementById('messages');
    if (c.innerHTML.includes('No messages') || c.innerHTML.includes('Loading')) c.innerHTML = '';
    let mh = '';
    const mt = msg.message || '';
    if (mt.startsWith('📷 IMAGE:')) {
        mh = `<div class="media-message" onclick="downloadMedia('${mt.replace('📷 IMAGE:', '')}', 'image')"><img src="${mt.replace('📷 IMAGE:', '')}" loading="lazy"></div>`;
    } else if (mt.startsWith('📎 FILE:')) {
        const p = mt.replace('📎 FILE:', '').split('|');
        mh = `<div class="file-message" onclick="downloadMedia('${p[0]}', 'file', '${p[1] || 'File'}')"><i class="fas fa-file"></i> ${escapeHtml(p[1] || 'File')}</div>`;
    } else {
        mh = escapeHtml(mt);
    }
    const d = document.createElement('div');
    d.className = `msg-row ${isMine ? 'mine msg-mine' : 'other msg-other'}`;
    if (msg.id) d.setAttribute('data-msg-id', msg.id);
    let bc = 'normal-tier';
    if (spt === 1) bc = 'bronze-tier';
    else if (spt === 2) bc = 'silver-tier';
    else if (spt === 3) bc = 'gold-tier';
    let av = '';
    if (!isMine) {
        av = msg.avatar_url ? `<img src="${msg.avatar_url}" class="msg-avatar-xs" onerror="this.style.display='none'">` : `<div class="msg-avatar-xs" style="background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:10px">👤</div>`;
    }
    let seenHtml = '';
    if (isMine) {
        if (msg.is_read) seenHtml = '<span style="color:#2ecc71;font-size:9px;margin-left:3px">✓✓</span>';
        else seenHtml = '<span style="color:rgba(255,255,255,0.25);font-size:9px;margin-left:3px">✓</span>';
    }
    d.innerHTML = `${av}<div class="msg-bubble ${bc}">${!isMine ? `<div class="msg-sender">${escapeHtml(msg.username || 'User')}</div>` : ''}${mh}<div class="msg-time">${new Date(msg.created_at).toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'})}${seenHtml}</div></div>`;
    c.appendChild(d);
}

function downloadMedia(u, t, fn = 'file') {
    const a = document.createElement('a');
    a.href = u;
    a.download = t === 'image' ? 'image.jpg' : fn;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

    i.focus();
    setTimeout(() => i.focus(), 50);
}

// ==================== EMOJI ====================
function insertEmoji(e) {
    const i = document.getElementById('msgInput');
    const p = i.selectionStart;
    i.value = i.value.substring(0, p) + e + i.value.substring(p);
    i.focus();
    i.setSelectionRange(p + e.length, p + e.length);
}

// ==================== MESSAGE EDIT / DELETE ====================
document.addEventListener('contextmenu', function(e) {
    var bubble = e.target.closest('.msg-bubble');
    if (!bubble) return;
    var row = bubble.closest('.msg-row');
    if (!row || !row.classList.contains('mine')) return;
    e.preventDefault();
    var msgData = row.getAttribute('data-msg-id');
    if (!msgData) return;
    selectedMsgId = parseInt(msgData);
    selectedMsgElement = row;
    var clone = bubble.cloneNode(true);
    var sender = clone.querySelector('.msg-sender');
    var time = clone.querySelector('.msg-time');
    if (sender) sender.remove();
    if (time) time.remove();
    selectedMsgText = clone.textContent.trim();
    var menu = document.getElementById('msgContextMenu');
    menu.style.display = 'block';
    menu.style.left = Math.min(e.clientX, window.innerWidth - 160) + 'px';
    menu.style.top = Math.min(e.clientY, window.innerHeight - 120) + 'px';
    setTimeout(function() {
        document.addEventListener('click', hideContextMenu, { once: true });
    }, 100);
});

function hideContextMenu() {
    document.getElementById('msgContextMenu').style.display = 'none';
}

function editMessage() {
    hideContextMenu();
    if (!selectedMsgId) return;
    document.getElementById('editOriginalMsg').textContent = selectedMsgText;
    document.getElementById('editMsgInput').value = selectedMsgText;
    document.getElementById('editMsgModal').classList.add('active');
}

async function saveEditMessage() {
    var newText = document.getElementById('editMsgInput').value.trim();
    if (!newText) { showToast('Message cannot be empty', true); return; }
    if (newText === selectedMsgText) { closeModal('editMsgModal'); return; }
    closeModal('editMsgModal');
    showToast('Saving...');
    try {
        var r = await fetch('/api/chat/edit_message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                messageId: selectedMsgId,
                newMessage: newText,
                userId: currentUser.id
            })
        });
        var d = await r.json();
        if (d.success) {
            if (selectedMsgElement) {
                var bubble = selectedMsgElement.querySelector('.msg-bubble');
                if (bubble) {
                    var timeEl = bubble.querySelector('.msg-time');
                    var timeHtml = timeEl ? timeEl.outerHTML : '';
                    var senderEl = bubble.querySelector('.msg-sender');
                    var senderHtml = senderEl ? senderEl.outerHTML : '';
                    bubble.innerHTML = senderHtml + escapeHtml(newText) + ' <small style="font-size:7px;color:rgba(255,255,255,0.3)">(edited)</small>' + timeHtml;
                }
            }
            showToast('✅ Message edited!');
        } else {
            showToast(d.message || 'Error', true);
        }
    } catch(e) {
        showToast('Server error', true);
    }
}

async function deleteMessage() {
    hideContextMenu();
    if (!selectedMsgId) return;
    if (!confirm('Delete this message?')) return;
    showToast('Deleting...');
    try {
        var r = await fetch('/api/chat/delete_message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                messageId: selectedMsgId,
                userId: currentUser.id
            })
        });
        var d = await r.json();
        if (d.success) {
            if (selectedMsgElement) selectedMsgElement.remove();
            showToast('✅ Message deleted!');
        } else {
            showToast(d.message || 'Error', true);
        }
    } catch(e) {
        showToast('Server error', true);
    }
}

// ==================== PAGE TIMER ====================
function setCookie(name, value, days) {
    let expires = '';
    if (days) {
        const date = new Date();
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
        expires = '; expires=' + date.toUTCString();
    }
    document.cookie = name + '=' + encodeURIComponent(value || '') + expires + '; path=/';
}

function getCookie(name) {
    const nameEQ = name + '=';
    const ca = document.cookie.split(';');
    for (let i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) === ' ') c = c.substring(1, c.length);
        if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
    }
    return null;
}

async function checkPageTimer() {
    const pid = 'chat';
    let t = null;
    try {
        const saved = localStorage.getItem('pageTimers');
        if (saved) { const timers = JSON.parse(saved); t = timers[pid]; }
        if (!t) {
            const cookieTimers = getCookie('pageTimers');
            if (cookieTimers) { const timers = JSON.parse(decodeURIComponent(cookieTimers)); t = timers[pid]; }
        }
        if (!t) {
            const sessionTimers = sessionStorage.getItem('pageTimers');
            if (sessionTimers) { const timers = JSON.parse(sessionTimers); t = timers[pid]; }
        }
    } catch(e) {}
    if (t && t > Date.now()) {
        showMaintenanceMode(t);
        return false;
    }
    return true;
}

function showMaintenanceMode(te) {
    document.querySelector('.tg-header').style.display = 'none';
    document.querySelector('.tg-tabs').style.display = 'none';
    document.querySelector('.chat-body').style.display = 'none';
    document.body.insertAdjacentHTML('beforeend', `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px">
            <div style="font-size:60px;color:var(--gold);margin-bottom:15px"><i class="fas fa-tools"></i></div>
            <div style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:8px">ပြုပြင်နေပါသည်</div>
            <div id="maintCountdown" style="font-size:26px;font-weight:700;color:var(--gold);font-family:monospace;margin:12px 0">--:--:--</div>
            <a href="/dashboard" style="padding:10px 25px;background:var(--gold);color:#000;text-decoration:none;border-radius:10px;font-weight:700;font-size:13px;margin-top:8px"><i class="fas fa-arrow-left"></i> Dashboard</a>
        </div>
    `);
    const ce = document.getElementById('maintCountdown');
    function up() {
        const r = te - Date.now();
        if (r <= 0) {
            try {
                const saved = localStorage.getItem('pageTimers');
                if (saved) { const timers = JSON.parse(saved); delete timers['chat']; localStorage.setItem('pageTimers', JSON.stringify(timers)); }
                setCookie('pageTimers', '', -1);
                sessionStorage.removeItem('pageTimers');
            } catch(e) {}
            location.reload();
            return;
        }
        const ss = Math.floor(r / 1000), h = Math.floor(ss / 3600), m = Math.floor((ss % 3600) / 60), s = ss % 60;
        ce.textContent = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }
    up();
    setInterval(up, 1000);
}

async function checkPageAccess() {
    try {
        const r = await fetch('/api/admin/page_status');
        const d = await r.json();
        if (d.pages) {
            const cp = d.pages.find(p => p.id === 'chat');
            if (cp && cp.status === 'off') {
                const ht = await checkPageTimer();
                if (ht === false) return false;
                document.querySelector('.tg-header').style.display = 'none';
                document.querySelector('.tg-tabs').style.display = 'none';
                document.querySelector('.chat-body').style.display = 'none';
                document.body.insertAdjacentHTML('beforeend', `
                    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px">
                        <div style="font-size:60px;color:var(--gold)"><i class="fas fa-tools"></i></div>
                        <div style="font-size:18px;font-weight:700;color:var(--gold);margin:10px 0">ပြုပြင်နေပါသည်</div>
                        <a href="/dashboard" style="padding:10px 25px;background:var(--gold);color:#000;text-decoration:none;border-radius:10px;font-weight:700;font-size:13px"><i class="fas fa-arrow-left"></i> Dashboard</a>
                    </div>
                `);
                return false;
            }
        }
        return true;
    } catch(e) { return true; }
}

// ==================== INIT ====================
async function init() {
    const po = await checkPageAccess();
    if (!po) return;
    initSounds();
    document.querySelectorAll('.tg-tab:not(.nav-link)').forEach(t => 
        t.addEventListener('click', () => switchTab(t.getAttribute('data-tab')))
    );
    const u = await getCurrentUser();
    if (!u) return;
    await checkPremiumStatus();
    initSocket();
    loadRooms();
}

// Start the app
init();

// Refresh online status every 10 seconds
setInterval(async () => {
    try {
        const r = await fetch('/api/admin/page_status');
        const d = await r.json();
        if (d.pages) {
            const cp = d.pages.find(p => p.id === 'chat');
            if (cp && cp.status === 'off') location.reload();
        }
    } catch(e) {}
}, 30000);
</script>
