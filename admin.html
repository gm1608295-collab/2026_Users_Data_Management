<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0c0e27;--p:#1a1f4b;--a:#4a1c7a;--r:#e74c3c;--g:#2ecc71;--w:#f39c12;--b:#3498db;--t:#fff}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);min-height:100vh;padding:15px}
        .container{max-width:500px;margin:0 auto}
        .header{background:linear-gradient(to right,var(--a),var(--p));padding:15px;text-align:center;border-radius:12px;border-bottom:4px solid var(--w);margin-bottom:15px}
        .header h1{font-size:18px;color:var(--w)}
        .header a{color:var(--t);font-size:13px;text-decoration:none;display:block;margin-top:5px}
        
        .section{background:rgba(26,31,75,0.6);border-radius:10px;padding:15px;margin-bottom:12px;border:1px solid rgba(74,28,122,0.5)}
        .section h3{color:var(--w);font-size:14px;margin-bottom:10px}
        
        .form-group{margin-bottom:8px}
        .form-group label{display:block;font-size:11px;margin-bottom:3px;color:#ccc}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:5px;color:var(--t);font-size:12px}
        .form-group select option{background:var(--bg);color:var(--t)}
        
        .btn{padding:8px 15px;border:none;border-radius:5px;font-size:11px;font-weight:bold;cursor:pointer;margin:2px}
        .btn-w{background:var(--w);color:#000}.btn-g{background:var(--g);color:#000}.btn-r{background:var(--r);color:#fff}.btn-b{background:var(--b);color:#fff}
        
        .user-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:rgba(0,0,0,0.2);border-radius:5px;margin-bottom:3px;font-size:10px;border-left:3px solid var(--g)}
        .user-row.banned{border-left-color:var(--r);opacity:0.7}
        .order-row{display:flex;justify-content:space-between;align-items:center;padding:7px 8px;background:rgba(0,0,0,0.2);border-radius:5px;margin-bottom:3px;font-size:10px;border-left:3px solid var(--w)}
        
        .stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
        .stat-card{background:rgba(0,0,0,0.3);padding:10px;text-align:center;border-radius:8px}
        .stat-card .num{font-size:20px;font-weight:bold;color:var(--w)}
        .stat-card .lbl{font-size:9px;color:rgba(255,255,255,0.5)}
        
        .screenshot-preview{max-width:35px;max-height:35px;border-radius:4px;cursor:pointer;margin:0 2px}
        .zoom-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;justify-content:center;align-items:center;cursor:pointer}
        .zoom-overlay img{max-width:95%;max-height:95%;border-radius:10px}
        
        .notif{position:fixed;top:20px;right:20px;padding:10px 15px;border-radius:5px;display:none;z-index:1000;font-size:12px;max-width:250px}
        
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:2000;justify-content:center;align-items:center}
        .modal.active{display:flex}
        .modal-box{background:var(--p);border:2px solid var(--w);border-radius:10px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto}
        .modal-box h3{color:var(--w);margin-bottom:12px;text-align:center;font-size:15px}
        .modal-close{float:right;color:var(--r);cursor:pointer;font-size:20px}
    </style>
</head>
<body>
    <div class="notif" id="notif"></div>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-user-shield"></i> Admin Panel</h1>
            <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
        
        <div class="section">
            <h3><i class="fas fa-lock"></i> Admin Login</h3>
            <div class="form-group"><label>Admin Password</label><input type="password" id="adminPass" placeholder="Enter admin password"></div>
            <button class="btn btn-w" onclick="unlockAdmin()"><i class="fas fa-unlock"></i> Unlock Admin</button>
            <div id="adminBox" style="display:none;margin-top:15px">
                <!-- Stats -->
                <div class="stats">
                    <div class="stat-card"><div class="num" id="totalUsers">0</div><div class="lbl">Total Users</div></div>
                    <div class="stat-card"><div class="num" id="bannedUsers" style="color:var(--r)">0</div><div class="lbl">Banned Users</div></div>
                </div>
                
                <!-- User Search & Balance -->
                <h3 style="font-size:12px;margin-top:10px">🔍 User Search & Balance</h3>
                <div style="display:flex;gap:4px;margin-bottom:8px">
                    <input type="text" id="userSearch" placeholder="User ID or Email..." style="flex:1;padding:8px;font-size:10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#fff" onkeyup="searchUser()">
                </div>
                <div id="userSearchResult" style="max-height:120px;overflow-y:auto;margin-bottom:8px;font-size:10px"></div>
                
                <!-- Orders -->
                <h3 style="font-size:12px;margin-top:10px">🛒 Top-Up Orders</h3>
                <div id="adminOrders" style="max-height:200px;overflow-y:auto;margin-bottom:8px;font-size:10px"></div>
                
                <!-- User Lists -->
                <h3 style="font-size:12px;margin-top:10px">📧 Local Login</h3>
                <div id="localList" style="max-height:100px;overflow-y:auto;margin-bottom:6px;font-size:10px"></div>
                
                <h3 style="font-size:12px;margin-top:10px">🔵 Google Login</h3>
                <div id="googleList" style="max-height:100px;overflow-y:auto;margin-bottom:6px;font-size:10px"></div>
                
                <h3 style="font-size:12px;margin-top:10px">🎵 TikTok Login</h3>
                <div id="tiktokList" style="max-height:100px;overflow-y:auto;margin-bottom:6px;font-size:10px"></div>
                
                <!-- Notice -->
                <div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:10px;margin-top:10px">
                    <h3 style="font-size:12px"><i class="fas fa-bullhorn"></i> Post Notice</h3>
                    <div class="form-group"><label>Notice Text</label><textarea id="adminNoticeMsg" rows="2" placeholder="Enter notice text..."></textarea></div>
                    <div class="form-group"><label>Text Color</label><input type="color" id="noticeColor" value="#ffffff" style="height:30px;padding:2px"></div>
                    <button class="btn btn-w" onclick="postNotice()"><i class="fas fa-paper-plane"></i> Post Notice</button>
                    <div style="margin-top:8px"><b style="font-size:11px;color:var(--w)">📋 Posted Notices</b></div>
                    <div id="noticeList" style="max-height:120px;overflow-y:auto;font-size:10px"></div>
                </div>
                
                <!-- Slider -->
                <div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:10px;margin-top:10px">
                    <h3 style="font-size:12px"><i class="fas fa-images"></i> Slider Images (1-5 URLs)</h3>
                    <div class="form-group"><input type="text" id="sliderUrl1" placeholder="Image URL 1"></div>
                    <div class="form-group"><input type="text" id="sliderUrl2" placeholder="Image URL 2 (optional)"></div>
                    <div class="form-group"><input type="text" id="sliderUrl3" placeholder="Image URL 3 (optional)"></div>
                    <div class="form-group"><input type="text" id="sliderUrl4" placeholder="Image URL 4 (optional)"></div>
                    <div class="form-group"><input type="text" id="sliderUrl5" placeholder="Image URL 5 (optional)"></div>
                    <button class="btn btn-g" onclick="saveSliderImages()"><i class="fas fa-save"></i> Save Slider</button>
                    <button class="btn btn-r" onclick="clearSliderImages()"><i class="fas fa-trash"></i> Clear Slider</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Edit User Modal -->
    <div class="modal" id="editModal">
        <div class="modal-box">
            <span class="modal-close" onclick="closeEditModal()">&times;</span>
            <h3>Edit User</h3>
            <input type="hidden" id="editUserId">
            <div class="form-group"><label>Name</label><input type="text" id="editName"></div>
            <div class="form-group"><label>Email</label><input type="email" id="editEmail"></div>
            <div class="form-group"><label>Phone</label><input type="text" id="editPhone"></div>
            <div class="form-group"><label>New Password</label><input type="password" id="editPass"></div>
            <button class="btn btn-g" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>

<script>
    const ADMIN="MK2008";
    
    function n(m,t="success"){ const e=document.getElementById("notif"); e.textContent=m; e.style.background=t==="success"?"#2ecc71":"#e74c3c"; e.style.display="block"; setTimeout(()=>e.style.display="none",3000); }
    
    function openEditModal(uid,un,em,ph){ document.getElementById("editUserId").value=uid; document.getElementById("editName").value=un||''; document.getElementById("editEmail").value=em||''; document.getElementById("editPhone").value=ph||''; document.getElementById("editPass").value=''; document.getElementById("editModal").classList.add("active"); }
    function closeEditModal(){ document.getElementById("editModal").classList.remove("active"); }
    function zoomImage(src){ const modal=document.createElement('div'); modal.className='zoom-overlay'; modal.onclick=()=>modal.remove(); modal.innerHTML=`<img src="${src}">`; document.body.appendChild(modal); }
    
    async function unlockAdmin(){ 
        if(document.getElementById("adminPass").value!==ADMIN) return n("Wrong password","error"); 
        document.getElementById("adminBox").style.display="block"; 
        loadAdminData(); 
        loadAdminOrders(); 
    }
    
    async function loadAdminData(){
        try{ 
            const r=await fetch("/api/admin/users_grouped"); 
            const d=await r.json(); 
            document.getElementById("totalUsers").textContent=d.total||0; 
            document.getElementById("bannedUsers").textContent=(d.banned||[]).length; 
            const banned=d.banned||[];
            const renderList=(list,container,canEdit)=>{ 
                container.innerHTML=list.length===0?'<p style="font-size:10px">No users</p>':list.map(u=>{ 
                    const isBanned=banned.includes(u.id.toString()); 
                    return `<div class="user-row${isBanned?' banned':''}"><div><b>ID:${u.id.toString().padStart(6,'0')}</b><br>${u.username||'N/A'}<br><small>${u.email}</small></div><div style="display:flex;gap:2px;flex-wrap:wrap">${canEdit?`<button class="btn btn-w" onclick="openEditModal('${u.id}','${u.username||''}','${u.email||''}','${u.phone||''}')">Edit</button>`:''}${isBanned?`<button class="btn btn-g" onclick="unbanUser('${u.id}')">Unban</button>`:`<button class="btn btn-r" onclick="banUserById('${u.id}')">Ban</button>`}<button class="btn btn-r" onclick="delUserById('${u.id}')">Del</button></div></div>`; 
                }).join(''); 
            };
            renderList(d.local||[],document.getElementById("localList"),true);
            renderList(d.google||[],document.getElementById("googleList"),false);
            renderList(d.tiktok||[],document.getElementById("tiktokList"),false);
            loadNoticeList(); 
        }catch(e){}
    }
    
    async function banUserById(id){ await fetch("/api/admin/ban",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:id})}); loadAdminData(); n("Banned!"); }
    async function unbanUser(id){ await fetch("/api/admin/unban",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:id})}); loadAdminData(); n("Unbanned!"); }
    async function delUserById(id){ if(!confirm("Delete user "+id+"?")) return; await fetch("/api/admin/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:id})}); n("Deleted!"); loadAdminData(); }
    
    async function saveEdit(){
        const id=document.getElementById("editUserId").value, un=document.getElementById("editName").value, em=document.getElementById("editEmail").value, ph=document.getElementById("editPhone").value, pw=document.getElementById("editPass").value;
        try{ const r=await fetch("/api/admin/edit_user",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:parseInt(id),username:un,email:em,phone:ph,password:pw||''})}); const d=await r.json(); d.success?(n("Updated!"),closeEditModal(),loadAdminData()):n(d.message||"Error","error"); }catch(e){ n("Error","error"); }
    }
    
    async function searchUser(){ 
        const q=document.getElementById('userSearch').value; 
        if(q.length<2){ document.getElementById('userSearchResult').innerHTML=''; return; } 
        try{ const r=await fetch('/api/admin/search_user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q})}); const d=await r.json(); const c=document.getElementById('userSearchResult');
            c.innerHTML=d.users.map(u=>`<div class="user-row" style="justify-content:space-between"><div><b>ID:${u.id}</b> ${u.username||''}<br><small>${u.email}</small><br><small>Balance: ${u.balance||0} Ks</small></div><div style="display:flex;gap:2px"><input type="number" id="bal${u.id}" placeholder="Amt" style="width:50px;padding:2px;font-size:9px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:3px"><button class="btn btn-g" onclick="addBalance(${u.id})">+</button><button class="btn btn-r" onclick="subBalance(${u.id})">-</button></div></div>`).join(''); 
        }catch(e){} 
    }
    
    async function addBalance(uid){ const amt=document.getElementById('bal'+uid).value; if(!amt) return; await fetch('/api/admin/update_balance',{method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:uid,amount:parseFloat(amt)})}); n('Balance Added!'); searchUser(); }
    async function subBalance(uid){ const amt=document.getElementById('bal'+uid).value; if(!amt) return; await fetch('/api/admin/update_balance',{method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:uid,amount:-parseFloat(amt)})}); n('Balance Deducted!'); searchUser(); }
    
    async function loadAdminOrders(){
        try{ const r=await fetch('/api/admin/orders'); const d=await r.json(); const c=document.getElementById('adminOrders');
            if(d.orders.length===0){ c.innerHTML='<p style="font-size:10px">No orders</p>'; return; }
            c.innerHTML=d.orders.map(o=>`<div class="order-row"><div><b>${o.username||'N/A'}</b><br>💰 ${o.amount} Ks | 💳 ${o.payment_method}<br><small>🆔 ${o.submitted_user_id||o.user_id} | ${new Date(o.created_at).toLocaleString()}</small></div><div style="display:flex;gap:2px;align-items:center"><span style="font-size:8px;color:${o.status==='approved'?'var(--g)':o.status==='rejected'?'var(--r)':'var(--w)'}">${o.status}</span>${o.screenshot?`<img src="${o.screenshot}" class="screenshot-preview" onclick="zoomImage('${o.screenshot}')">`:'📷'}${o.status==='pending'?`<button class="btn btn-g" onclick="approveOrder(${o.id},${o.user_id},${o.amount})">✓</button><button class="btn btn-r" onclick="rejectOrder(${o.id})">✕</button>`:''}</div></div>`).join(''); 
        }catch(e){}
    }
    
    async function approveOrder(id,userId,amount){ const manualAmount=prompt('Enter amount to add (Ks):',amount); if(!manualAmount) return; await fetch('/api/admin/order_status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:'approved'})}); await fetch('/api/admin/update_balance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId,amount:parseFloat(manualAmount)})}); n('Approved! +'+manualAmount+' Ks'); loadAdminOrders(); loadAdminData(); }
    async function rejectOrder(id){ await fetch('/api/admin/order_status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:'rejected'})}); n('Rejected!'); loadAdminOrders(); }
    
    // Notice
    async function loadNoticeList(){ try{ const r=await fetch("/api/admin/notices"); const d=await r.json(); const c=document.getElementById("noticeList"); if(d.notices&&d.notices.length>0){ c.innerHTML=d.notices.map(n=>`<div class="user-row"><div><span style="color:${n.color||'#fff'}">${n.message}</span><br><small>${new Date(n.created_at).toLocaleString()}</small></div><button class="btn btn-r" onclick="delNoticeById(${n.id})">Del</button></div>`).join(''); } else { c.innerHTML='<p>No notices</p>'; } }catch(e){} }
    async function postNotice(){ const m=document.getElementById("adminNoticeMsg").value; const co=document.getElementById("noticeColor").value; if(!m) return n("Enter notice text","error"); try{ const r=await fetch("/api/admin/notice",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:m,color:co})}); const d=await r.json(); d.success?(n("Notice Posted!"),document.getElementById("adminNoticeMsg").value="",loadNoticeList()):n(d.message,"error"); }catch(e){ n("Connection error","error"); } }
    async function delNoticeById(id){ if(!confirm("Delete?")) return; await fetch("/api/admin/notice/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:id})}); n("Deleted!"); loadNoticeList(); }
    
    // Slider
    async function saveSliderImages(){ const urls=[]; for(let i=1;i<=5;i++){ const input=document.getElementById('sliderUrl'+i); if(input&&input.value.trim()) urls.push(input.value.trim()); } if(urls.length===0) return n("Enter at least one URL","error"); try{ const r=await fetch('/api/admin/slider_images',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({images:urls})}); const d=await r.json(); d.success?(n('Saved! '+urls.length+' images'),urls.forEach((_,i)=>{ const input=document.getElementById('sliderUrl'+(i+1)); if(input) input.value=''; })):n(d.message||'Error','error'); }catch(e){ n('Connection error','error'); } }
    async function clearSliderImages(){ try{ await fetch('/api/admin/slider_images',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({images:[]})}); n('Slider cleared!'); }catch(e){ n('Error','error'); } }
</script>
</body>
</html>
