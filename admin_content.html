<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Content</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0c0e27;--p:#1a1f4b;--a:#4a1c7a;--r:#e74c3c;--g:#2ecc71;--w:#f39c12;--b:#3498db;--t:#fff}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);min-height:100vh;padding:15px;overflow-y:auto}
        .section{background:rgba(26,31,75,0.6);border-radius:10px;padding:15px;margin-bottom:12px;border:1px solid rgba(74,28,122,0.5)}
        .section h3{color:var(--w);font-size:13px;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:6px;display:flex;align-items:center;gap:8px}
        .btn{padding:8px 14px;border:none;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer;margin:3px;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;justify-content:center}
        .btn-w{background:var(--w);color:#000}.btn-g{background:var(--g);color:#000}.btn-r{background:var(--r);color:#fff}.btn-b{background:var(--b);color:#fff}
        .backup-info{background:rgba(0,0,0,0.3);padding:10px;border-radius:8px;margin:8px 0;font-size:10px}
        .notice-cards{display:flex;flex-direction:column;gap:6px;margin-top:8px;max-height:250px;overflow-y:auto}
        .notice-card{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(0,0,0,0.2);border-radius:8px;border-left:3px solid var(--w)}
        .notice-card .nc-color{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:1px solid rgba(255,255,255,0.2)}
        .notice-card .nc-msg{flex:1;font-size:10px;color:rgba(255,255,255,0.85);word-break:break-word}
        .notice-card .nc-date{font-size:8px;color:rgba(255,255,255,0.35);white-space:nowrap}
        .notice-card .nc-del{color:var(--r);cursor:pointer;font-size:12px;padding:4px}
        .form-group{margin-bottom:8px}
        .form-group label{display:block;font-size:11px;margin-bottom:3px;color:#ccc;font-weight:600}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:8px 10px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:var(--t);font-size:11px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:2000;justify-content:center;align-items:center}
        .modal.active{display:flex}
        .modal-box{background:var(--p);border:2px solid var(--w);border-radius:12px;padding:22px;width:90%;max-width:420px}
        .modal-close{float:right;color:var(--r);cursor:pointer;font-size:22px}
        .btn-row{display:flex;gap:6px;flex-wrap:wrap}
    </style>
</head>
<body>
    <div class="section">
        <h3><i class="fas fa-database"></i> Backup & Restore</h3>
        <div class="btn-row"><button class="btn btn-g" onclick="backupDatabase()"><i class="fas fa-download"></i> Backup</button><button class="btn btn-o" onclick="document.getElementById('restoreFile').click()"><i class="fas fa-upload"></i> Restore</button><input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restoreDatabase(this)"></div>
        <div class="backup-info" id="backupInfo">📅 Last Backup: No backup yet</div>
    </div>

    <div class="section">
        <h3><i class="fas fa-bullhorn"></i> Dashboard Notice</h3>
        <div class="form-group"><label>Notice Text</label><textarea id="adminNoticeMsg" rows="2"></textarea></div>
        <div class="form-group"><label>Text Color</label><input type="color" id="noticeColor" value="#ffffff" style="height:32px;padding:2px;cursor:pointer"></div>
        <div class="btn-row"><button class="btn btn-w" onclick="postNotice()">Post</button><button class="btn btn-r" onclick="deleteAllNotices()">Delete All</button></div>
        <div class="notice-cards" id="noticeCards"></div>
    </div>

    <div class="section">
        <h3><i class="fas fa-wallet"></i> Top Up Notice</h3>
        <div class="form-group"><label>Notice Text</label><textarea id="topupNoticeMsg" rows="2"></textarea></div>
        <div class="form-group"><label>Text Color</label><input type="color" id="topupNoticeColor" value="#ffffff" style="height:32px;padding:2px;cursor:pointer"></div>
        <div class="btn-row"><button class="btn btn-w" onclick="postTopupNotice()">Post</button><button class="btn btn-r" onclick="deleteAllTopupNotices()">Delete All</button></div>
        <div class="notice-cards" id="topupNoticeCards"></div>
    </div>

    <div class="section">
        <h3><i class="fas fa-ticket-alt"></i> Buy Code Notice</h3>
        <div class="form-group"><label>Notice Text</label><textarea id="buycodeNoticeMsg" rows="2"></textarea></div>
        <div class="form-group"><label>Text Color</label><input type="color" id="buycodeNoticeColor" value="#ffffff" style="height:32px;padding:2px;cursor:pointer"></div>
        <div class="btn-row"><button class="btn btn-w" onclick="postBuyCodeNotice()">Post</button><button class="btn btn-r" onclick="deleteAllBuyCodeNotices()">Delete All</button></div>
        <div class="notice-cards" id="buycodeNoticeCards"></div>
    </div>

    <div class="section">
        <h3><i class="fas fa-gift"></i> Redeem Code Management</h3>
        <div class="form-group"><label>Category</label><select id="redeemCategory"><option value="shhh_emote">🎭 Shhh emote (2,500 Ks)</option><option value="golden_border">🏆 Golden Month Border (3,500 Ks)</option><option value="lucky_diamond">💎 Lucky Diamond Code (2,000 Ks)</option><option value="magic_durt">✨ Magic Durt (1,500 Ks)</option><option value="emblem_box">📦 Emblem Box (1,500 Ks)</option></select></div>
        <div class="form-group"><label>Code</label><input type="text" id="redeemCode"></div>
        <button class="btn btn-g" onclick="addRedeemCode()" style="width:100%"><i class="fas fa-plus"></i> Add Code</button>
        <div id="redeemCodeList" style="max-height:200px;overflow-y:auto;margin-top:8px"></div>
    </div>

    <div class="section">
        <h3><i class="fab fa-telegram"></i> Bot Message</h3>
        <div class="form-group"><label>Message</label><textarea id="botCustomMsg" rows="3"></textarea></div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">
            <button class="btn" style="background:#e74c3c;color:#fff" onclick="addBotTemplate('announcement')">📢 Announcement</button>
            <button class="btn" style="background:#2ecc71;color:#000" onclick="addBotTemplate('promo')">🎉 Promo</button>
            <button class="btn" style="background:#3498db;color:#fff" onclick="addBotTemplate('update')">🔧 Update</button>
            <button class="btn" style="background:#f39c12;color:#000" onclick="addBotTemplate('warning')">⚠️ Warning</button>
        </div>
        <button class="btn btn-b" onclick="sendBotMessage()" style="width:100%"><i class="fas fa-paper-plane"></i> Send</button>
    </div>

    <script>
        function n(m,t){t=t||"success";const e=document.getElementById("notif");if(!e){alert(m);return} e.textContent=m;e.style.background=t==="success"?"#2ecc71":"#e74c3c";e.style.display="block";setTimeout(()=>e.style.display="none",3000)}
        let pendingRestoreData=null;

        // ==================== BACKUP ====================
        async function backupDatabase(){try{const r=await fetch('/api/admin/backup');const d=await r.json();if(d.success&&d.data){const blob=new Blob([JSON.stringify(d.data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`backup_${new Date().toISOString().split('T')[0]}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);alert('Downloaded!');localStorage.setItem('lastBackup',new Date().toLocaleString());updateBackupInfo()}else alert('Failed')}catch(e){alert('Error')}}
        function restoreDatabase(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){try{pendingRestoreData=JSON.parse(e.target.result);if(!pendingRestoreData.tables){alert('Invalid');return}document.getElementById('restoreConfirmModal').classList.add('active')}catch(e){alert('Invalid JSON')}};reader.readAsText(file);input.value=''}
        async function confirmRestore(){if(!pendingRestoreData)return;try{const r=await fetch('/api/admin/restore',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({data:pendingRestoreData})});const d=await r.json();if(d.success){alert('Restored!');closeRestoreConfirm();updateBackupInfo()}else{alert(d.message||'Error')}}catch(e){alert('Error')}}
        function closeRestoreConfirm(){document.getElementById("restoreConfirmModal").classList.remove("active");pendingRestoreData=null}
        function updateBackupInfo(){const lb=localStorage.getItem('lastBackup');document.getElementById('backupInfo').innerHTML=lb?`📅 Last Backup: ${lb}`:'📅 Last Backup: No backup yet'}

        // ==================== NOTICES ====================
        async function loadNoticeList(){try{const r=await fetch("/api/admin/notices");const d=await r.json();const c=document.getElementById("noticeCards");if(d.notices&&d.notices.length>0){c.innerHTML=d.notices.map(n=>`<div class="notice-card"><div class="nc-color" style="background:${n.color||'#fff'}"></div><div class="nc-msg"><span style="color:${n.color||'#fff'}">${n.message}</span></div><div class="nc-date">${new Date(n.created_at).toLocaleDateString()}</div><span class="nc-del" onclick="delNoticeById(${n.id})"><i class="fas fa-times"></i></span></div>`).join('')}else{c.innerHTML='<p style="font-size:10px;color:rgba(255,255,255,0.4);text-align:center;padding:15px">No notices</p>'}}catch(e){}}
        async function postNotice(){const m=document.getElementById("adminNoticeMsg").value,co=document.getElementById("noticeColor").value;if(!m)return alert("Enter text");try{await fetch("/api/admin/notice",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:m,color:co})});alert("Posted!");document.getElementById("adminNoticeMsg").value="";loadNoticeList()}catch(e){alert("Error")}}
        async function delNoticeById(id){await fetch("/api/admin/notice/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:id})});alert("Deleted!");loadNoticeList()}
        async function deleteAllNotices(){if(!confirm('Delete ALL?'))return;await fetch('/api/admin/notices/delete_all',{method:'POST'});alert('Deleted!');loadNoticeList()}
        async function loadTopupNoticeList(){try{const r=await fetch("/api/admin/topup_notices");const d=await r.json();const c=document.getElementById("topupNoticeCards");if(d.notices&&d.notices.length>0){c.innerHTML=d.notices.map(n=>`<div class="notice-card"><div class="nc-color" style="background:${n.color||'#fff'}"></div><div class="nc-msg"><span style="color:${n.color||'#fff'}">${n.message}</span></div><div class="nc-date">${new Date(n.created_at).toLocaleDateString()}</div><span class="nc-del" onclick="delTopupNoticeById(${n.id})"><i class="fas fa-times"></i></span></div>`).join('')}else{c.innerHTML='<p style="font-size:10px;color:rgba(255,255,255,0.4);text-align:center;padding:15px">No notices</p>'}}catch(e){}}
        async function postTopupNotice(){const m=document.getElementById("topupNoticeMsg").value,co=document.getElementById("topupNoticeColor").value;if(!m)return alert("Enter text");await fetch("/api/admin/topup_notice",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:m,color:co})});alert("Posted!");document.getElementById("topupNoticeMsg").value="";loadTopupNoticeList()}
        async function delTopupNoticeById(id){await fetch("/api/admin/topup_notice/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:id})});alert("Deleted!");loadTopupNoticeList()}
        async function deleteAllTopupNotices(){if(!confirm('Delete ALL?'))return;await fetch('/api/admin/topup_notices/delete_all',{method:'POST'});alert('Deleted!');loadTopupNoticeList()}
        async function loadBuyCodeNoticeList(){try{const r=await fetch("/api/admin/buycode_notices");const d=await r.json();const c=document.getElementById("buycodeNoticeCards");if(d.notices&&d.notices.length>0){c.innerHTML=d.notices.map(n=>`<div class="notice-card"><div class="nc-color" style="background:${n.color||'#fff'}"></div><div class="nc-msg"><span style="color:${n.color||'#fff'}">${n.message}</span></div><div class="nc-date">${new Date(n.created_at).toLocaleDateString()}</div><span class="nc-del" onclick="delBuyCodeNoticeById(${n.id})"><i class="fas fa-times"></i></span></div>`).join('')}else{c.innerHTML='<p style="font-size:10px;color:rgba(255,255,255,0.4);text-align:center;padding:15px">No notices</p>'}}catch(e){}}
        async function postBuyCodeNotice(){const m=document.getElementById("buycodeNoticeMsg").value,co=document.getElementById("buycodeNoticeColor").value;if(!m)return alert("Enter text");await fetch("/api/admin/buycode_notice",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:m,color:co})});alert("Posted!");document.getElementById("buycodeNoticeMsg").value="";loadBuyCodeNoticeList()}
        async function delBuyCodeNoticeById(id){await fetch("/api/admin/buycode_notice/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:id})});alert("Deleted!");loadBuyCodeNoticeList()}
        async function deleteAllBuyCodeNotices(){if(!confirm('Delete ALL?'))return;await fetch('/api/admin/buycode_notices/delete_all',{method:'POST'});alert('Deleted!');loadBuyCodeNoticeList()}

        // ==================== REDEEM CODES ====================
        async function loadRedeemCodes(){try{const r=await fetch('/api/admin/redeem_codes');const d=await r.json();if(d.codes){const cats={shhh_emote:'🎭 Shhh emote (2.5K)',golden_border:'🏆 Golden Border (3.5K)',lucky_diamond:'💎 Lucky Diamond (2K)',magic_durt:'✨ Magic Durt (1.5K)',emblem_box:'📦 Emblem Box (1.5K)'};let h='';d.codes.forEach(c=>{h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(0,0,0,0.2);border-radius:6px;margin-bottom:4px;font-size:9px;border-left:3px solid ${c.used?'var(--r)':'var(--g)'}"><div><b>${cats[c.category]||c.category}</b><br>${c.code}<br><small>${c.used?'❌ Used':'✅ Available'}</small></div><button class="btn btn-r" style="font-size:8px;padding:3px 8px" onclick="delRedeemCode(${c.id})">Del</button></div>`});document.getElementById('redeemCodeList').innerHTML=h||'<p style="font-size:10px;color:rgba(255,255,255,0.5);text-align:center;padding:15px">No codes</p>'}}catch(e){}}
        async function addRedeemCode(){const cat=document.getElementById('redeemCategory').value;const code=document.getElementById('redeemCode').value.trim();if(!cat||!code)return alert('Fill all fields');try{await fetch('/api/admin/redeem_code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:cat,code})});alert('Added!');document.getElementById('redeemCode').value='';loadRedeemCodes()}catch(e){alert('Error')}}
        async function delRedeemCode(id){if(!confirm('Delete?'))return;await fetch('/api/admin/redeem_code/delete',{method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify({id})});alert('Deleted!');loadRedeemCodes()}

        // ==================== BOT ====================
        function addBotTemplate(t){const ta=document.getElementById('botCustomMsg');const temps={announcement:'📢 Announcement\n\n',promo:'🎉 Promotion\n\n',update:'🔧 Update\n\n• \n• \n\n',warning:'⚠️ Warning\n\n'};ta.value=temps[t]||'';ta.focus()}
        async function sendBotMessage(){const msg=document.getElementById('botCustomMsg').value.trim();if(!msg)return alert('Enter message');try{const r=await fetch('/api/admin/bot_message',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});const d=await r.json();if(d.success){alert('✅ Sent to '+d.count+' users!');document.getElementById('botCustomMsg').value=''}else{alert(d.message||'Error')}}catch(e){alert('Error')}}

        // ==================== INIT ====================
        function init(){
            loadNoticeList();loadTopupNoticeList();loadBuyCodeNoticeList();loadRedeemCodes();updateBackupInfo();
        }
        init();
    </script>
    <!-- Restore Confirm Modal -->
    <div class="modal" id="restoreConfirmModal"><div class="modal-box"><span class="modal-close" onclick="closeRestoreConfirm()">&times;</span><h3>⚠️ Restore Database</h3><p style="font-size:11px;color:var(--r);text-align:center;margin-bottom:15px">လက်ရှိ Database ကို Backup File ဖြင့် အစားထိုးမှာ သေချာပါသလား?</p><div style="display:flex;gap:8px"><button class="btn btn-r" onclick="confirmRestore()" style="flex:1">Yes</button><button class="btn" onclick="closeRestoreConfirm()" style="flex:1;background:rgba(255,255,255,0.2)">Cancel</button></div></div></div>
</body>
</html>
