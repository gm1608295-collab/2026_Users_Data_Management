<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Change Password - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0c0e27;--p:#1a1f4b;--a:#4a1c7a;--r:#e74c3c;--g:#2ecc71;--w:#f39c12;--b:#3498db;--t:#fff}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);min-height:100vh;padding:15px;overflow-y:auto}
        .container{max-width:500px;margin:0 auto}
        .header{display:flex;align-items:center;gap:10px;margin-bottom:15px;background:linear-gradient(to right,var(--a),var(--p));padding:12px 15px;border-radius:10px;border-bottom:3px solid var(--w)}
        .header a{color:var(--w);font-size:20px;text-decoration:none}
        .header h2{color:var(--w);font-size:16px}
        .panel{background:rgba(26,31,75,0.6);padding:20px;border-radius:10px;border:1px solid rgba(74,28,122,0.5)}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;font-size:13px;margin-bottom:5px;color:#ccc;font-weight:600}
        .form-group input,.form-group select{width:100%;padding:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);border-radius:6px;color:var(--t);font-size:14px}
        .form-group select option{background:var(--bg);color:var(--t)}
        .btn{width:100%;padding:12px;border:none;border-radius:6px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:8px}
        .btn-w{background:var(--w);color:#000}
        .pass-wrapper{position:relative}
        .pass-wrapper input{padding-right:40px!important}
        .pass-wrapper .eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:16px}
        .notif{position:fixed;top:20px;right:20px;padding:10px 15px;border-radius:5px;display:none;z-index:1000;font-size:12px}
        .back-btn{display:block;padding:10px;background:rgba(255,255,255,0.1);color:var(--t);text-align:center;border-radius:6px;text-decoration:none;font-size:13px;margin-top:15px}
    </style>
</head>
<body>
    <audio id="bgAudio" loop style="display:none"></audio>
    <div class="notif" id="notif"></div>
    <div class="container">
        <div class="header">
            <a href="/dashboard"><i class="fas fa-arrow-left"></i></a>
            <h2><i class="fas fa-key"></i> Change Password</h2>
        </div>
        <div class="panel">
            <div class="form-group"><label>Type</label><select id="passType"><option value="gmail">Gmail</option><option value="mlbb">MLBB</option><option value="tiktok">TikTok</option></select></div>
            <div class="form-group"><label>Current Password</label><div class="pass-wrapper"><input type="password" id="curPass" placeholder="Enter current password"><button class="eye-btn" onclick="togglePass('curPass',this)"><i class="fas fa-eye"></i></button></div></div>
            <div class="form-group"><label>New Password</label><div class="pass-wrapper"><input type="password" id="newPass" placeholder="Enter new password"><button class="eye-btn" onclick="togglePass('newPass',this)"><i class="fas fa-eye"></i></button></div></div>
            <button class="btn btn-w" onclick="chPass()"><i class="fas fa-save"></i> Change Password</button>
        </div>
        <a href="/dashboard" class="back-btn"><i class="fas fa-home"></i> Back to Dashboard</a>
    </div>
<script>
    // ==================== GLOBAL: BG Music Player ====================
    const bgAudio = document.getElementById('bgAudio');
    let musicPlaylist = [], musicCurrentIndex = parseInt(localStorage.getItem('bgMusicIndex') || '0');
    bgAudio.volume = 0.6;
    async function checkMusic() {
        try {
            const r = await fetch('/api/bg_music?t=' + Date.now());
            const d = await r.json();
            if (d.playlist && d.playlist.length > 0) {
                const newList = JSON.stringify(d.playlist), oldList = JSON.stringify(musicPlaylist);
                if (newList !== oldList) { musicPlaylist = d.playlist; musicCurrentIndex = 0; playMusic(); }
                else if (bgAudio.paused && bgAudio.src) { const t = localStorage.getItem('bgMusicTime_' + musicCurrentIndex); if (t) bgAudio.currentTime = parseFloat(t); bgAudio.play().catch(() => {}); }
            } else { bgAudio.pause(); bgAudio.src = ''; musicPlaylist = []; }
        } catch(e) {}
    }
    function playMusic() {
        if (!musicPlaylist.length) return;
        if (musicCurrentIndex >= musicPlaylist.length) musicCurrentIndex = 0;
        const url = musicPlaylist[musicCurrentIndex];
        if (bgAudio.src !== url) {
            bgAudio.src = url;
            bgAudio.addEventListener('canplay', function() { const t = localStorage.getItem('bgMusicTime_' + musicCurrentIndex); if (t) bgAudio.currentTime = parseFloat(t); bgAudio.play().catch(() => {}); }, { once: true });
        } else { bgAudio.play().catch(() => {}); }
    }
    bgAudio.addEventListener('ended', function() {
        localStorage.setItem('bgMusicTime_' + musicCurrentIndex, bgAudio.currentTime);
        musicCurrentIndex = (musicCurrentIndex + 1) % musicPlaylist.length;
        localStorage.setItem('bgMusicIndex', musicCurrentIndex);
        localStorage.setItem('bgMusicTime_' + musicCurrentIndex, '0');
        playMusic();
    });
    setInterval(() => { if (!bgAudio.paused && musicPlaylist.length > 0) { localStorage.setItem('bgMusicIndex', musicCurrentIndex); localStorage.setItem('bgMusicTime_' + musicCurrentIndex, bgAudio.currentTime); } }, 500);
    checkMusic();
    setInterval(checkMusic, 2000);

    function n(m, t = "success") { const e = document.getElementById("notif"); e.textContent = m; e.style.background = t === "success" ? "#2ecc71" : "#e74c3c"; e.style.display = "block"; setTimeout(() => e.style.display = "none", 3000); }
    function togglePass(i, b) { const inp = document.getElementById(i), ic = b.querySelector('i'); if (inp.type === 'password') { inp.type = 'text'; ic.className = 'fas fa-eye-slash'; } else { inp.type = 'password'; ic.className = 'fas fa-eye'; } }
    async function chPass() { const t = document.getElementById("passType").value, cp = document.getElementById("curPass").value, np = document.getElementById("newPass").value; if (!cp || !np) return n("Fill all fields", "error"); try { const r = await fetch("/api/change_password", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ token: localStorage.getItem("auth_token"), type: t, cp: cp, np: np }) }); const d = await r.json(); d.success ? n("✅ Password Changed!") : n(d.message || "Error", "error"); } catch(e) { n("Connection error", "error"); } }
</script>
</body>
</html>
