<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top Up - MLBB Security</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0c0e27;--p:#1a1f4b;--a:#4a1c7a;--w:#f39c12;--t:#fff}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);min-height:100vh;padding:15px}
        .container{max-width:500px;margin:0 auto}
        .header{text-align:center;margin-bottom:20px}
        .header h1{font-size:20px;color:var(--w)}
        .header p{font-size:12px;color:rgba(255,255,255,0.6)}
        .wallet{background:rgba(26,31,75,0.8);padding:15px;border-radius:10px;text-align:center;margin-bottom:15px;border:1px solid var(--w)}
        .wallet span{font-size:24px;font-weight:bold;color:var(--w)}
        .tabs{display:flex;gap:5px;margin-bottom:15px}
        .tab{flex:1;padding:10px;text-align:center;background:rgba(0,0,0,0.3);border-radius:6px;font-size:12px;cursor:pointer;color:var(--t)}
        .tab.active{background:var(--a);color:var(--w)}
        .games{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:15px}
        .game-card{background:rgba(26,31,75,0.6);border-radius:10px;padding:15px 10px;text-align:center;cursor:pointer;border:1px solid rgba(255,255,255,0.1);transition:all 0.3s}
        .game-card:hover{background:rgba(74,28,122,0.4);border-color:var(--w)}
        .game-card img{width:50px;height:50px;border-radius:10px;margin-bottom:8px;background:rgba(255,255,255,0.1);object-fit:cover}
        .game-card p{font-size:11px;color:var(--t);margin-top:5px}
        .back-btn{display:block;padding:10px;background:var(--a);color:var(--t);text-align:center;border-radius:6px;text-decoration:none;font-size:13px;margin-top:10px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-wallet"></i> Top Up</h1>
            <p>Game Top-Up Center</p>
        </div>
        
        <div class="wallet">
            <span>389 ks</span>
            <p style="font-size:11px;color:rgba(255,255,255,0.6)">Your Wallet</p>
        </div>
        
        <div class="tabs">
            <div class="tab active">Top-up</div>
            <div class="tab">Order History</div>
            <div class="tab">Top-up History</div>
        </div>
        
        <p style="font-size:13px;color:var(--w);margin-bottom:10px"><i class="fas fa-gamepad"></i> Popular Games</p>
        
        <div class="games">
            <!-- 1. Mobile Legends -->
            <div class="game-card">
                <img src="https://i.ibb.co/XkST52ZT/9dad5c0fde6524c0fcffbb3b6060adf8.jpg" alt="MLBB">
                <p>Mobile Legends</p>
            </div>
            
            <!-- 2. Free Fire -->
            <div class="game-card">
                <img src="https://i.ibb.co/4zkNbBS/ef4811fc15f5f2ae70418dcbca37356e.jpg" alt="Free Fire">
                <p>Free Fire</p>
            </div>
            
            <!-- 3. PUBG Mobile -->
            <div class="game-card">
                <img src="https://i.ibb.co/ccpjJN58/6cff530cefe3c08a01e01353e676d3ad.jpg" alt="PUBG">
                <p>PUBG Mobile</p>
            </div>
            
            <!-- 4. Telegram Premium -->
            <div class="game-card">
                <img src="https://i.ibb.co/7N6f55b7/9180e0981da12d5c8a99f27615efeac4.jpg" alt="Telegram">
                <p>Telegram Premium</p>
            </div>
            
            <!-- 5. Facebook -->
            <div class="game-card">
                <img src="https://i.ibb.co/ns7PKfZM/37d52a6553fd1f2b89bce60fe80bd461.jpg" alt="Facebook">
                <p>Facebook</p>
            </div>
            
            <!-- 6. TikTok -->
            <div class="game-card">
                <img src="https://i.ibb.co/pjW4xzKR/8664a29ebba03efa6cd56aca834079f7.jpg" alt="TikTok">
                <p>TikTok</p>
            </div>
            
            <!-- 7. Honor Of Kings -->
            <div class="game-card">
                <img src="https://i.ibb.co/VcX4s8zY/e4597b399a7fe0d3af3af2f16461f647.jpg" alt="Honor Of Kings">
                <p>Honor Of Kings</p>
            </div>
            
            <!-- 8. eFootball -->
            <div class="game-card">
                <img src="https://i.ibb.co/qLPrhJcV/9ee84ac645044402290fdb4945de89bd.jpg" alt="eFootball">
                <p>eFootball</p>
            </div>
            
            <!-- 9. Clash Of Clans -->
            <div class="game-card">
                <img src="https://i.ibb.co/JRD9DRkm/77d65d4a45bb4480df342081a1236ca1.jpg" alt="Clash Of Clans">
                <p>Clash Of Clans</p>
            </div>
        </div>
        
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</body>
</html>
