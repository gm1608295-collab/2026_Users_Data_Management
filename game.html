<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍄 SUPER SOLO RUN - SOLO M Game Shop</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --w: #f39c12;
            --r: #e74c3c;
            --g: #2ecc71;
            --b: #3498db;
            --t: #fff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            background: linear-gradient(180deg, #5c94fc 0%, #87CEEB 40%, #90EE90 80%, #8B4513 100%);
            border: 3px solid #f39c12;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(243,156,18,0.3);
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }
        
        #hud {
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 5px;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }
        .hud-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .hud-item .icon {
            font-size: 16px;
        }
        
        #mobileControls {
            display: none;
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            padding: 0 10px;
            z-index: 10;
        }
        
        .ctrl-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .dpad {
            display: grid;
            grid-template-columns: 45px 45px 45px;
            grid-template-rows: 45px 45px 45px;
            gap: 3px;
        }
        .dpad button {
            width: 45px;
            height: 45px;
            border: 2px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            color: #fff;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            touch-action: manipulation;
        }
        .dpad button:active {
            background: rgba(243,156,18,0.4);
            border-color: #f39c12;
        }
        .dpad .empty {
            background: transparent;
            border: none;
            pointer-events: none;
        }
        .dpad .up {
            grid-column: 2;
            grid-row: 1;
        }
        .dpad .left {
            grid-column: 1;
            grid-row: 2;
        }
        .dpad .right {
            grid-column: 3;
            grid-row: 2;
        }
        .dpad .down {
            grid-column: 2;
            grid-row: 3;
        }
        
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .action-btns button {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 3px solid #f39c12;
            background: rgba(243,156,18,0.3);
            color: #f39c12;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
        }
        .action-btns button:active {
            background: rgba(243,156,18,0.7);
            color: #000;
        }
        
        #startScreen, #gameOverScreen, #winScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            z-index: 20;
            color: #fff;
            text-align: center;
        }
        
        #startScreen h1 {
            font-size: 28px;
            color: #f39c12;
            margin-bottom: 10px;
            text-shadow: 2px 2px #000;
        }
        #startScreen p {
            font-size: 12px;
            color: #ccc;
            margin: 5px 0;
        }
        #startScreen .btn, #gameOverScreen .btn, #winScreen .btn {
            padding: 12px 30px;
            background: #f39c12;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(243,156,18,0.5);
        }
        
        #gameOverScreen h2 {
            color: #e74c3c;
            font-size: 24px;
        }
        #winScreen h2 {
            color: #2ecc71;
            font-size: 24px;
        }
        
        @media (max-width: 600px) {
            #mobileControls {
                display: block;
            }
            #gameContainer {
                aspect-ratio: auto;
                height: 100vh;
                border-radius: 0;
                border: none;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="hud">
            <div class="hud-item"><span class="icon">🌍</span> <span id="hudLevel">1-1</span></div>
            <div class="hud-item"><span class="icon">⏱️</span> <span id="hudTime">99</span></div>
            <div class="hud-item"><span class="icon">🪙</span> <span id="hudCoins">0</span></div>
            <div class="hud-item"><span class="icon">💎</span> <span id="hudDiamonds">0</span></div>
            <div class="hud-item"><span class="icon">🏆</span> <span id="hudScore">0</span></div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="mobileControls">
            <div class="ctrl-row">
                <div class="dpad">
                    <div class="empty"></div>
                    <button class="up" ontouchstart="keys.ArrowUp=true" ontouchend="keys.ArrowUp=false" onmousedown="keys.ArrowUp=true" onmouseup="keys.ArrowUp=false">▲</button>
                    <div class="empty"></div>
                    <button class="left" ontouchstart="keys.ArrowLeft=true" ontouchend="keys.ArrowLeft=false" onmousedown="keys.ArrowLeft=true" onmouseup="keys.ArrowLeft=false">◄</button>
                    <div class="empty"></div>
                    <button class="right" ontouchstart="keys.ArrowRight=true" ontouchend="keys.ArrowRight=false" onmousedown="keys.ArrowRight=true" onmouseup="keys.ArrowRight=false">►</button>
                </div>
                <div class="action-btns">
                    <button ontouchstart="keys.Space=true" ontouchend="keys.Space=false" onmousedown="keys.Space=true" onmouseup="keys.Space=false">JUMP</button>
                </div>
            </div>
        </div>
        
        <div id="startScreen">
            <h1>🍄 SUPER SOLO RUN</h1>
            <p>⬅️➡️ Move | ⬆️ Jump | ⬆️⬆️ Double Jump</p>
            <p>Stomp enemies 🧟 | Collect coins 🪙 | Reach the flag 🏁</p>
            <p style="margin-top:10px;font-size:10px;color:#aaa">🖥️ Arrow Keys + Space | 📱 Touch Controls</p>
            <button class="btn" onclick="startGame()">▶️ START GAME</button>
        </div>
        
        <div id="gameOverScreen" style="display:none">
            <h2>💀 GAME OVER</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <p>Level: <span id="finalLevel">1-1</span></p>
            <button class="btn" onclick="restartGame()">🔄 TRY AGAIN</button>
        </div>
        
        <div id="winScreen" style="display:none">
            <h2>🎉 VICTORY!</h2>
            <p>You completed all levels!</p>
            <p>Total Score: <span id="winScore">0</span></p>
            <p>Diamonds: <span id="winDiamonds">0</span></p>
            <button class="btn" onclick="restartGame()">🔄 PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // ==================== GAME ENGINE ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Canvas Size
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 600;
        const GROUND_Y = 500;
        const GRAVITY = 0.6;
        
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        
        // Input
        const keys = {};
        document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
        document.addEventListener('keyup', e => { keys[e.key] = false; e.preventDefault(); });
        
        // Game State
        let gameRunning = false;
        let gamePaused = false;
        let currentLevel = 0;
        let score = 0;
        let coins = 0;
        let diamonds = 0;
        let timeLeft = 99;
        let timerInterval;
        let playerLives = 3;
        let enemyKills = 0;
        
        // Player
        const player = {
            x: 100,
            y: GROUND_Y - 40,
            width: 30,
            height: 40,
            vx: 0,
            vy: 0,
            speed: 4,
            jumpForce: -12,
            doubleJump: true,
            canDoubleJump: false,
            onGround: false,
            isBig: false,
            invincible: false,
            invincibleTimer: 0,
            facing: 1,
            color: '#3498db'
        };
        
        // Level Data
        const levels = [
            { // Level 1-1
                name: '1-1',
                bg: '#5c94fc',
                platforms: [
                    { x: 200, y: 420, w: 120, h: 20 },
                    { x: 400, y: 350, w: 100, h: 20 },
                    { x: 550, y: 280, w: 100, h: 20 },
                    { x: 700, y: 400, w: 100, h: 20 },
                    { x: 900, y: 350, w: 120, h: 20 },
                    { x: 1100, y: 300, w: 100, h: 20 },
                ],
                mysteryBoxes: [
                    { x: 250, y: 350, item: 'coin' },
                    { x: 500, y: 250, item: 'mushroom' },
                    { x: 800, y: 300, item: 'star' },
                    { x: 1000, y: 250, item: 'diamond' },
                ],
                coins: [
                    { x: 300, y: 380 }, { x: 320, y: 360 }, { x: 340, y: 340 },
                    { x: 600, y: 240 }, { x: 630, y: 240 }, { x: 660, y: 240 },
                    { x: 850, y: 300 }, { x: 880, y: 300 },
                ],
                enemies: [
                    { x: 350, y: GROUND_Y - 30, type: 'goomba' },
                    { x: 650, y: GROUND_Y - 30, type: 'goomba' },
                    { x: 950, y: GROUND_Y - 30, type: 'koopa' },
                ],
                flagX: 1300,
                timeLimit: 99
            },
            { // Level 1-2
                name: '1-2',
                bg: '#4a6cf7',
                platforms: [
                    { x: 150, y: 400, w: 80, h: 20 },
                    { x: 300, y: 320, w: 100, h: 20 },
                    { x: 450, y: 420, w: 80, h: 20 },
                    { x: 600, y: 300, w: 100, h: 20 },
                    { x: 750, y: 400, w: 80, h: 20 },
                    { x: 900, y: 280, w: 120, h: 20 },
                    { x: 1050, y: 380, w: 100, h: 20 },
                ],
                mysteryBoxes: [
                    { x: 350, y: 280, item: 'coin' },
                    { x: 550, y: 250, item: 'mushroom' },
                    { x: 750, y: 300, item: 'star' },
                    { x: 950, y: 250, item: 'diamond' },
                ],
                coins: [
                    { x: 200, y: 350 }, { x: 220, y: 350 },
                    { x: 500, y: 250 }, { x: 530, y: 250 },
                    { x: 800, y: 300 }, { x: 830, y: 280 },
                    { x: 1000, y: 250 }, { x: 1030, y: 250 },
                ],
                enemies: [
                    { x: 280, y: GROUND_Y - 30, type: 'goomba' },
                    { x: 500, y: GROUND_Y - 30, type: 'koopa' },
                    { x: 800, y: GROUND_Y - 30, type: 'goomba' },
                    { x: 1000, y: GROUND_Y - 30, type: 'goomba' },
                ],
                flagX: 1200,
                timeLimit: 89
            },
            { // Level 1-3
                name: '1-3',
                bg: '#3b5de7',
                platforms: [
                    { x: 100, y: 380, w: 80, h: 20 },
                    { x: 250, y: 300, w: 80, h: 20 },
                    { x: 400, y: 350, w: 100, h: 20 },
                    { x: 550, y: 250, w: 80, h: 20 },
                    { x: 700, y: 380, w: 100, h: 20 },
                    { x: 850, y: 280, w: 80, h: 20 },
                    { x: 1000, y: 350, w: 120, h: 20 },
                ],
                mysteryBoxes: [
                    { x: 300, y: 250, item: 'mushroom' },
                    { x: 500, y: 280, item: 'star' },
                    { x: 750, y: 300, item: 'diamond' },
                    { x: 950, y: 250, item: 'coin' },
                ],
                coins: [
                    { x: 350, y: 250 }, { x: 380, y: 250 },
                    { x: 600, y: 200 }, { x: 630, y: 200 },
                    { x: 900, y: 250 }, { x: 930, y: 230 },
                ],
                enemies: [
                    { x: 200, y: GROUND_Y - 30, type: 'goomba' },
                    { x: 450, y: GROUND_Y - 30, type: 'goomba' },
                    { x: 650, y: GROUND_Y - 30, type: 'koopa' },
                    { x: 850, y: GROUND_Y - 30, type: 'goomba' },
                    { x: 1050, y: GROUND_Y - 30, type: 'koopa' },
                ],
                flagX: 1200,
                timeLimit: 79
            },
            { // Level 1-4
                name: '1-4',
                bg: '#2a4ad4',
                platforms: [
                    { x: 120, y: 400, w: 70, h: 20 },
                    { x: 220, y: 330, w: 70, h: 20 },
                    { x: 350, y: 400, w: 80, h: 20 },
                    { x: 480, y: 300, w: 90, h: 20 },
                    { x: 620, y: 400, w: 80, h: 20 },
                    { x: 750, y: 280, w: 80, h: 20 },
                    { x: 880, y: 380, w: 100, h: 20 },
                ],
                mysteryBoxes: [
                    { x: 280, y: 320, item: 'star' },
                    { x: 450, y: 280, item: 'mushroom' },
                    { x: 650, y: 300, item: 'diamond' },
                    { x: 850, y: 250, item: 'coin' },
                ],
                coins: [ { x: 400, y: 300 }, { x: 430, y: 280 }, { x: 700, y: 300 }, { x: 730, y: 280 } ],
                enemies: [
                    { x: 300, y: GROUND_Y - 30, type: 'koopa' },
                    { x: 550, y: GROUND_Y - 30, type: 'goomba' },
                    { x: 700, y: GROUND_Y - 30, type: 'koopa' },
                    { x: 950, y: GROUND_Y - 30, type: 'goomba' },
                ],
                flagX: 1100,
                timeLimit: 69
            },
            { // Level 1-5 (BOSS)
                name: '1-5',
                bg: '#1a3abc',
                platforms: [
                    { x: 150, y: 380, w: 100, h: 20 },
                    { x: 350, y: 350, w: 100, h: 20 },
                    { x: 550, y: 380, w: 100, h: 20 },
                ],
                mysteryBoxes: [
                    { x: 400, y: 300, item: 'star' },
                    { x: 600, y: 300, item: 'mushroom' },
                ],
                coins: [ { x: 250, y: 300 }, { x: 500, y: 300 } ],
                enemies: [
                    { x: 600, y: GROUND_Y - 50, type: 'boss' },
                ],
                flagX: 800,
                timeLimit: 60
            }
        ];
        
        let platforms = [];
        let mysteryBoxes = [];
        let coinItems = [];
        let enemies = [];
        let flagX = 800;
        let collectedMysteryBoxes = [];
        let cameraX = 0;
        let particles = [];
        
        // Initialize Level
        function initLevel(levelIndex) {
            if (levelIndex >= levels.length) {
                // Win!
                winGame();
                return;
            }
            
            const level = levels[levelIndex];
            currentLevel = levelIndex;
            
            // Copy level data
            platforms = level.platforms.map(p => ({ ...p }));
            mysteryBoxes = level.mysteryBoxes.map(b => ({ ...b, collected: false }));
            coinItems = level.coins.map(c => ({ ...c, collected: false }));
            enemies = level.enemies.map(e => ({ 
                ...e, 
                vx: e.type === 'koopa' ? -1 : (Math.random() > 0.5 ? 1 : -1) * 1.5,
                vy: 0,
                alive: true,
                stomped: false,
                stompTimer: 0,
                hp: e.type === 'boss' ? 5 : (e.type === 'koopa' ? 2 : 1)
            }));
            flagX = level.flagX;
            timeLeft = level.timeLimit;
            collectedMysteryBoxes = [];
            particles = [];
            
            // Reset player
            player.x = 100;
            player.y = GROUND_Y - player.height;
            player.vx = 0;
            player.vy = 0;
            player.onGround = false;
            player.doubleJump = true;
            player.canDoubleJump = false;
            player.isBig = false;
            player.invincible = false;
            player.invincibleTimer = 0;
            player.width = 30;
            player.height = 40;
            player.color = '#3498db';
            
            cameraX = 0;
            document.getElementById('hudLevel').textContent = level.name;
            document.getElementById('hudTime').textContent = timeLeft;
        }
        
        // Start Game
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('winScreen').style.display = 'none';
            
            score = 0;
            coins = 0;
            diamonds = 0;
            playerLives = 3;
            enemyKills = 0;
            currentLevel = 0;
            
            initLevel(0);
            gameRunning = true;
            updateHUD();
            
            // Start timer
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameRunning && !gamePaused) {
                    timeLeft--;
                    document.getElementById('hudTime').textContent = timeLeft;
                    if (timeLeft <= 0) {
                        playerDie();
                    }
                }
            }, 1000);
        }
        
        function restartGame() {
            startGame();
        }
        
        function winGame() {
            gameRunning = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('winScore').textContent = score;
            document.getElementById('winDiamonds').textContent = diamonds;
            document.getElementById('winScreen').style.display = 'flex';
            
            // Save to backend
            saveScoreToDB();
        }
        
        function playerDie() {
            playerLives--;
            if (playerLives <= 0) {
                gameOver();
                return;
            }
            
            // Reset level
            player.invincible = true;
            player.invincibleTimer = 90;
            initLevel(currentLevel);
            updateHUD();
        }
        
        function gameOver() {
            gameRunning = false;
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalLevel').textContent = levels[currentLevel].name;
            document.getElementById('gameOverScreen').style.display = 'flex';
            
            // Save score
            saveScoreToDB();
        }
        
        async function saveScoreToDB() {
            const deviceId = localStorage.getItem('game_device_id') || 'guest_' + Date.now();
            if (!localStorage.getItem('game_device_id')) {
                localStorage.setItem('game_device_id', deviceId);
            }
            
            try {
                await fetch('/api/game/save_score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_id: deviceId,
                        score: score,
                        gold_earned: coins,
                        waves_completed: currentLevel + 1,
                        kills: enemyKills,
                        deaths: 3 - playerLives,
                        hero_used: 'Solo Runner'
                    })
                });
            } catch(e) {}
        }
        
        function updateHUD() {
            document.getElementById('hudCoins').textContent = coins;
            document.getElementById('hudDiamonds').textContent = diamonds;
            document.getElementById('hudScore').textContent = score;
        }
        
        // Collision Detection
        function rectCollide(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
        }
        
        function collectItem(item, type) {
            if (type === 'coin') {
                coins += 1;
                score += 100;
                addParticles(item.x, item.y, '#f39c12', 8);
            } else if (type === 'diamond') {
                diamonds += 1;
                score += 500;
                addParticles(item.x, item.y, '#3498db', 15);
            } else if (type === 'mushroom') {
                if (!player.isBig) {
                    player.isBig = true;
                    player.height = 50;
                    player.y -= 10;
                }
                score += 200;
                addParticles(item.x, item.y, '#e74c3c', 12);
            } else if (type === 'star') {
                player.invincible = true;
                player.invincibleTimer = 180;
                player.color = '#ffdd00';
                score += 300;
                addParticles(item.x, item.y, '#ffdd00', 20);
            }
            updateHUD();
        }
        
        function addParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x + Math.random() * 20,
                    y: y + Math.random() * 20,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 1) * -5,
                    life: 30 + Math.random() * 20,
                    color: color,
                    size: 2 + Math.random() * 3
                });
            }
        }
        
        // Update
        function update() {
            if (!gameRunning || gamePaused) return;
            
            // Player Movement
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                player.vx = -player.speed;
                player.facing = -1;
            } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                player.vx = player.speed;
                player.facing = 1;
            } else {
                player.vx *= 0.8;
            }
            
            // Jump
            if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' '] || keys['Space']) && player.onGround) {
                player.vy = player.jumpForce;
                player.onGround = false;
                player.canDoubleJump = true;
            } else if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' '] || keys['Space']) && !player.onGround && player.canDoubleJump && player.doubleJump) {
                player.vy = player.jumpForce * 0.8;
                player.canDoubleJump = false;
                player.doubleJump = false;
                addParticles(player.x + player.width/2, player.y + player.height, '#fff', 5);
            }
            
            // Gravity
            player.vy += GRAVITY;
            if (player.vy > 15) player.vy = 15;
            
            // Apply movement
            player.x += player.vx;
            player.y += player.vy;
            
            // Ground collision
            player.onGround = false;
            if (player.y + player.height >= GROUND_Y) {
                player.y = GROUND_Y - player.height;
                player.vy = 0;
                player.onGround = true;
                player.doubleJump = true;
            }
            
            // Platform collision
            platforms.forEach(p => {
                if (player.vy > 0 && player.x + player.width > p.x && player.x < p.x + p.w &&
                    player.y + player.height >= p.y && player.y + player.height - player.vy <= p.y) {
                    player.y = p.y - player.height;
                    player.vy = 0;
                    player.onGround = true;
                    player.doubleJump = true;
                }
            });
            
            // Keep player in bounds
            if (player.x < 0) player.x = 0;
            if (player.y > GAME_HEIGHT + 50) playerDie();
            
            // Camera
            const targetCamX = player.x - GAME_WIDTH / 3;
            cameraX += (targetCamX - cameraX) * 0.1;
            if (cameraX < 0) cameraX = 0;
            
            // Check Mystery Boxes
            mysteryBoxes.forEach(box => {
                if (!box.collected && rectCollide(
                    { x: player.x, y: player.y, w: player.width, h: player.height },
                    { x: box.x, y: box.y - 30, w: 30, h: 30 }
                )) {
                    box.collected = true;
                    collectItem(box, box.item);
                    collectedMysteryBoxes.push(box);
                }
            });
            
            // Check Coins
            coinItems.forEach(coin => {
                if (!coin.collected) {
                    const dist = Math.hypot(player.x + player.width/2 - coin.x, player.y + player.height/2 - coin.y);
                    if (dist < 30) {
                        coin.collected = true;
                        collectItem(coin, 'coin');
                    }
                }
            });
            
            // Update Enemies
            enemies.forEach(enemy => {
                if (!enemy.alive) return;
                
                if (enemy.stomped) {
                    enemy.stompTimer--;
                    if (enemy.stompTimer <= 0) {
                        enemy.alive = false;
                    }
                    return;
                }
                
                // Enemy AI
                if (enemy.type === 'boss') {
                    // Boss moves toward player
                    if (player.x < enemy.x) enemy.vx = -2;
                    else enemy.vx = 2;
                } else {
                    // Simple patrol
                    enemy.x += enemy.vx;
                    if (enemy.x < cameraX || enemy.x > cameraX + GAME_WIDTH + 200) {
                        enemy.vx *= -1;
                    }
                }
                enemy.y = GROUND_Y - (enemy.type === 'boss' ? 50 : 30);
                
                // Enemy collides with player
                if (rectCollide(
                    { x: player.x, y: player.y, w: player.width, h: player.height },
                    { x: enemy.x, y: enemy.y, w: 30, h: enemy.type === 'boss' ? 50 : 30 }
                )) {
                    if (player.vy > 0 && player.y + player.height - player.vy <= enemy.y) {
                        // Player stomped enemy
                        enemy.hp--;
                        player.vy = -8;
                        if (enemy.hp <= 0) {
                            enemy.stomped = true;
                            enemy.stompTimer = 20;
                            enemyKills++;
                            score += enemy.type === 'boss' ? 5000 : (enemy.type === 'koopa' ? 500 : 200);
                            addParticles(enemy.x, enemy.y, '#e74c3c', 15);
                            updateHUD();
                        }
                    } else if (!player.invincible) {
                        playerDie();
                    }
                }
            });
            
            // Invincibility Timer
            if (player.invincible) {
                player.invincibleTimer--;
                if (player.invincibleTimer <= 0) {
                    player.invincible = false;
                    player.color = '#3498db';
                }
            }
            
            // Check Flag
            if (player.x > flagX) {
                score += timeLeft * 10;
                updateHUD();
                initLevel(currentLevel + 1);
                updateHUD();
            }
            
            // Update Particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life--;
                return p.life > 0;
            });
        }
        
        // Render
        function render() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // Background
            const gradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            gradient.addColorStop(0, '#5c94fc');
            gradient.addColorStop(0.5, '#87CEEB');
            gradient.addColorStop(1, '#90EE90');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // Clouds (parallax)
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            for (let i = 0; i < 6; i++) {
                const cloudX = ((i * 200) - cameraX * 0.3) % (GAME_WIDTH + 200) - 100;
                const cloudY = 40 + (i % 3) * 50;
                ctx.beginPath();
                ctx.arc(cloudX, cloudY, 25, 0, Math.PI * 2);
                ctx.arc(cloudX + 25, cloudY - 10, 20, 0, Math.PI * 2);
                ctx.arc(cloudX + 50, cloudY, 25, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Mountains (parallax)
            ctx.fillStyle = '#6B8E23';
            for (let i = 0; i < 8; i++) {
                const mx = ((i * 150) - cameraX * 0.5) % (GAME_WIDTH + 300) - 150;
                ctx.beginPath();
                ctx.moveTo(mx, GROUND_Y);
                ctx.lineTo(mx + 60, GROUND_Y - 80);
                ctx.lineTo(mx + 120, GROUND_Y);
                ctx.fill();
            }
            
            // Ground
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(0, GROUND_Y, GAME_WIDTH, GAME_HEIGHT - GROUND_Y);
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, GROUND_Y, GAME_WIDTH, 5);
            
            // Platforms
            platforms.forEach(p => {
                const px = p.x - cameraX;
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(px, p.y, p.w, p.h);
                ctx.fillStyle = '#228B22';
                ctx.fillRect(px, p.y - 3, p.w, 5);
            });
            
            // Mystery Boxes
            mysteryBoxes.forEach(box => {
                if (box.collected) return;
                const bx = box.x - cameraX;
                ctx.fillStyle = '#f39c12';
                ctx.fillRect(bx, box.y - 30, 30, 30);
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.fillText('?', bx + 8, box.y - 5);
                // Border
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.strokeRect(bx, box.y - 30, 30, 30);
            });
            
            // Coins
            coinItems.forEach(coin => {
                if (coin.collected) return;
                const cx = coin.x - cameraX;
                const cy = coin.y + Math.sin(Date.now() / 500 + coin.x) * 5;
                ctx.fillStyle = '#f39c12';
                ctx.beginPath();
                ctx.arc(cx, cy, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.fillText('$', cx - 4, cy + 4);
            });
            
            // Enemies
            enemies.forEach(enemy => {
                if (!enemy.alive && !enemy.stomped) return;
                const ex = enemy.x - cameraX;
                const ey = enemy.y;
                
                if (enemy.type === 'goomba') {
                    ctx.fillStyle = enemy.stomped ? '#555' : '#8B4513';
                    ctx.fillRect(ex, ey, 30, 20);
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(ex + 5, ey + 3, 8, 6); // Eyes
                    ctx.fillRect(ex + 17, ey + 3, 8, 6);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(ex + 8, ey + 5, 3, 3);
                    ctx.fillRect(ex + 20, ey + 5, 3, 3);
                } else if (enemy.type === 'koopa') {
                    ctx.fillStyle = enemy.stomped ? '#555' : '#2ecc71';
                    const shellY = enemy.stomped ? ey + 10 : ey;
                    ctx.fillRect(ex, shellY, 30, enemy.stomped ? 10 : 25);
                    if (!enemy.stomped) {
                        ctx.fillStyle = '#f39c12';
                        ctx.fillRect(ex + 5, ey + 3, 8, 8); // Head
                        ctx.fillStyle = '#000';
                        ctx.fillRect(ex + 8, ey + 5, 2, 2);
                        ctx.fillRect(ex + 13, ey + 5, 2, 2);
                    }
                } else if (enemy.type === 'boss') {
                    ctx.fillStyle = '#e74c3c';
                    ctx.fillRect(ex, ey, 50, 50);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(ex + 10, ey + 10, 10, 10); // Eyes
                    ctx.fillRect(ex + 30, ey + 10, 10, 10);
                    // HP bar
                    ctx.fillStyle = '#e74c3c';
                    ctx.fillRect(ex, ey - 15, 50, 8);
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(ex, ey - 15, 50 * (enemy.hp / 5), 8);
                }
            });
            
            // Player
            const px = player.x - cameraX;
            const py = player.y;
            
            // Flash when invincible
            if (!player.invincible || Math.floor(Date.now() / 100) % 2 === 0) {
                // Body
                ctx.fillStyle = player.color;
                ctx.fillRect(px, py, player.width, player.height);
                
                // Head
                ctx.fillStyle = '#FFD700';
                ctx.fillRect(px + 5, py - 8, 20, 12);
                
                // Eyes
                ctx.fillStyle = '#000';
                if (player.facing > 0) {
                    ctx.fillRect(px + 18, py + 5, 4, 6);
                    ctx.fillRect(px + 24, py + 5, 4, 6);
                } else {
                    ctx.fillRect(px + 2, py + 5, 4, 6);
                    ctx.fillRect(px + 8, py + 5, 4, 6);
                }
                
                // Cape
                ctx.fillStyle = '#e74c3c';
                ctx.fillRect(px + 5, py + 20, 20, 8);
            }
            
            // Flag
            const fx = flagX - cameraX;
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(fx, GROUND_Y - 120, 4, 120);
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            ctx.moveTo(fx, GROUND_Y - 120);
            ctx.lineTo(fx + 30, GROUND_Y - 100);
            ctx.lineTo(fx, GROUND_Y - 80);
            ctx.fill();
            ctx.fillStyle = '#f39c12';
            ctx.beginPath();
            ctx.arc(fx + 2, GROUND_Y - 120, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 50;
                ctx.fillRect(p.x - cameraX, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;
            
            // HUD Lives
            ctx.font = '14px Arial';
            ctx.fillStyle = '#fff';
            for (let i = 0; i < playerLives; i++) {
                ctx.fillText('❤️', GAME_WIDTH - 80 + i * 25, 20);
            }
        }
        
        // Game Loop
        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }
        
        // Handle Resize
        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const rect = container.getBoundingClientRect();
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
        
        // Start Game Loop
        resizeCanvas();
        gameLoop();
    </script>
</body>
</html>
