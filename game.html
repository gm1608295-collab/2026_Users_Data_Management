<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Spin - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0a0a1a;--p:#1a1f4b;--a:#4a1c7a;--r:#e74c3c;--g:#2ecc71;--w:#f39c12;--b:#3498db;--t:#fff;--usd:#85bb65}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        html,body{height:100%;overflow:hidden;position:fixed;width:100%}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);display:flex;justify-content:center;align-items:center;padding:10px}
        .container{width:100%;max-width:450px;display:flex;flex-direction:column;align-items:center;gap:10px}
        
        /* Header */
        .header{display:flex;align-items:center;gap:10px;width:100%;background:linear-gradient(to right,var(--a),var(--p));padding:10px 15px;border-radius:12px;border-bottom:3px solid var(--w)}
        .header a{color:var(--w);font-size:20px;text-decoration:none;flex-shrink:0}
        .header h2{color:var(--w);font-size:15px;font-weight:700;flex:1;text-align:center}
        
        /* Balance Bar */
        .balance-bar{display:flex;gap:8px;width:100%}
        .bal-card{flex:1;background:rgba(26,31,75,0.7);border-radius:8px;padding:8px;text-align:center;border:1px solid rgba(255,255,255,0.1)}
        .bal-card .bal-label{font-size:8px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px}
        .bal-card .bal-value{font-size:16px;font-weight:bold;color:var(--w)}
        .bal-card.usd .bal-value{color:var(--usd)}
        
        /* Wheel */
        .wheel-wrapper{position:relative;width:260px;height:260px;margin:0 auto}
        .wheel-pointer{position:absolute;top:-12px;left:50%;transform:translateX(-50%);z-index:10;font-size:28px;color:var(--w);filter:drop-shadow(0 0 5px rgba(0,0,0,0.5))}
        canvas#wheelCanvas{width:260px;height:260px;border-radius:50%;box-shadow:0 0 25px rgba(243,156,18,0.3),0 0 50px rgba(74,28,122,0.5),inset 0 0 15px rgba(0,0,0,0.3);border:4px solid var(--w)}
        
        /* Timer */
        .timer-display{font-size:11px;color:rgba(255,255,255,0.6);text-align:center;font-family:'Courier New',monospace;min-height:16px}
        .timer-display.spinning{color:var(--w);animation:pulse 0.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        
        /* Spin Button */
        .spin-btn{padding:10px 40px;border:none;border-radius:25px;font-size:14px;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,var(--w),#e67e22);color:#000;letter-spacing:1px;transition:all 0.3s;text-transform:uppercase;box-shadow:0 4px 15px rgba(243,156,18,0.3)}
        .spin-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(243,156,18,0.5)}
        .spin-btn:active{transform:scale(0.95)}
        .spin-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;background:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5)}
        .spin-info{font-size:9px;color:rgba(255,255,255,0.4);text-align:center;margin-top:2px}
        
        /* Result Modal */
        .result-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;justify-content:center;align-items:center}
        .result-overlay.active{display:flex}
        .result-box{background:var(--p);border:3px solid var(--w);border-radius:20px;padding:25px;text-align:center;width:90%;max-width:330px;animation:popIn 0.5s ease}
        @keyframes popIn{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
        .result-box .result-icon{font-size:50px;margin-bottom:8px}
        .result-box .result-text{font-size:18px;font-weight:bold;color:var(--w);margin-bottom:5px}
        .result-box .result-amount{font-size:26px;font-weight:bold;color:var(--g);margin-bottom:12px}
        .btn-close{padding:10px 30px;border:none;border-radius:25px;font-size:14px;font-weight:bold;cursor:pointer;background:var(--g);color:#000}
        
        /* Toast */
        .toast{position:fixed;top:15px;right:15px;padding:10px 15px;border-radius:6px;z-index:9999;font-size:11px;font-weight:bold;animation:slideIn 0.3s ease;display:none}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="/dashboard"><i class="fas fa-arrow-left"></i></a>
            <h2>🎰 Lucky Spin</h2>
        </div>
        
        <!-- Balance -->
        <div class="balance-bar">
            <div class="bal-card usd">
                <div class="bal-label">💵 USD</div>
                <div class="bal-value" id="usdBalance">$0.00</div>
            </div>
            <div class="bal-card">
                <div class="bal-label">💰 MMK</div>
                <div class="bal-value" id="mmkBalance">0 Ks</div>
            </div>
        </div>
        
        <!-- Wheel -->
        <div class="wheel-wrapper">
            <div class="wheel-pointer"><i class="fas fa-caret-down"></i></div>
            <canvas id="wheelCanvas" width="520" height="520"></canvas>
        </div>
        
        <!-- Timer -->
        <div class="timer-display" id="timerDisplay">🎰 Ready to spin!</div>
        
        <!-- Spin Button -->
        <button class="spin-btn" id="spinBtn" onclick="startSpin()">🎰 SPIN</button>
        <div class="spin-info" id="spinInfo">1 free spin daily • Resets at midnight</div>
    </div>
    
    <!-- Result Modal -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-box">
            <div class="result-icon" id="resultIcon">🎉</div>
            <div class="result-text" id="resultText"></div>
            <div class="result-amount" id="resultAmount"></div>
            <button class="btn-close" onclick="closeResult()">OK</button>
        </div>
    </div>

<script>
    // ==================== CONFIG ====================
    // Segments with probabilities (weights)
    const SEGMENTS = [
        { label: '$0.25',  color: '#e74c3c', reward: 0.25, type: 'usd',   weight: 15 },    // 15%
        { label: '$0.75',  color: '#3498db', reward: 0.75, type: 'usd',   weight: 13 },    // 13%
        { label: '$1.00',  color: '#2ecc71', reward: 1.00, type: 'usd',   weight: 10 },    // 10%
        { label: '$2.00',  color: '#9b59b6', reward: 2.00, type: 'usd',   weight: 6.5 },   // 6.5%
        { label: '500 Ks', color: '#f39c12', reward: 500,  type: 'mmk',   weight: 55 },    // 55%
        { label: 'Thanks!',color: '#7f8c8d', reward: 0,    type: 'thanks', weight: 50 },    // 50%
        { label: 'FREE',   color: '#1abc9c', reward: 0,    type: 'free',   weight: 60 },    // 60%
        { label: 'SUPER',  color: '#e91e63', reward: 0,    type: 'super',  weight: 2.5 }   // 2.5%
    ];
    const SEG_COUNT = 8;
    const ARC = (2 * Math.PI) / SEG_COUNT;
    
    // ==================== STATE ====================
    let isSpinning = false;
    let currentAngle = 0;
    let spinAvailable = true;
    let countdownInterval = null;
    
    // ==================== TOAST ====================
    function toast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.background = type === 'success' ? '#2ecc71' : '#e74c3c';
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2500);
    }
    
    // ==================== DRAW WHEEL ====================
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    
    function drawWheel(rotationAngle = 0) {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const radius = cx - 15;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        SEGMENTS.forEach((seg, i) => {
            const startAngle = i * ARC + rotationAngle;
            const endAngle = startAngle + ARC;
            
            // Segment fill with gradient
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, startAngle, endAngle);
            ctx.closePath();
            
            const grad = ctx.createRadialGradient(cx, cy, radius * 0.2, cx, cy, radius);
            grad.addColorStop(0, lightenColor(seg.color, 40));
            grad.addColorStop(1, seg.color);
            ctx.fillStyle = grad;
            ctx.fill();
            
            // Gold border between segments
            ctx.strokeStyle = 'rgba(255,215,0,0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Label
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(startAngle + ARC / 2);
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 16px Segoe UI';
            ctx.shadowColor = 'rgba(0,0,0,0.7)';
            ctx.shadowBlur = 5;
            ctx.fillText(seg.label, radius * 0.65, 6);
            ctx.shadowBlur = 0;
            ctx.restore();
        });
        
        // Gold dots on border
        for (let i = 0; i < SEG_COUNT; i++) {
            const dotAngle = i * ARC + rotationAngle;
            const dotX = cx + Math.cos(dotAngle) * (radius - 2);
            const dotY = cy + Math.sin(dotAngle) * (radius - 2);
            ctx.beginPath();
            ctx.arc(dotX, dotY, 4, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffd700';
            ctx.fill();
        }
        
        // Center circle
        ctx.beginPath();
        ctx.arc(cx, cy, 30, 0, 2 * Math.PI);
        const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
        centerGrad.addColorStop(0, '#2c3e50');
        centerGrad.addColorStop(1, '#1a1f4b');
        ctx.fillStyle = centerGrad;
        ctx.fill();
        ctx.strokeStyle = '#f39c12';
        ctx.lineWidth = 3;
        ctx.stroke();
        
        // Center text
        ctx.fillStyle = '#f39c12';
        ctx.font = 'bold 12px Segoe UI';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('SPIN', cx, cy);
        
        // Outer glow ring
        ctx.beginPath();
        ctx.arc(cx, cy, radius + 2, 0, 2 * Math.PI);
        ctx.strokeStyle = 'rgba(243,156,18,0.5)';
        ctx.lineWidth = 3;
        ctx.stroke();
    }
    
    function lightenColor(hex, percent) {
        const num = parseInt(hex.replace('#', ''), 16);
        const r = Math.min(255, (num >> 16) + percent);
        const g = Math.min(255, ((num >> 8) & 0x00FF) + percent);
        const b = Math.min(255, (num & 0x0000FF) + percent);
        return `rgb(${r},${g},${b})`;
    }
    
    // ==================== SPIN LOGIC (FIXED) ====================
    function getWinningIndex() {
        // Weighted random selection
        const totalWeight = SEGMENTS.reduce((sum, seg) => sum + seg.weight, 0);
        let random = Math.random() * totalWeight;
        
        for (let i = 0; i < SEGMENTS.length; i++) {
            random -= SEGMENTS[i].weight;
            if (random <= 0) return i;
        }
        return SEGMENTS.length - 1; // fallback
    }
    
    function getTargetAngleForIndex(winningIndex) {
        // Arrow is at TOP (angle = -PI/2 or 3*PI/2)
        // We need the CENTER of the winning segment to align with the arrow
        // Segment i spans from i*ARC to (i+1)*ARC
        // Center of segment i = i*ARC + ARC/2
        
        const segmentCenter = winningIndex * ARC + ARC / 2;
        
        // Arrow points UP (-PI/2). We need the segment center to be at PI/2 (bottom)
        // Because the wheel rotates, the segment at angle "segmentCenter" appears at top
        // when wheel rotation = 2*PI - segmentCenter + PI
        
        // Actually simpler: arrow at top (-PI/2)
        // Segment i center at angle = i*ARC + ARC/2 (from 0)
        // For this segment to be at top (arrow), wheel must be rotated by:
        // rotation = -(i*ARC + ARC/2) - PI/2
        //         = -(i*ARC + ARC/2 + PI/2)
        
        let targetRotation = -(winningIndex * ARC + ARC / 2) - Math.PI / 2;
        
        // Normalize to positive
        while (targetRotation < 0) targetRotation += 2 * Math.PI;
        targetRotation = targetRotation % (2 * Math.PI);
        
        return targetRotation;
    }
    
    function startCountdown() {
        let seconds = 4;
        const timerEl = document.getElementById('timerDisplay');
        timerEl.classList.add('spinning');
        
        const update = () => {
            if (seconds <= 0 || !isSpinning) {
                if (countdownInterval) clearInterval(countdownInterval);
                return;
            }
            timerEl.textContent = `⏱️ Spinning... ${seconds}s`;
            seconds--;
        };
        
        update();
        if (countdownInterval) clearInterval(countdownInterval);
        countdownInterval = setInterval(update, 1000);
    }
    
    async function startSpin() {
        if (isSpinning) return;
        if (!spinAvailable) return toast('❌ Today\'s spin already used!', 'error');
        
        const token = localStorage.getItem('auth_token');
        if (!token || token === 'guest') return toast('❌ Please login first!', 'error');
        
        isSpinning = true;
        const btn = document.getElementById('spinBtn');
        btn.disabled = true;
        btn.textContent = '🎰 SPINNING...';
        
        // Start countdown timer
        startCountdown();
        
        // Determine winning segment (weighted random)
        const winningIndex = getWinningIndex();
        const seg = SEGMENTS[winningIndex];
        
        // Calculate target angle so arrow points to winning segment
        const targetRotation = getTargetAngleForIndex(winningIndex);
        
        // Add multiple full spins for visual effect
        const extraSpins = 6 + Math.floor(Math.random() * 4); // 6-9 full rotations
        const totalRotation = extraSpins * 2 * Math.PI + targetRotation;
        
        // Animate
        const duration = 4000 + Math.random() * 500; // 4-4.5 seconds
        const startAngle = currentAngle;
        const startTime = Date.now();
        
        function animate() {
            const elapsed = Date.now() - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            // Ease-out (deceleration)
            const eased = 1 - Math.pow(1 - progress, 3);
            const angle = startAngle + (totalRotation - startAngle % (2 * Math.PI) + startAngle) * eased;
            
            // Simpler calculation:
            const simpleAngle = startAngle + (totalRotation) * eased;
            
            drawWheel(simpleAngle % (2 * Math.PI));
            currentAngle = simpleAngle;
            
            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                // Spin complete
                if (countdownInterval) clearInterval(countdownInterval);
                
                const timerEl = document.getElementById('timerDisplay');
                timerEl.classList.remove('spinning');
                timerEl.textContent = '✅ Spin complete!';
                
                // Verify arrow points to correct segment
                // At final angle, arrow at top should point to winningIndex
                const normalizedAngle = ((currentAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
                // Arrow is at top = -PI/2 = 3*PI/2 in normalized
                const arrowAngle = (2 * Math.PI - normalizedAngle + Math.PI / 2) % (2 * Math.PI);
                const actualIndex = Math.floor(arrowAngle / ARC) % SEG_COUNT;
                
                console.log('Winning index:', winningIndex, 'Actual index:', actualIndex, 'Match:', winningIndex === actualIndex);
                
                // Save to DB
                saveSpinResult(seg);
                
                // Update state
                spinAvailable = false;
                const today = new Date().toDateString();
                localStorage.setItem('lastSpinDate', today);
                
                // Update button
                btn.disabled = false;
                btn.textContent = '🎰 SPIN';
                document.getElementById('spinInfo').textContent = 'Come back tomorrow!';
                isSpinning = false;
                
                // Show result
                showResult(seg);
                
                // Schedule reset
                scheduleReset();
            }
        }
        
        requestAnimationFrame(animate);
    }
    
    async function saveSpinResult(seg) {
        const token = localStorage.getItem('auth_token');
        try {
            await fetch('/api/spin/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: token,
                    reward_type: seg.type,
                    reward_amount: seg.reward,
                    segment_label: seg.label
                })
            });
            loadBalance();
        } catch(e) {}
    }
    
    function showResult(seg) {
        const overlay = document.getElementById('resultOverlay');
        const icon = document.getElementById('resultIcon');
        const text = document.getElementById('resultText');
        const amount = document.getElementById('resultAmount');
        
        switch(seg.type) {
            case 'usd':
                icon.textContent = '💵';
                text.textContent = '🎉 You Won!';
                amount.textContent = `$${seg.reward.toFixed(2)} USD`;
                amount.style.color = '#2ecc71';
                break;
            case 'mmk':
                icon.textContent = '💰';
                text.textContent = '🎉 You Won!';
                amount.textContent = `${seg.reward} Ks`;
                amount.style.color = '#f39c12';
                break;
            case 'free':
                icon.textContent = '🔄';
                text.textContent = 'Free Spin!';
                amount.textContent = 'Extra spin granted';
                amount.style.color = '#1abc9c';
                break;
            case 'super':
                icon.textContent = '👑';
                text.textContent = '🏆 SUPER PRIZE!';
                amount.textContent = 'Coming Soon...';
                amount.style.color = '#e91e63';
                break;
            default:
                icon.textContent = '😊';
                text.textContent = 'Thank You!';
                amount.textContent = 'Better luck tomorrow';
                amount.style.color = '#7f8c8d';
        }
        
        overlay.classList.add('active');
    }
    
    function closeResult() {
        document.getElementById('resultOverlay').classList.remove('active');
    }
    
    // ==================== RESET SYSTEM ====================
    function scheduleReset() {
        const now = new Date();
        const tomorrow = new Date(now);
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(0, 0, 0, 0);
        const msUntilReset = tomorrow.getTime() - now.getTime();
        
        setTimeout(() => {
            spinAvailable = true;
            localStorage.removeItem('lastSpinDate');
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('spinBtn').textContent = '🎰 SPIN';
            document.getElementById('spinInfo').textContent = '1 free spin daily • Resets at midnight';
            document.getElementById('timerDisplay').textContent = '🎰 Ready to spin!';
        }, msUntilReset);
    }
    
    // ==================== BALANCE ====================
    async function loadBalance() {
        const token = localStorage.getItem('auth_token');
        if (!token || token === 'guest') return;
        try {
            const r = await fetch('/api/get_balance', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const d = await r.json();
            document.getElementById('mmkBalance').textContent = (d.balance || 0).toLocaleString() + ' Ks';
            
            const ur = await fetch('/api/get_usd_balance', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const ud = await ur.json();
            document.getElementById('usdBalance').textContent = '$' + (ud.usd_balance || 0).toFixed(2);
        } catch(e) {}
    }
    
    // ==================== INIT ====================
    function init() {
        const lastSpinDate = localStorage.getItem('lastSpinDate');
        const today = new Date().toDateString();
        
        if (lastSpinDate === today) {
            spinAvailable = false;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('spinInfo').textContent = 'Already spun today • Come back tomorrow!';
            document.getElementById('timerDisplay').textContent = '⏰ Already used today';
        } else {
            spinAvailable = true;
        }
        
        drawWheel(0);
        loadBalance();
        if (!spinAvailable) scheduleReset();
        setInterval(loadBalance, 30000);
    }
    
    init();
</script>
</body>
</html>
