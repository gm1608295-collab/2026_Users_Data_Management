<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Spin - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a1a;
            --panel: #1a1f4b;
            --gold: #f39c12;
            --green: #2ecc71;
            --red: #e74c3c;
            --blue: #3498db;
            --text: #fff;
            --text-muted: rgba(255,255,255,0.5);
            --wheel-size: 280px;
            --canvas-size: 560px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #0c0e27, #1a1f4b, #2c3e50);
            color: var(--text);
            min-height: 100vh;
            padding: 10px;
            overflow-y: auto;
        }
        .container { max-width: 450px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 10px; padding-bottom: 30px; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            background: linear-gradient(to right, #4a1c7a, #1a1f4b);
            padding: 12px 15px;
            border-radius: 14px;
            border: 2px solid var(--gold);
        }
        .back-btn { color: var(--gold); font-size: 18px; text-decoration: none; }
        .header-title { font-size: 15px; font-weight: bold; color: var(--gold); text-align: center; flex: 1; }

        /* Balance Cards */
        .balance-bar { display: flex; gap: 8px; width: 100%; }
        .bal-card {
            flex: 1;
            background: rgba(26,31,75,0.8);
            border-radius: 12px;
            padding: 12px 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bal-icon { font-size: 18px; margin-bottom: 2px; }
        .bal-label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .bal-value { font-size: 20px; font-weight: bold; margin-top: 3px; }
        .bal-value.usd { color: #85bb65; }
        .bal-value.mmk { color: var(--gold); }

        /* Draw Cards */
        .draws-container { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .draw-card {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .draw-icon { font-size: 22px; }
        .draw-label { font-size: 8px; color: var(--text-muted); text-transform: uppercase; }
        .draw-count { font-size: 18px; font-weight: bold; color: var(--gold); margin-top: 2px; }

        /* Wheel */
        .wheel-container { position: relative; width: var(--wheel-size); height: var(--wheel-size); margin: 8px auto; }
        .wheel-pointer { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 32px; color: #ff4444; }
        canvas#wheelCanvas {
            width: var(--wheel-size);
            height: var(--wheel-size);
            border-radius: 50%;
            border: 4px solid var(--gold);
            box-shadow: 0 0 30px rgba(243,156,18,0.3);
        }
        .spin-status { font-size: 10px; color: var(--text-muted); min-height: 16px; text-align: center; }

        /* Buttons */
        .btn-spin {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 28px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: #000;
            box-shadow: 0 5px 20px rgba(243,156,18,0.4);
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn-spin:hover:not(:disabled) { transform: translateY(-2px); }
        .btn-spin:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Check-In Section */
        .checkin-section { width: 100%; }
        .checkin-box {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 14px 10px;
            border: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 8px;
        }
        .checkin-box.normal { border-color: rgba(52,152,219,0.5); }
        .checkin-box.premium { border-color: rgba(155,89,182,0.5); }
        .checkin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .checkin-title { font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 6px; }
        .checkin-title.normal { color: var(--blue); }
        .checkin-title.premium { color: #9b59b6; }
        .checkin-timer { font-size: 9px; color: var(--text-muted); background: rgba(0,0,0,0.3); padding: 5px 10px; border-radius: 10px; }
        .checkin-days { display: flex; gap: 8px; overflow-x: auto; padding: 6px 2px 12px; }
        .day-card {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            min-width: 85px;
            padding: 12px 10px;
            border-radius: 8px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .day-card.claimed { opacity: 0.5; }
        .day-card.today { border-color: var(--gold) !important; box-shadow: 0 0 12px rgba(243,156,18,0.4); }
        .day-card.current { border-color: var(--gold) !important; animation: dayPulse 1.5s infinite; }
        @keyframes dayPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(243,156,18,0.3); }
            50% { box-shadow: 0 0 20px rgba(243,156,18,0.6); }
        }
        .day-number { font-size: 8px; color: var(--text-muted); margin-bottom: 6px; }
        .day-reward-icon { width: 40px; height: 40px; object-fit: contain; margin-bottom: 6px; border-radius: 6px; }
        .day-reward-label { font-size: 9px; font-weight: bold; color: var(--text); margin-bottom: 2px; }
        .day-reward-amount { font-size: 8px; color: var(--text-muted); margin-bottom: 8px; }
        .day-claim-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            font-size: 9px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            background: linear-gradient(135deg, #2980b9, #3498db);
            color: var(--text);
        }
        .day-claimed-badge {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: bold;
            background: rgba(46,204,113,0.2);
            color: var(--green);
            text-align: center;
            width: 100%;
        }
        .day-missed-badge {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: bold;
            background: rgba(231,76,60,0.15);
            color: var(--red);
            text-align: center;
            width: 100%;
        }

        /* Pending Countdown */
        .checkin-pending {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(243,156,18,0.3);
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--panel);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: modalSlideIn 0.3s ease;
        }
        @keyframes modalSlideIn {
            from { opacity: 0; transform: translateY(-30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .result-icon { font-size: 60px; margin: 10px 0; }
        .result-text { font-size: 18px; font-weight: bold; margin: 8px 0; }
        .result-amount { font-size: 26px; font-weight: bold; margin: 8px 0; }
        .btn-close {
            display: block;
            margin: 15px auto 0;
            padding: 10px 30px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            top: 15px;
            right: 15px;
            padding: 12px 18px;
            border-radius: 8px;
            z-index: 9999;
            font-size: 12px;
            font-weight: bold;
            display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        @media (max-width: 380px) {
            :root { --wheel-size: 240px; --canvas-size: 480px; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="container" id="mainContainer">
        <!-- Header -->
        <div class="header">
            <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div class="header-title">🎰 Lucky Spin</div>
            <span style="width:18px;"></span>
        </div>

        <!-- Balance -->
        <div class="balance-bar">
            <div class="bal-card">
                <div class="bal-icon">💵</div>
                <div class="bal-label">USD Balance</div>
                <div class="bal-value usd" id="usdBalance">$0.00</div>
            </div>
            <div class="bal-card">
                <div class="bal-icon">💰</div>
                <div class="bal-label">MMK Balance</div>
                <div class="bal-value mmk" id="mmkBalance">0 Ks</div>
            </div>
        </div>

        <!-- Draw Cards -->
        <div class="draws-container">
            <div class="draw-card">
                <div class="draw-icon">🔄</div>
                <div class="draw-label">Daily Free</div>
                <div class="draw-count" id="dailyCount">0</div>
            </div>
            <div class="draw-card">
                <div class="draw-icon">💳</div>
                <div class="draw-label">Bought Draws</div>
                <div class="draw-count" id="boughtCount">0</div>
            </div>
        </div>

        <!-- Check-In Section -->
        <div class="checkin-section" id="checkinSection">
            <div class="checkin-pending">
                <div style="font-size:30px;margin-bottom:8px;">⏳</div>
                <div style="font-size:13px;font-weight:bold;color:var(--gold);">Loading events...</div>
                <div style="font-size:10px;color:var(--text-muted);margin-top:4px;">Please wait</div>
            </div>
        </div>

        <!-- Wheel -->
        <div class="wheel-container">
            <div class="wheel-pointer"><i class="fas fa-caret-down"></i></div>
            <canvas id="wheelCanvas" width="560" height="560"></canvas>
        </div>
        <div class="spin-status" id="spinStatus">Ready to spin!</div>

        <!-- Spin Button -->
        <button class="btn-spin" id="btnSpin" onclick="handleSpin()" disabled>🎰 SPIN</button>
    </div>

    <!-- Result Modal -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-box">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-text" id="resultText"></div>
            <div class="result-amount" id="resultAmount"></div>
            <button class="btn-close" onclick="closeResultModal()">OK</button>
        </div>
    </div>

    <script>
        // ==================== STATE ====================
        var State = {
            isSpinning: false,
            wheelAngle: 0,
            dailyDraws: 0,
            boughtDraws: 0,
            mmkBalance: 0,
            usdBalance: 0,
            serverRates: null,
            animFrame: null,

            getTotalDraws: function() { return this.dailyDraws + this.boughtDraws; },
            getDrawSource: function() {
                if (this.dailyDraws > 0) return 'daily';
                if (this.boughtDraws > 0) return 'bought';
                return null;
            },
            consumeDraw: function(source) {
                if (source === 'daily' && this.dailyDraws > 0) this.dailyDraws--;
                else if (source === 'bought' && this.boughtDraws > 0) this.boughtDraws--;
            },
            getSegments: function() {
                return [
                    { label: 'FREE', color: '#1abc9c', reward: 0, type: 'free', weight: 40 },
                    { label: 'Thank You', color: '#7f8c8d', reward: 0, type: 'thanks', weight: 40 },
                    { label: '500 Ks', color: '#f39c12', reward: 500, type: 'mmk', weight: 5 },
                    { label: '$0.25', color: '#e74c3c', reward: 0.25, type: 'usd', weight: 3 },
                    { label: '$0.50', color: '#e67e22', reward: 0.50, type: 'usd', weight: 2 },
                    { label: '$0.75', color: '#3498db', reward: 0.75, type: 'usd', weight: 1 },
                    { label: '$1.00', color: '#2ecc71', reward: 1.00, type: 'usd', weight: 1 },
                    { label: '$2.00', color: '#9b59b6', reward: 2.00, type: 'usd', weight: 1 }
                ];
            }
        };

        // ==================== API ====================
        var API = {
            getToken: function() { return localStorage.getItem('auth_token'); },
            isGuest: function() { var t = this.getToken(); return !t || t === 'guest'; },
            headers: function() { return { 'Content-Type': 'application/json' }; },

            syncAll: async function() {
                if (this.isGuest()) return null;
                try {
                    var [bRes, uRes] = await Promise.all([
                        fetch('/api/get_balance', { method: 'POST', headers: this.headers(), body: JSON.stringify({ token: this.getToken() }) }).then(r => r.json()),
                        fetch('/api/get_usd_balance', { method: 'POST', headers: this.headers(), body: JSON.stringify({ token: this.getToken() }) }).then(r => r.json())
                    ]);
                    return {
                        mmkBalance: parseFloat(bRes.balance || 0),
                        usdBalance: parseFloat(uRes.usd_balance || 0),
                        dailyDrawsRemaining: 1
                    };
                } catch(e) { return null; }
            },

            executeSpin: async function(source) {
                if (this.isGuest()) return this._guestSpin(source);
                try {
                    return await (await fetch('/api/spin/execute', {
                        method: 'POST',
                        headers: this.headers(),
                        body: JSON.stringify({ token: this.getToken(), spin_source: source })
                    })).json();
                } catch(e) { return null; }
            },

            _guestSpin: function(source) {
                var segs = State.getSegments();
                var tw = segs.reduce(function(a, x) { return a + x.weight; }, 0);
                var rand = Math.random() * tw;
                var wi = 0;
                for (var i = 0; i < segs.length; i++) {
                    rand -= segs[i].weight;
                    if (rand <= 0) { wi = i; break; }
                }
                if (segs[wi].type === 'usd') State.usdBalance += segs[wi].reward;
                else if (segs[wi].type === 'mmk') State.mmkBalance += segs[wi].reward;
                return { success: true, winIndex: wi, reward: segs[wi], mmkBalance: State.mmkBalance, usdBalance: State.usdBalance };
            }
        };

        // ==================== WHEEL ENGINE ====================
        var WheelEngine = {
            canvas: null,
            ctx: null,

            init: function() {
                this.canvas = document.getElementById('wheelCanvas');
                this.ctx = this.canvas.getContext('2d', { alpha: false });
            },

            draw: function(angle) {
                if (!this.ctx) this.init();
                var segs = State.getSegments();
                var cx = 280, cy = 280, r = 250;
                var arc = (2 * Math.PI) / segs.length;

                this.ctx.clearRect(0, 0, 560, 560);

                for (var i = 0; i < segs.length; i++) {
                    var s = segs[i];
                    var sa = i * arc + angle;
                    var ea = sa + arc;

                    this.ctx.beginPath();
                    this.ctx.moveTo(cx, cy);
                    this.ctx.arc(cx, cy, r, sa, ea);
                    this.ctx.closePath();
                    this.ctx.fillStyle = s.color;
                    this.ctx.fill();
                    this.ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    this.ctx.lineWidth = 1;
                    this.ctx.stroke();

                    this.ctx.save();
                    this.ctx.translate(cx, cy);
                    this.ctx.rotate(sa + arc / 2);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.font = 'bold 10px Segoe UI';
                    this.ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    this.ctx.shadowBlur = 3;
                    this.ctx.fillText(s.label, r * 0.55, 4);
                    this.ctx.restore();
                }

                // Center circle
                this.ctx.beginPath();
                this.ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
                this.ctx.fillStyle = '#1a0a2e';
                this.ctx.fill();
                this.ctx.strokeStyle = '#ffd700';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();

                this.ctx.fillStyle = '#fff';
                this.ctx.font = 'bold 10px Segoe UI';
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.ctx.fillText('SPIN', cx, cy);
            },

            spin: function(winIndex) {
                var segs = State.getSegments();
                var arc = (2 * Math.PI) / segs.length;
                var targetAngle = -(winIndex * arc + arc / 2) - Math.PI / 2;
                while (targetAngle < 0) targetAngle += 2 * Math.PI;

                var totalRotation = targetAngle + (6 + Math.floor(Math.random() * 3)) * 2 * Math.PI;
                var startAngle = State.wheelAngle;
                var duration = 4000 + Math.random() * 500;
                var startTime = Date.now();
                var self = this;

                if (State.animFrame) cancelAnimationFrame(State.animFrame);

                return new Promise(function(resolve) {
                    function animate() {
                        var elapsed = Math.min((Date.now() - startTime) / duration, 1);
                        var ease = 1 - Math.pow(1 - elapsed, 3);
                        var currentAngle = startAngle + totalRotation * ease;

                        self.draw(currentAngle % (2 * Math.PI));
                        State.wheelAngle = currentAngle;

                        if (elapsed < 1) {
                            State.animFrame = requestAnimationFrame(animate);
                        } else {
                            resolve();
                        }
                    }
                    State.animFrame = requestAnimationFrame(animate);
                });
            }
        };

        // ==================== UI ====================
        var UI = {
            _toastTimeout: null,

            updateBalances: function() {
                document.getElementById('mmkBalance').textContent = State.mmkBalance.toLocaleString() + ' Ks';
                document.getElementById('usdBalance').textContent = '$' + State.usdBalance.toFixed(2);
            },

            updateDraws: function() {
                document.getElementById('dailyCount').textContent = State.dailyDraws;
                document.getElementById('boughtCount').textContent = State.boughtDraws;
                this.updateSpinButton();
            },

            updateSpinButton: function() {
                var btn = document.getElementById('btnSpin');
                var status = document.getElementById('spinStatus');

                if (State.isSpinning) {
                    btn.disabled = true;
                    status.textContent = 'Spinning...';
                    return;
                }

                var total = State.getTotalDraws();
                var source = State.getDrawSource();

                if (total > 0) {
                    btn.disabled = false;
                    status.textContent = (source === 'daily' ? 'Daily' : 'Bought') + ' - ' + total + ' draw(s) left';
                } else {
                    btn.disabled = true;
                    status.textContent = 'No draws available';
                }
            },

            showToast: function(msg, type) {
                type = type || 'success';
                var el = document.getElementById('toast');
                el.textContent = msg;
                el.style.display = 'block';
                el.style.background = type === 'success' ? '#2ecc71' : '#e74c3c';
                el.style.color = '#fff';
                clearTimeout(this._toastTimeout);
                var self = this;
                this._toastTimeout = setTimeout(function() { el.style.display = 'none'; }, 3000);
            },

            showResult: function(winIndex) {
                var segs = State.getSegments();
                var reward = segs[winIndex];

                var icon = document.getElementById('resultIcon');
                var text = document.getElementById('resultText');
                var amount = document.getElementById('resultAmount');

                switch (reward.type) {
                    case 'free':
                        icon.textContent = '🔄';
                        text.textContent = 'Free Spin!';
                        amount.textContent = '+1 Extra Draw';
                        amount.style.color = '#1abc9c';
                        break;
                    case 'thanks':
                        icon.textContent = '😊';
                        text.textContent = 'Thank You!';
                        amount.textContent = 'Better luck next time';
                        amount.style.color = '#7f8c8d';
                        break;
                    case 'usd':
                        icon.textContent = '💵';
                        text.textContent = '🎉 You Won!';
                        amount.textContent = '$' + reward.reward.toFixed(2) + ' USD';
                        amount.style.color = '#2ecc71';
                        break;
                    case 'mmk':
                        icon.textContent = '💰';
                        text.textContent = '🎉 You Won!';
                        amount.textContent = reward.reward.toLocaleString() + ' Ks';
                        amount.style.color = '#f39c12';
                        break;
                }

                document.getElementById('resultModal').classList.add('active');
            },

            // ==================== CHECK-IN UI ====================
            loadCheckInStatus: async function() {
                var token = API.getToken();
                if (!token || token === 'guest') {
                    document.getElementById('checkinSection').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;">Login required for Check-In</p>';
                    return;
                }

                try {
                    var r = await fetch('/api/daily_checkin/status', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token: token })
                    });
                    var d = await r.json();

                    if (d.success && d.events && d.events.length > 0) {
                        this.renderCheckInUI(d.events);
                    } else {
                        document.getElementById('checkinSection').innerHTML = '<div class="checkin-pending"><div style="font-size:30px;">📅</div><div style="font-size:13px;font-weight:bold;color:var(--gold);">No Active Events</div><div style="font-size:10px;color:var(--text-muted);">Admin မှ Event သတ်မှတ်ပြီးပါက ဤနေရာတွင် ပေါ်လာပါမည်</div></div>';
                    }
                } catch(e) {
                    console.error('[CHECKIN]', e);
                }
            },

            renderCheckInUI: function(events) {
                var section = document.getElementById('checkinSection');
                var html = '';

                events.forEach(function(ev) {
                    var isNormal = ev.event_type === 'normal';
                    var boxClass = isNormal ? 'normal' : 'premium';
                    var titleIcon = isNormal ? '🎁' : '👑';
                    var titleColor = isNormal ? 'normal' : 'premium';
                    var titleText = ev.event_name || (isNormal ? 'Daily Check-In' : 'Premium Check-In');

                    // Pending Countdown
                    if (ev.is_pending && ev.pending_countdown_seconds > 0) {
                        html += '<div class="checkin-pending" id="pendingBlock_' + ev.event_id + '">';
                        html += '<div style="font-size:30px;margin-bottom:8px;">⏳</div>';
                        html += '<div style="font-size:13px;font-weight:bold;color:var(--gold);">' + titleIcon + ' ' + titleText + '</div>';
                        html += '<div style="font-size:10px;color:var(--text-muted);margin-top:4px;">Event starts in:</div>';
                        html += '<div style="font-size:22px;font-weight:bold;color:#ffd700;font-family:\'Courier New\',monospace;margin-top:6px;" id="pendingCountdown_' + ev.event_id + '">' + formatCountdown(ev.pending_countdown_seconds) + '</div>';
                        html += '<div style="font-size:9px;color:var(--text-muted);margin-top:4px;">📅 ' + ev.start_date + ' at ' + (ev.start_time || '00:00').substring(0, 5) + '</div>';
                        html += '</div>';
                        return; // Don't show day cards for pending events
                    }

                    // Grace Period Banner
                    if (ev.is_grace_period) {
                        html += '<div style="background:rgba(243,156,18,0.1);border:1px solid rgba(243,156,18,0.3);padding:8px 12px;border-radius:8px;margin-bottom:8px;text-align:center;font-size:10px;color:#f39c12;">⚠️ ပွဲတော်ပြီးဆုံးသွားပါပြီ။ ' + ev.grace_end_date + ' အထိ ဆုရယူနိုင်ပါသေးသည်။</div>';
                    }

                    // Day Cards
                    html += '<div class="checkin-box ' + boxClass + '">';
                    html += '<div class="checkin-header">';
                    html += '<span class="checkin-title ' + titleColor + '">' + titleIcon + ' ' + titleText + '</span>';
                    html += '<span class="checkin-timer">⏰ Reset: ' + (ev.reset_time || '00:00').substring(0, 5) + '</span>';
                    html += '</div>';
                    html += '<div class="checkin-days">';

                    ev.day_status.forEach(function(day) {
                        var rw = day.reward;
                        var ri = rw && rw.icon ? rw.icon : '';
                        var rl = rw ? rw.label : '';
                        var ra = rw ? (rw.type === 'usd' ? '$' + parseFloat(rw.amount).toFixed(2) : rw.type === 'mmk' ? parseFloat(rw.amount).toLocaleString() + ' Ks' : parseInt(rw.amount) + ' Draw') : '';

                        var cardClass = '';
                        var actionHtml = '';

                        if (day.claimed) {
                            cardClass = 'claimed';
                            actionHtml = '<div class="day-claimed-badge">✅ Claimed</div>';
                        } else if (ev.is_grace_period) {
                            cardClass = 'claimed';
                            actionHtml = '<div class="day-missed-badge">⏰ Missed</div>';
                        } else if (day.day < ev.current_day) {
                            cardClass = 'claimed';
                            actionHtml = '<div class="day-missed-badge">⏰ Missed</div>';
                        } else if (day.day === ev.current_day && !ev.checked_in_today && ev.can_claim) {
                            cardClass = 'current';
                            actionHtml = '<button class="day-claim-btn" onclick="claimDailyReward(' + ev.event_id + ')">🎁 ဆုယူမည်</button>';
                        } else if (day.day === ev.current_day && ev.checked_in_today) {
                            cardClass = 'today';
                            actionHtml = '<div class="day-claimed-badge">✅ Claimed</div>';
                        } else {
                            actionHtml = '<div style="padding:6px 14px;font-size:9px;color:rgba(255,255,255,0.3);text-align:center;">🔒 Locked</div>';
                        }

                        html += '<div class="day-card ' + cardClass + '">';
                        html += '<div class="day-number">Day ' + day.day + '</div>';
                        html += '<span style="font-size:28px;display:block;text-align:center;margin-bottom:4px;">' + (ri || '🎁') + '</span>';
                        html += '<div class="day-reward-label">' + rl + '</div>';
                        html += '<div class="day-reward-amount">' + ra + '</div>';
                        html += actionHtml;
                        html += '</div>';
                    });

                    html += '</div></div>';
                });

                section.innerHTML = html;

                // Start pending countdown timers
                events.forEach(function(ev) {
                    if (ev.is_pending && ev.pending_countdown_seconds > 0) {
                        startPendingCountdown(ev.event_id, ev.pending_countdown_seconds);
                    }
                });
            }
        };

        // ==================== GLOBAL FUNCTIONS ====================
        function formatCountdown(seconds) {
            if (seconds <= 0) return 'Starting...';
            var d = Math.floor(seconds / 86400);
            var h = Math.floor((seconds % 86400) / 3600);
            var m = Math.floor((seconds % 3600) / 60);
            var s = seconds % 60;
            if (d > 0) return d + 'd ' + h.toString().padStart(2, '0') + 'h ' + m.toString().padStart(2, '0') + 'm';
            return h.toString().padStart(2, '0') + ':' + m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
        }

        function startPendingCountdown(eventId, totalSeconds) {
            var el = document.getElementById('pendingCountdown_' + eventId);
            if (!el) return;

            var remaining = totalSeconds;
            var interval = setInterval(function() {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(interval);
                    UI.loadCheckInStatus();
                    return;
                }
                el.textContent = formatCountdown(remaining);
            }, 1000);
        }

        async function claimDailyReward(eventId) {
            var token = API.getToken();
            if (!token || token === 'guest') { UI.showToast('Please login first', 'error'); return; }

            try {
                var r = await fetch('/api/daily_checkin/claim', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, event_id: eventId })
                });
                var d = await r.json();

                if (d.success) {
                    State.mmkBalance = d.mmk_balance;
                    State.usdBalance = d.usd_balance;
                    UI.updateBalances();
                    UI.showToast('✅ ' + d.reward_label + ' Claimed!');
                    UI.loadCheckInStatus();
                } else {
                    UI.showToast(d.message || 'Claim failed', 'error');
                }
            } catch(e) { UI.showToast('Network error', 'error'); }
        }

        async function handleSpin() {
            if (State.isSpinning) return;

            var source = State.getDrawSource();
            if (!source) { UI.showToast('No draws available!', 'error'); return; }

            State.isSpinning = true;
            document.getElementById('btnSpin').disabled = true;
            document.getElementById('spinStatus').textContent = 'Spinning...';

            State.consumeDraw(source);
            UI.updateDraws();

            var result = await API.executeSpin(source);

            if (!result || !result.success) {
                // Refund draw on failure
                if (source === 'daily') State.dailyDraws++;
                else State.boughtDraws++;

                UI.updateDraws();
                UI.showToast('Spin failed!', 'error');
                State.isSpinning = false;
                UI.updateSpinButton();
                return;
            }

            if (result.mmkBalance !== undefined) State.mmkBalance = result.mmkBalance;
            if (result.usdBalance !== undefined) State.usdBalance = result.usdBalance;

            UI.updateBalances();

            await WheelEngine.spin(result.winIndex);
            UI.showResult(result.winIndex);

            State.isSpinning = false;
            UI.updateDraws();
            UI.updateSpinButton();
        }

        function closeResultModal() {
            document.getElementById('resultModal').classList.remove('active');
        }

        // Modal overlay click
        document.getElementById('resultModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });

        // ==================== INIT ====================
        async function init() {
            // Load balances
            var data = await API.syncAll();
            if (data) {
                State.mmkBalance = data.mmkBalance;
                State.usdBalance = data.usdBalance;
                State.dailyDraws = data.dailyDrawsRemaining || 1;
            }

            // Reset daily draws
            var today = new Date().toDateString();
            if (localStorage.getItem('spinLastResetDate') !== today) {
                State.dailyDraws = 1;
                localStorage.setItem('spinLastResetDate', today);
            }

            UI.updateBalances();
            UI.updateDraws();
            WheelEngine.draw(State.wheelAngle % (2 * Math.PI));

            // Load check-in
            UI.loadCheckInStatus();

            // Refresh check-in every 30 seconds
            setInterval(function() { UI.loadCheckInStatus(); }, 30000);

            // Refresh balances every 60 seconds
            setInterval(async function() {
                var data = await API.syncAll();
                if (data) {
                    State.mmkBalance = data.mmkBalance;
                    State.usdBalance = data.usdBalance;
                    UI.updateBalances();
                }
            }, 60000);
        }

        init();
    </script>
</body>
</html>
