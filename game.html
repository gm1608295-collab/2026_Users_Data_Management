<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Spin - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0a0a1a;--p:#1a1f4b;--a:#4a1c7a;--r:#e74c3c;--g:#2ecc71;--w:#f39c12;--b:#3498db;--t:#fff;--usd:#85bb65}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        html,body{height:100%;overflow:hidden;position:fixed;width:100%}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);display:flex;justify-content:center;align-items:center;padding:10px}
        .container{width:100%;max-width:450px;display:flex;flex-direction:column;align-items:center;gap:15px}
        
        /* ========== HEADER ========== */
        .header{display:flex;align-items:center;gap:10px;width:100%;background:linear-gradient(to right,var(--a),var(--p));padding:12px 15px;border-radius:12px;border-bottom:3px solid var(--w)}
        .header a{color:var(--w);font-size:20px;text-decoration:none;flex-shrink:0}
        .header h2{color:var(--w);font-size:16px;font-weight:700;flex:1;text-align:center}
        
        /* ========== BALANCE BAR ========== */
        .balance-bar{display:flex;gap:10px;width:100%}
        .bal-card{flex:1;background:rgba(26,31,75,0.7);border-radius:10px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,0.1)}
        .bal-card .bal-label{font-size:9px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px}
        .bal-card .bal-value{font-size:18px;font-weight:bold;color:var(--w)}
        .bal-card.usd .bal-value{color:var(--usd)}
        
        /* ========== SPIN WHEEL AREA ========== */
        .wheel-wrapper{position:relative;width:280px;height:280px;margin:0 auto}
        .wheel-pointer{position:absolute;top:-15px;left:50%;transform:translateX(-50%);z-index:10;font-size:30px;color:var(--w);filter:drop-shadow(0 0 5px rgba(0,0,0,0.5))}
        .wheel-pointer i{animation:bounce 1s infinite}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
        
        canvas#wheelCanvas{width:280px;height:280px;border-radius:50%;box-shadow:0 0 30px rgba(243,156,18,0.3),0 0 60px rgba(74,28,122,0.5),inset 0 0 20px rgba(0,0,0,0.3);border:4px solid var(--w)}
        
        /* ========== SPIN BUTTON ========== */
        .spin-btn{width:100%;padding:15px;border:none;border-radius:30px;font-size:18px;font-weight:bold;cursor:pointer;background:linear-gradient(135deg,var(--w),#e67e22);color:#000;letter-spacing:2px;transition:all 0.3s;text-transform:uppercase;box-shadow:0 6px 25px rgba(243,156,18,0.4)}
        .spin-btn:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(243,156,18,0.6)}
        .spin-btn:active{transform:scale(0.95)}
        .spin-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;background:rgba(255,255,255,0.2);color:rgba(255,255,255,0.5)}
        .spin-btn .remaining{font-size:10px;display:block;letter-spacing:1px;margin-top:2px;opacity:0.7}
        
        /* ========== RESULT MODAL ========== */
        .result-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center}
        .result-overlay.active{display:flex}
        .result-box{background:var(--p);border:3px solid var(--w);border-radius:20px;padding:30px;text-align:center;width:90%;max-width:350px;animation:popIn 0.5s ease}
        @keyframes popIn{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
        .result-box .result-icon{font-size:60px;margin-bottom:10px}
        .result-box .result-text{font-size:20px;font-weight:bold;color:var(--w);margin-bottom:5px}
        .result-box .result-amount{font-size:30px;font-weight:bold;color:var(--g);margin-bottom:15px}
        .result-box .btn{margin:5px;padding:12px 25px;border:none;border-radius:25px;font-size:14px;font-weight:bold;cursor:pointer}
        .btn-close{background:rgba(255,255,255,0.2);color:#fff}
        .btn-claim{background:var(--g);color:#000}
        
        /* ========== TOAST ========== */
        .toast{position:fixed;top:20px;right:20px;padding:12px 18px;border-radius:8px;z-index:9999;font-size:12px;font-weight:bold;animation:slideIn 0.3s ease;display:none}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        
        .timer-text{font-size:10px;color:rgba(255,255,255,0.5);text-align:center;margin-top:5px}
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <a href="/dashboard"><i class="fas fa-arrow-left"></i></a>
            <h2>🎰 Lucky Spin</h2>
        </div>
        
        <!-- Balance Bar -->
        <div class="balance-bar">
            <div class="bal-card usd">
                <div class="bal-label">💵 USD Balance</div>
                <div class="bal-value" id="usdBalance">$0.00</div>
            </div>
            <div class="bal-card">
                <div class="bal-label">💰 MMK Balance</div>
                <div class="bal-value" id="mmkBalance">0 Ks</div>
            </div>
        </div>
        
        <!-- Wheel -->
        <div class="wheel-wrapper">
            <div class="wheel-pointer"><i class="fas fa-caret-down"></i></div>
            <canvas id="wheelCanvas" width="560" height="560"></canvas>
        </div>
        
        <!-- Spin Button -->
        <button class="spin-btn" id="spinBtn" onclick="startSpin()">
            🎰 SPIN NOW
            <span class="remaining" id="spinRemaining">Free Spin: 1 remaining</span>
        </button>
        <div class="timer-text" id="resetTimer"></div>
    </div>
    
    <!-- Result Modal -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-box">
            <div class="result-icon" id="resultIcon">🎉</div>
            <div class="result-text" id="resultText">Congratulations!</div>
            <div class="result-amount" id="resultAmount"></div>
            <button class="btn btn-claim" onclick="closeResult()">OK</button>
        </div>
    </div>

<script>
    // ==================== CONFIG ====================
    const SEGMENTS = [
        { label: '$0.25', color: '#e74c3c', reward: 0.25, type: 'usd' },
        { label: '$0.75', color: '#3498db', reward: 0.75, type: 'usd' },
        { label: '$1.00', color: '#2ecc71', reward: 1.00, type: 'usd' },
        { label: '$2.00', color: '#9b59b6', reward: 2.00, type: 'usd' },
        { label: '500 Ks', color: '#f39c12', reward: 500, type: 'mmk' },
        { label: 'Thanks!', color: '#7f8c8d', reward: 0, type: 'thanks' },
        { label: 'FREE', color: '#1abc9c', reward: 0, type: 'free' },
        { label: 'SUPER', color: '#e91e63', reward: 0, type: 'super' }
    ];
    const SEG_COUNT = 8;
    const ARC = (2 * Math.PI) / SEG_COUNT;
    
    // ==================== STATE ====================
    let isSpinning = false;
    let currentAngle = 0;
    let lastSpinDate = null;
    let spinAvailable = true;
    
    // ==================== TOAST ====================
    function toast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.background = type === 'success' ? '#2ecc71' : '#e74c3c';
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 3000);
    }
    
    // ==================== DRAW WHEEL ====================
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    
    function drawWheel(rotationAngle = 0) {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const radius = cx - 10;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw segments
        SEGMENTS.forEach((seg, i) => {
            const startAngle = i * ARC + rotationAngle;
            const endAngle = startAngle + ARC;
            
            // Segment fill
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, radius, startAngle, endAngle);
            ctx.closePath();
            
            // Gradient
            const grad = ctx.createRadialGradient(cx, cy, radius * 0.3, cx, cy, radius);
            grad.addColorStop(0, lightenColor(seg.color, 30));
            grad.addColorStop(1, seg.color);
            ctx.fillStyle = grad;
            ctx.fill();
            
            // Border
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Label
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(startAngle + ARC / 2);
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Segoe UI';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fillText(seg.label, radius * 0.62, 7);
            ctx.shadowBlur = 0;
            ctx.restore();
        });
        
        // Center circle
        ctx.beginPath();
        ctx.arc(cx, cy, 35, 0, 2 * Math.PI);
        ctx.fillStyle = '#1a1f4b';
        ctx.fill();
        ctx.strokeStyle = '#f39c12';
        ctx.lineWidth = 3;
        ctx.stroke();
        
        // Center text
        ctx.fillStyle = '#f39c12';
        ctx.font = 'bold 14px Segoe UI';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('SPIN', cx, cy);
        
        // Outer ring
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
        ctx.strokeStyle = '#f39c12';
        ctx.lineWidth = 5;
        ctx.stroke();
    }
    
    function lightenColor(hex, percent) {
        const num = parseInt(hex.replace('#', ''), 16);
        const r = Math.min(255, (num >> 16) + percent);
        const g = Math.min(255, ((num >> 8) & 0x00FF) + percent);
        const b = Math.min(255, (num & 0x0000FF) + percent);
        return `rgb(${r},${g},${b})`;
    }
    
    // ==================== SPIN LOGIC ====================
    function getWinningIndex(finalAngle) {
        // Normalize angle (pointer is at top = -PI/2)
        const normalized = ((finalAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
        const pointerAngle = (2 * Math.PI - normalized + Math.PI / 2) % (2 * Math.PI);
        return Math.floor(pointerAngle / ARC) % SEG_COUNT;
    }
    
    async function startSpin() {
        if (isSpinning) return;
        if (!spinAvailable) return toast('❌ Today\'s spin already used!', 'error');
        
        const token = localStorage.getItem('auth_token');
        if (!token || token === 'guest') return toast('❌ Please login first!', 'error');
        
        isSpinning = true;
        const btn = document.getElementById('spinBtn');
        btn.disabled = true;
        btn.innerHTML = '🎰 SPINNING...<span class="remaining">Good luck!</span>';
        
        // Random winning segment (weighted)
        const weights = [8, 8, 7, 4, 10, 3, 6, 1]; // SUPER = rarest
        const totalWeight = weights.reduce((a, b) => a + b, 0);
        let random = Math.random() * totalWeight;
        let winningIndex = 0;
        for (let i = 0; i < weights.length; i++) {
            random -= weights[i];
            if (random <= 0) { winningIndex = i; break; }
        }
        
        // Calculate final angle
        const fullSpins = 5 + Math.floor(Math.random() * 5); // 5-10 full rotations
        const targetAngle = winningIndex * ARC + ARC / 2;
        const finalAngle = currentAngle + (fullSpins * 2 * Math.PI) + (2 * Math.PI - (currentAngle % (2 * Math.PI))) + targetAngle;
        
        // Animate
        const duration = 4000 + Math.random() * 1000; // 4-5 seconds
        const startAngle = currentAngle;
        const startTime = Date.now();
        
        function animate() {
            const elapsed = Date.now() - startTime;
            const progress = Math.min(elapsed / duration, 1);
            
            // Ease-out cubic
            const eased = 1 - Math.pow(1 - progress, 3);
            const angle = startAngle + (finalAngle - startAngle) * eased;
            
            currentAngle = angle;
            drawWheel(angle);
            
            if (progress < 1) {
                requestAnimationFrame(animate);
            } else {
                // Spin complete
                currentAngle = finalAngle % (2 * Math.PI);
                const seg = SEGMENTS[winningIndex];
                
                // Save to DB
                saveSpinResult(seg, winningIndex);
                
                // Update state
                spinAvailable = false;
                lastSpinDate = new Date().toDateString();
                localStorage.setItem('lastSpinDate', lastSpinDate);
                
                // Update button
                btn.disabled = false;
                btn.innerHTML = '🎰 SPIN NOW<span class="remaining">Come back tomorrow!</span>';
                isSpinning = false;
                
                // Show result
                showResult(seg);
                
                // Schedule reset
                scheduleReset();
            }
        }
        
        requestAnimationFrame(animate);
    }
    
    async function saveSpinResult(seg, index) {
        const token = localStorage.getItem('auth_token');
        try {
            await fetch('/api/spin/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: token,
                    reward_type: seg.type,
                    reward_amount: seg.reward,
                    segment_label: seg.label,
                    segment_index: index
                })
            });
            // Reload balance
            loadBalance();
        } catch(e) {}
    }
    
    function showResult(seg) {
        const overlay = document.getElementById('resultOverlay');
        const icon = document.getElementById('resultIcon');
        const text = document.getElementById('resultText');
        const amount = document.getElementById('resultAmount');
        
        if (seg.type === 'usd') {
            icon.textContent = '💵';
            text.textContent = 'You Won!';
            amount.textContent = `$${seg.reward.toFixed(2)} USD`;
            amount.style.color = '#2ecc71';
        } else if (seg.type === 'mmk') {
            icon.textContent = '💰';
            text.textContent = 'You Won!';
            amount.textContent = `${seg.reward} Ks`;
            amount.style.color = '#f39c12';
        } else if (seg.type === 'free') {
            icon.textContent = '🔄';
            text.textContent = 'Free Spin!';
            amount.textContent = 'Spin Again Tomorrow';
            amount.style.color = '#1abc9c';
        } else if (seg.type === 'super') {
            icon.textContent = '👑';
            text.textContent = 'SUPER PRIZE!';
            amount.textContent = 'Coming Soon...';
            amount.style.color = '#e91e63';
        } else {
            icon.textContent = '😊';
            text.textContent = 'Thank You!';
            amount.textContent = 'Better luck next time';
            amount.style.color = '#7f8c8d';
        }
        
        overlay.classList.add('active');
    }
    
    function closeResult() {
        document.getElementById('resultOverlay').classList.remove('active');
    }
    
    // ==================== RESET SYSTEM ====================
    function scheduleReset() {
        const now = new Date();
        const tomorrow = new Date(now);
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(0, 0, 0, 0);
        const msUntilReset = tomorrow.getTime() - now.getTime();
        
        // Update timer
        updateResetTimer(msUntilReset);
        
        // Auto reset at midnight
        setTimeout(() => {
            spinAvailable = true;
            lastSpinDate = null;
            localStorage.removeItem('lastSpinDate');
            document.getElementById('spinBtn').innerHTML = '🎰 SPIN NOW<span class="remaining">Free Spin: 1 remaining</span>';
            document.getElementById('spinBtn').disabled = false;
            document.getElementById('resetTimer').textContent = '';
        }, msUntilReset);
    }
    
    function updateResetTimer(ms) {
        const timer = document.getElementById('resetTimer');
        const update = () => {
            const remaining = ms - (Date.now() - (new Date().setHours(0,0,0,0) === 0 ? 0 : 0));
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(0, 0, 0, 0);
            const rem = tomorrow.getTime() - Date.now();
            
            if (rem <= 0) {
                timer.textContent = '';
                return;
            }
            const h = Math.floor(rem / 3600000);
            const m = Math.floor((rem % 3600000) / 60000);
            const s = Math.floor((rem % 60000) / 1000);
            timer.textContent = `⏰ Reset in: ${h}h ${m}m ${s}s`;
        };
        update();
        setInterval(update, 30000);
    }
    
    // ==================== BALANCE ====================
    async function loadBalance() {
        const token = localStorage.getItem('auth_token');
        if (!token || token === 'guest') return;
        try {
            const r = await fetch('/api/get_balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const d = await r.json();
            document.getElementById('mmkBalance').textContent = (d.balance || 0).toLocaleString() + ' Ks';
            
            // Get USD balance
            const ur = await fetch('/api/get_usd_balance', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            const ud = await ur.json();
            document.getElementById('usdBalance').textContent = '$' + (ud.usd_balance || 0).toFixed(2);
        } catch(e) {}
    }
    
    // ==================== INIT ====================
    function init() {
        // Check last spin date
        lastSpinDate = localStorage.getItem('lastSpinDate');
        const today = new Date().toDateString();
        
        if (lastSpinDate === today) {
            spinAvailable = false;
            document.getElementById('spinBtn').innerHTML = '🎰 SPIN NOW<span class="remaining">Come back tomorrow!</span>';
        } else {
            spinAvailable = true;
            document.getElementById('spinBtn').innerHTML = '🎰 SPIN NOW<span class="remaining">Free Spin: 1 remaining</span>';
        }
        
        // Draw initial wheel
        drawWheel(currentAngle);
        
        // Load balance
        loadBalance();
        
        // Schedule reset
        if (!spinAvailable) {
            scheduleReset();
        }
        
        // Refresh balance every 30s
        setInterval(loadBalance, 30000);
    }
    
    init();
</script>
</body>
</html>
