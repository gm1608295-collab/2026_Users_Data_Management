<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root{--bg:#0c0e27;--p:#1a1f4b;--a:#4a1c7a;--w:#f39c12;--b:#3498db;--t:#fff;--r:#e74c3c;--g:#2ecc71;--pk:#e91e75}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);min-height:100vh;padding:15px;overflow-y:auto}
        .container{max-width:500px;margin:0 auto}
        .header{display:flex;align-items:center;gap:10px;margin-bottom:15px;background:linear-gradient(to right,var(--a),var(--p));padding:12px 15px;border-radius:10px;border-bottom:3px solid var(--w)}
        .header a{color:var(--w);font-size:20px;text-decoration:none}
        .header h2{color:var(--w);font-size:16px}
        .contact-table{width:100%;border-collapse:collapse;font-size:12px;background:rgba(26,31,75,0.6);border-radius:10px;overflow:hidden}
        .contact-table th{background:rgba(0,0,0,0.3);color:var(--w);padding:10px;text-align:left}
        .contact-table td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.05)}
        .ct-gmail{color:var(--r)}.ct-phone{color:var(--g)}.ct-telegram{color:var(--b)}.ct-tiktok{color:var(--pk)}
        .contact-table button{padding:6px 12px;border:none;border-radius:4px;font-size:11px;cursor:pointer;background:var(--a);color:#fff}
        .email-link{font-size:12px;color:var(--b);text-align:center;cursor:pointer;text-decoration:underline;margin-top:15px;display:block}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:2000;justify-content:center;align-items:center}
        .modal.active{display:flex}
        .modal-box{background:var(--p);border:2px solid var(--w);border-radius:10px;padding:20px;width:90%;max-width:400px}
        .modal-box h3{color:var(--w);margin-bottom:12px;text-align:center}
        .modal-close{float:right;color:var(--r);cursor:pointer;font-size:20px}
        .form-group{margin-bottom:10px}
        .form-group label{display:block;font-size:12px;margin-bottom:4px;color:#ccc}
        .form-group input,.form-group textarea{width:100%;padding:10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);border-radius:6px;color:var(--t);font-size:13px}
        .btn{padding:10px 20px;border:none;border-radius:6px;font-size:13px;font-weight:bold;cursor:pointer;background:var(--g);color:#000}
        .notif{position:fixed;top:20px;right:20px;padding:10px 15px;border-radius:5px;display:none;z-index:1000;font-size:12px}
    </style>
</head>
<body>
    <div class="notif" id="notif"></div>
    <div class="container">
        <div class="header">
            <a href="/dashboard"><i class="fas fa-arrow-left"></i></a>
            <h2><i class="fas fa-address-book"></i> Contact</h2>
        </div>
        <table class="contact-table">
            <tr><th>Type</th><th>Info</th><th>Action</th></tr>
            <tr onclick="contactG('gm1608295@gmail.com')"><td><i class="fas fa-envelope"></i> Gmail</td><td class="ct-gmail">gm1608295@gmail.com</td><td style="text-align:center"><button>Open</button></td></tr>
            <tr onclick="contactP('09672093790')"><td><i class="fas fa-phone"></i> Phone</td><td class="ct-phone">09672093790</td><td style="text-align:center"><button>Call</button></td></tr>
            <tr onclick="contactT('@Solo_m28')"><td><i class="fab fa-telegram"></i> Telegram</td><td class="ct-telegram">@Solo_m28</td><td style="text-align:center"><button>Chat</button></td></tr>
            <tr onclick="contactTik('sologamer149')"><td><i class="fab fa-tiktok"></i> TikTok</td><td class="ct-tiktok">@sologamer149</td><td style="text-align:center"><button>View</button></td></tr>
        </table>
        <div class="email-link" onclick="openEmail()"><i class="fas fa-envelope"></i> Send us a message via Email</div>
    </div>
    
    <div class="modal" id="emailModal"><div class="modal-box"><span class="modal-close" onclick="closeEmail()">&times;</span><h3>Send Message</h3><div class="form-group"><label>Name</label><input type="text" id="emName"></div><div class="form-group"><label>Email</label><input type="email" id="emEmail"></div><div class="form-group"><label>Message</label><textarea id="emMsg" rows="3"></textarea></div><button class="btn" onclick="sendEmail()"><i class="fas fa-paper-plane"></i> Send</button></div></div>

<script>
    emailjs.init("tsKN2j9o6RYK4KeEp");
    function n(m,t="success"){const e=document.getElementById("notif");e.textContent=m;e.style.background=t==="success"?"#2ecc71":"#e74c3c";e.style.display="block";setTimeout(()=>e.style.display="none",3000)}
    function contactG(e){window.open('mailto:'+e)}
    function contactP(p){window.open('tel:'+p)}
    function contactT(u){window.open('https://t.me/'+u.replace('@',''))}
    function contactTik(u){window.open("https://www.tiktok.com/@"+u)}
    function openEmail(){document.getElementById("emailModal").classList.add("active")}
    function closeEmail(){document.getElementById("emailModal").classList.remove("active")}
    function sendEmail(){const na=document.getElementById("emName").value,em=document.getElementById("emEmail").value,ms=document.getElementById("emMsg").value;if(!na||!em||!ms)return n("Fill required","error");emailjs.send("service_3akzfls","template_xqygsga",{from_name:na,from_email:em,message:ms}).then(()=>{n("Sent!");closeEmail()}).catch(()=>n("Error","error"))}
</script>
</body>
</html>
