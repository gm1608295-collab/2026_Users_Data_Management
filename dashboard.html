<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0c0e27;--p:#1a1f4b;--a:#4a1c7a;--r:#e74c3c;--g:#2ecc71;--w:#f39c12;--b:#3498db;--t:#fff}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);min-height:100vh;padding:10px;overflow-y:auto}
        .container{max-width:500px;margin:0 auto}
        .header{background:linear-gradient(to right,var(--a),var(--p));padding:15px;text-align:center;border-radius:12px;border-bottom:4px solid var(--w);margin-bottom:12px}
        .header .brand{font-size:18px;font-weight:bold;color:var(--w);animation:blink 1.5s ease-in-out infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
        .header .subtitle{font-size:11px;opacity:0.8}
        .header .refresh-btn{position:absolute;top:15px;left:15px;color:var(--w);font-size:14px;cursor:pointer}
        .content{padding:5px 15px}
        
        .id-panel{background:rgba(26,31,75,0.6);border:1px solid rgba(74,28,122,0.5);border-radius:10px;padding:12px 15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
        .id-left{display:flex;flex-direction:column;gap:4px}
        .id-email{font-size:11px;color:rgba(255,255,255,0.5)}
        .id-row{display:flex;align-items:center;gap:6px}
        .id-label{font-size:14px;font-weight:bold;color:var(--w)}
        .id-number{font-size:14px;font-weight:bold;color:var(--t);font-family:'Courier New',monospace}
        .id-copy-btn{color:var(--b);cursor:pointer;font-size:12px}
        .id-help-btn{color:var(--w);cursor:pointer;font-size:11px;background:rgba(255,255,255,0.1);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-weight:bold}
        .id-right{text-align:right}
        .id-time{font-size:14px;font-weight:bold;color:var(--w)}
        .id-date{font-size:9px;color:rgba(255,255,255,0.5)}

        .marquee-box{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:6px 10px;margin-bottom:10px;overflow:hidden;height:28px;display:flex;align-items:center}
        .marquee-text{font-size:12px;color:rgba(255,255,255,0.8);white-space:nowrap;animation:marquee 25s linear infinite}
        @keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

        .slider-container{background:rgba(26,31,75,0.6);border:1px solid rgba(74,28,122,0.5);border-radius:10px;margin-bottom:10px;overflow:hidden}
        .slider-wrapper{display:flex;transition:transform 0.5s ease-in-out}
        .slider-slide{min-width:100%}
        .slider-slide img{width:100%;height:auto;max-height:180px;object-fit:contain;padding:3px}
        .slider-dots{display:flex;justify-content:center;gap:6px;padding:6px 0;background:rgba(0,0,0,0.3)}
        .slider-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3)}
        .slider-dot.active{background:var(--w);width:18px;border-radius:4px}

        .notice-banner{background:rgba(26,31,75,0.6);border:1px solid rgba(74,28,122,0.5);border-radius:10px;padding:10px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
        .notice-banner .notice-icon{font-size:24px;color:var(--w)}
        .notice-banner .notice-msg{font-size:12px;font-weight:bold}
        .notice-banner .notice-time{font-size:9px;color:rgba(255,255,255,0.5)}

        .sec-note{background:rgba(255,193,7,0.1);border-left:4px solid var(--w);padding:8px;border-radius:6px;margin-top:10px;font-size:11px}
        .footer{text-align:center;padding:10px;color:rgba(255,255,255,0.7);font-size:10px;border-top:1px solid rgba(74,28,122,0.5)}
        
        .confirm-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:7000;justify-content:center;align-items:center}
        .confirm-modal.active{display:flex}
        .confirm-box{background:var(--p);border:2px solid var(--w);border-radius:12px;padding:25px;width:90%;max-width:350px;text-align:center}
        .confirm-box h3{color:var(--w);margin-bottom:15px}
        .confirm-btns{display:flex;gap:10px;justify-content:center}
        .confirm-btns button{padding:10px 25px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:13px}
        .confirm-yes{background:var(--r);color:#fff}.confirm-no{background:rgba(255,255,255,0.2);color:#fff}
        
        .banned-container{text-align:center;padding:40px 20px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
        .banned-icon{font-size:80px;margin-bottom:20px}
        .banned-title{color:var(--r);font-size:20px;font-weight:bold}
        .banned-contact{background:rgba(0,0,0,0.3);padding:18px;border-radius:10px;max-width:350px;width:100%;margin-bottom:20px;text-align:left}
        .banned-contact h4{color:var(--w);font-size:13px;text-align:center}
        .banned-contact p{font-size:12px;margin:6px 0}
        .banned-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
        .banned-btns button{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:12px}
        .btn-stay{background:rgba(255,255,255,0.2);color:var(--t)}.btn-new{background:var(--b);color:var(--t)}
    </style>
</head>
<body>
    <audio id="bgAudio" loop style="display:none"></audio>
    <div class="container">
        <div class="header">
            <div class="refresh-btn" onclick="refreshPage()"><i class="fas fa-sync-alt"></i></div>
            <div class="brand">SOLO M Game Shop</div>
            <div class="subtitle">Security & Data Management</div>
            <button onclick="confirmLogout()" style="background:var(--r);color:#fff;border:none;padding:6px 18px;border-radius:5px;cursor:pointer;margin-top:8px;font-size:13px"><i class="fas fa-sign-out-alt"></i> Logout</button>
            <div class="marquee-box" style="margin-top:8px">
                <span class="marquee-text">ingame items, MLBB Redeem Code များဝယ်ယူလိုပါက Menu မှတစ်ဆင့် Top Up နှင့် Buy Code တို့ကို အသုံးပြုနိုင်ပါသည်</span>
            </div>
        </div>
        
        <div class="content">
            <div class="id-panel">
                <div class="id-left">
                    <div class="id-email" id="myEmail">---</div>
                    <div class="id-row">
                        <span class="id-label">U ID -</span>
                        <span class="id-number" id="myUserIdDisp">------</span>
                        <span class="id-copy-btn" onclick="copyUserId()" title="Copy ID"><i class="fas fa-copy"></i></span>
                        <span class="id-help-btn" onclick="openIdHelp()">?</span>
                    </div>
                </div>
                <div class="id-right">
                    <div class="id-time" id="localTime">---</div>
                    <div class="id-date" id="localDate">---</div>
                </div>
            </div>

            <div class="slider-container" id="sliderContainer" style="display:none">
                <div class="slider-wrapper" id="sliderWrapper"></div>
                <div class="slider-dots" id="sliderDots"></div>
            </div>

            <div class="notice-banner" id="noticeBanner" style="display:none">
                <div class="notice-icon" id="noticeIcon"><i class="fas fa-bullhorn"></i></div>
                <div class="notice-text">
                    <div class="notice-msg" id="noticeMsgDisplay"></div>
                    <div class="notice-time" id="noticeTime"></div>
                </div>
            </div>
            
            <div class="sec-note"><strong>System Security:</strong> All data is encrypted.</div>
        </div>
        <div class="footer">© 2026 SOLO M Game Shop</div>
    </div>

    <div class="confirm-modal" id="logoutConfirmModal">
        <div class="confirm-box">
            <h3><i class="fas fa-sign-out-alt"></i> Logout</h3>
            <p>အကောင့်မှထွက်မှာသေချာပါသလား?</p>
            <div class="confirm-btns">
                <button class="confirm-yes" onclick="logout()">Yes, Logout</button>
                <button class="confirm-no" onclick="closeLogoutConfirm()">Cancel</button>
            </div>
        </div>
    </div>

<script>
    function refreshPage(){window.location.href='/dashboard'}
    function confirmLogout(){document.getElementById("logoutConfirmModal").classList.add("active")}
    function closeLogoutConfirm(){document.getElementById("logoutConfirmModal").classList.remove("active")}
    function copyUserId(){const id=document.getElementById("myUserIdDisp").textContent;if(id==='------')return;navigator.clipboard.writeText(id).then(()=>alert("✅ ID Copied!"))}
    function maskEmail(email){if(!email)return'---';const p=email.split('@');if(p.length<2)return'****'+email.slice(-2);const n=p[0],d=p[1];if(n.length<=4)return n[0]+'***@'+d;return n.slice(0,2)+'****'+n.slice(-1)+'@'+d}
    function updateTime(){const now=new Date();document.getElementById("localTime").textContent=now.toLocaleTimeString('my-MM',{hour:'2-digit',minute:'2-digit',second:'2-digit'});document.getElementById("localDate").textContent=now.toLocaleDateString('my-MM',{year:'numeric',month:'short',day:'numeric'})}
    setInterval(updateTime,1000);updateTime();
    async function logout(){try{await fetch("/api/logout",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:localStorage.getItem("auth_token")})})}catch(e){}localStorage.removeItem("auth_token");localStorage.removeItem("user");window.location.href="/"}

    // Slider
    let sliderImages=[],currentSlide=0,slideInterval=null;
    function renderSlider(){const c=document.getElementById('sliderContainer'),w=document.getElementById('sliderWrapper'),d=document.getElementById('sliderDots');const ca=localStorage.getItem('sliderImagesCache');if(ca){try{sliderImages=JSON.parse(ca)}catch(e){sliderImages=[]}}if(!sliderImages||sliderImages.length===0){c.style.display='none';return}c.style.display='block';w.innerHTML=sliderImages.map(u=>`<div class="slider-slide"><img src="${u}"></div>`).join('');d.innerHTML=sliderImages.map((_,i)=>`<div class="slider-dot ${i===currentSlide?'active':''}"></div>`).join('');goToSlide(currentSlide);if(sliderImages.length>1)slideInterval=setInterval(()=>{currentSlide=(currentSlide+1)%sliderImages.length;goToSlide(currentSlide)},4000)}
    function goToSlide(i){currentSlide=i;document.getElementById('sliderWrapper').style.transform=`translateX(-${i*100}%)`;document.querySelectorAll('.slider-dot').forEach((d,j)=>{d.classList.toggle('active',j===i)})}
    async function loadSliderImages(){renderSlider();try{const r=await fetch('/api/slider_images');const d=await r.json();if(d.success&&d.images&&d.images.length>0){localStorage.setItem('sliderImagesCache',JSON.stringify(d.images));sliderImages=d.images;renderSlider()}else{localStorage.removeItem('sliderImagesCache');document.getElementById('sliderContainer').style.display='none'}}catch(e){}}

    // Notice
    function renderNotice(d){const b=document.getElementById('noticeBanner'),i=document.getElementById('noticeIcon'),m=document.getElementById('noticeMsgDisplay'),t=document.getElementById('noticeTime');if(d&&d.message){b.style.display='flex';m.textContent=d.message;m.style.color=d.color||'var(--t)';i.style.color=d.color||'var(--w)';t.textContent=new Date(d.created_at).toLocaleString()}else b.style.display='none'}
    async function loadNotice(){const ca=localStorage.getItem('noticeCache');if(ca){try{const d=JSON.parse(ca);if(d.message)renderNotice(d)}catch(e){}}try{const r=await fetch("/api/notice");const d=await r.json();if(d.success&&d.message){const cn={message:d.message,color:d.color,id:d.id,created_at:d.created_at};localStorage.setItem('noticeCache',JSON.stringify(cn));renderNotice(cn)}else{localStorage.removeItem('noticeCache')}}catch(e){}}

    // BG Music
    (function(){const a=document.getElementById('bgAudio');let playlist=[],currentIndex=parseInt(localStorage.getItem('bgMusicIndex')||'0');a.volume=0.6;
    async function check(){try{const r=await fetch('/api/bg_music?t='+Date.now());const d=await r.json();if(d.playlist&&d.playlist.length>0){const nl=JSON.stringify(d.playlist),ol=JSON.stringify(playlist);if(nl!==ol){playlist=d.playlist;currentIndex=0;play()}else if(a.paused&&a.src){const t=localStorage.getItem('bgMusicTime_'+currentIndex);if(t)a.currentTime=parseFloat(t);a.play().catch(()=>{})}}else{a.pause();a.src='';playlist=[]}}catch(e){}}
    function play(){if(!playlist.length)return;if(currentIndex>=playlist.length)currentIndex=0;const url=playlist[currentIndex];if(a.src!==url){a.src=url;a.addEventListener('canplay',function(){const t=localStorage.getItem('bgMusicTime_'+currentIndex);if(t)a.currentTime=parseFloat(t);a.play().catch(()=>{})},{once:true})}else{a.play().catch(()=>{})}}
    a.addEventListener('ended',function(){localStorage.setItem('bgMusicTime_'+currentIndex,a.currentTime);currentIndex=(currentIndex+1)%playlist.length;localStorage.setItem('bgMusicIndex',currentIndex);localStorage.setItem('bgMusicTime_'+currentIndex,'0');play()});
    setInterval(()=>{if(!a.paused&&playlist.length>0){localStorage.setItem('bgMusicIndex',currentIndex);localStorage.setItem('bgMusicTime_'+currentIndex,a.currentTime)}},500);
    check();setInterval(check,5000)})();

    window.onload=async function(){
        if(!localStorage.getItem("auth_token")){window.location.href="/";return}
        const user=JSON.parse(localStorage.getItem("user")||'{}');
        document.getElementById("myUserIdDisp").textContent=user.id?user.id.toString().padStart(6,'0'):'------';
        document.getElementById("myEmail").textContent=maskEmail(user.email||'');
        loadSliderImages();loadNotice();
        fetch("/api/track_login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:user.id,username:user.username,email:user.email,loginType:user.login_type})});
        if(user.id){const r=await fetch("/api/check_banned",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:user.id.toString()})});const d=await r.json();if(d.banned){document.body.innerHTML=`<div class="banned-container"><div class="banned-icon">🚫</div><h2 class="banned-title">သင်၏အကောင့် ဘန်းခံထားရပါသည်</h2><div class="banned-contact"><h4>ဆက်သွယ်ရန်</h4><p>📧 gm1608295@gmail.com</p><p>📞 09672093790</p><p>💬 @Solo_m28</p></div><div class="banned-btns"><button class="btn-stay" onclick="location.reload()">ဆက်နေမည်</button><button class="btn-new" onclick="localStorage.clear();window.location.href='/'">အကောင့်သစ်ဖွင့်မည်</button></div></div>`;return}}
    };
</script>
</body>
</html>
