<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Recovery - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0c0e27;--p:#1a1f4b;--a:#4a1c7a;--w:#f39c12;--t:#fff}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);min-height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;padding:20px}
        .header a{color:var(--w);font-size:20px;text-decoration:none;position:fixed;top:15px;left:15px}
        i{font-size:60px;color:var(--w);display:block;margin-bottom:20px}
        h2{color:var(--w);margin-bottom:10px}
        p{color:rgba(255,255,255,0.7);font-size:14px}
        a.back{color:var(--w);text-decoration:none;margin-top:20px;display:inline-block;padding:10px 20px;border:1px solid var(--w);border-radius:5px}
    </style>
</head>
<body>
    <a href="/dashboard" class="header"><i class="fas fa-arrow-left"></i></a>
    <div>
        <i class="fas fa-tools"></i>
        <h2>Recovery</h2>
        <p>Feature Coming Soon</p>
        <a href="/dashboard" class="back">Back to Dashboard</a>
    </div>
<script>
    // Ban Check
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (user.id) {
    const r = await fetch("/api/check_banned", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId: user.id.toString() })
    });
    const d = await r.json();
    if (d.banned) {
        document.body.innerHTML = `<div class="banned-container">
            <div class="banned-icon">🚫</div>
            <h2>သင်၏အကောင့် ဘန်းခံထားရပါသည်</h2>
            <p>Admin မှ သင့်အကောင့်အား ပိတ်ပင်ထားပါသည်။</p>
            <button onclick="localStorage.clear();window.location.href='/'">အကောင့်သစ်ဖွင့်မည်</button>
        </div>`;
        return; // Stop page from loading
    }
}
    </script>
</body>
</html>
