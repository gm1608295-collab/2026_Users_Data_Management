<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PUBG - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0a0a1a;--p:#1a1f4b;--a:#4a1c7a;--w:#f39c12;--g:#2ecc71;--t:#fff;--r:#e74c3c;--b:#3498db}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
html,body{height:auto!important;min-height:100vh!important;overflow-y:auto!important;-webkit-overflow-scrolling:touch!important}
body{background:linear-gradient(160deg,#0a0d24 0%,#0f1235 50%,#080b1a 100%);color:var(--t);min-height:100vh;padding:12px;overflow-y:auto!important}
.container{max-width:500px;margin:0 auto;padding-bottom:30px}

/* ========== HEADER ========== */
.header{display:flex;align-items:center;gap:10px;margin-bottom:14px;background:linear-gradient(135deg,#1a0a2e,#2d1b4e);padding:14px 16px;border:1.5px solid rgba(255,255,255,0.1);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(243,156,18,0.05),transparent);animation:headerShine 3s infinite}
@keyframes headerShine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.header a{color:var(--w);font-size:18px;text-decoration:none;flex-shrink:0;z-index:1;transition:all 0.2s}
.header a:hover{transform:scale(1.1)}
.header h2{color:var(--w);font-size:15px;font-weight:700;z-index:1}

/* ========== BALANCE CARD (LED BORDER) ========== */
.balance-bar{display:flex;gap:8px;margin-bottom:12px}
.bal-card{flex:1;background:rgba(255,255,255,0.03);border:2px solid #f39c12;padding:14px 12px;text-align:center;position:relative;overflow:hidden;animation:ledBorderBalance 2s linear infinite}
@keyframes ledBorderBalance{
0%{border-color:#f39c12;box-shadow:0 0 10px #f39c12,0 0 20px rgba(243,156,18,0.3)}
25%{border-color:#e74c3c;box-shadow:0 0 10px #e74c3c,0 0 20px rgba(231,76,60,0.3)}
50%{border-color:#2ecc71;box-shadow:0 0 10px #2ecc71,0 0 20px rgba(46,204,113,0.3)}
75%{border-color:#3498db;box-shadow:0 0 10px #3498db,0 0 20px rgba(52,152,219,0.3)}
100%{border-color:#f39c12;box-shadow:0 0 10px #f39c12,0 0 20px rgba(243,156,18,0.3)}
}
.bal-value{font-size:20px;font-weight:700;color:var(--w);position:relative;z-index:1}
.bal-label{font-size:8px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;position:relative;z-index:1}

/* ========== CATEGORY TABS ========== */
.category-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.category-tab{padding:8px 14px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);font-size:10px;font-weight:600;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.3s;white-space:nowrap;backdrop-filter:blur(5px)}
.category-tab:hover{background:rgba(243,156,18,0.1);border-color:rgba(243,156,18,0.3);color:#fff}
.category-tab.active{background:linear-gradient(135deg,var(--w),#e67e22);color:#000;border-color:var(--w);font-weight:700;box-shadow:0 4px 15px rgba(243,156,18,0.3)}

/* ========== SECTION TITLE ========== */
.category-section-title{font-size:11px;font-weight:700;color:var(--w);margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:8px}
.cat-dot{width:8px;height:8px;background:var(--w);animation:dotPulse 1.5s infinite}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ========== PRODUCT GRID (3 PER ROW) ========== */
.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}

/* ========== PRODUCT CARD (GOLD GAMING - SHARP CORNERS) ========== */
.product-card{background:linear-gradient(160deg,#1a1000,#2d1800,#1a0c00);border:2px solid #b8860b;padding:14px 6px 10px;text-align:center;cursor:pointer;transition:all 0.3s cubic-bezier(0.25,0.8,0.25,1.2);position:relative;overflow:hidden;box-shadow:0 4px 15px rgba(184,134,11,0.3),inset 0 1px 0 rgba(255,215,0,0.1)}
.product-card::before{content:'';position:absolute;top:-50%;left:-100%;width:60%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,215,0,0.15),rgba(255,255,255,0.2),rgba(255,215,0,0.15),transparent);transform:skewX(-25deg);animation:goldSweep 3s ease-in-out infinite;z-index:3;pointer-events:none}
@keyframes goldSweep{0%{left:-100%}100%{left:150%}}
.product-card::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 0%,rgba(255,215,0,0.2),transparent 70%);opacity:0;transition:opacity 0.4s;z-index:1;pointer-events:none}
.product-card:hover::after{opacity:1}
.product-card:hover{border-color:#ffd700;transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.4),0 0 25px rgba(255,215,0,0.3),0 0 50px rgba(255,215,0,0.1)}
.product-card:active{transform:scale(0.95)}
.product-card.selected{border-color:#2ecc71;background:linear-gradient(160deg,#0a1a0a,#0d2d0d,#0a1a0a);box-shadow:0 0 25px rgba(46,204,113,0.3),inset 0 1px 0 rgba(46,204,113,0.1)}
.product-card.selected::after{opacity:1;background:radial-gradient(circle at 50% 0%,rgba(46,204,113,0.2),transparent 70%)}
.product-card.selected::before{background:linear-gradient(90deg,transparent,rgba(46,204,113,0.1),rgba(255,255,255,0.15),rgba(46,204,113,0.1),transparent)}
.product-card .checkmark{display:none}
.product-card.selected .checkmark{display:flex;position:absolute;top:6px;right:6px;width:20px;height:20px;background:#2ecc71;color:#000;font-size:11px;font-weight:700;align-items:center;justify-content:center;z-index:5;box-shadow:0 2px 8px rgba(46,204,113,0.4)}

/* ========== IMAGE WRAPPER ========== */
.product-img-wrap{width:56px;height:56px;margin:0 auto 8px;overflow:hidden;border:1.5px solid rgba(255,215,0,0.3);background:rgba(0,0,0,0.6);transition:all 0.3s;position:relative;z-index:2}
.product-card:hover .product-img-wrap{border-color:rgba(255,215,0,0.7);box-shadow:0 0 20px rgba(255,215,0,0.2);transform:scale(1.05)}
.product-img{width:100%;height:100%;object-fit:contain;transition:transform 0.3s}
.product-card:hover .product-img{transform:scale(1.1)}

/* ========== PRODUCT NAME ========== */
.product-name{font-size:8.5px;color:rgba(255,255,255,0.85);font-weight:600;line-height:1.3;min-height:22px;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;transition:color 0.3s}
.product-card:hover .product-name{color:#ffd700}

/* ========== PRICE BOX ========== */
.product-price{font-size:13px;font-weight:700;color:#ffd700;background:rgba(0,0,0,0.7);border:1px solid rgba(255,215,0,0.3);padding:5px 10px;margin-top:4px;display:inline-block;position:relative;z-index:2;letter-spacing:0.5px;text-shadow:0 0 8px rgba(255,215,0,0.4);box-shadow:0 2px 8px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05);transition:all 0.3s}
.product-card:hover .product-price{background:rgba(0,0,0,0.85);border-color:#ffd700;box-shadow:0 4px 15px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1),0 0 15px rgba(255,215,0,0.3);transform:scale(1.05)}

/* ========== ORIGINAL PRICE ========== */
.product-original{font-size:7.5px;color:rgba(255,255,255,0.25);text-decoration:line-through;margin-top:2px;position:relative;z-index:2}

/* ========== DETAIL PANEL ========== */
.detail-panel{display:none;background:rgba(0,0,0,0.6);border:1.5px solid rgba(255,255,255,0.1);padding:18px;margin-bottom:15px;animation:slideUp 0.35s ease;backdrop-filter:blur(15px);position:relative;overflow:hidden}
.detail-panel::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--w),transparent)}
.detail-panel.active{display:block}
.detail-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06)}
.detail-header img{width:50px;height:50px;object-fit:contain;background:rgba(0,0,0,0.4);padding:5px;border:1.5px solid rgba(255,255,255,0.1)}
.detail-name{font-size:14px;font-weight:700;color:#fff}
.detail-price{font-size:18px;font-weight:700;color:var(--w);margin-top:2px}
.detail-original{font-size:9px;color:rgba(255,255,255,0.2);text-decoration:line-through}

/* ========== ID INPUTS ========== */
.id-row{display:flex;gap:8px;margin-bottom:10px}
.id-group{flex:1}
.id-group label{display:block;font-size:8px;color:rgba(255,255,255,0.4);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.id-group input{width:100%;padding:12px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);color:#fff;font-size:14px;text-align:center;font-weight:700;letter-spacing:2px;transition:all 0.3s}
.id-group input:focus{outline:none;border-color:var(--w);box-shadow:0 0 15px rgba(243,156,18,0.1);background:rgba(255,255,255,0.06)}
.id-group input.invalid{border-color:var(--r);animation:shake 0.4s}

/* ========== ACTION BUTTONS ========== */
.action-row{display:flex;gap:8px;margin-top:12px}
.btn-cancel{flex:1;padding:12px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-cancel:hover{background:rgba(255,255,255,0.06);color:#fff}
.btn-buy{flex:2;padding:12px;background:linear-gradient(135deg,var(--w),#e67e22);border:none;color:#000;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.3s}
.btn-buy:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 25px rgba(243,156,18,0.35)}
.btn-buy:disabled{opacity:0.35;cursor:not-allowed;filter:grayscale(40%)}

/* ========== TOAST ========== */
.toast{position:fixed;top:20px;right:20px;padding:12px 18px;z-index:9999;font-size:12px;font-weight:700;display:none;box-shadow:0 8px 30px rgba(0,0,0,0.5);animation:slideIn 0.3s ease}

@keyframes slideUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
     </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    
    <div class="container">
        <div class="header">
            <a href="/topup.html"><i class="fas fa-arrow-left"></i></a>
            <h2>🔫 PUBG Mobile</h2>
        </div>
        
        <div class="balance-bar">
            <div class="bal-card"><div class="bal-label">MMK Balance</div><div class="bal-value" id="mmkBalance">0 Ks</div></div>
        </div>
        
        <div class="product-grid" id="productGrid"></div>
        
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <img id="detailImg" src="" alt="">
                <div>
                    <div class="detail-name" id="detailName"></div>
                    <div class="detail-price" id="detailPrice"></div>
                    <div class="detail-original" id="detailOriginal"></div>
                </div>
            </div>
            <div class="id-row">
                <div class="id-group">
                    <label>🆔 Player ID</label>
                    <input type="text" id="playerId" placeholder="Player ID" maxlength="20" oninput="validateInputs()">
                </div>
            </div>
            <div class="action-row">
                <button class="btn-cancel" onclick="closeDetail()">Cancel</button>
                <button class="btn-buy" id="buyBtn" disabled onclick="purchasePUBG()">
                    <i class="fas fa-shopping-cart"></i> Buy Now
                </button>
            </div>
        </div>
    </div>

    <script>
        const PRODUCTS = [
            { name: '60 UC', img: 'https://i.ibb.co/ccpjJN58/6cff530cefe3c08a01e01353e676d3ad.jpg', price: 4025, original: 4025 },
            { name: '325 UC', img: 'https://i.ibb.co/ccpjJN58/6cff530cefe3c08a01e01353e676d3ad.jpg', price: 20289, original: 20289 },
            { name: '660 UC', img: 'https://i.ibb.co/ccpjJN58/6cff530cefe3c08a01e01353e676d3ad.jpg', price: 40619, original: 40619 },
            { name: '1800 UC', img: 'https://i.ibb.co/ccpjJN58/6cff530cefe3c08a01e01353e676d3ad.jpg', price: 101609, original: 101609 },
            { name: '3850 UC', img: 'https://i.ibb.co/ccpjJN58/6cff530cefe3c08a01e01353e676d3ad.jpg', price: 203259, original: 203259 },
            { name: '8100 UC', img: 'https://i.ibb.co/ccpjJN58/6cff530cefe3c08a01e01353e676d3ad.jpg', price: 406559, original: 406559 }
        ];

        let selectedProduct = null;

        function showToast(msg, type) {
            var t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = type === 'error' ? '#e74c3c' : '#2ecc71';
            t.style.display = 'block';
            setTimeout(function() { t.style.display = 'none'; }, 2500);
        }

        function renderProducts() {
            document.getElementById('productGrid').innerHTML = PRODUCTS.map(function(p, i) {
                var op = p.original > 0 ? '<div class="product-original">' + p.original.toLocaleString() + ' Ks</div>' : '';
                return '<div class="product-card" onclick="selectProduct(' + i + ')" id="card' + i + '">' +
                    '<div class="product-img-wrap"><img class="product-img" src="' + p.img + '" alt="' + p.name + '" onerror="this.src=\'https://i.ibb.co/ccpjJN58/6cff530cefe3c08a01e01353e676d3ad.jpg\'"></div>' +
                    '<div class="product-name">' + p.name + '</div>' +
                    '<div class="product-price">' + p.price.toLocaleString() + ' Ks</div>' + op + '</div>';
            }).join('');
        }

        function selectProduct(index) {
            selectedProduct = PRODUCTS[index];
            document.querySelectorAll('.product-card').forEach(function(c) { c.classList.remove('selected'); });
            document.getElementById('card' + index).classList.add('selected');
            document.getElementById('detailPanel').classList.add('active');
            document.getElementById('detailImg').src = selectedProduct.img;
            document.getElementById('detailName').textContent = selectedProduct.name;
            document.getElementById('detailPrice').textContent = selectedProduct.price.toLocaleString() + ' Ks';
            if (selectedProduct.original > 0) {
                document.getElementById('detailOriginal').textContent = selectedProduct.original.toLocaleString() + ' Ks';
                document.getElementById('detailOriginal').style.display = 'block';
            } else { document.getElementById('detailOriginal').style.display = 'none'; }
            document.getElementById('playerId').value = '';
            document.getElementById('buyBtn').disabled = true;
            document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth' });
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('active');
            selectedProduct = null;
        }

        function validateInputs() {
            var id = document.getElementById('playerId').value.trim();
            document.getElementById('buyBtn').disabled = !(id.length >= 1 && selectedProduct);
        }

        async function purchasePUBG() {
            if (!selectedProduct) return showToast('Select a product', 'error');
            var token = localStorage.getItem('auth_token');
            if (!token || token === 'guest') return showToast('Login required', 'error');
            
            try {
                var r = await fetch('/api/purchase_game_item', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token, game: 'pubg', product_name: selectedProduct.name, price: selectedProduct.price,
                        player_id: document.getElementById('playerId').value.trim()
                    })
                });
                var d = await r.json();
                if (d.success) {
                    showToast('✅ Purchased! Balance: ' + d.new_balance.toLocaleString() + ' Ks');
                    document.getElementById('mmkBalance').textContent = d.new_balance.toLocaleString() + ' Ks';
                    closeDetail();
                } else { showToast(d.message || 'Error', 'error'); }
            } catch(e) { showToast('Connection error', 'error'); }
        }

        async function loadBalance() {
            try {
                var r = await fetch('/api/get_balance', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: localStorage.getItem('auth_token') }) });
                var d = await r.json();
                document.getElementById('mmkBalance').textContent = (d.balance || 0).toLocaleString() + ' Ks';
            } catch(e) {}
        }

        renderProducts();
        loadBalance();
    </script>
</body>
</html>
