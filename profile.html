<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profile - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;padding-top:env(safe-area-inset-top,0px)}
        .coming-soon{text-align:center;max-width:400px}
        .coming-icon{font-size:80px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        .coming-title{font-size:24px;font-weight:700;color:#f39c12;margin-bottom:10px}
        .coming-subtitle{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:8px;line-height:1.6}
        .coming-features{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px 0}
        .coming-feature{font-size:10px;padding:8px 14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;color:rgba(255,255,255,0.5)}
        .coming-btn{display:inline-block;padding:12px 30px;background:linear-gradient(135deg,#f39c12,#e67e22);color:#000;text-decoration:none;border-radius:25px;font-weight:700;font-size:14px;margin-top:15px;transition:all 0.3s}
        .coming-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(243,156,18,0.3)}
    </style>
</head>
<body>
    <div class="coming-soon">
        <div class="coming-icon">👤</div>
        <div class="coming-title">Profile - Coming Soon</div>
        <div class="coming-subtitle">
            Avatar Upload, @Username Change,<br>
            My Groups, Copy Username နှင့်<br>
            Profile Picture System မကြာမီလာမည်
        </div>
        <div class="coming-features">
            <span class="coming-feature">📷 Avatar Upload</span>
            <span class="coming-feature">✏️ @Username</span>
            <span class="coming-feature">👥 My Groups</span>
            <span class="coming-feature">📋 Copy Link</span>
            <span class="coming-feature">🖼️ Photo System</span>
        </div>
        <a href="/chat.html" class="coming-btn"><i class="fas fa-arrow-left"></i> Back to Chat</a>
    </div>
</body>
</html>
