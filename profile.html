<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ကျွန်ုပ်၏ Profile - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1123;
            --surface: #1a1f4b;
            --gold: #f39c12;
            --green: #2ecc71;
            --red: #e74c3c;
            --bronze-solid: #5a2d0c;
            --bronze: #CD7F32;
            --bronze-light: #E8A87C;
            --silver-solid: #5a5a5a;
            --silver: #C0C0C0;
            --silver-light: #E8E8E8;
            --gold-solid: #8B6914;
            --gold-p: #FFD700;
            --gold-light: #FFF8DC;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', -apple-system, sans-serif; }
        body {
            background: var(--bg);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top, 0px));
            display: flex;
            justify-content: center;
        }
        .profile-container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        /* Header Back Button */
        .header-nav {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            color: #fff;
            font-size: 18px;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); }
        .header-nav h2 { flex:1; text-align:center; font-size:18px; color: var(--gold); margin-right: 40px; }

        /* Premium Theme for Body */
        body.bronze-tier { background: linear-gradient(160deg, #2d1a0a, #1a0f07); }
        body.silver-tier { background: linear-gradient(160deg, #1a1a1a, #0a0a0a); }
        body.gold-tier { background: linear-gradient(160deg, #3d2a00, #1a0a00); }

        /* Avatar */
        .avatar-wrap {
            position: relative;
            display: inline-block;
            margin: 15px 0;
        }
        .avatar-img {
            width: 120px; height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.1);
            background: #1a1f4b;
        }
        
        /* Avatar Action Buttons */
        .avatar-actions {
            position: absolute;
            bottom: 0;
            right: -45px; /* Button နှစ်ခုကို ဘေးမှာထားဖို့ */
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .avatar-action-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 2px solid #fff;
            transition: 0.2s;
        }
        .avatar-action-btn:hover { transform: scale(1.1); }
        
        .upload-btn { background: var(--gold); color: #000; }
        .delete-btn { background: var(--red); color: #fff; }
        
        input[type="file"] { display: none; }

        /* Username */
        .username-box {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-top: 5px;
        }
        .username-box h3 {
            font-size: 24px; font-weight: 700;
            background: linear-gradient(135deg, var(--gold), #e67e22);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .edit-icon {
            color: rgba(255,255,255,0.4); cursor: pointer;
            font-size: 14px; transition: 0.2s;
        }
        .edit-icon:hover { color: var(--gold); transform: scale(1.1); }
        .email-text { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 15px; }

        /* Stats */
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin: 20px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 14px 8px;
        }
        .stat-card .num { font-size: 18px; font-weight: 700; color: var(--gold); }
        .stat-card .lbl { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }

        /* My Groups */
        .groups-section { margin-top: 20px; text-align: left; }
        .groups-section h4 { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 10px; padding-left: 4px; }
        .group-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px; border-radius: 10px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 6px; cursor: pointer; transition: 0.2s;
        }
        .group-item:hover { background: rgba(255,255,255,0.06); transform: translateX(4px); }
        .group-item .g-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 16px;
        }
        .group-item .g-name { font-size: 14px; font-weight: 600; flex:1; }
        .group-item .g-count { font-size: 10px; color: rgba(255,255,255,0.3); }

        /* Toast */
        .toast {
            position: fixed; top: 15px; right: 15px;
            padding: 10px 16px; border-radius: 10px;
            background: var(--green); color: #000;
            display: none; z-index: 4000;
            font-size: 11px; font-weight: 700;
        }

        /* Edit Modal */
        .modal-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 18px; width: 90%; max-width: 350px;
        }
        .modal-box h3 { color: var(--gold); margin-bottom: 12px; font-size: 15px; }
        .modal-box input {
            width: 100%; padding: 10px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            color: #fff; font-size: 13px; margin-bottom: 10px;
        }
        .modal-box .btn-row { display: flex; gap: 8px; }
        .modal-box .btn {
            padding: 10px; border: none; border-radius: 10px; font-size: 12px; font-weight: 700;
            cursor: pointer; flex: 1; text-align: center;
        }
        .btn-g { background: var(--green); color: #000; }
        .btn-r { background: var(--red); color: #fff; }
        
        /* Confirm Dialog Overlay */
        .confirm-overlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); z-index: 2000;
            justify-content: center; align-items: center;
        }
        .confirm-overlay.active { display: flex; }
        .confirm-box {
            background: var(--surface); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 18px; width: 90%; max-width: 350px;
            text-align: center;
        }
        .confirm-box h3 { color: var(--red); margin-bottom: 12px; font-size: 15px; }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="profile-container">
        <!-- Header -->
        <div class="header-nav">
            <a href="/chat.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <h2>ကျွန်ုပ်၏ Profile</h2>
        </div>
        
        <!-- Avatar -->
<div class="avatar-wrap">
    <img src="https://i.ibb.co/MyB60kHF/64a831b950c3e3e7d699368b48618dd6.jpg" alt="Avatar" class="avatar-img" id="avatarImg">
    <!-- ✅ ဒီ Button နှစ်ခုကို မိမိအတွက်ပဲ ပြမယ် -->
    <div class="avatar-actions" id="avatarActions" style="display:none;">
        <div class="avatar-action-btn upload-btn" onclick="document.getElementById('avatarFileInput').click()">
            <i class="fas fa-upload"></i>
        </div>
        <div class="avatar-action-btn delete-btn" onclick="confirmDeleteAvatar()">
            <i class="fas fa-trash"></i>
        </div>
    </div>
    <input type="file" id="avatarFileInput" accept="image/*" onchange="uploadAvatar(event)">
</div>

<!-- Username -->
<div class="username-box">
    <h3 id="usernameDisplay">Loading...</h3>
    <!-- ✅ ဒီ Edit Button ကို မိမိအတွက်ပဲ ပြမယ် -->
    <span class="edit-icon" id="editIcon" style="display:none;" onclick="openEditUsername()"><i class="fas fa-pen"></i></span>
</div>
    
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="num" id="groupCount">0</div>
                <div class="lbl">Groups</div>
            </div>
            <div class="stat-card">
                <div class="num" id="premiumTierDisplay">Free</div>
                <div class="lbl">Premium Tier</div>
            </div>
            <div class="stat-card">
                <div class="num" id="memberSince">-</div>
                <div class="lbl">Member Since</div>
            </div>
        </div>
        
        <!-- My Groups -->
        <div class="groups-section">
            <h4><i class="fas fa-users" style="margin-right:6px;"></i> ကျွန်ုပ်၏ Groups</h4>
            <div id="groupsList">
                <div style="color:rgba(255,255,255,0.2); font-size:12px; padding:10px; text-align:center;">Loading groups...</div>
            </div>
        </div>
    </div>

    <!-- Edit Username Modal -->
    <div class="modal-overlay" id="editUsernameModal">
        <div class="modal-box">
            <h3><i class="fas fa-user-edit"></i> Username ပြောင်းရန်</h3>
            <input type="text" id="newUsernameInput" placeholder="Username အသစ်ထည့်ပါ" maxlength="20">
            <div class="btn-row">
                <button class="btn btn-g" onclick="saveUsername()">သိမ်းမယ်</button>
                <button class="btn btn-r" onclick="closeModal('editUsernameModal')">မလုပ်တော့</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Avatar Modal -->
    <div class="confirm-overlay" id="confirmDeleteModal">
        <div class="confirm-box">
            <h3><i class="fas fa-exclamation-triangle"></i> Avatar ဖျက်ရန် သေချာပါသလား?</h3>
            <p style="color:rgba(255,255,255,0.6); font-size:13px; margin-bottom:15px;">
                Avatar ကို ဖျက်လိုက်ပါက Default ပုံသို့ ပြန်ရောက်သွားပါမည်။
            </p>
            <div class="btn-row">
                <button class="btn btn-g" onclick="deleteAvatar()">ဟုတ်ကဲ့၊ ဖျက်မယ်</button>
                <button class="btn btn-r" onclick="closeModal('confirmDeleteModal')">မလုပ်တော့</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== UTILITY ====================
        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.background = isError ? '#e74c3c' : '#2ecc71';
            t.style.color = isError ? '#fff' : '#000';
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function getToken() {
    let t = localStorage.getItem('auth_token');
    
    // Cookie မှာ token ရှိမရှိစစ် (App တွေအတွက်)
    if (!t || t === 'guest') {
        // ဒီနေရာမှာ Cookie ကို ရှင်းရှင်းလင်းလင်း ရှာပါမယ်
        const cookies = document.cookie.split('; ');
        for (let i = 0; i < cookies.length; i++) {
            const parts = cookies[i].split('=');
            if (parts[0] === 'auth_token') {
                t = decodeURIComponent(parts[1]);
                break;
            }
        }
    }

    // Meta tag မှာပါရင် (Telegram Web App / Android WebView တွေအတွက်)
    if (!t || t === 'guest') {
        const metaToken = document.querySelector('meta[name="auth_token"]');
        if (metaToken) {
            t = metaToken.content;
        }
    }
    
    return t;
        }
        
        // ==================== LOAD PROFILE ====================
async function loadProfile() {
    // ✅ 1. URL ကနေ userId ကို ထုတ်ယူမယ်
    const urlParams = new URLSearchParams(window.location.search);
    const targetUserId = urlParams.get('userId'); // e.g., ?userId=42

    // ✅ 2. မိမိ Token ကို ရှာမယ်
    const token = getToken();
    if (!token) {
        document.body.innerHTML = '<div style="text-align:center;padding:50px;color:#e74c3c;">အကောင့်ဝင်ရန် လိုအပ်ပါသည်။ <a href="/" style="color:var(--gold);">Login</a></div>';
        return;
    }

    try {
        // ✅ 3. Server ကို API ခေါ်မယ် (targetUserId ရှိရင် အဲ့ဒါကို ယူ၊ မရှိရင် မိမိ Token ကို ယူ)
        const res = await fetch('/api/chat/user_profile', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json', 
                'Authorization': 'Bearer ' + token // ✅ App အတွက် Header မှာပါထည့်ပေးမယ်
            },
            body: JSON.stringify({ 
                userId: targetUserId || token, 
                viewerId: token 
            })
        });
        const data = await res.json();
        
        if (data.success) {
            document.getElementById('usernameDisplay').textContent = data.username || 'Unknown';
            document.getElementById('emailDisplay').textContent = data.email || 'No email';
            document.getElementById('groupCount').textContent = data.groups?.length || 0;
            
            if (data.avatar_url) {
                document.getElementById('avatarImg').src = data.avatar_url + '?t=' + Date.now();
            }

            // Premium Tier
            const tierEl = document.getElementById('premiumTierDisplay');
            const premiumTier = data.premium_tier || 1;
            
            if (premiumTier === 3) { 
                tierEl.textContent = '🥇 Gold'; 
                document.body.classList.add('gold-tier'); 
            }
            else if (premiumTier === 2) { 
                tierEl.textContent = '🥈 Silver'; 
                document.body.classList.add('silver-tier'); 
            }
            else if (premiumTier === 1) { 
                tierEl.textContent = '🥉 Bronze'; 
                document.body.classList.add('bronze-tier'); 
            }
            else { 
                tierEl.textContent = 'Free'; 
            }

            // Groups
            const groupsList = document.getElementById('groupsList');
            if (data.groups && data.groups.length > 0) {
                groupsList.innerHTML = data.groups.map(g => `
                    <div class="group-item" onclick="window.location.href='/chat.html'">
                        <div class="g-avatar">${g.room_type === 'group' ? '👥' : '💬'}</div>
                        <div class="g-name">${escapeHtml(g.room_name)}</div>
                        <div class="g-count">${g.member_count || 0} members</div>
                    </div>
                `).join('');
            } else {
                groupsList.innerHTML = '<div style="color:rgba(255,255,255,0.2); font-size:12px; padding:10px; text-align:center;">Group မရှိသေးပါ။</div>';
            }

            // ✅ 4. Self / Other ခွဲခြားပြီး Button ပြရန် (Server က ပြန်ပို့တဲ့ id နဲ့ စစ်မယ်)
            const isSelf = !targetUserId || targetUserId == token || data.id == token;
            const avatarActions = document.getElementById('avatarActions');
            const editIcon = document.getElementById('editIcon');

            if (isSelf) {
                avatarActions.style.display = 'flex';
                editIcon.style.display = 'inline-block';
            } else {
                avatarActions.style.display = 'none';
                editIcon.style.display = 'none';
            }

        } else {
            console.error('[PROFILE ERROR] API returned no user');
            document.getElementById('usernameDisplay').textContent = 'Error';
            showToast('Server error', true); // Error ပေါ်အောင် Toast ပြမယ်
        }
    } catch(e) {
        console.error('[PROFILE ERROR]', e);
        document.getElementById('usernameDisplay').textContent = 'Error';
        showToast('Server error', true);
    }
      }
        
        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        // ==================== UPDATE AVATAR (Upload) ====================
        async function uploadAvatar(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) {
                showToast('File size must be less than 5MB', true);
                return;
            }

            const reader = new FileReader();
            reader.onload = async (e) => {
                const base64 = e.target.result;
                const token = getToken();
                
                try {
                    showToast('Uploading image... (please wait)');
                    
                    // 1. Base64 ကို Server API (/api/upload_image) ကိုခေါ်ပြီး URL ရယူမယ်
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 30000);

                    const imgRes = await fetch('/api/upload_image', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ base64: base64 }),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    const imgData = await imgRes.json();

                    if (!imgData.success) {
                        showToast('Image upload failed: ' + (imgData.message || 'Unknown error'), true);
                        return;
                    }

                    const imageUrl = imgData.url; // URL ရပြီ

                    // 2. Avatar URL ကို Server က update_avatar API ကို ပို့မယ်
                    const res = await fetch('/api/chat/update_avatar', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                        body: JSON.stringify({ token: token, avatarUrl: imageUrl })
                    });
                    const data = await res.json();
                    
                    if (data.success) {
    // ✅ ပုံအသစ်ကို Cache မှမယူအောင် `?t=` ထည့်ပြီး ပြပါ
    document.getElementById('avatarImg').src = imageUrl + '?t=' + Date.now();
    showToast('Avatar အသစ် ပြောင်းပြီးပါပြီ!');
} else {
    showToast(data.message || 'Avatar update failed', true);
                    }
                } catch(err) {
                    console.error('[UPLOAD ERROR]', err);
                    if (err.name === 'AbortError') {
                        showToast('Request timed out. Please try a smaller image.', true);
                    } else {
                        showToast('Upload error: ' + err.message, true);
                    }
                }
            };
            reader.readAsDataURL(file);
        }

        // ==================== DELETE AVATAR ====================
        function confirmDeleteAvatar() {
            document.getElementById('confirmDeleteModal').classList.add('active');
        }

        async function deleteAvatar() {
    const token = getToken();
    const defaultAvatar = 'https://i.ibb.co/MyB60kHF/64a831b950c3e3e7d699368b48618dd6.jpg';

    try {
        showToast('Deleting avatar...');
        const res = await fetch('/api/chat/update_avatar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ token: token, avatarUrl: '' })
        });
        const data = await res.json();

        if (data.success) {
            // ✅ ပုံကို Cache မှမယူအောင် `?t=` ထည့်ပြီး ပြပါ
            document.getElementById('avatarImg').src = defaultAvatar + '?t=' + Date.now();
            closeModal('confirmDeleteModal');
            showToast('Avatar ကို ဖျက်ပြီးပါပြီ (Default ပုံသို့ ပြန်ရောက်သွားပါပြီ)');
        } else {
            showToast(data.message || 'Delete failed', true);
        }
    } catch(e) {
        console.error('[DELETE ERROR]', e);
        showToast('Server error', true);
    }
        }

        // ==================== UPDATE USERNAME ====================
        function openEditUsername() {
            document.getElementById('newUsernameInput').value = document.getElementById('usernameDisplay').textContent;
            document.getElementById('editUsernameModal').classList.add('active');
        }

        async function saveUsername() {
            const newUsername = document.getElementById('newUsernameInput').value.trim();
            if (!newUsername || newUsername.length < 3) {
                showToast('Username သည် ၃ လုံးအထက် ရှိရပါမည်။', true);
                return;
            }

            const token = getToken();
            try {
                const res = await fetch('/api/chat/update_username', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ token: token, username: newUsername })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('usernameDisplay').textContent = newUsername;
                    closeModal('editUsernameModal');
                    showToast('Username ပြောင်းပြီးပါပြီ!');
                } else {
                    showToast(data.message || 'Username update failed', true);
                }
            } catch(e) {
                showToast('Server error', true);
            }
        }

        // ==================== INIT ====================
        document.addEventListener('DOMContentLoaded', loadProfile);

    </script>
</body>
</html>
