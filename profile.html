<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profile - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b);color:#fff;min-height:100vh;padding:10px;padding-top:env(safe-area-inset-top,0px);overflow-y:auto}
        .container{max-width:450px;margin:0 auto;padding-bottom:30px}
        
        .page-header{display:flex;align-items:center;gap:8px;padding:8px 10px;margin-bottom:12px;background:linear-gradient(135deg,#4a1c7a,#1a1f4b);border-bottom:2px solid #f39c12;border-radius:0 0 4px 4px}
        .page-header a{text-decoration:none;font-size:14px;transition:0.2s;color:#fff}
        .page-header h3{flex:1;font-size:13px;font-weight:600}
        .back-btn-label{font-size:11px;font-weight:600;padding:4px 10px;border:1px solid rgba(255,255,255,0.2);border-radius:4px;clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);display:inline-flex;align-items:center;gap:4px;color:#fff;text-decoration:none}

        .profile-modal-content{text-align:center}
        .profile-avatar-large{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #f39c12;margin-bottom:10px;cursor:pointer}
        .profile-username{font-size:18px;font-weight:bold;color:#f39c12;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:6px}
        .copy-btn{cursor:pointer;font-size:12px;color:rgba(255,255,255,0.5);padding:4px}
        .copy-btn:hover{color:#fff}
        .profile-groups{margin-top:12px;text-align:left}
        .profile-groups .group-item{padding:8px;background:rgba(0,0,0,0.2);border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:6px;transition:all 0.2s}
        .profile-groups .group-item:hover{background:rgba(255,255,255,0.05)}

        .btn-row{display:flex;gap:6px;margin-top:8px}
        .btn{padding:8px;border:none;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer;flex:1;text-align:center}
        .btn-g{background:#2ecc71;color:#000}.btn-r{background:#e74c3c;color:#fff}.btn-b{background:#3498db;color:#fff}.btn-w{background:#f39c12;color:#000}
        .toast{position:fixed;top:15px;right:15px;padding:8px 14px;border-radius:6px;background:#2ecc71;color:#000;display:none;z-index:4000;font-size:10px;font-weight:600}
        .empty-state{text-align:center;padding:25px;color:rgba(255,255,255,0.25);font-size:11px}
        
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:2000;justify-content:center;align-items:center}
        .modal-overlay.active{display:flex}
        .modal-box{background:linear-gradient(135deg,#1a1f4b,#11112a);border:2px solid #f39c12;border-radius:12px;padding:16px;width:90%;max-width:380px;max-height:80vh;overflow-y:auto}
        .modal-box h3{color:#f39c12;margin-bottom:10px;text-align:center;font-size:15px}
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <div class="container">
        <div class="page-header">
            <a href="/chat.html" class="back-btn-label"><i class="fas fa-arrow-left"></i> Chat</a>
            <h3><i class="fas fa-user-circle"></i> Profile</h3>
        </div>
        <div id="profileContent"><div class="empty-state">Loading...</div></div>
    </div>

<script>
let currentUser=null;
const IMGBB_KEY='55854bc5e01a19fd4793d1df84326d00';
let pendingAvatarFile=null;

function showToast(m,e){e=e||false;const t=document.getElementById('toast');t.textContent=m;t.style.background=e?'#e74c3c':'#2ecc71';t.style.color=e?'#fff':'#000';t.style.display='block';setTimeout(()=>t.style.display='none',2500)}
function escapeHtml(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML}

async function getCurrentUser(){const t=localStorage.getItem('auth_token');if(!t||t==='guest'){document.getElementById('profileContent').innerHTML='<div class="empty-state">Please login</div>';return null}try{const r=await fetch('/api/chat/current_user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})});const d=await r.json();if(d.success){currentUser=d.user;return currentUser}throw new Error('User not found')}catch(e){document.getElementById('profileContent').innerHTML='<div class="empty-state">Error</div>';return null}}

async function loadMyProfile(){
    if(!currentUser){document.getElementById('profileContent').innerHTML='<div class="empty-state">Login required</div>';return}
    try{const r=await fetch('/api/chat/my_profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id})});const d=await r.json();
    let h='<div style="text-align:center;padding:15px">';
    if(d.avatar_url){h+=`<img src="${d.avatar_url}" class="profile-avatar-large" id="myAvatarImg" onclick="uploadProfilePic()" onerror="this.outerHTML='<div class=profile-avatar-large style=background:rgba(255,255,255,0.1);display:inline-flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer onclick=uploadProfilePic()>👤</div>'">`}else{h+='<div class="profile-avatar-large" style="background:rgba(255,255,255,0.1);display:inline-flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer" onclick="uploadProfilePic()">👤</div>'}
    h+='<div class="profile-username">@'+escapeHtml(d.username||currentUser.username)+' <span class="copy-btn" onclick="copyUsername(\''+escapeHtml(d.username||currentUser.username)+'\')"><i class="fas fa-copy"></i></span></div>';
    h+='<div style="font-size:9px;color:rgba(255,255,255,0.4);margin-bottom:8px">'+escapeHtml(d.name||d.username||'User')+'</div>';
    h+='<div style="display:flex;gap:6px;margin-bottom:10px"><input type="text" id="newUsername" value="'+escapeHtml(d.username||'')+'" placeholder="@username" style="flex:1;padding:6px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;font-size:10px"><button class="btn btn-w" onclick="updateUsername()" style="flex:1;font-size:10px">💾 Save</button></div>';
    h+='<div style="display:flex;gap:6px;margin-bottom:10px"><button class="btn btn-b" onclick="uploadProfilePic()" style="flex:1;font-size:10px"><i class="fas fa-camera"></i> Photo</button>';
    if(d.avatar_url){h+='<button class="btn btn-r" onclick="deleteProfilePic()" style="flex:1;font-size:10px"><i class="fas fa-trash"></i> Remove</button>'}h+='</div>';
    if(d.groups&&d.groups.length>0){h+='<div class="profile-groups"><div style="font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:6px">📋 My Groups ('+d.groups.length+')</div>';d.groups.forEach(g=>{h+='<div class="group-item" onclick="window.location.href=\'/group.html?gid='+g.id+'\'">👥 '+escapeHtml(g.room_name)+'</div>'});h+='</div>'}else{h+='<div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:10px">No groups yet</div>'}
    h+='</div>';document.getElementById('profileContent').innerHTML=h}catch(e){document.getElementById('profileContent').innerHTML='<div class="empty-state">Error loading profile</div>'}
}

function uploadProfilePic(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=function(e){const files=e.target.files;if(!files||files.length===0)return;const file=files[0];pendingAvatarFile=file;showAvatarPreview(file,'profile')};i.click()}
function showAvatarPreview(file,type){
    if(!file){showToast('No file selected',true);return}
    const reader=new FileReader();reader.onload=function(e){const html=`<div class="modal-overlay active" id="avatarPreviewModal" onclick="closeAvatarPreview()"><div class="modal-box" onclick="event.stopPropagation()" style="text-align:center"><h3>Preview</h3><img src="${e.target.result}" style="max-width:200px;max-height:200px;border-radius:10px;margin:10px 0"><div class="btn-row"><button class="btn btn-g" onclick="saveAvatar('${type}')">💾 Save</button><button class="btn btn-r" onclick="closeAvatarPreview()">Cancel</button></div></div></div>`;document.body.insertAdjacentHTML('beforeend',html)};reader.onerror=function(){showToast('Failed to read file',true)};reader.readAsDataURL(file);
}
function closeAvatarPreview(){const m=document.getElementById('avatarPreviewModal');if(m)m.remove();pendingAvatarFile=null}
async function saveAvatar(type){
    if(!pendingAvatarFile)return;closeAvatarPreview();showToast('⏳ Uploading...');
    try{const reader=new FileReader();const base64=await new Promise(r=>{reader.onload=e=>r(e.target.result);reader.readAsDataURL(pendingAvatarFile)});
    const fd=new URLSearchParams();fd.append('key',IMGBB_KEY);fd.append('image',base64.split(',')[1]);
    const ir=await fetch('https://api.imgbb.com/1/upload',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd.toString()});const id=await ir.json();
    if(!id.success){showToast('❌ '+(id.error?.message||'Upload failed'),true);return}const url=id.data.url;
    if(type==='profile'){await fetch('/api/chat/update_avatar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id,avatarUrl:url})});showToast('✅ Updated!');loadMyProfile()}
    }catch(e){showToast('❌ '+e.message,true)}
}
async function deleteProfilePic(){if(!confirm('Remove photo?'))return;await fetch('/api/chat/update_avatar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id,avatarUrl:''})});showToast('Removed');loadMyProfile()}
async function updateUsername(){const nu=document.getElementById('newUsername').value.trim();if(!nu||!nu.startsWith('@')){showToast('Must start with @',true);return}try{const r=await fetch('/api/chat/update_username',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id,username:nu.substring(1)})});const d=await r.json();if(d.success){showToast('Updated!');currentUser.username=nu.substring(1);loadMyProfile()}else{showToast(d.message||'Error',true)}}catch(e){showToast('Server error',true)}}
function copyUsername(u){navigator.clipboard.writeText('@'+u).then(()=>showToast('Copied!'))}

// Load user by UID (for viewing other profiles)
async function loadUserProfile(uid){
    try{const r=await fetch('/api/chat/user_profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:uid})});const d=await r.json();
    if(!d.success){showToast('User not found',true);return}
    let h='<div style="text-align:center;padding:15px">';
    if(d.avatar_url){h+=`<img src="${d.avatar_url}" class="profile-avatar-large" onerror="this.style.display='none'">`}else{h+='<div class="profile-avatar-large" style="background:rgba(255,255,255,0.1);display:inline-flex;align-items:center;justify-content:center;font-size:30px">👤</div>'}
    h+='<div class="profile-username">@'+escapeHtml(d.username)+' <span class="copy-btn" onclick="copyUsername(\''+escapeHtml(d.username)+'\')"><i class="fas fa-copy"></i></span></div>';
    h+='<div style="font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:10px">'+escapeHtml(d.name||'')+'</div>';
    if(d.groups&&d.groups.length>0){h+='<div class="profile-groups"><div style="font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:6px">Groups ('+d.groups.length+')</div>';d.groups.forEach(g=>{h+='<div class="group-item" onclick="window.location.href=\'/group.html?gid='+g.id+'\'">👥 '+escapeHtml(g.room_name)+'</div>'});h+='</div>'}
    h+='</div>';document.getElementById('profileContent').innerHTML=h}catch(e){}
}

async function init(){
    const params=new URLSearchParams(window.location.search);const uid=params.get('uid');
    await getCurrentUser();
    if(uid&&uid!==currentUser?.id.toString()){loadUserProfile(uid)}else{loadMyProfile()}
}
init();
</script>
</body>
</html>
