<!DOCTYPE html>
<html>
<head><title>MP3 to Base64</title></head>
<body>
    <h3>MP3 File ကို Base64 ပြောင်းမယ်</h3>
    <input type="file" id="fileInput" accept="audio/*">
    <button onclick="convert()">Convert</button>
    <br><br>
    <textarea id="output" rows="10" cols="50" placeholder="Base64 ဒေတာ ဒီမှာပေါ်မယ်..."></textarea>
    <br>
    <button onclick="copyOutput()">Copy</button>
    
    <script>
        function convert() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert('File ရွေးပါ');
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('output').value = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        function copyOutput() {
            const output = document.getElementById('output');
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }
    </script>
</body>
</html>
