<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Groups - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        :root{--bg:#0a0a1a;--gold:#f39c12;--green:#2ecc71;--red:#e74c3c;--text:#fff;--b-solid:#6b3410;--b-light:#CD7F32;--b-bright:#E8A87C;--s-solid:#707070;--s-light:#C0C0C0;--s-bright:#E8E8E8;--g-solid:#B8860B;--g-light:#FFD700;--g-bright:#FFF8DC}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
        body{background:#0f1123;color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top,0px)}

        /* ========== HEADER ========== */
        .page-header{display:flex;align-items:center;gap:10px;padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top,0px));flex-shrink:0;background:#1a1f4b;border-bottom:1px solid rgba(255,255,255,0.08)}
        .page-header h3{flex:1;font-size:15px;font-weight:700}
        .back-btn{color:#fff;font-size:16px;text-decoration:none;padding:6px 10px;border-radius:8px;transition:0.2s}
        .back-btn:hover{background:rgba(255,255,255,0.08)}

        /* ========== GROUP LIST ========== */
        .group-list{flex:1;overflow-y:auto;padding:8px 12px}
        .tg-group-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;margin-bottom:4px;cursor:pointer;transition:all 0.25s;background:rgba(255,255,255,0.03);border:1px solid transparent}
        .tg-group-item:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.08);transform:translateX(2px)}
        .tg-group-item:active{transform:scale(0.98)}
        .tg-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid transparent;transition:all 0.2s}
        .tg-group-item:hover .tg-avatar{border-color:rgba(255,255,255,0.2)}
        .tg-info{flex:1;min-width:0}
        .tg-name{font-size:14px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .tg-meta{font-size:10px;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:6px}
        .tg-role{font-size:8px;padding:2px 8px;border-radius:10px;font-weight:700;flex-shrink:0}
        .tg-role.owner{background:rgba(255,215,0,0.15);color:#FFD700}
        .tg-role.admin{background:rgba(52,152,219,0.15);color:#3498db}
        .tg-role.member{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)}

        .tg-create-btn{display:flex;align-items:center;gap:10px;padding:14px;border-radius:14px;cursor:pointer;background:rgba(46,204,113,0.08);border:1px dashed rgba(46,204,113,0.3);transition:all 0.2s;margin-bottom:8px}
        .tg-create-btn:hover{background:rgba(46,204,113,0.15);border-color:#2ecc71}
        .tg-create-icon{width:42px;height:42px;border-radius:50%;background:rgba(46,204,113,0.15);display:flex;align-items:center;justify-content:center;font-size:18px;color:#2ecc71;flex-shrink:0}
        .tg-create-text{font-size:13px;font-weight:600;color:#2ecc71}
        .tg-create-sub{font-size:9px;color:rgba(255,255,255,0.4)}

        /* ========== CHAT AREA ========== */
        .chat-view{display:none;flex:1;flex-direction:column;overflow:hidden}
        .chat-view.active{display:flex}
        .chat-header-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#1a1f4b;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;cursor:pointer}
        .chat-header-bar:hover{background:rgba(255,255,255,0.02)}
        .chat-avatar-sm{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.15);flex-shrink:0}
        .chat-header-info{flex:1;min-width:0}
        .chat-header-name{font-size:13px;font-weight:700}
        .chat-header-meta{font-size:9px;color:rgba(255,255,255,0.4)}
        .chat-close-btn{color:rgba(255,255,255,0.5);font-size:18px;padding:6px;cursor:pointer;text-decoration:none}

        .messages{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:3px}
        .msg-row{display:flex;gap:6px;max-width:82%;margin-bottom:2px;align-items:flex-end}
        .msg-row.mine{align-self:flex-end;flex-direction:row-reverse}
        .msg-avatar-xs{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid rgba(255,255,255,0.15);cursor:pointer}
        .msg-bubble{padding:7px 12px;border-radius:14px;font-size:11px;word-break:break-word;position:relative;line-height:1.4}
        .msg-bubble.bronze-tier{background:linear-gradient(150deg,#6b3410,#8B4513)!important;color:#fff!important;border:1.5px solid #CD7F32!important}
        .msg-bubble.silver-tier{background:linear-gradient(150deg,#707070,#5a5a5a)!important;color:#fff!important;border:1.5px solid #C0C0C0!important}
        .msg-bubble.gold-tier{background:linear-gradient(150deg,#B8860B,#8B6914)!important;color:#fff!important;border:1.5px solid #FFD700!important}
        .msg-bubble.normal-tier{background:rgba(255,255,255,0.06)!important;border:1px solid rgba(255,255,255,0.1)!important;color:#fff!important}
        .msg-mine .msg-bubble.normal-tier{background:rgba(46,204,113,0.15)!important;border:1px solid rgba(46,204,113,0.2)!important}
        .msg-mine .msg-bubble{border-bottom-right-radius:3px}
        .msg-other .msg-bubble{border-bottom-left-radius:3px}
        .msg-sender{font-size:8px;margin-bottom:2px;font-weight:600;opacity:0.75;cursor:pointer;color:#f39c12}
        .msg-time{font-size:7px;color:rgba(255,255,255,0.3);margin-top:2px;text-align:right}
        .msg-seen{font-size:8px;color:rgba(46,204,113,0.6);text-align:right;margin-top:1px}
        .msg-seen.double{color:#2ecc71}
        .media-message{max-width:180px;border-radius:10px;cursor:pointer}
        .media-message img{max-width:100%;border-radius:10px}

        .msg-input-area{display:flex;gap:6px;padding:8px 10px;background:rgba(0,0,0,0.2);border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0}
        .msg-input-area input{flex:1;height:34px;padding:0 14px;border-radius:18px;font-size:12px;outline:none;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:#fff}
        .msg-input-area input::placeholder{color:rgba(255,255,255,0.25);font-size:11px}
        .msg-input-area button{width:34px;height:34px;border-radius:50%;border:none;font-size:14px;cursor:pointer;background:#f39c12;color:#000;flex-shrink:0}
        .media-btns{display:flex;gap:4px}
        .media-btn-sm{width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,0.06);color:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .media-btn-sm.locked{background:rgba(231,76,60,0.1);opacity:0.6}

        /* ========== GROUP SETTINGS PANEL ========== */
        .settings-panel{display:none;flex:1;flex-direction:column;overflow-y:auto}
        .settings-panel.active{display:flex}
        .settings-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#1a1f4b;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
        .settings-header .back-btn-sm{color:#fff;font-size:16px;cursor:pointer;padding:6px}
        .settings-header h3{flex:1;font-size:14px;font-weight:700}
        .settings-body{padding:16px;flex:1;overflow-y:auto}
        .settings-avatar-section{text-align:center;margin-bottom:20px}
        .settings-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(243,156,18,0.4);cursor:pointer;margin-bottom:8px;background:rgba(255,255,255,0.05);display:inline-flex;align-items:center;justify-content:center;font-size:35px}
        .settings-avatar:hover{border-color:#f39c12;box-shadow:0 0 20px rgba(243,156,18,0.3)}
        .settings-avatar-edit{display:inline-block;font-size:10px;color:#f39c12;cursor:pointer;margin-top:4px}
        .settings-field{margin-bottom:14px}
        .settings-field label{display:block;font-size:9px;color:rgba(255,255,255,0.45);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
        .settings-field input{width:100%;padding:10px 12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:12px;outline:none}
        .settings-field input:focus{border-color:#f39c12}
        .settings-field .link-row{display:flex;gap:6px}
        .settings-field .link-row input{flex:1}
        .settings-field .link-row button{padding:8px 14px;border:none;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap}
        .btn-copy{background:rgba(52,152,219,0.2);color:#3498db}
        .btn-edit-link{background:rgba(243,156,18,0.2);color:#f39c12}
        .btn-manage{width:100%;padding:12px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;background:rgba(52,152,219,0.15);color:#3498db;margin-top:8px;transition:all 0.2s}
        .btn-manage:hover{background:rgba(52,152,219,0.25)}
        .btn-danger{width:100%;padding:12px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;background:rgba(231,76,60,0.1);color:#e74c3c;margin-top:6px}

        /* ========== MODALS ========== */
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:2000;justify-content:center;align-items:center}
        .modal-overlay.active{display:flex}
        .modal-box{background:#1a1f4b;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px;width:90%;max-width:400px;max-height:85vh;overflow-y:auto}
        .modal-box h3{color:#f39c12;margin-bottom:12px;text-align:center;font-size:15px}
        .form-group{margin-bottom:10px}
        .form-group label{display:block;font-size:9px;margin-bottom:3px;color:rgba(255,255,255,0.5)}
        .form-group input{width:100%;padding:10px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:12px}
        .btn-row{display:flex;gap:8px;margin-top:10px}
        .btn{padding:10px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;flex:1;text-align:center}
        .btn-g{background:#2ecc71;color:#000}.btn-r{background:#e74c3c;color:#fff}.btn-b{background:#3498db;color:#fff}.btn-w{background:#f39c12;color:#000}
        .toast{position:fixed;top:15px;right:15px;padding:10px 16px;border-radius:10px;background:#2ecc71;color:#000;display:none;z-index:4000;font-size:11px;font-weight:700}
        .empty-state{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.25)}
        .empty-state i{font-size:45px;margin-bottom:12px;display:block}

        .premium-req-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:2500;justify-content:center;align-items:center}
        .premium-req-overlay.active{display:flex}
        .premium-req-card{background:#1a1f4b;border:2px solid #f39c12;border-radius:16px;padding:20px;width:90%;max-width:320px;text-align:center}
        .premium-req-card h3{font-size:15px;color:#f39c12;margin-bottom:8px}
        .btn-upgrade{background:linear-gradient(135deg,#f39c12,#e67e22);color:#000;padding:10px;border:none;border-radius:10px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;font-size:12px}

        .username-dropdown{position:absolute;top:100%;left:0;right:0;background:#1a1f4b;border:1px solid rgba(255,255,255,0.15);border-radius:10px;max-height:150px;overflow-y:auto;z-index:10;display:none}
        .username-dropdown.active{display:block}
        .username-dropdown-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;font-size:11px}
        .username-dropdown-item:hover{background:rgba(255,255,255,0.06)}
        .add-btn{background:#2ecc71;color:#000;padding:4px 10px;border-radius:6px;font-size:9px;font-weight:700;cursor:pointer}

        .member-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:rgba(0,0,0,0.2);border-radius:10px;margin-bottom:4px;font-size:10px;flex-wrap:wrap}
        .member-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,0.15);margin-right:8px;cursor:pointer;flex-shrink:0}
        .member-badge{font-size:7px;padding:2px 8px;border-radius:10px;font-weight:700}
        .member-badge.owner{background:rgba(255,215,0,0.15);color:#FFD700}
        .member-badge.admin{background:rgba(52,152,219,0.15);color:#3498db}
        .member-badge.member{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5)}
        .join-btn{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#000;padding:8px 20px;border:none;border-radius:20px;font-weight:700;cursor:pointer;font-size:12px;animation:joinPulse 1.5s infinite;width:100%}
        @keyframes joinPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <!-- ========== GROUP LIST VIEW ========== -->
    <div class="page-header" id="listHeader">
        <a href="/chat.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h3>👥 Groups</h3>
    </div>
    <div class="group-list" id="groupListView"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div></div>

    <!-- ========== CHAT VIEW ========== -->
    <div class="chat-view" id="chatView">
        <div class="chat-header-bar" onclick="openGroupSettings()">
            <img class="chat-avatar-sm" id="chatAvatar" src="" onerror="this.style.display='none'" style="display:none">
            <div class="chat-header-info">
                <div class="chat-header-name" id="chatName">Group Chat</div>
                <div class="chat-header-meta" id="chatMeta">0 members</div>
            </div>
            <a href="#" class="chat-close-btn" onclick="closeChatView(event)"><i class="fas fa-times"></i></a>
        </div>
        <div class="messages" id="messages"><div style="text-align:center;padding:30px;color:rgba(255,255,255,0.3)">Loading messages...</div></div>
        <div class="msg-input-area">
            <div class="media-btns">
                <button class="media-btn-sm" id="imageBtn" onclick="handleImageClick()"><i class="fas fa-image"></i></button>
                <button class="media-btn-sm" id="fileBtn" onclick="handleFileClick()"><i class="fas fa-paperclip"></i></button>
            </div>
            <input type="text" id="msgInput" placeholder="Message..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendMessage()}">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <!-- ========== SETTINGS VIEW ========== -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <span class="back-btn-sm" onclick="closeSettings()"><i class="fas fa-arrow-left"></i></span>
            <h3>Group Settings</h3>
        </div>
        <div class="settings-body" id="settingsBody"></div>
    </div>

    <!-- ========== MODALS ========== -->
    <div class="modal-overlay" id="groupModal"><div class="modal-box"><h3>➕ Create New Group</h3><div class="form-group"><label>Group Name</label><input type="text" id="groupName" placeholder="Enter group name..."></div><div class="form-group"><label>Public Link</label><input type="text" id="groupLink" placeholder="my-group-link" style="text-transform:lowercase"></div><div style="font-size:9px;color:rgba(255,255,255,0.4);margin-bottom:8px">🔗 Join link: /join/ <span id="linkPreview">my-group-link</span></div><div class="btn-row"><button class="btn btn-g" onclick="createGroup()">Create</button><button class="btn btn-r" onclick="closeModal('groupModal')">Cancel</button></div></div></div>
    <div class="modal-overlay" id="manageModal"><div class="modal-box"><h3>👥 Manage Members</h3><div id="manageContent"></div><button class="btn" onclick="closeModal('manageModal')" style="width:100%;margin-top:8px;background:rgba(255,255,255,0.08);color:#fff">Close</button></div></div>
    <div class="modal-overlay" id="addMemberModal"><div class="modal-box"><h3>➕ Add Member</h3><input type="hidden" id="addMemberRoomId"><div class="form-group" style="position:relative"><input type="text" id="addMemberSearch" placeholder="Search @username..." oninput="searchUserForAdd()" autocomplete="off"><div class="username-dropdown" id="addMemberDropdown"></div></div><button class="btn" onclick="closeModal('addMemberModal')" style="width:100%;margin-top:6px;background:rgba(255,255,255,0.08);color:#fff">Close</button></div></div>
    <div class="premium-req-overlay" id="premiumReqOverlay" onclick="closePremiumReq(event)"><div class="premium-req-card" onclick="event.stopPropagation()"><div style="font-size:45px">👑</div><h3>Premium Required</h3><p style="font-size:10px;color:rgba(255,255,255,0.6);margin-bottom:10px">Image & File sharing requires any Premium tier</p><button class="btn-upgrade" onclick="window.location.href='/chatpremium.html'">👑 Upgrade Now</button><button style="background:rgba(255,255,255,0.08);color:#fff;padding:8px;border:none;border-radius:10px;cursor:pointer;width:100%;margin-top:6px;font-size:10px" onclick="document.getElementById('premiumReqOverlay').classList.remove('active')">Cancel</button></div></div>

<script>
// ============================================
// GROUP SYSTEM - TELEGRAM STYLE
// ============================================
let currentUser=null,currentRoom=null,currentRoomData=null,isPremium=false,premiumTier=0,socket=null;
let selectedFile=null,selectedFileType=null,selectedFileName=null,uploadCancelled=false;
const IMGBB_KEY='55854bc5e01a19fd4793d1df84326d00';
let pendingAvatarFile=null,currentUploadGroupId=null;

function showToast(m,e){e=e||false;const t=document.getElementById('toast');t.textContent=m;t.style.background=e?'#e74c3c':'#2ecc71';t.style.color=e?'#fff':'#000';t.style.display='block';setTimeout(()=>t.style.display='none',2500)}
function escapeHtml(t){if(!t)return'';const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function closeModal(id){document.getElementById(id).classList.remove('active')}
function closePremiumReq(e){if(e&&e.target!==document.getElementById('premiumReqOverlay'))return;document.getElementById('premiumReqOverlay').classList.remove('active')}
function handleImageClick(){if(!isPremium){document.getElementById('premiumReqOverlay').classList.add('active');return}selectImage()}
function handleFileClick(){if(!isPremium){document.getElementById('premiumReqOverlay').classList.add('active');return}selectFile()}

// ==================== INIT ====================
async function init(){
    await getCurrentUser();
    await checkPremiumStatus();
    initSocket();
    loadGroupList();
    
    // Check URL params
    const params=new URLSearchParams(window.location.search);
    const gid=params.get('gid');
    if(gid) openGroupChat(parseInt(gid));
}
init();

async function getCurrentUser(){
    const t=localStorage.getItem('auth_token');
    if(!t||t==='guest'){document.getElementById('groupListView').innerHTML='<div class="empty-state"><i class="fas fa-lock"></i><p>Please login</p></div>';return null}
    try{const r=await fetch('/api/chat/current_user',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})});const d=await r.json();if(d.success){currentUser=d.user;return currentUser}}catch(e){}
    return null;
}
async function checkPremiumStatus(){
    const t=localStorage.getItem('auth_token');if(!t||t==='guest')return;
    try{const r=await fetch('/api/chat/premium/all_tiers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})});const d=await r.json();
    if(d.success&&d.tiers){let h=0;for(let i=3;i>=1;i--){if(d.tiers[i]){h=i;break}}isPremium=h>0;premiumTier=h;updateMediaButtons(isPremium)}}catch(e){}
}
function updateMediaButtons(h){const i=document.getElementById('imageBtn'),f=document.getElementById('fileBtn');if(h){i.disabled=false;f.disabled=false;i.classList.remove('locked');f.classList.remove('locked')}else{i.disabled=true;f.disabled=true;i.classList.add('locked');f.classList.add('locked')}}
function initSocket(){
    socket=io(window.location.origin,{transports:['polling','websocket'],reconnection:true});
    socket.on('new_message',msg=>{if(currentRoom===msg.roomId){addMessageToUI(msg,msg.sender_id===currentUser?.id,msg.sender_premium_tier||0);scrollToBottom()}});
}

// ==================== GROUP LIST ====================
async function loadGroupList(){
    if(!currentUser)return;
    try{const r=await fetch('/api/chat/groups',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUser.id})});const d=await r.json();
    let h='';
    // Create button
    h+=`<div class="tg-create-btn" onclick="openCreateGroupModal()"><div class="tg-create-icon"><i class="fas fa-plus"></i></div><div><div class="tg-create-text">Create New Group</div><div class="tg-create-sub">Start a community</div></div></div>`;
    if(d.groups?.length){
        d.groups.forEach(g=>{
            let av=g.avatar_url?`<img src="${g.avatar_url}" class="tg-avatar" onerror="this.style.display='none'">`:`<div class="tg-avatar">👥</div>`;
            let role='';if(g.user_role==='owner')role='<span class="tg-role owner">Owner</span>';else if(g.user_role==='admin')role='<span class="tg-role admin">Admin</span>';else role='<span class="tg-role member">Member</span>';
            h+=`<div class="tg-group-item" onclick="openGroupChat(${g.id})">${av}<div class="tg-info"><div class="tg-name">${escapeHtml(g.room_name)}</div><div class="tg-meta">${g.member_count||0} members</div></div>${role}</div>`;
        });

// ==================== GROUP AVATAR UPLOAD (FULLY FIXED) ====================
let groupAvatarFile = null;
let groupAvatarBusy = false;

function uploadGroupPic(gid) {
    // ✅ Permission Check (UI Level)
    if (!currentRoomData) {
        showToast('Group data not loaded', true);
        return;
    }
    if (currentRoomData.user_role !== 'owner' && currentRoomData.user_role !== 'admin') {
        showToast('❌ Only Owner or Admin can change group photo', true);
        return;
    }
    if (groupAvatarBusy) {
        showToast('Upload in progress, please wait', true);
        return;
    }
    
    currentUploadGroupId = gid;
    pickGroupAvatarFile();
}

function pickGroupAvatarFile() {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    
    input.onchange = function(e) {
        // ✅ 1. Check if files exist
        if (!e.target.files || e.target.files.length === 0) {
            console.log('[GROUP AVATAR] No file selected');
            return;
        }
        
        var file = e.target.files[0];
        
        // ✅ 2. Debug log
        console.log('[GROUP AVATAR] File:', file.name, 'Size:', file.size, 'Type:', file.type);
        console.log('[GROUP AVATAR] Is Blob?', file instanceof Blob);
        console.log('[GROUP AVATAR] Is File?', file instanceof File);
        
        // ✅ 3. Blob validation
        if (!(file instanceof Blob)) {
            console.error('[GROUP AVATAR] ERROR: Not a Blob');
            showToast('❌ Invalid file type', true);
            return;
        }
        
        // ✅ 4. Type check
        if (!file.type.startsWith('image/')) {
            showToast('❌ Only images allowed', true);
            return;
        }
        
        // ✅ 5. Size check (5MB max)
        if (file.size > 5 * 1024 * 1024) {
            showToast('❌ File too large (max 5MB)', true);
            return;
        }
        
        // ✅ 6. Save to variable
        groupAvatarFile = file;
        
        // ✅ 7. Show preview
        showGroupAvatarPreview(file);
    };
    
    input.click();
}

function showGroupAvatarPreview(file) {
    // ✅ Final Blob check before readAsDataURL
    if (!file) {
        console.error('[GROUP AVATAR PREVIEW] No file');
        showToast('❌ No file', true);
        return;
    }
    
    if (!(file instanceof Blob)) {
        console.error('[GROUP AVATAR PREVIEW] Not a Blob, type:', typeof file);
        showToast('❌ Invalid file', true);
        return;
    }
    
    console.log('[GROUP AVATAR PREVIEW] Reading file...');
    
    var reader = new FileReader();
    
    reader.onload = function(event) {
        console.log('[GROUP AVATAR PREVIEW] Read success');
        
        var html = '<div class="modal-overlay active" id="avatarPreviewModal" onclick="closeGroupAvatarPreview()">';
        html += '<div class="modal-box" onclick="event.stopPropagation()" style="text-align:center">';
        html += '<h3>📷 Preview</h3>';
        html += '<img src="' + event.target.result + '" style="max-width:200px;max-height:200px;border-radius:12px;margin:10px 0;border:2px solid rgba(255,255,255,0.15)">';
        html += '<div style="font-size:9px;color:rgba(255,255,255,0.4);margin-bottom:10px">' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)</div>';
        html += '<div class="btn-row">';
        html += '<button class="btn btn-g" onclick="confirmGroupAvatarUpload()">💾 Save</button>';
        html += '<button class="btn btn-r" onclick="closeGroupAvatarPreview()">Cancel</button>';
        html += '</div></div></div>';
        
        document.body.insertAdjacentHTML('beforeend', html);
    };
    
    reader.onerror = function() {
        console.error('[GROUP AVATAR PREVIEW] Read error');
        showToast('❌ Failed to read file', true);
    };
    
    // ✅ Safe call
    reader.readAsDataURL(file);
}

function closeGroupAvatarPreview() {
    var modal = document.getElementById('avatarPreviewModal');
    if (modal) modal.remove();
    // Don't clear groupAvatarFile here - user might want to retry
}

async function confirmGroupAvatarUpload() {
    // Close preview
    closeGroupAvatarPreview();
    
    // ✅ Validate state
    if (!groupAvatarFile) {
        console.error('[GROUP AVATAR UPLOAD] No file');
        showToast('❌ No file selected', true);
        return;
    }
    
    if (!(groupAvatarFile instanceof Blob)) {
        console.error('[GROUP AVATAR UPLOAD] Corrupted file state');
        groupAvatarFile = null;
        showToast('❌ File corrupted, try again', true);
        return;
    }
    
    if (!currentUploadGroupId) {
        console.error('[GROUP AVATAR UPLOAD] No group ID');
        return;
    }
    
    groupAvatarBusy = true;
    showToast('⏳ Uploading...');
    
    console.log('[GROUP AVATAR UPLOAD] Starting. Group:', currentUploadGroupId);
    
    try {
        // Step 1: Read file to base64
        var reader = new FileReader();
        var base64 = await new Promise(function(resolve, reject) {
            reader.onload = function(e) { resolve(e.target.result); };
            reader.onerror = function() { reject(new Error('Read failed')); };
            reader.readAsDataURL(groupAvatarFile);
        });
        console.log('[GROUP AVATAR UPLOAD] Base64 ready, length:', base64.length);
        
        // Step 2: Upload to ImgBB
        showToast('⏳ Uploading to server...');
        var formData = new URLSearchParams();
        formData.append('key', IMGBB_KEY);
        formData.append('image', base64.split(',')[1]);
        
        var imgbbRes = await fetch('https://api.imgbb.com/1/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        });
        
        var imgbbData = await imgbbRes.json();
        console.log('[GROUP AVATAR UPLOAD] ImgBB:', imgbbData);
        
        if (!imgbbData.success) {
            throw new Error(imgbbData.error?.message || 'ImgBB upload failed');
        }
        
        var imageUrl = imgbbData.data.url;
        console.log('[GROUP AVATAR UPLOAD] URL:', imageUrl);
        
        // Step 3: Save to our server
        showToast('⏳ Saving...');
        
        var saveRes = await fetch('/api/chat/update_group_avatar', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomId: currentUploadGroupId, avatarUrl: imageUrl })
        });
        
        var saveData = await saveRes.json();
        console.log('[GROUP AVATAR UPLOAD] Server:', saveData);
        
        if (saveData.success) {
            showToast('✅ Group photo updated!');
            openGroupSettings();
            loadGroupList();
        } else {
            showToast('❌ ' + (saveData.message || 'Save failed'), true);
        }
        
    } catch(e) {
        console.error('[GROUP AVATAR UPLOAD] Error:', e.message);
        showToast('❌ ' + e.message, true);
    } finally {
        // Clean up
        groupAvatarFile = null;
        groupAvatarBusy = false;
    }
        }

// ==================== FILE UPLOAD ====================
function selectImage(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=e=>{if(e.target.files[0]){selectedFile=e.target.files[0];selectedFileType='image';selectedFileName=selectedFile.name;uploadFile(selectedFile,'image')}};i.click()}
function selectFile(){const i=document.createElement('input');i.type='file';i.onchange=e=>{if(e.target.files[0]){selectedFile=e.target.files[0];selectedFileType='file';selectedFileName=selectedFile.name;uploadFile(selectedFile,'file')}};i.click()}
async function uploadFile(file,type){
    showToast('Uploading...');
    try{const r=new FileReader();const b64=await new Promise(res=>{r.onload=e=>res(e.target.result);r.readAsDataURL(file)});
    const res=await fetch('/api/chat/upload_file',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:localStorage.getItem('auth_token'),base64:b64,fileName:file.name,fileType:file.type})});const d=await res.json();
    if(d.success){socket.emit('send_message',{roomId:currentRoom,message:type==='image'?`📷 IMAGE:${d.url}`:`📎 FILE:${d.url}|${d.fileName||file.name}`,userId:currentUser.id,username:currentUser.username,senderPremiumTier:premiumTier});showToast('Sent!')}else{showToast(d.message||'Upload failed',true)}}catch(e){showToast('Upload error',true)}
}
</script>
</body>
