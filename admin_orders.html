<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Orders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bg:#0c0e27;--p:#1a1f4b;--a:#4a1c7a;--r:#e74c3c;--g:#2ecc71;--w:#f39c12;--b:#3498db;--t:#fff}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);color:var(--t);min-height:100vh;padding:15px;overflow-y:auto}
        .section{background:rgba(26,31,75,0.6);border-radius:10px;padding:15px;margin-bottom:12px;border:1px solid rgba(74,28,122,0.5)}
        .section h3{color:var(--w);font-size:13px;margin-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:6px;display:flex;align-items:center;gap:8px}
        .btn{padding:8px 14px;border:none;border-radius:6px;font-size:11px;font-weight:bold;cursor:pointer;margin:3px;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;justify-content:center}
        .btn-w{background:var(--w);color:#000}.btn-g{background:var(--g);color:#000}.btn-r{background:var(--r);color:#fff}.btn-b{background:var(--b);color:#fff}
        .status-badge{font-size:8px;padding:4px 8px;border-radius:12px;font-weight:bold;display:inline-block}
        .status-badge.on{background:rgba(46,204,113,0.2);color:var(--g)}
        .status-badge.off{background:rgba(231,76,60,0.2);color:var(--r)}
        .order-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(0,0,0,0.2);border-radius:6px;margin-bottom:4px;font-size:10px;border-left:3px solid var(--w);gap:8px}
        .order-date-header{color:var(--w);font-size:11px;font-weight:bold;padding:8px 0 4px 0;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:6px}
        .screenshot-preview{max-width:35px;max-height:35px;border-radius:4px;cursor:pointer;border:1px solid rgba(255,255,255,0.2)}
        .full-order-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:5000;justify-content:center;align-items:center}
        .full-order-overlay.active{display:flex}
        .full-order-modal{background:linear-gradient(145deg,#0f1235,#1a1f4b);border:2px solid rgba(255,255,255,0.15);border-radius:16px;width:98%;max-width:1400px;height:95vh;display:flex;flex-direction:column;overflow:hidden}
        .full-order-header{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
        .full-order-header h2{font-size:16px;color:var(--w);margin:0}
        .full-order-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:18px;cursor:pointer}
        .full-order-toolbar{display:flex;gap:8px;padding:10px 16px;background:rgba(0,0,0,0.2);border-bottom:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;flex-shrink:0}
        .full-order-toolbar .filter-btn{padding:6px 12px;font-size:9px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.05);color:#fff;cursor:pointer}
        .full-order-toolbar .filter-btn.active{background:var(--w);color:#000;border-color:var(--w);font-weight:bold}
        .batch-action-bar{display:none;padding:8px 16px;background:rgba(243,156,18,0.15);border-bottom:1px solid var(--w);align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
        .batch-action-bar.active{display:flex}
        .batch-action-bar span{font-size:10px;color:var(--w);font-weight:bold}
        .full-order-table-wrap{flex:1;overflow-y:auto;overflow-x:auto;padding:0}
        .full-order-table{width:100%;border-collapse:collapse;font-size:11px;min-width:100%}
        .full-order-table th{background:rgba(0,0,0,0.8);color:var(--w);padding:12px 8px;text-align:left;font-size:10px;font-weight:bold;position:sticky;top:0;z-index:10}
        .full-order-table td{padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.05);vertical-align:middle}
        .status-badge-full{display:inline-block;padding:4px 10px;border-radius:12px;font-size:9px;font-weight:bold;min-width:75px;text-align:center}
        .status-badge-full.pending{color:#f39c12;background:rgba(243,156,18,0.15)}
        .status-badge-full.approved{color:#2ecc71;background:rgba(46,204,113,0.15)}
        .status-badge-full.rejected{color:#e74c3c;background:rgba(231,76,60,0.15)}
        .screenshot-thumb{width:45px;height:45px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid rgba(255,255,255,0.2)}
        .table-action-cell{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
        .table-action-cell input{width:60px;padding:5px 6px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#fff;font-size:9px}
        .full-order-footer{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.1);font-size:10px;flex-shrink:0;flex-wrap:wrap}
        .more-orders-btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:11px;font-weight:bold;cursor:pointer}
        .full-order-table input[type="checkbox"]{width:15px;height:15px;cursor:pointer;accent-color:var(--w)}
        .no-screenshot{color:rgba(255,255,255,0.3);font-size:20px}
        .game-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:9px;font-weight:bold}
        .game-badge.mlbb{background:rgba(243,156,18,0.2);color:#f39c12}
        .game-badge.pubg{background:rgba(231,76,60,0.2);color:#e74c3c}
        .game-badge.hok{background:rgba(155,89,182,0.2);color:#9b59b6}
        .game-badge.topup{background:rgba(46,204,113,0.2);color:#2ecc71}
        .admin-game-btn.active{background:rgba(255,255,255,0.15)!important;border:2px solid var(--w)!important}
        .admin-date-btn.active{background:rgba(255,255,255,0.15)!important;border:2px solid var(--w)!important}
    </style>
</head>
<body>
    <div class="section">
        <h3>🛒 Top-Up Orders</h3>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;">
            <div class="btn-row" style="display:flex;gap:6px;flex-wrap:wrap;flex:1;">
                <button class="btn btn-b" onclick="loadAdminOrders('all')">All</button>
                <button class="btn btn-b" onclick="loadAdminOrders('today')">Today</button>
                <button class="btn btn-b" onclick="loadAdminOrders('yesterday')">Yesterday</button>
            </div>
            <button class="more-orders-btn" onclick="openFullOrderModal()" style="flex-shrink:0;"><i class="fas fa-table"></i> More</button>
        </div>
        <div id="adminOrders" style="max-height:300px;overflow-y:auto;margin-bottom:8px;"></div>
    </div>

    <div class="section">
        <h3><i class="fas fa-shopping-cart"></i> Game Orders Management (MLBB / PUBG / HOK)</h3>
        <p style="font-size:9px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Approve လုပ်မှသာ User ထံသို့ ပို့ဆောင်ပေးမည်။</p>
        <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
            <button class="btn admin-game-btn active" onclick="adminSetGameFilter('all')">All Games</button>
            <button class="btn admin-game-btn" onclick="adminSetGameFilter('mlbb')" style="background:#f39c12;color:#000;">MLBB</button>
            <button class="btn admin-game-btn" onclick="adminSetGameFilter('pubg')" style="background:#e74c3c;color:#fff;">PUBG</button>
            <button class="btn admin-game-btn" onclick="adminSetGameFilter('hok')" style="background:#9b59b6;color:#fff;">HOK</button>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">
            <button class="btn admin-date-btn active" onclick="adminSetDateFilter('today')">Today</button>
            <button class="btn admin-date-btn" onclick="adminSetDateFilter('yesterday')">Yesterday</button>
            <div id="adminDateNumbers" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
        </div>
        <div id="adminOrderTableWrap"></div>
    </div>

    <!-- Full Order Modal -->
    <div class="full-order-overlay" id="fullOrderOverlay" onclick="closeFullOrderModal(event)">
        <div class="full-order-modal" onclick="event.stopPropagation()">
            <div class="full-order-header"><h2><i class="fas fa-table"></i> Order History</h2><button class="full-order-close" onclick="closeFullOrderModal()">&times;</button></div>
            <div class="batch-action-bar" id="batchActionBar"><span id="batchCount">0 selected</span><button class="btn btn-g" onclick="batchApprove()"><i class="fas fa-check-circle"></i> Approve Selected</button><button class="btn btn-r" onclick="batchReject()"><i class="fas fa-times-circle"></i> Reject Selected</button><button class="btn" onclick="selectAllOrders()" style="background:rgba(255,255,255,0.1);"><i class="fas fa-check-square"></i> Select All</button></div>
            <div class="full-order-toolbar">
                <button class="btn btn-g" onclick="approveAllPendingInModal()"><i class="fas fa-check-double"></i> Approve All Pending</button>
                <button class="btn btn-r" onclick="rejectAllPendingInModal()"><i class="fas fa-times"></i> Reject All Pending</button>
                <div class="filter-group">
                    <button class="filter-btn active" onclick="filterModalOrders('all', this)">All</button>
                    <button class="filter-btn" onclick="filterModalOrders('today', this)">Today</button>
                    <button class="filter-btn" onclick="filterModalOrders('yesterday', this)">Yesterday</button>
                </div>
            </div>
            <div class="full-order-table-wrap" id="fullOrderTableWrap"><div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4);"><i class="fas fa-spinner fa-spin" style="font-size:30px;"></i><p style="margin-top:12px;">Loading orders...</p></div></div>
            <div class="full-order-footer"><span>Total: <b id="fullOrderTotal">0</b> orders</span><span>Today: <b id="fullOrderToday">0</b> orders</span><span>Pending: <b id="fullOrderPending">0</b> orders</span></div>
        </div>
    </div>

    <script>
        let currentOrderFilter='all';
        let adminAllOrders=[];
        let adminCurrentFilter='all';
        let adminCurrentDate='today';
        let fullOrderModalFilter='all';
        let allModalOrders=[];

        // ==================== TOP-UP ORDERS ====================
        function zoomImage(src){const m=document.createElement('div');m.className='zoom-overlay';m.onclick=()=>m.remove();m.innerHTML=`<img src="${src}">`;document.body.appendChild(m);}
        async function loadAdminOrders(f){currentOrderFilter=f;try{const r=await fetch(`/api/admin/orders?filter=${f}`);const d=await r.json();const c=document.getElementById('adminOrders');document.getElementById("totalOrders").textContent=d.total||0;document.getElementById("todayOrders").textContent=d.today||0;if(!d.orders||d.orders.length===0){c.innerHTML='<p style="font-size:10px;color:rgba(255,255,255,0.4);padding:15px;text-align:center">No orders</p>';return}let cd='',h='';d.orders.forEach(o=>{const ds=new Date(o.created_at).toLocaleDateString('my-MM',{year:'numeric',month:'short',day:'numeric'});if(ds!==cd){cd=ds;h+=`<div class="order-date-header">📅 ${ds}</div>`}h+=`<div class="order-row"><div><b>${o.username||'N/A'}</b><br>💰 ${Math.abs(o.amount)||0} Ks | 💳 ${o.payment_method}<br><small>🆔 ${o.submitted_user_id||o.user_id} | ${new Date(o.created_at).toLocaleTimeString()}</small></div><div style="display:flex;gap:3px;align-items:center"><span style="font-size:8px;color:${o.status==='approved'?'var(--g)':o.status==='rejected'?'var(--r)':'var(--w)'}">${o.status}</span>${o.screenshot?`<img src="${o.screenshot}" class="screenshot-preview" onclick="zoomImage('${o.screenshot}')">`:'📷'}${o.status==='pending'?`<input type="number" id="approveAmt${o.id}" value="${Math.abs(o.amount)||10000}" style="width:55px;padding:3px;font-size:9px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:3px"><button class="btn btn-g" style="font-size:9px;padding:3px 6px" onclick="approveOrderWithAmount(${o.id},${o.user_id})">✓</button><button class="btn btn-r" style="font-size:9px;padding:3px 6px" onclick="rejectOrderWithReason(${o.id})">✕</button>`:''}</div></div>`});c.innerHTML=h}catch(e){}}
        async function approveOrderWithAmount(id,userId){const amtInput=document.getElementById('approveAmt'+id);const amount=parseInt(amtInput?.value)||0;if(amount<=0){alert('Enter amount');return}try{await fetch('/api/admin/order_status',{method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify({id,status:'approved'})});await fetch('/api/admin/update_balance',{method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:userId,amount:parseFloat(amount)})});alert('✅ Approved! +'+amount+' Ks');loadAdminOrders(currentOrderFilter)}catch(e){alert('Error')}}
        function rejectOrderWithReason(id){const reason=prompt('ငြင်းပယ်ရသည့်အကြောင်းရင်း:');if(reason===null)return;if(!reason.trim())return alert('Reason required!');rejectOrder(id,reason.trim())}
        async function rejectOrder(id,reason){try{await fetch('/api/admin/order_status',{method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify({id,status:'rejected',reason})});alert('❌ Rejected!');loadAdminOrders(currentOrderFilter)}catch(e){alert('Error')}}

        // ==================== GAME ORDERS ====================
        function detectGameTypeAdmin(order){let product=(order.product_name||'').toLowerCase();let payment=(order.payment_method||'').toLowerCase();if(product.includes('diamond')||product.includes('weekly')||product.includes('twilight'))return'mlbb';if(product.includes('uc'))return'pubg';if(product.includes('token'))return'hok';return'topup'}
        async function loadAdminOrderTable(){const wrap=document.getElementById('adminOrderTableWrap');wrap.innerHTML='<div style="text-align:center;padding:40px;"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';try{const r=await fetch('/api/admin/orders?filter=all');const d=await r.json();adminAllOrders=d.orders||[];renderAdminOrderTable();}catch(e){wrap.innerHTML='<div style="text-align:center;padding:40px;color:var(--r);">Error loading orders</div>'}}
        function renderAdminOrderTable(){let filtered=[...adminAllOrders];if(adminCurrentFilter!=='all'){filtered=filtered.filter(order=>detectGameTypeAdmin(order)===adminCurrentFilter)}const todayStr=new Date().toISOString().split('T')[0];const yesterdayStr=new Date(Date.now()-86400000).toISOString().split('T')[0];if(adminCurrentDate==='today'){filtered=filtered.filter(order=>order.created_at.split('T')[0]===todayStr)}else if(adminCurrentDate==='yesterday'){filtered=filtered.filter(order=>order.created_at.split('T')[0]===yesterdayStr)}else if(adminCurrentDate.startsWith('day_')){const daysAgo=parseInt(adminCurrentDate.split('_')[1]);const targetDate=new Date();targetDate.setDate(targetDate.getDate()-daysAgo);const targetStr=targetDate.toISOString().split('T')[0];filtered=filtered.filter(order=>order.created_at.split('T')[0]===targetStr)}filtered.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));renderAdminOrderTableHTML(filtered)}
        function adminSetDateFilter(dateType){adminCurrentDate=dateType;document.querySelectorAll('.admin-date-btn').forEach(btn=>btn.classList.remove('active'));if(event&&event.target)event.target.classList.add('active');renderAdminOrderTable()}
        function adminSetGameFilter(gameType){adminCurrentFilter=gameType;document.querySelectorAll('.admin-game-btn').forEach(btn=>btn.classList.remove('active'));if(event&&event.target)event.target.classList.add('active');renderAdminOrderTable()}
        function renderAdminOrderTableHTML(orders){const wrap=document.getElementById('adminOrderTableWrap');if(!wrap)return;if(orders.length===0){wrap.innerHTML='<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.4);"><i class="fas fa-inbox" style="font-size:50px;"></i><p style="margin-top:15px;">No orders found</p></div>';return}let html=`<div style="overflow-x:auto;margin-top:15px;"><table style="width:100%;border-collapse:collapse;font-size:11px;min-width:800px;"><thead><tr style="background:rgba(0,0,0,0.4);"><th style="padding:12px 8px;text-align:left;">ID</th><th style="padding:12px 8px;text-align:left;">User</th><th style="padding:12px 8px;text-align:left;">Game</th><th style="padding:12px 8px;text-align:left;">Product</th><th style="padding:12px 8px;text-align:left;">Amount</th><th style="padding:12px 8px;text-align:left;">Game ID/Player ID</th><th style="padding:12px 8px;text-align:center;">📷</th><th style="padding:12px 8px;text-align:left;">Date</th><th style="padding:12px 8px;text-align:left;">Status</th><th style="padding:12px 8px;text-align:left;">Action</th></tr></thead><tbody>`;orders.forEach(order=>{const gameType=detectGameTypeAdmin(order);let gameIdDisplay='';if(gameType==='mlbb'){gameIdDisplay=`${order.game_id||'N/A'} / ${order.server_id||'N/A'}`}else if(gameType==='pubg'){gameIdDisplay=order.player_id||'N/A'}else if(gameType==='hok'){gameIdDisplay=order.player_id||'N/A'}else{gameIdDisplay=order.submitted_user_id||'N/A'}const amount=Math.abs(order.amount||0);const dateStr=new Date(order.created_at).toLocaleString();const isPending=order.status==='pending';html+=`<tr style="border-bottom:1px solid rgba(255,255,255,0.05);"><td style="padding:10px 8px;"><b>#${order.id}</b></td><td style="padding:10px 8px;">${escapeHtml(order.username||'N/A')}<br><small style="color:rgba(255,255,255,0.5);">ID: ${order.user_id}</small></td><td style="padding:10px 8px;"><span class="game-badge ${gameType}">${gameType.toUpperCase()}</span></td><td style="padding:10px 8px;">${escapeHtml(order.product_name||order.payment_method||'-')}</td><td style="padding:10px 8px;"><b style="color:var(--w);">${amount.toLocaleString()} Ks</b></td><td style="padding:10px 8px;font-size:10px;">${gameIdDisplay}</td><td style="padding:10px 8px;text-align:center;">${order.screenshot?`<img src="${order.screenshot}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;cursor:pointer;" onclick="zoomImage('${order.screenshot}')">`:'—'}</td><td style="padding:10px 8px;font-size:10px;">${dateStr}</td><td style="padding:10px 8px;"><span class="status-badge ${order.status}" style="background:${order.status==='approved'?'#2ecc71':order.status==='rejected'?'#e74c3c':'#f39c12'}20;color:${order.status==='approved'?'#2ecc71':order.status==='rejected'?'#e74c3c':'#f39c12'};">${order.status==='approved'?'✅ Approved':order.status==='rejected'?'❌ Rejected':'⏳ Pending'}</span></td><td style="padding:10px 8px;">${isPending?`<div style="display:flex;gap:4px;flex-wrap:wrap;"><input type="number" id="adminApproveAmt_${order.id}" value="${amount}" style="width:70px;padding:5px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:4px;color:#fff;font-size:10px;"><button class="btn btn-g" onclick="adminApproveOrder(${order.id}, ${order.user_id})" style="font-size:9px;padding:5px 8px;">✓ Approve</button><button class="btn btn-r" onclick="adminRejectOrder(${order.id}, ${order.user_id}, ${amount})" style="font-size:9px;padding:5px 8px;">✕ Reject</button></div>`:'<span style="font-size:9px;color:rgba(255,255,255,0.4);">—</span>'}</td></tr>`});html+='</tbody></table></div>';wrap.innerHTML=html}
        async function adminApproveOrder(id,userId){const amountInput=document.getElementById(`adminApproveAmt_${id}`);const amount=parseInt(amountInput?.value)||0;if(amount<=0){alert('Enter amount');return}try{await fetch('/api/admin/order_status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:'approved'})});await fetch('/api/admin/update_balance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:userId,amount:parseFloat(amount)})});alert('✅ Order #'+id+' approved! +'+amount+' Ks');loadAdminOrderTable();loadAdminOrders(currentOrderFilter)}catch(e){alert('Error')}}
        async function adminRejectOrder(id,userId,amount){const reason='အချက်အလက်များ မှန်ကန်မှုမရှိသောကြောင့်ဖြစ်ပါသည်။';if(!confirm('❌ Reject order #'+id+'?\n\n'+reason))return;try{await fetch('/api/admin/order/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,reason})});alert('❌ Order #'+id+' rejected! Refunded '+amount+' Ks');loadAdminOrderTable();loadAdminOrders(currentOrderFilter)}catch(e){alert('Error')}}

        // ==================== FULL ORDER MODAL ====================
        function openFullOrderModal(){document.getElementById('fullOrderOverlay').classList.add('active');document.body.style.filter='blur(4px)';document.body.style.pointerEvents='none';document.getElementById('fullOrderOverlay').style.pointerEvents='auto';fullOrderModalFilter='all';document.querySelectorAll('.full-order-toolbar .filter-btn').forEach((btn,i)=>{btn.classList.toggle('active',i===0)});loadFullOrderModal('all')}
        function closeFullOrderModal(event){if(event&&event.target!==document.getElementById('fullOrderOverlay'))return;document.getElementById('fullOrderOverlay').classList.remove('active');document.body.style.filter='none';document.body.style.pointerEvents='auto';document.getElementById('batchActionBar').classList.remove('active')}
        async function loadFullOrderModal(filter){fullOrderModalFilter=filter;const wrap=document.getElementById('fullOrderTableWrap');wrap.innerHTML='<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.4);"><i class="fas fa-spinner fa-spin" style="font-size:30px;"></i><p style="margin-top:12px;">Loading...</p></div>';try{const r=await fetch(`/api/admin/orders?filter=${filter}`);const d=await r.json();allModalOrders=d.orders||[];document.getElementById('fullOrderTotal').textContent=d.total||0;document.getElementById('fullOrderToday').textContent=d.today||0;document.getElementById('fullOrderPending').textContent=allModalOrders.filter(o=>o.status==='pending').length;if(!allModalOrders.length){wrap.innerHTML='<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.4);"><i class="fas fa-inbox" style="font-size:40px;"></i><p style="margin-top:12px;">No orders found</p></div>';return}renderFullOrderTable(allModalOrders)}catch(e){wrap.innerHTML=`<div style="text-align:center;padding:40px;color:var(--r);"><i class="fas fa-exclamation-triangle" style="font-size:30px;"></i><p style="margin-top:12px;">Error loading orders</p><button class="btn btn-b" onclick="loadFullOrderModal('${filter}')" style="margin-top:10px;">🔄 Retry</button></div>`}}
        function renderFullOrderTable(orders){const wrap=document.getElementById('fullOrderTableWrap');let html=`<table class="full-order-table"><thead><tr><th style="width:35px;"><input type="checkbox" id="selectAllCheckbox" onchange="toggleAllCheckboxes(this)"></th><th>Order</th><th>User</th><th>Amount</th><th>Payment</th><th>Status</th><th style="text-align:center;">📷</th><th>Date</th><th>Action</th></tr></thead><tbody>`;orders.forEach(o=>{const amount=Math.abs(o.amount)||0;const dateStr=new Date(o.created_at).toLocaleDateString('my-MM',{year:'numeric',month:'short',day:'numeric'});const timeStr=new Date(o.created_at).toLocaleTimeString('my-MM',{hour:'2-digit',minute:'2-digit'});html+=`<tr id="modalOrderRow${o.id}" data-status="${o.status}"><td style="text-align:center;">${o.status==='pending'?`<input type="checkbox" class="order-checkbox" value="${o.id}" data-user-id="${o.user_id}" data-amount="${amount}" onchange="updateBatchBar()">`:''}</td><td><b style="color:var(--w);">#${o.id}</b></td><td><div style="font-weight:bold;color:#fff;font-size:11px;">${escapeHtml(o.username||'N/A')}</div><div style="font-size:8px;color:rgba(255,255,255,0.5);">🆔 ${o.submitted_user_id||o.user_id}</div></td><td><b style="color:var(--w);">${amount.toLocaleString()} Ks</b></td><td>💳 ${escapeHtml(o.payment_method||'N/A')}</td><td><span class="status-badge-full ${o.status}">${o.status==='approved'?'✅':o.status==='rejected'?'❌':'⏳'} ${o.status.toUpperCase()}</span></td><td style="text-align:center;">${o.screenshot?`<img src="${o.screenshot}" class="screenshot-thumb" onclick="zoomImage('${o.screenshot}')">`:'<span class="no-screenshot">📷</span>'}</td><td style="font-size:10px;white-space:nowrap;"><div>${dateStr}</div><div style="color:rgba(255,255,255,0.5);">${timeStr}</div></td><td>${o.status==='pending'?`<div class="table-action-cell"><input type="number" id="modalApproveAmt${o.id}" value="${amount}"><button class="btn btn-g" onclick="modalApproveOrder(${o.id},${o.user_id})">✓</button><button class="btn btn-r" onclick="modalRejectOrder(${o.id})">✕</button></div>`:`<span style="font-size:9px;color:rgba(255,255,255,0.4);">—</span>`}</td></tr>`});html+='</tbody></table>';wrap.innerHTML=html;document.getElementById('batchActionBar').classList.remove('active');updateBatchBar()}
        function filterModalOrders(filter,btn){document.querySelectorAll('.full-order-toolbar .filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');loadFullOrderModal(filter)}
        function toggleAllCheckboxes(master){document.querySelectorAll('.order-checkbox').forEach(cb=>cb.checked=master.checked);updateBatchBar()}
        function updateBatchBar(){const checked=document.querySelectorAll('.order-checkbox:checked');const bar=document.getElementById('batchActionBar');if(checked.length>0){bar.classList.add('active');document.getElementById('batchCount').textContent=`${checked.length} order(s) selected`}else{bar.classList.remove('active')}}
        function getSelectedOrders(){return Array.from(document.querySelectorAll('.order-checkbox:checked')).map(cb=>({id:parseInt(cb.value),userId:parseInt(cb.dataset.userId),amount:parseInt(cb.dataset.amount)}))}
        async function batchApprove(){const selected=getSelectedOrders();if(!selected.length)return alert('No orders selected');if(!confirm(`✅ Approve ${selected.length} order(s)?`))return;for(const order of selected){const amtInput=document.getElementById('modalApproveAmt'+order.id);const amount=amtInput?parseInt(amtInput.value)||order.amount:order.amount;await fetch('/api/admin/order_status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:order.id,status:'approved'})});await fetch('/api/admin/update_balance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:order.userId,amount:parseFloat(amount)})})}alert(`✅ ${selected.length} orders approved!`);loadFullOrderModal(fullOrderModalFilter);loadAdminOrders(currentOrderFilter)}
        async function batchReject(){const selected=getSelectedOrders();if(!selected.length)return alert('No orders selected');const reason=prompt(`❌ Reject ${selected.length} order(s)? Reason:`);if(!reason||!reason.trim())return;if(!confirm(`⚠️ Reject ${selected.length} order(s)?`))return;for(const order of selected){await fetch('/api/admin/order_status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:order.id,status:'rejected',reason:reason.trim()})})}alert(`❌ ${selected.length} orders rejected!`);loadFullOrderModal(fullOrderModalFilter);loadAdminOrders(currentOrderFilter)}
        function selectAllOrders(){const master=document.getElementById('selectAllCheckbox');if(master){master.checked=true;toggleAllCheckboxes(master)}}
        async function modalApproveOrder(id,userId){const amtInput=document.getElementById('modalApproveAmt'+id);const amount=parseInt(amtInput?.value)||0;if(amount<=0)return alert('Enter amount');await fetch('/api/admin/order_status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:'approved'})});await fetch('/api/admin/update_balance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:userId,amount:parseFloat(amount)})});alert('✅ Approved! +'+amount+' Ks');loadFullOrderModal(fullOrderModalFilter);loadAdminOrders(currentOrderFilter)}
        function modalRejectOrder(id){const reason=prompt('❌ Reject reason for Order #'+id+':');if(!reason||!reason.trim())return;fetch('/api/admin/order_status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:'rejected',reason:reason.trim()})}).then(()=>{alert('❌ Order #'+id+' rejected!');loadFullOrderModal(fullOrderModalFilter);loadAdminOrders(currentOrderFilter)}).catch(()=>alert('Error'))}
        async function approveAllPendingInModal(){const pending=allModalOrders.filter(o=>o.status==='pending');if(!pending.length)return alert('No pending orders');if(!confirm(`⚠️ Approve ALL ${pending.length} pending orders?`))return;for(const order of pending){const amount=Math.abs(order.amount)||10000;await fetch('/api/admin/order_status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:order.id,status:'approved'})});await fetch('/api/admin/update_balance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:order.user_id,amount:parseFloat(amount)})})}alert(`✅ ${pending.length} orders approved!`);loadFullOrderModal(fullOrderModalFilter);loadAdminOrders(currentOrderFilter)}
        async function rejectAllPendingInModal(){const pending=allModalOrders.filter(o=>o.status==='pending');if(!pending.length)return alert('No pending orders');const reason=prompt(`❌ Reject ALL ${pending.length} pending orders? Reason:`);if(!reason||!reason.trim())return;if(!confirm(`⚠️ Reject ALL ${pending.length} pending orders?`))return;for(const order of pending){await fetch('/api/admin/order_status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:order.id,status:'rejected',reason:reason.trim()})})}alert(`❌ ${pending.length} orders rejected!`);loadFullOrderModal(fullOrderModalFilter);loadAdminOrders(currentOrderFilter)}

        // ==================== UTILITY ====================
        function escapeHtml(str){if(!str)return'';return str.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m})}

        // ==================== INIT ====================
        loadAdminOrders('all');
        loadAdminOrderTable();
    </script>
</body>
</html>
