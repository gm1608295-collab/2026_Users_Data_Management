<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLBB - SOLO M Game Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>      
    :root{--bg:#0a0a1a;--p:#1a1f4b;--a:#4a1c7a;--w:#f39c12;--g:#2ecc71;--t:#fff;--r:#e74c3c;--b:#3498db}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
html,body{height:auto!important;min-height:100vh!important;overflow-y:auto!important;-webkit-overflow-scrolling:touch!important}
body{background:linear-gradient(160deg,#0a0d24 0%,#0f1235 50%,#080b1a 100%);color:var(--t);min-height:100vh;padding:12px;overflow-y:auto!important}
.container{max-width:500px;margin:0 auto;padding-bottom:30px}

/* ========== HEADER ========== */
.header{display:flex;align-items:center;gap:10px;margin-bottom:14px;background:linear-gradient(135deg,#1a0a2e,#2d1b4e);padding:14px 16px;border:1.5px solid rgba(255,255,255,0.1);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(243,156,18,0.05),transparent);animation:headerShine 3s infinite}
@keyframes headerShine{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.header a{color:var(--w);font-size:18px;text-decoration:none;flex-shrink:0;z-index:1;transition:all 0.2s}
.header a:hover{transform:scale(1.1)}
.header h2{color:var(--w);font-size:15px;font-weight:700;z-index:1}

/* ========== BALANCE CARD (LED BORDER) ========== */
.balance-bar{display:flex;gap:8px;margin-bottom:12px}
.bal-card{flex:1;background:rgba(255,255,255,0.03);border:2px solid #f39c12;padding:14px 12px;text-align:center;position:relative;overflow:hidden;animation:ledBorderBalance 2s linear infinite}
@keyframes ledBorderBalance{
0%{border-color:#f39c12;box-shadow:0 0 10px #f39c12,0 0 20px rgba(243,156,18,0.3)}
25%{border-color:#e74c3c;box-shadow:0 0 10px #e74c3c,0 0 20px rgba(231,76,60,0.3)}
50%{border-color:#2ecc71;box-shadow:0 0 10px #2ecc71,0 0 20px rgba(46,204,113,0.3)}
75%{border-color:#3498db;box-shadow:0 0 10px #3498db,0 0 20px rgba(52,152,219,0.3)}
100%{border-color:#f39c12;box-shadow:0 0 10px #f39c12,0 0 20px rgba(243,156,18,0.3)}
}
.bal-value{font-size:20px;font-weight:700;color:var(--w);position:relative;z-index:1}
.bal-label{font-size:8px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;position:relative;z-index:1}

/* ========== CATEGORY TABS ========== */
.category-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.category-tab{padding:8px 14px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);font-size:10px;font-weight:600;color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.3s;white-space:nowrap;backdrop-filter:blur(5px)}
.category-tab:hover{background:rgba(243,156,18,0.1);border-color:rgba(243,156,18,0.3);color:#fff}
.category-tab.active{background:linear-gradient(135deg,var(--w),#e67e22);color:#000;border-color:var(--w);font-weight:700;box-shadow:0 4px 15px rgba(243,156,18,0.3)}

/* ========== SECTION TITLE ========== */
.category-section-title{font-size:11px;font-weight:700;color:var(--w);margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:8px}
.cat-dot{width:8px;height:8px;background:var(--w);animation:dotPulse 1.5s infinite}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ========== PRODUCT GRID (3 PER ROW) ========== */
.product-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}

/* ========== PRODUCT CARD (GOLD GAMING - SHARP CORNERS) ========== */
.product-card{background:linear-gradient(160deg,#1a1000,#2d1800,#1a0c00);border:2px solid #b8860b;padding:14px 6px 10px;text-align:center;cursor:pointer;transition:all 0.3s cubic-bezier(0.25,0.8,0.25,1.2);position:relative;overflow:hidden;box-shadow:0 4px 15px rgba(184,134,11,0.3),inset 0 1px 0 rgba(255,215,0,0.1)}
.product-card::before{content:'';position:absolute;top:-50%;left:-100%;width:60%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,215,0,0.15),rgba(255,255,255,0.2),rgba(255,215,0,0.15),transparent);transform:skewX(-25deg);animation:goldSweep 3s ease-in-out infinite;z-index:3;pointer-events:none}
@keyframes goldSweep{0%{left:-100%}100%{left:150%}}
.product-card::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 50% 0%,rgba(255,215,0,0.2),transparent 70%);opacity:0;transition:opacity 0.4s;z-index:1;pointer-events:none}
.product-card:hover::after{opacity:1}
.product-card:hover{border-color:#ffd700;transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,0.4),0 0 25px rgba(255,215,0,0.3),0 0 50px rgba(255,215,0,0.1)}
.product-card:active{transform:scale(0.95)}
.product-card.selected{border-color:#2ecc71;background:linear-gradient(160deg,#0a1a0a,#0d2d0d,#0a1a0a);box-shadow:0 0 25px rgba(46,204,113,0.3),inset 0 1px 0 rgba(46,204,113,0.1)}
.product-card.selected::after{opacity:1;background:radial-gradient(circle at 50% 0%,rgba(46,204,113,0.2),transparent 70%)}
.product-card.selected::before{background:linear-gradient(90deg,transparent,rgba(46,204,113,0.1),rgba(255,255,255,0.15),rgba(46,204,113,0.1),transparent)}
.product-card .checkmark{display:none}
.product-card.selected .checkmark{display:flex;position:absolute;top:6px;right:6px;width:20px;height:20px;background:#2ecc71;color:#000;font-size:11px;font-weight:700;align-items:center;justify-content:center;z-index:5;box-shadow:0 2px 8px rgba(46,204,113,0.4)}

/* ========== IMAGE WRAPPER ========== */
.product-img-wrap{width:56px;height:56px;margin:0 auto 8px;overflow:hidden;border:1.5px solid rgba(255,215,0,0.3);background:rgba(0,0,0,0.6);transition:all 0.3s;position:relative;z-index:2}
.product-card:hover .product-img-wrap{border-color:rgba(255,215,0,0.7);box-shadow:0 0 20px rgba(255,215,0,0.2);transform:scale(1.05)}
.product-img{width:100%;height:100%;object-fit:contain;transition:transform 0.3s}
.product-card:hover .product-img{transform:scale(1.1)}

/* ========== PRODUCT NAME ========== */
.product-name{font-size:8.5px;color:rgba(255,255,255,0.85);font-weight:600;line-height:1.3;min-height:22px;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;transition:color 0.3s}
.product-card:hover .product-name{color:#ffd700}

/* ========== PRICE BOX ========== */
.product-price{font-size:13px;font-weight:700;color:#ffd700;background:rgba(0,0,0,0.7);border:1px solid rgba(255,215,0,0.3);padding:5px 10px;margin-top:4px;display:inline-block;position:relative;z-index:2;letter-spacing:0.5px;text-shadow:0 0 8px rgba(255,215,0,0.4);box-shadow:0 2px 8px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.05);transition:all 0.3s}
.product-card:hover .product-price{background:rgba(0,0,0,0.85);border-color:#ffd700;box-shadow:0 4px 15px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1),0 0 15px rgba(255,215,0,0.3);transform:scale(1.05)}

/* ========== ORIGINAL PRICE ========== */
.product-original{font-size:7.5px;color:rgba(255,255,255,0.25);text-decoration:line-through;margin-top:2px;position:relative;z-index:2}

/* ========== DETAIL PANEL ========== */
.detail-panel{display:none;background:rgba(0,0,0,0.6);border:1.5px solid rgba(255,255,255,0.1);padding:18px;margin-bottom:15px;animation:slideUp 0.35s ease;backdrop-filter:blur(15px);position:relative;overflow:hidden}
.detail-panel::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,var(--w),transparent)}
.detail-panel.active{display:block}
.detail-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06)}
.detail-header img{width:50px;height:50px;object-fit:contain;background:rgba(0,0,0,0.4);padding:5px;border:1.5px solid rgba(255,255,255,0.1)}
.detail-name{font-size:14px;font-weight:700;color:#fff}
.detail-price{font-size:18px;font-weight:700;color:var(--w);margin-top:2px}
.detail-original{font-size:9px;color:rgba(255,255,255,0.2);text-decoration:line-through}

/* ========== ID INPUTS ========== */
.id-row{display:flex;gap:8px;margin-bottom:10px}
.id-group{flex:1}
.id-group label{display:block;font-size:8px;color:rgba(255,255,255,0.4);margin-bottom:3px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.id-group input{width:100%;padding:12px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.1);color:#fff;font-size:14px;text-align:center;font-weight:700;letter-spacing:2px;transition:all 0.3s}
.id-group input:focus{outline:none;border-color:var(--w);box-shadow:0 0 15px rgba(243,156,18,0.1);background:rgba(255,255,255,0.06)}
.id-group input.invalid{border-color:var(--r);animation:shake 0.4s}

/* ========== ACTION BUTTONS ========== */
.action-row{display:flex;gap:8px;margin-top:12px}
.btn-cancel{flex:1;padding:12px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-cancel:hover{background:rgba(255,255,255,0.06);color:#fff}
.btn-buy{flex:2;padding:12px;background:linear-gradient(135deg,var(--w),#e67e22);border:none;color:#000;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.3s}
.btn-buy:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 25px rgba(243,156,18,0.35)}
.btn-buy:disabled{opacity:0.35;cursor:not-allowed;filter:grayscale(40%)}

/* ========== TOAST ========== */
.toast{position:fixed;top:20px;right:20px;padding:12px 18px;z-index:9999;font-size:12px;font-weight:700;display:none;box-shadow:0 8px 30px rgba(0,0,0,0.5);animation:slideIn 0.3s ease}

@keyframes slideUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}50%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
/* ========== QUANTITY SELECTOR ========== */
.quantity-row {
    margin-bottom: 12px;
}

.quantity-row label {
    display: block;
    font-size: 9px;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.quantity-control {
    display: flex;
    align-items: center;
    gap: 6px;
}

.qty-btn {
    width: 36px;
    height: 36px;
    background: rgba(255, 255, 255, 0.06);
    border: 1.5px solid rgba(255, 255, 255, 0.12);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.qty-btn:hover {
    background: rgba(243, 156, 18, 0.2);
    border-color: var(--w);
}

.quantity-control input {
    width: 55px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.04);
    border: 1.5px solid rgba(255, 255, 255, 0.12);
    color: #fff;
    font-size: 14px;
    text-align: center;
    font-weight: 700;
}

.quantity-control input:focus {
    outline: none;
    border-color: var(--w);
}

/* ========== TOTAL PRICE BOX ========== */
.total-price-box {
    background: rgba(0, 0, 0, 0.5);
    border: 1.5px solid rgba(255, 215, 0, 0.3);
    padding: 10px 14px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.total-label {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.6);
    font-weight: 600;
}

.total-value {
    font-size: 16px;
    font-weight: 700;
    color: #ffd700;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
}

/* ========== LOADING OVERLAY ========== */
.loading-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 5000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.loading-overlay.active {
    display: flex;
}

.loading-spinner {
    width: 45px;
    height: 45px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top: 3px solid var(--w);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-bottom: 14px;
}

.loading-text {
    font-size: 14px;
    color: #fff;
    font-weight: 600;
}

.loading-sub {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 5px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ========== SUCCESS MODAL ========== */
.success-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    z-index: 5000;
    justify-content: center;
    align-items: center;
}

.success-overlay.active {
    display: flex;
}

.success-box {
    background: linear-gradient(160deg, #0a0d24, #151a3a);
    border: 2px solid var(--g);
    padding: 25px;
    width: 90%;
    max-width: 370px;
    text-align: center;
    animation: modalSlideIn 0.4s ease;
    position: relative;
}

.success-close {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 26px;
    height: 26px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.5);
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.success-close:hover {
    background: #e74c3c;
    color: #fff;
}

.success-icon {
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: rgba(46, 204, 113, 0.15);
    margin: 0 auto 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    border: 2px solid rgba(46, 204, 113, 0.3);
}

.success-title {
    font-size: 16px;
    font-weight: 700;
    color: #2ecc71;
    margin-bottom: 8px;
}

.success-msg {
    font-size: 10px;
    color: rgba(255, 255, 255, 0.7);
    line-height: 1.8;
    margin-bottom: 16px;
}

.btn-ok {
    padding: 10px 35px;
    background: var(--w);
    color: #000;
    border: none;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-ok:hover {
    background: #e67e22;
    transform: scale(1.05);
}

@keyframes modalSlideIn {
    from { opacity: 0; transform: translateY(-30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ========== NOTI SYSTEM ========== */
.noti-container {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 4000;
}

.noti-bell {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.06);
    border: 1.5px solid rgba(255, 255, 255, 0.12);
    cursor: pointer;
    font-size: 18px;
    color: var(--w);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: all 0.2s;
}

.noti-bell:hover {
    background: rgba(243, 156, 18, 0.15);
    border-color: var(--w);
}

.noti-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--r);
    color: #fff;
    font-size: 8px;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
}

.noti-badge.show {
    display: flex;
}

.noti-dropdown {
    display: none;
    position: absolute;
    top: 48px;
    right: 0;
    width: 280px;
    max-height: 300px;
    overflow-y: auto;
    background: #0f1235;
    border: 1.5px solid rgba(255, 255, 255, 0.12);
    padding: 10px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
}

.noti-dropdown.active {
    display: block;
}

.noti-item {
    background: rgba(0, 0, 0, 0.35);
    padding: 10px 12px;
    margin-bottom: 6px;
    font-size: 10px;
    border-left: 3px solid #f39c12;
    line-height: 1.6;
    color: rgba(255, 255, 255, 0.85);
}

.noti-item.success {
    border-left-color: #2ecc71;
    background: rgba(46, 204, 113, 0.1);
}

.noti-item.pending {
    border-left-color: #e67e22;
    background: rgba(230, 126, 34, 0.1);
}

.noti-item .noti-time {
    font-size: 8px;
    color: rgba(255, 255, 255, 0.35);
    margin-top: 5px;
    text-align: right;
}

.noti-empty {
    text-align: center;
    color: rgba(255, 255, 255, 0.4);
    padding: 20px;
    font-size: 11px;
        }
    </style>
</head>
<body>
    <audio id="bgAudio" loop style="display:none"></audio>
    <div class="toast" id="toast"></div>
    
    <div class="container">
        <div class="header">
            <a href="/topup.html"><i class="fas fa-arrow-left"></i></a>
            <h2>📱 Mobile Legends</h2>
        </div>
        
        <div class="balance-bar">
            <div class="bal-card"><div class="bal-label">MMK Balance</div><div class="bal-value" id="mmkBalance">0 Ks</div></div>
        </div>
        
        <div class="category-tabs" id="categoryTabs">
            <div class="category-tab active" onclick="filterCategory('all')">All</div>
            <div class="category-tab" onclick="filterCategory('diamonds')">💎 Diamonds</div>
            <div class="category-tab" onclick="filterCategory('double-diamond')">💎 2x Diamond</div>
            <div class="category-tab" onclick="filterCategory('weekly-pass')">📅 Weekly</div>
            <div class="category-tab" onclick="filterCategory('twilight-pass')">🌙 Twilight</div>
            <div class="category-tab" onclick="filterCategory('epic')">⚔️ Epic</div>
        </div>
        
        <div id="productGrid"></div>
        
        <!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
    <div class="detail-header">
        <img id="detailImg" src="" alt="">
        <div>
            <div class="detail-name" id="detailName"></div>
            <div class="detail-price" id="detailPrice"></div>
            <div class="detail-original" id="detailOriginal"></div>
        </div>
    </div>
    
    <!-- Quantity Selector -->
    <div class="quantity-row">
        <label>📦 Quantity</label>
        <div class="quantity-control">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <input type="number" id="quantity" value="1" min="1" max="99" onchange="updateTotal()" oninput="updateTotal()">
            <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
    </div>
    
    <!-- Total Price -->
    <div class="total-price-box">
        <span class="total-label">Total:</span>
        <span class="total-value" id="totalPrice">0 Ks</span>
    </div>
    
    <div class="id-row">
        <div class="id-group">
            <label>🆔 Game ID (8-10 digits)</label>
            <input type="text" id="gameId" placeholder="Game ID" maxlength="10" oninput="validateInputs()">
        </div>
        <div class="id-group">
            <label>🖥️ Server ID (4-5 digits)</label>
            <input type="text" id="serverId" placeholder="Server ID" maxlength="5" oninput="validateInputs()">
        </div>
    </div>
    
    <div class="action-row">
        <button class="btn-cancel" onclick="closeDetail()">Cancel</button>
        <button class="btn-buy" id="buyBtn" disabled onclick="purchaseMLBB()">
            <i class="fas fa-shopping-cart"></i> Buy Now
        </button>
    </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">ဝယ်ယူမှု လုပ်ဆောင်နေသည်...</div>
    <div class="loading-sub">ခဏစောင့်ဆိုင်းပေးပါ</div>
</div>

<!-- Success Modal -->
<div class="success-overlay" id="successOverlay" onclick="closeSuccess(event)">
    <div class="success-box" onclick="event.stopPropagation()">
        <button class="success-close" onclick="closeSuccess()">✕</button>
        <div class="success-icon">✅</div>

// ==================== NOTI SYSTEM ====================
function loadNotiItems() {
    var saved = localStorage.getItem('mlbbNotiItems');
    if (saved) { try { notiItems = JSON.parse(saved); } catch(e) { notiItems = []; } }
    unreadCount = parseInt(localStorage.getItem('mlbbNotiUnread') || '0');
    updateNotiBadge();
    renderNotiDropdown();
}

function addNotiItem(type, message) {
    notiItems.unshift({ type: type, message: message, time: new Date().toISOString(), read: false });
    unreadCount++;
    if (notiItems.length > 50) notiItems.pop();
    localStorage.setItem('mlbbNotiItems', JSON.stringify(notiItems));
    localStorage.setItem('mlbbNotiUnread', unreadCount.toString());
    updateNotiBadge();
}

function updateNotiBadge() {
    var badge = document.getElementById('notiBadge');
    if (unreadCount > 0) {
        badge.textContent = unreadCount > 9 ? '9+' : unreadCount;
        badge.classList.add('show');
    } else {
        badge.classList.remove('show');
    }
}

function toggleNoti() {
    var dd = document.getElementById('notiDropdown');
    dd.classList.toggle('active');
    if (dd.classList.contains('active')) {
        unreadCount = 0;
        localStorage.setItem('mlbbNotiUnread', '0');
        notiItems.forEach(function(n) { n.read = true; });
        localStorage.setItem('mlbbNotiItems', JSON.stringify(notiItems));
        updateNotiBadge();
        renderNotiDropdown();
    }
}

function renderNotiDropdown() {
    var list = document.getElementById('notiList');
    var empty = document.getElementById('notiEmpty');
    if (notiItems.length === 0) {
        empty.style.display = 'block';
        list.innerHTML = '';
        return;
    }
    empty.style.display = 'none';
    list.innerHTML = notiItems.map(function(n) {
        var cls = n.type === 'success' ? 'success' : 'pending';
        return '<div class="noti-item ' + cls + '">' + n.message + '<div class="noti-time">' + new Date(n.time).toLocaleString() + '</div></div>';
    }).join('');
}

document.addEventListener('click', function(e) {
    var dd = document.getElementById('notiDropdown');
    var bell = document.querySelector('.noti-bell');
    if (dd && bell && !bell.contains(e.target) && dd.classList.contains('active')) {
        dd.classList.remove('active');
    }
});

// ==================== QUANTITY ====================
function changeQty(delta) {
    var qtyInput = document.getElementById('quantity');
    var qty = parseInt(qtyInput.value) || 1;
    qty = Math.max(1, Math.min(99, qty + delta));
    qtyInput.value = qty;
    updateTotal();
}

function updateTotal() {
    var qty = parseInt(document.getElementById('quantity').value) || 1;
    if (qty < 1) qty = 1;
    if (qty > 99) qty = 99;
    document.getElementById('quantity').value = qty;
    if (selectedProduct) {
        var total = selectedProduct.price * qty;
        document.getElementById('totalPrice').textContent = total.toLocaleString() + ' Ks';
    }
}

// ==================== SELECT PRODUCT ====================
function selectProduct(productName) {
    selectedProduct = PRODUCTS.find(function(p) { return p.name === productName; });
    if (!selectedProduct) return;
    
    document.querySelectorAll('.product-card').forEach(function(c) { c.classList.remove('selected'); });
    event.target.closest('.product-card').classList.add('selected');
    
    document.getElementById('detailPanel').classList.add('active');
    document.getElementById('detailImg').src = selectedProduct.img;
    document.getElementById('detailName').textContent = selectedProduct.name;
    document.getElementById('detailPrice').textContent = selectedProduct.price.toLocaleString() + ' Ks';
    if (selectedProduct.original > 0) {
        document.getElementById('detailOriginal').textContent = selectedProduct.original.toLocaleString() + ' Ks';
        document.getElementById('detailOriginal').style.display = 'block';
    } else { document.getElementById('detailOriginal').style.display = 'none'; }
    
    document.getElementById('quantity').value = 1;
    document.getElementById('totalPrice').textContent = selectedProduct.price.toLocaleString() + ' Ks';
    document.getElementById('gameId').value = '';
    document.getElementById('serverId').value = '';
    document.getElementById('buyBtn').disabled = true;
    document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth' });
}

function closeDetail() { document.getElementById('detailPanel').classList.remove('active'); selectedProduct = null; }

function validateInputs() {
    var id = document.getElementById('gameId').value.trim();
    var server = document.getElementById('serverId').value.trim();
    document.getElementById('buyBtn').disabled = !(id.length >= 8 && id.length <= 10 && /^\d+$/.test(id) && server.length >= 4 && server.length <= 5 && /^\d+$/.test(server) && selectedProduct);
}

// ==================== PURCHASE ====================
async function purchaseMLBB() {
    if (!selectedProduct) return showToast('Select a product', 'error');
    var token = localStorage.getItem('auth_token');
    if (!token || token === 'guest') return showToast('Login required', 'error');
    
    var qty = parseInt(document.getElementById('quantity').value) || 1;
    var totalPrice = selectedProduct.price * qty;
    var productName = qty > 1 ? selectedProduct.name + ' (x' + qty + ')' : selectedProduct.name;
    
    // Show Loading
    document.getElementById('loadingOverlay').classList.add('active');
    
    try {
        var r = await fetch('/api/purchase_game_item', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                token: token, game: 'mlbb', product_name: productName, price: totalPrice,
                game_id: document.getElementById('gameId').value.trim(),
                server_id: document.getElementById('serverId').value.trim()
            })
        });
        var d = await r.json();
        
        // Hide Loading
        document.getElementById('loadingOverlay').classList.remove('active');
        
        if (d.success) {
            // Show Success Modal
            document.getElementById('successMsg').innerHTML = 'Admin ဘက်မှ ထည့်သွင်းနေပြီဖြစ်ပြီး<br><b>၃ မိနစ်</b> အတွင်း သင့်ဂိမ်းအကောင့်ထဲသို့ ရောက်ရှိပါမည်<br><br><small style="color:#e67e22">⚠️ သင်၏ဖြည့်စွက်မှု မှားယွင်းပါက ကျွန်ုပ်တို့ဘက်မှ ဝယ်ယူမှုပယ်ဖျက်မည်ဖြစ်ပြီး သင်၏ဝယ်ယူထားသောငွေပမာဏကို တစ်နာရီအတွင်း app ထဲသို့ ပြန်လည်ပေးဆောင်ပါမည်။</small>';
            document.getElementById('successOverlay').classList.add('active');
            
            // Add Noti
            addNotiItem('success', '✅ <b>MLBB - ' + productName + '</b><br>💰 နှုတ်ငွေ: <b style="color:#e74c3c">-' + totalPrice.toLocaleString() + ' Ks</b><br>💵 လက်ကျန်: <b>' + d.new_balance.toLocaleString() + ' Ks</b>');
            
            document.getElementById('mmkBalance').textContent = d.new_balance.toLocaleString() + ' Ks';
            closeDetail();
        } else {
            showToast(d.message || 'Error', 'error');
        }
    } catch(e) {
        document.getElementById('loadingOverlay').classList.remove('active');
        showToast('Connection error', 'error');
    }
}

function closeSuccess(event) {
    if (event && event.target !== document.getElementById('successOverlay')) return;
    document.getElementById('successOverlay').classList.remove('active');
}
