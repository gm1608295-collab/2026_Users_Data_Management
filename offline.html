<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLBB Security - Offline</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
        body{background:linear-gradient(135deg,#0c0e27,#1a1f4b,#2c3e50);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .offline-box{text-align:center;color:#fff;max-width:400px}
        .offline-icon{font-size:80px;color:#f39c12;margin-bottom:20px;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        .offline-box h1{font-size:24px;margin-bottom:10px;color:#f39c12}
        .offline-box p{font-size:14px;color:#ccc;margin-bottom:20px;line-height:1.6}
        .retry-btn{display:inline-block;padding:12px 30px;background:#4a1c7a;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;text-decoration:none;transition:all 0.3s}
        .retry-btn:hover{background:#5d2a92;transform:translateY(-2px)}
        .retry-btn i{margin-right:8px}
        .status-dot{width:12px;height:12px;background:#e74c3c;border-radius:50%;display:inline-block;margin-right:8px;animation:blink 1s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
        .footer-text{font-size:11px;color:#666;margin-top:30px}
    </style>
</head>
<body>
    <div class="offline-box">
        <div class="offline-icon"><i class="fas fa-wifi"></i></div>
        <h1><span class="status-dot"></span> No Internet Connection</h1>
        <p>အင်တာနက်ချိတ်ဆက်မှုမရှိပါ။ သင့် WiFi သို့မဟုတ် Mobile Data ကိုစစ်ဆေးပြီး ပြန်လည်ချိတ်ဆက်ကြည့်ပါ။</p>
        <p>Please check your internet connection and try again.</p>
        <button class="retry-btn" onclick="retryConnection()"><i class="fas fa-redo"></i> Retry Connection</button>
        <div class="footer-text">© 2025 MLBB Account Management System</div>
    </div>
    <script>
        function retryConnection(){
            fetch('/').then(()=>{window.location.href='/'}).catch(()=>{alert('Still offline. Please check your connection.')});
        }
        // Auto-retry every 5 seconds
        setInterval(()=>{fetch('/').then(()=>{window.location.href='/'}).catch(()=>{})},5000);
    </script>
</body>
</html>
